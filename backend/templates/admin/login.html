{% extends "admin/login.html" %}

{% block extrahead %}
    {{ block.super }}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var form = document.querySelector('.login-card-body form');
            if (!form) return;
            var widget = document.createElement('div');
            widget.className = 'cf-turnstile mb-3';
            widget.setAttribute('data-sitekey', '{{ turnstile_site_key }}');
            widget.setAttribute('data-theme', 'auto');
            var submitWrap = form.querySelector('.d-grid') || form.lastElementChild;
            form.insertBefore(widget, submitWrap);
        });
    </script>
{% endblock %}
