  # ─── CORE APP ──────────────────────────────────────────────────────────────

  "backend/core/models.py":
    status: done
    imports:
      external: [{from: uuid, items: [uuid4]}, {from: django.db, items: [models]}]
      internal: []
    exports:
      - name: Permission
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          codename: str(50), unique
          label: str(100)
          description: str(350), blank
          created_at: datetime, auto
        meta: {ordering: [codename]}
      - name: DefaultSetting
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          key: str(100), unique
          value: text
          description: str(350), blank
          updated_by: FK → accounts.Member, SET_NULL, null
          created_at: datetime, auto
          updated_at: datetime, auto
        seeds: [default_group=<UUID>, default_currency=GBP, require_comment_approval=true, max_receipt_image_size_mb=5]
        permission_seeds: [can_contribute(ON), can_comment(ON), can_post, can_expense, can_manage_permissions, can_approve_comments, can_view_balance]
    needed_by:
      - {file: "backend/accounts/models.py",  items: [Permission], status: available}
      - {file: "backend/core/serializers.py", items: [Permission, DefaultSetting], status: pending}
      - {file: "backend/core/views.py",       items: [Permission, DefaultSetting], status: pending}

  "backend/core/apps.py":
    status: done
    imports:
      external: [{from: django.apps, items: [AppConfig]}]
      internal:
        - {from: "backend/core/signals.py", items: [signal handlers], status: available}
    exports: []
    needed_by: []

  "backend/core/management/commands/seed_initial_data.py":
    status: done
    note: >
      Closes a CRITICAL deploy gap discovered during the Phase 11 audit: nothing
      anywhere (no data migration, no signal, no fixture) ever created the
      Permission rows / default AccessGroup / DefaultSetting rows the codebase
      depends on — core/models.py only documented them as comments ("set via
      Django admin by superuser"). On a fresh production DB this left the
      ENTIRE permission system empty (no member could ever be granted
      can_contribute/can_post/etc., registration's default group would be NULL,
      payment methods would show as unconfigured). `python manage.py
      seed_initial_data` idempotently get_or_creates: all 11 Permission
      codenames referenced in code (can_contribute, can_comment, can_post,
      can_expense, can_view_balance, can_view_posts, can_view_dashboard,
      can_approve_comments, can_delete_member, can_change_any_password,
      can_manage_permissions), a default "Members" AccessGroup
      (is_default=True, granted can_contribute+can_comment per the
      accounts/models.py contract), and every DefaultSetting key the codebase
      reads (general/visibility/payment_manual/payment_paypal +
      payment_stripe/payment_google_pay placeholders reserved for Phase 10).
      Wired into backend/docker-entrypoint.sh, after migrate and before
      collectstatic — runs (harmlessly) on every container start.
    imports:
      external: [{from: django.core.management.base, items: [BaseCommand]}, {from: django.db, items: [transaction]}]
      internal:
        - {from: "backend/accounts/models.py", items: [{name: AccessGroup, status: available}]}
        - {from: "backend/core/models.py",     items: [{name: DefaultSetting, status: available}, {name: Permission, status: available}]}
    exports:
      - {name: Command, kind: class, type: Django BaseCommand, invocation: "python manage.py seed_initial_data"}
    needed_by:
      - {file: "backend/docker-entrypoint.sh", items: [release/startup sequence], status: available}

  "backend/core/signals.py":
    status: done
    imports:
      external: [{from: django.db.models.signals, items: [pre_delete]}, {from: django.dispatch, items: [receiver]}]
      internal:
        - {from: "backend/accounts/models.py", items: [{name: AccessGroup, status: available}, {name: Member, status: available}]}
        - {from: "backend/posts/models.py",    items: [{name: Comment, status: available}]}
