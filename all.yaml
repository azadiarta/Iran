of an explicit selection) and AccessGroupUpdateSerializer (now sets exactly the submitted permission set with no forced union, so an admin CAN manually disable any of the 4 baseline permissions for a given group — item f). Admin-panel access is now gated by a NEW frontend/lib/adminNav.ts export `hasAdminAccess({isSuperuser, groupPermissions})` (replaces the old ADMIN_PERMISSIONS export, also exporting BASELINE_PERMISSIONS = the same 4 codenames): superusers always pass; everyone else passes only if their group has at least one permission OUTSIDE the 4-item BASELINE_PERMISSIONS set — a member whose group grants ONLY some/all of those 4 'default plan' permissions is denied admin-panel access (admin/layout.tsx redirects to /forbidden) and the 'Admin Panel' entry is hidden from Navbar.tsx entirely (items c/e). admin/groups/page.tsx's create-group modal now seeds its permission checkboxes from BASELINE_PERMISSIONS instead of a hardcoded ['can_contribute','can_comment'].", "item d — fixed garbled/broken first-load text: frontend/app/layout.tsx (a redundant second root layout that ALSO rendered <html>/<body>, nesting inside frontend/app/[locale]/layout.tsx's own <html>/<body> and causing a hydration mismatch that briefly rendered broken/unstyled text on first paint) was DELETED entirely; frontend/app/[locale]/layout.tsx is now the SOLE root layout and gained the `metadata` export ({title:'Group Fund', description:'Transparent community fund management'}) and the `@/styles/globals.css` import that the deleted file used to provide.", "item g — fixed quick-logout for deactivated members + dedicated deactivated experience: backend/groupfund/settings.py SIMPLE_JWT gained CHECK_USER_IS_ACTIVE: False, so a deactivated member's existing JWT access token is no longer rejected by simplejwt's own authentication layer on every request (previously this caused an immediate logout loop right after login, even though accounts/backends.py already allowed a deactivated member's credentials to authenticate) — DRF permission classes (IsActiveMember/HasGroupPermission/IsSuperuser) are UNCHANGED and still require is_active=True, so the Phase 15 DeactivatedGuard + Navbar's home/contact-only nav for deactivated members continue to fully apply (deactivated members can reach only '/{locale}' and '/{locale}/contact'). NEW Member fields deactivation_reason (TextField, blank) and deactivated_by (FK to self, SET_NULL, related_name='+'), via migration 0004_member_deactivated_by_member_deactivation_reason; MemberToggleActiveView now records/clears both fields (and logs the reason in extra_data) on deactivate/reactivate; MemberProfileSerializer and MemberDetailSerializer expose deactivation_reason + a computed deactivated_by_name (display_name||full_name of the deactivating admin). The landing page's existing deactivation banner now also shows the admin-supplied reason (new common.deactivated_reason_label) and the deactivating admin's name (new common.deactivated_by_label) when present — 2 new i18n keys in messages/en.json and fa.json. admin/members/[id]/page.tsx's deactivate-confirmation AdminConfirmDialog gained a children slot containing an AdminTextarea for the reason (shown only when about to deactivate), and a new amber 'Danger Zone' info block on already-deactivated members' detail pages displays the stored reason and deactivating admin's name."]
    18:
      name: "bugfix — /api/auth/token/refresh/ 500 error for deleted-member refresh tokens"
      status: done
      done: ["Root cause: rest_framework_simplejwt.serializers.TokenRefreshSerializer.validate() looks up get_user_model().objects.get(**{USER_ID_FIELD: user_id}) with NO exception handling (unlike JWTAuthentication.get_user(), which catches DoesNotExist and raises AuthenticationFailed) — a refresh token (valid up to 7 days per SIMPLE_JWT.REFRESH_TOKEN_LIFETIME) belonging to a Member deleted in the meantime (e.g. via admin/members MemberDeleteView) raised an uncaught Member.DoesNotExist, producing a 500 Internal Server Error on POST /api/auth/token/refresh/ (visible in /admin/logs/system).", "backend/accounts/views.py — NEW SafeTokenRefreshSerializer(TokenRefreshSerializer) catches Member.DoesNotExist from .validate() and re-raises InvalidToken('No account found for this token.'); NEW SafeTokenRefreshView(TokenRefreshView) with serializer_class=SafeTokenRefreshSerializer.", "backend/accounts/urls.py — token/refresh/ now routes to SafeTokenRefreshView instead of the bare rest_framework_simplejwt.views.TokenRefreshView.", "Result: the endpoint now returns a normal 401 {detail: 'No account found for this token.', code: 'token_not_valid'} for a deleted member's refresh token, which the frontend's existing 401 refresh-failure handling (logout) already covers; active members' refresh flow is unaffected. Verified end-to-end with a live dev server (deleted-member token -> 401 no traceback; active-member token -> 200 with fresh access/refresh tokens)."]
    19:
      name: "bugfix — quiet routine 4xx 'Unauthorized'/'Not Found' WARNINGs in Railway console + /admin/logs/system"
      status: done
      done: ["Root cause: django.utils.log.log_response() (called from django.core.handlers.base.BaseHandler.get_response() for EVERY response with status_code>=400) logs via the 'django.request' logger at WARNING for any 4xx (e.g. 'Unauthorized: /api/posts/', 'Unauthorized: /api/fund/balance/', 'Unauthorized: /api/auth/token/refresh/') — these are routine, not errors: the homepage (frontend/app/[locale]/page.tsx) calls fundAPI.getBalance() and postsAPI.getList() on mount for EVERY visitor including anonymous ones, so any guest 401s on both; a stale/expired refresh token in localStorage similarly 401s POST /api/auth/token/refresh/ (handled gracefully by the axios interceptor -> logout()). Reported by the user as 'this warning always appears, on sqlite AND on postgres' — confirmed unrelated to the DB backend, purely an HTTP-status/logging-config issue.", "backend/core/logging_handlers.py — NEW Quiet4xxFilter(logging.Filter): reads record.status_code (set by log_response's extra=) and demotes record.levelno/levelname from WARNING to INFO when status_code<500; 5xx server errors pass through unchanged.", "backend/groupfund/settings.py LOGGING — added top-level 'filters': {quiet_4xx: {'()': 'core.logging_handlers.Quiet4xxFilter'}} and a new 'django.request' logger entry (handlers=[console, system_log], same level as 'django', propagate=False, filters=['quiet_4xx']).", "Result: routine 4xx responses now log at INFO in the Railway console (no longer shown as warnings) and fall below system_log's WARNING threshold, so they no longer create logs.SystemLog rows / clutter /admin/logs/system; genuine 5xx server errors are unaffected. Verified via manage.py check (clean) + a live Client().get('/api/fund/balance/') request: console line changed from 'WARNING django.request Unauthorized: ...' to 'INFO django.request Unauthorized: ...' and logs.SystemLog row count did not increase."]
