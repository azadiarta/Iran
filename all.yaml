meta:
  project: groupfund
  backend: django/python
  frontend: react/javascript
  db: postgresql
  deploy: railway
  payment: stripe (gbp primary, expandable: paypal, google_pay, multi-currency)

rules:
  status: [done, in-progress, pending]
  kind: [class, function, constant, type]
  before_build: check needed_by + check imports internal availability
  after_build: update exports + update imports with status

progress:
  current_phase: 9
  current_task: complete
  phases:
    1:
      name: database
      status: done
      done: [entities defined, models created, split into 5 apps, project setup, migrations verified]
    2:
      name: project structure
      status: done
      done: [groupfund project, 5 apps, settings.py, requirements.txt, .env.example]
    3:
      name: authentication system
      status: done
      done: [Member→AbstractBaseUser, MemberAuthBackend, JWT simplejwt, register/login/logout/profile views, HasGroupPermission, IsSuperuser, IsActiveMember, accounts/urls, groupfund/urls]
    4:
      name: model updates + signals + utils
      status: done
      done: [DefaultSetting model, AccessGroup.is_default + save(), get_default_group_id(), Member.group SET_DEFAULT, Expense.withdrawn_by SET_NULL, Post.author SET_NULL, core/signals.py, core/utils.py, core/apps.py ready(), migrations verified]
    5:
      name: backend API (fund, posts, comments)
      status: done
      done: [fund/serializers, fund/views, fund/urls, posts/serializers, posts/views, posts/urls, groupfund/urls updated]
    6:
      name: backend API (members, groups, settings, dashboard, logs)
      status: done
      done: [accounts/member_views, accounts/member_urls, accounts/group_views, accounts/group_urls, core/serializers, core/settings_views, core/settings_urls, core/dashboard_views, core/dashboard_urls, logs/serializers, logs/views, logs/urls, accounts/serializers extended, groupfund/urls updated]
    7:
      name: payment system (manual bank transfer + PayPal)
      status: done
      done: [fund/models updated (pending_review status + receipt_image), payments app created, BasePaymentProvider, ManualPaymentProvider, PayPalPaymentProvider, PaymentFactory, payments/serializers, payments/views, payments/urls, migrations 0003 applied, groupfund/urls updated]
    8:
      name: Django admin panel (jazzmin)
      status: done
      done: [django-jazzmin added, JAZZMIN_SETTINGS + JAZZMIN_UI_TWEAKS, i18n setup, core/admin.py, accounts/admin.py, fund/admin.py + balance templates, posts/admin.py, logs/admin.py, payments/admin.py, can_view_balance permission seed, FundBalanceView gated on can_view_balance]
    9:
      name: frontend
      status: done
      done: [lib/api.ts (axios + interceptors + unwrap), authStore, langStore, i18n, messages en/fa, middleware, layouts, Navbar, Footer, animations (IranianSymbols, PageTransition, SplashScreen), pages (landing, login, register, posts, posts/[id], expenses, contribute, profile, contact, forbidden, unavailable, not-found)]
    10:
      name: payment integration (Stripe / Google Pay)
      status: pending
    11:
      name: deploy
      status: pending

files:

  # ─── PROJECT CONFIG ────────────────────────────────────────────────────────

  "backend/groupfund/settings.py":
    status: done
    kind: config
    key_settings:
      installed_apps: [jazzmin, django.contrib.admin, django.contrib.auth, django.contrib.contenttypes, django.contrib.sessions, django.contrib.messages, django.contrib.staticfiles, rest_framework, rest_framework_simplejwt.token_blacklist, corsheaders, core, accounts, fund, posts, logs, payments]
      auth_user_model: accounts.Member
      authentication_backends: [accounts.backends.MemberAuthBackend]
      db_engine: postgresql (override: DB_ENGINE env for local sqlite testing)
      db_env_vars: [DB_NAME, DB_USER, DB_PASSWORD, DB_HOST, DB_PORT]
      media: MEDIA_ROOT=backend/media, MEDIA_URL=/media/
      static: STATIC_ROOT=backend/staticfiles, STATIC_URL=/static/
      cors: CORS_ALLOWED_ORIGINS from env
      auth_env_vars: [SECRET_KEY, DEBUG, ALLOWED_HOSTS]
      simple_jwt: ACCESS=1day, REFRESH=7days, ROTATE=true, BLACKLIST=true
      drf_default_auth: JWTAuthentication
      drf_default_permission: IsAuthenticated
    imports:
      external: [{from: os, items: [environ]}, {from: pathlib, items: [Path]}, {from: datetime, items: [timedelta]}]
      internal: []
    exports: []
    needed_by: []

  "backend/groupfund/urls.py":
    status: done
    imports:
      external: [{from: django.contrib, items: [admin]}, {from: django.urls, items: [path, include]}]
      internal:
        - {file: "backend/accounts/urls.py",        items: [urlpatterns], status: available}
        - {file: "backend/accounts/member_urls.py", items: [urlpatterns], status: available}
        - {file: "backend/accounts/group_urls.py",  items: [urlpatterns], status: available}
        - {file: "backend/fund/urls.py",            items: [urlpatterns], status: available}
        - {file: "backend/posts/urls.py",           items: [urlpatterns], status: available}
        - {file: "backend/logs/urls.py",            items: [urlpatterns], status: available}
        - {file: "backend/core/settings_urls.py",   items: [urlpatterns], status: available}
        - {file: "backend/core/dashboard_urls.py",  items: [urlpatterns], status: available}
        - {file: "backend/payments/urls.py",         items: [urlpatterns], status: available}
    exports: []
    needed_by: []

  # ─── ADMIN ────────────────────────────────────────────────────────────────

  "backend/core/admin.py":
    status: done
    imports:
      external:
        - {from: json, items: [json]}
        - {from: django.contrib, items: [admin]}
        - {from: django.contrib.contenttypes.models, items: [ContentType]}
        - {from: django.db.models, items: [Q]}
        - {from: django.utils.html, items: [mark_safe]}
      internal:
        - {from: "backend/core/models.py",  items: [{name: DefaultSetting, status: available}, {name: Permission, status: available}]}
        - {from: "backend/logs/models.py",  items: [{name: ActivityLog, status: available}]}
    exports:
      - {name: PermissionAdmin,      kind: class, type: Django ModelAdmin, note: "list_display codename/label/desc; read-only in admin"}
      - {name: DefaultSettingAdmin,  kind: class, type: Django ModelAdmin, note: "auto-sets updated_by; logs setting_updated_via_admin; SettingCategoryFilter; key readonly on edit"}
      - {name: SettingCategoryFilter,kind: class, type: SimpleListFilter,  note: "filters by key prefix: general/visibility/payment_manual/paypal/stripe/google"}
    needed_by: []

  "backend/accounts/admin.py":
    status: done
    imports:
      external:
        - {from: django.contrib, items: [admin]}
        - {from: django.contrib.auth.admin, items: [UserAdmin]}
        - {from: django.contrib.contenttypes.models, items: [ContentType]}
      internal:
        - {from: "backend/accounts/models.py", items: [{name: AccessGroup, status: available}, {name: Member, status: available}]}
        - {from: "backend/core/models.py",     items: [{name: DefaultSetting, status: available}]}
        - {from: "backend/fund/models.py",     items: [{name: Contribution, status: available}, {name: Expense, status: available}]}
        - {from: "backend/logs/models.py",     items: [{name: ActivityLog, status: available}]}
    exports:
      - {name: MemberAdmin,      kind: class, type: Django UserAdmin, note: "inlines: last-5 contributions + last-5 expenses; actions: activate/deactivate (never superuser); logs on save"}
      - {name: AccessGroupAdmin, kind: class, type: Django ModelAdmin, note: "filter_horizontal permissions; member_count column; set_as_default action syncs DefaultSetting+ActivityLog"}
    needed_by: []

  "backend/fund/admin.py":
    status: done
    imports:
      external:
        - {from: decimal, items: [Decimal]}
        - {from: django.contrib, items: [admin]}
        - {from: django.contrib.contenttypes.models, items: [ContentType]}
        - {from: django.db.models, items: [Sum]}
        - {from: django.utils.html, items: [mark_safe]}
      internal:
        - {from: "backend/core/models.py", items: [{name: DefaultSetting, status: available}]}
        - {from: "backend/fund/models.py", items: [{name: Contribution, status: available}, {name: Expense, status: available}]}
        - {from: "backend/logs/models.py", items: [{name: ActivityLog, status: available}]}
    exports:
      - {name: ContributionAdmin, kind: class, type: Django ModelAdmin, note: "contributor_display column; receipt_preview; approve/reject actions; changelist shows live fund balance"}
      - {name: ExpenseAdmin,      kind: class, type: Django ModelAdmin, note: "receipt_preview; changelist shows live fund balance"}
    templates:
      - "backend/fund/templates/admin/fund/contribution/change_list.html"
      - "backend/fund/templates/admin/fund/expense/change_list.html"
    needed_by: []

  "backend/posts/admin.py":
    status: done
    imports:
      external:
        - {from: django.contrib, items: [admin]}
        - {from: django.contrib.contenttypes.admin, items: [GenericTabularInline]}
        - {from: django.contrib.contenttypes.models, items: [ContentType]}
        - {from: django.utils.html, items: [mark_safe]}
      internal:
        - {from: "backend/logs/models.py",  items: [{name: ActivityLog, status: available}]}
        - {from: "backend/posts/models.py", items: [{name: Comment, status: available}, {name: Post, status: available}, {name: PostImage, status: available}]}
    exports:
      - {name: PostAdmin,      kind: class, type: Django ModelAdmin, note: "inlines: PostImageInline (thumbnails, add/delete) + PostCommentInline (GenericTabularInline, readonly approved only); comment_count column"}
      - {name: PostImageAdmin, kind: class, type: Django ModelAdmin, note: "image_preview column"}
      - {name: CommentAdmin,   kind: class, type: Django ModelAdmin, note: "approve/reject actions; author_display + text_preview + target columns; logs to ActivityLog"}
    needed_by: []

  "backend/logs/admin.py":
    status: done
    imports:
      external:
        - {from: json, items: [json]}
        - {from: django.contrib, items: [admin]}
        - {from: django.utils.html, items: [mark_safe]}
      internal:
        - {from: "backend/logs/models.py", items: [{name: ActivityLog, status: available}, {name: SystemLog, status: available}]}
    exports:
      - {name: ActivityLogAdmin, kind: class, type: Django ModelAdmin, note: "fully immutable (no add/change/delete); pretty_extra_data JSON; date_hierarchy"}
      - {name: SystemLogAdmin,   kind: class, type: Django ModelAdmin, note: "fully immutable; message_preview column; pretty_extra_data JSON"}
    needed_by: []

  "backend/payments/admin.py":
    status: done
    note: "No Django models in payments app — Contribution is registered in fund/admin.py"
    exports: []
    needed_by: []

  # ─── CORE APP ──────────────────────────────────────────────────────────────

  "backend/core/models.py":
    status: done
    imports:
      external: [{from: uuid, items: [uuid4]}, {from: django.db, items: [models]}]
      internal: []
    exports:
      - name: Permission
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          codename: str(50), unique
          label: str(100)
          description: str(350), blank
          created_at: datetime, auto
        meta: {ordering: [codename]}
      - name: DefaultSetting
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          key: str(100), unique
          value: text
          description: str(350), blank
          updated_by: FK → accounts.Member, SET_NULL, null
          created_at: datetime, auto
          updated_at: datetime, auto
        seeds: [default_group=<UUID>, default_currency=GBP, require_comment_approval=true, max_receipt_image_size_mb=5]
        permission_seeds: [can_contribute(ON), can_comment(ON), can_post, can_expense, can_manage_permissions, can_approve_comments, can_view_balance]
    needed_by:
      - {file: "backend/accounts/models.py",  items: [Permission], status: available}
      - {file: "backend/core/serializers.py", items: [Permission, DefaultSetting], status: pending}
      - {file: "backend/core/views.py",       items: [Permission, DefaultSetting], status: pending}

  "backend/core/apps.py":
    status: done
    imports:
      external: [{from: django.apps, items: [AppConfig]}]
      internal:
        - {from: "backend/core/signals.py", items: [signal handlers], status: available}
    exports: []
    needed_by: []

  "backend/core/signals.py":
    status: done
    imports:
      external: [{from: django.db.models.signals, items: [pre_delete]}, {from: django.dispatch, items: [receiver]}]
      internal:
        - {from: "backend/accounts/models.py", items: [{name: AccessGroup, status: available}, {name: Member, status: available}]}
        - {from: "backend/posts/models.py",    items: [{name: Comment, status: available}]}
        - {from: "backend/logs/models.py",     items: [{name: ActivityLog, status: available}]}
    exports:
      - {name: on_access_group_delete, kind: function, description: "moves members to default group before AccessGroup deletion"}
      - {name: on_post_delete,         kind: function, description: "cascades comments + logs deleted_post"}
      - {name: on_expense_delete,      kind: function, description: "cascades comments + logs deleted_expense"}
      - {name: on_member_delete,       kind: function, description: "logs deleted_member"}
    needed_by:
      - {file: "backend/core/apps.py", items: [signal handlers], status: available}

  "backend/core/utils.py":
    status: done
    imports:
      external: [{from: rest_framework.response, items: [Response]}]
      internal: []
    exports:
      - {name: api_success, kind: function, signature: "(data=None, message='', status_code=200) -> Response", description: "returns {success: true, message, data}"}
      - {name: api_error,   kind: function, signature: "(message='', status_code=400, errors=None) -> Response", description: "returns {success: false, message, errors}"}
    needed_by:
      - {file: "backend/accounts/views.py", items: [api_success, api_error], status: available}
      - {file: "backend/fund/views.py",     items: [api_success, api_error], status: pending}
      - {file: "backend/posts/views.py",    items: [api_success, api_error], status: pending}
      - {file: "backend/logs/views.py",     items: [api_success, api_error], status: pending}

  "backend/core/serializers.py":
    status: done
    imports:
      external: [{from: rest_framework, items: [serializers]}]
      internal:
        - {from: "backend/core/models.py", items: [{name: Permission, status: available}, {name: DefaultSetting, status: available}]}
    exports:
      - {name: PermissionSerializer,      kind: class, type: DRF ModelSerializer, fields: [id, codename, label, description]}
      - {name: DefaultSettingSerializer,  kind: class, type: DRF ModelSerializer, fields: [id, key, value, description, updated_by_name, updated_at]}
    needed_by:
      - {file: "backend/core/settings_views.py",  items: [DefaultSettingSerializer], status: available}

  "backend/core/settings_views.py":
    status: done
    imports:
      external: [{from: rest_framework.permissions, items: [IsAuthenticated]}, {from: rest_framework.views, items: [APIView]}]
      internal:
        - {from: "backend/accounts/models.py",     items: [{name: AccessGroup, status: available}]}
        - {from: "backend/accounts/permissions.py",items: [{name: IsSuperuser, status: available}]}
        - {from: "backend/core/models.py",         items: [{name: DefaultSetting, status: available}]}
        - {from: "backend/core/serializers.py",    items: [{name: DefaultSettingSerializer, status: available}]}
        - {from: "backend/core/utils.py",          items: [{name: api_success, status: available}, {name: api_error, status: available}]}
        - {from: "backend/logs/models.py",         items: [{name: ActivityLog, status: available}]}
    exports:
      - {name: DefaultSettingListView,   kind: class, type: DRF APIView, endpoint: "GET   /api/settings/",       auth: superuser}
      - {name: DefaultSettingUpdateView, kind: class, type: DRF APIView, endpoint: "PATCH /api/settings/{key}/", auth: superuser, note: "validates value per key, logs to ActivityLog"}
    needed_by:
      - {file: "backend/core/settings_urls.py", items: [DefaultSettingListView, DefaultSettingUpdateView], status: available}

  "backend/core/settings_urls.py":
    status: done
    imports:
      external: [{from: django.urls, items: [path]}]
      internal:
        - {from: "backend/core/settings_views.py", items: [{name: DefaultSettingListView, status: available}, {name: DefaultSettingUpdateView, status: available}]}
    exports:
      - {name: urlpatterns, kind: constant, type: list, routes: ["GET /", "PATCH {key}/"]}
    needed_by:
      - {file: "backend/groupfund/urls.py", items: [urlpatterns], status: available}

  "backend/core/dashboard_views.py":
    status: done
    imports:
      external:
        - {from: decimal, items: [Decimal]}
        - {from: django.db.models, items: [Sum]}
        - {from: django.utils, items: [timezone]}
        - {from: rest_framework.permissions, items: [IsAuthenticated]}
        - {from: rest_framework.views, items: [APIView]}
      internal:
        - {from: "backend/accounts/models.py",   items: [{name: Member, status: available}]}
        - {from: "backend/accounts/permissions.py", items: [{name: HasGroupPermission, status: available}]}
        - {from: "backend/core/models.py",       items: [{name: DefaultSetting, status: available}]}
        - {from: "backend/core/utils.py",        items: [{name: api_success, status: available}]}
        - {from: "backend/fund/models.py",       items: [{name: Contribution, status: available}, {name: Expense, status: available}]}
        - {from: "backend/fund/serializers.py",  items: [{name: ContributionSerializer, status: available}, {name: ExpenseSerializer, status: available}]}
        - {from: "backend/posts/models.py",      items: [{name: Post, status: available}, {name: Comment, status: available}]}
        - {from: "backend/posts/serializers.py", items: [{name: PostSerializer, status: available}, {name: CommentSerializer, status: available}]}
    exports:
      - {name: DashboardView, kind: class, type: DRF APIView, endpoint: "GET /api/dashboard/", auth: can_view_dashboard, note: "all numbers real-time; pending_comments only if can_approve_comments"}
    needed_by:
      - {file: "backend/core/dashboard_urls.py", items: [DashboardView], status: available}

  "backend/core/dashboard_urls.py":
    status: done
    imports:
      external: [{from: django.urls, items: [path]}]
      internal:
        - {from: "backend/core/dashboard_views.py", items: [{name: DashboardView, status: available}]}
    exports:
      - {name: urlpatterns, kind: constant, type: list, routes: ["GET /"]}
    needed_by:
      - {file: "backend/groupfund/urls.py", items: [urlpatterns], status: available}

  "backend/core/views.py":
    status: pending
    note: "PermissionViewSet for listing permissions — deferred to later phase"
    imports:
      external: [{from: rest_framework.viewsets, items: [ReadOnlyModelViewSet]}]
      internal:
        - {from: "backend/core/models.py",      items: [{name: Permission, status: available}]}
        - {from: "backend/core/serializers.py", items: [{name: PermissionSerializer, status: available}]}
    exports:
      - {name: PermissionViewSet, kind: class, type: DRF ReadOnlyModelViewSet}
    needed_by:
      - {file: "backend/core/urls.py", items: [PermissionViewSet], status: pending}

  "backend/core/urls.py":
    status: pending
    imports:
      external: [{from: rest_framework.routers, items: [DefaultRouter]}]
      internal:
        - {from: "backend/core/views.py", items: [{name: PermissionViewSet, status: pending}]}
    exports:
      - {name: urlpatterns, kind: constant, type: list}
    needed_by: []

  # ─── ACCOUNTS APP ──────────────────────────────────────────────────────────

  "backend/accounts/models.py":
    status: done
    note: "Member updated to AbstractBaseUser for AUTH_USER_MODEL + simplejwt support"
    imports:
      external:
        - {from: uuid, items: [uuid4]}
        - {from: django.db, items: [models]}
        - {from: django.core.exceptions, items: [ValidationError]}
        - {from: django.contrib.auth.models, items: [AbstractBaseUser, BaseUserManager]}
      internal:
        - {from: "backend/core/models.py", items: [{name: Permission, status: available}]}
    exports:
      - name: get_default_group_id
        kind: function
        signature: "() -> UUID | None"
        description: "returns id of AccessGroup with is_default=True; returns None if none exists or DB unavailable"
      - name: MemberManager
        kind: class
        type: Django BaseUserManager
        methods:
          - {signature: "create_user(password, **extra_fields) -> Member"}
          - {signature: "create_superuser(email, password, **extra_fields) -> Member", note: "terminal only — no API endpoint"}
      - name: AccessGroup
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          name: str(20), unique
          description: str(350), blank
          is_default: bool, default False (save() enforces at most one default at a time)
          permissions: M2M → core.Permission
          created_at: datetime, auto
          updated_at: datetime, auto
        meta: {ordering: [name]}
      - name: Member
        kind: class
        type: Django AbstractBaseUser
        fields:
          id: UUID, pk, auto
          full_name: str(35)
          display_name: str(20), blank
          group: FK → AccessGroup, SET_DEFAULT (default=get_default_group_id), null=True
          phone: str(20), unique, null=True (stored as NULL not '')
          email: EmailField, unique, null=True (stored as NULL not '')
          password: from AbstractBaseUser (set via set_password())
          last_login: from AbstractBaseUser
          is_active: bool, default True
          is_staff: bool, default False
          is_superuser: bool, default False
          created_at: datetime, auto
          updated_at: datetime, auto
        username_field: email
        required_fields: [full_name]
        validation: "clean() → phone OR email required"
        meta: {ordering: [full_name]}
    needed_by:
      - {file: "backend/fund/models.py",          items: [Member], status: available}
      - {file: "backend/posts/models.py",         items: [Member], status: available}
      - {file: "backend/logs/models.py",          items: [Member], status: available}
      - {file: "backend/accounts/backends.py",    items: [Member], status: available}
      - {file: "backend/accounts/serializers.py", items: [AccessGroup, Member], status: available}
      - {file: "backend/accounts/views.py",       items: [Member], status: available}

  "backend/accounts/backends.py":
    status: done
    imports:
      external: [{from: django.contrib.auth.backends, items: [BaseBackend]}]
      internal:
        - {from: "backend/accounts/models.py", items: [{name: Member, status: available}]}
    exports:
      - name: MemberAuthBackend
        kind: class
        type: Django auth backend
        methods:
          - {signature: "authenticate(request, credential: str, password: str) -> Member | None", note: "'@' in credential → email lookup, else phone lookup"}
          - {signature: "get_user(user_id: UUID) -> Member | None"}
    needed_by:
      - {file: "backend/groupfund/settings.py", items: [MemberAuthBackend], status: available}

  "backend/accounts/serializers.py":
    status: done
    imports:
      external:
        - {from: rest_framework, items: [serializers]}
        - {from: rest_framework_simplejwt.tokens, items: [RefreshToken]}
      internal:
        - {from: "backend/accounts/models.py", items: [{name: AccessGroup, status: available}, {name: Member, status: available}]}
        - {from: "backend/core/models.py",     items: [{name: Permission, status: available}]}
    exports:
      - {name: RegisterSerializer,         kind: class, type: DRF ModelSerializer, fields: [full_name, display_name, phone, email, password(write_only), password_confirm(write_only)]}
      - {name: LoginSerializer,            kind: class, type: DRF Serializer,      fields: [credential, password(write_only)]}
      - {name: MemberProfileSerializer,    kind: class, type: DRF ModelSerializer, fields: [id, full_name, display_name, email, phone, group_name, group_permissions, is_active, created_at], note: "group_permissions=['*'] for superuser"}
      - {name: MemberListSerializer,       kind: class, type: DRF ModelSerializer, fields: [id, full_name, display_name, group_name, is_active, created_at]}
      - {name: MemberDetailSerializer,     kind: class, type: DRF ModelSerializer, fields: [id, full_name, display_name, email, phone, group_name, group_permissions, is_active, created_at]}
      - {name: MemberUpdateSerializer,     kind: class, type: DRF ModelSerializer, fields: [full_name, display_name, email, phone], note: "all optional; validates at least one of phone/email remains"}
      - {name: ChangePasswordSerializer,   kind: class, type: DRF Serializer,      fields: [old_password(optional), new_password, confirm_new_password]}
      - {name: AccessGroupSerializer,      kind: class, type: DRF ModelSerializer, fields: [id, name, description, is_default, permissions(codename+label), member_count, created_at]}
      - {name: AccessGroupCreateSerializer,kind: class, type: DRF ModelSerializer, fields: [name, description, permission_ids], note: "auto-adds can_contribute + can_comment"}
      - {name: AccessGroupUpdateSerializer,kind: class, type: DRF ModelSerializer, fields: [name, description, permission_ids], note: "cannot remove can_contribute or can_comment"}
    needed_by:
