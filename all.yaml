  "frontend/app/[locale]/page.tsx":
    status: done
    kind: page
    route: "/{locale}"
    note: "landing — fundAPI.getBalance() + postsAPI.getList(1) (latest 3 posts). AUTH-CONDITIONAL UI (when isAuthenticated && member from useAuthStore): hero CTA replaces the 'Join the Group' register link with a 'My Profile' link (landing.cta_profile) to /{locale}/profile (Contribute Now link unchanged for everyone); 'How It Works' Step 1 card swaps its CheckCircle icon + 'Join'-copy for UserCheck + landing.step1_title_member/step1_desc_member ('You're a Member'); bottom CTA section swaps the 'Ready to join?'/register-button block for landing.cta_authed_title/cta_authed_desc ('Welcome back!') + a 'View Posts' button to /{locale}/posts (landing.cta_view_posts) — FaravaharSimple decoration stays for both states. Also fixed a pre-existing hardcoded-English 'Ready to join?' heading → landing.cta_ready_title for the logged-out case. HERITAGE VISUAL REDESIGN (see roadmap.change_heritage_emblem_visuals): the old 'Iranian Heritage' grid section (heritage.title/subtitle + 5 CulturalEmblem cards) was REMOVED entirely, along with the `heritage` i18n namespace. Instead, 5 new hand-drawn currentColor icon components (PersepolisIcon, PasargadaeIcon, NaqsheRostamIcon, HafezIcon, SaadiIcon) are woven through the page as small/large low-opacity (0.05-0.07) absolutely-positioned background decorations, each section given `relative overflow-hidden`: Hero gets PersepolisIcon (size=220, -bottom-8 -start-8) + PasargadaeIcon (size=180, -top-6 -end-6); Stats Bar gets NaqsheRostamIcon (size=130, -bottom-6 -end-6); Recent Posts gets HafezIcon (size=90, top-4 end-4); How It Works gets SaadiIcon (size=90, top-4 start-4); CTA gets PersepolisIcon (size=160, -bottom-10 -end-10) + PasargadaeIcon (size=140, -top-8 -start-8). All use `pointer-events-none select-none hidden sm:block`/`hidden md:block` and logical start/end classes for RTL correctness. Phase 15 (item Q) — useCountUp's animation no longer floors the final frame (progress>=1 returns `target` exactly; intermediate frames round to 2 decimals via Math.floor(progress*target*100)/100) and the rendered stat values use toLocaleString(locale-aware, {maximumFractionDigits:2}), so the homepage's Fund Balance stat shows the same precise decimal as the admin dashboard (was always a whole number due to the old unconditional Math.floor). Phase 15 (item V) — when mounted && member?.is_active===false, renders a bilingual amber/red deactivation banner (common.deactivated_title/_message/_contact_link, linking to /{locale}/contact) above the hero section. Phase 30 — postsAPI.getList(1, '') simplified to getList(1) (filters-object signature change). Phase 32 — 3 fixes: (a) the Members StatCard's hardcoded value=\"—\" placeholder was replaced with real data — new memberCount/memberCountLoading state, fetched via membersAPI.getPublicCount() in the existing mount-time useEffect; (b) the hero headline/tagline (t('landing.headline')/t('landing.tagline')) are now overridable by an admin via 4 new public DefaultSetting keys (landing_headline_en/_fa, landing_tagline_en/_fa) — new heroHeadline/heroTagline state, fetched via the existing settingsAPI.getPublicSettings() (locale-keyed: _fa suffix when locale==='fa', else _en), rendered as `{heroHeadline || t('landing.headline')}` / `{heroTagline || t('landing.tagline')}` at BOTH usage sites of the tagline (Hero section + the bottom CTA section's logged-out fallback, which previously called t('landing.tagline') a second time — now also uses the same heroTagline fallback so the two never diverge); (c) the 'Recent Posts' <section> now renders BEFORE the 'Stats Bar' <section> (previously the reverse) — pure relocation, no logic changes to either section's content. Phase 35 — the Hero CTA row's 'Contribute Now' button (landing.cta_contribute, → /{locale}/contribute) was REPLACED by a language-switch button: `handleLanguageSwitch()` toggles `locale` (en<->fa) via `setLocale` (useLangStore) and `router.push(pathname.replace('/${locale}', '/${newLocale}'))`. The button's label ('فارسی'/'English') is a hardcoded inline string, not an i18n key — it names the TARGET locale, mirroring Navbar.tsx's existing language-switcher convention (see shared_components.useLangStore's needed_by note: 'mirrors Navbar handleLanguageSwitch'). landing.cta_contribute was removed from both messages/en.json and messages/fa.json (see i18n.namespaces.landing note) since nothing else referenced it. Separately, the outermost wrapper's `style={{ background: '#0a0a0f', minHeight: '100vh' }}` had its hardcoded `background` removed (now just `minHeight: '100vh'`) as part of the sitewide-watermark cleanup — see roadmap.add_sitewide_watermark. Phase 37 (bugfix) — the Phase 15 (item Q) claim that StatCard's count-up value was already 'toLocaleString(locale-aware, ...)' was STALE/inaccurate: it actually called `counted.toLocaleString(undefined, {maximumFractionDigits:2})`, which defers to the BROWSER/OS's own default Intl locale (independent of this app's own `/en` vs `/fa` route) — on a browser/OS set to Persian, this rendered Persian-Indic digits even while the page itself was showing `/en` (English) content. `StatCard` now takes a required `locale` prop (passed by the 3 call sites in the Stats Bar section as `locale={locale}`, reading the page's own `useParams().locale`) and the call is `counted.toLocaleString(locale === 'fa' ? 'fa-IR' : 'en-US', {maximumFractionDigits:2})` — mirroring this same file's own `formatDate`'s pre-existing correct `locale === 'fa' ? 'fa-IR' : 'en-GB'` pattern. Phase 38 — the Hero-content foreground icon directly above the headline (previously `<LionAndSun size={72} animated />`) was swapped to `<HandsEmblem size={72} animated />` — the Iranian Political Association (Birmingham) emblem (frontend/public/branding/ipa-birmingham.jpg, the SAME file SiteBackground.tsx uses as the sitewide watermark) at full opacity, full image, same size/animation as the icon it replaced. The Hero BACKGROUND decoration (`<LionAndSun size={280} opacity={.15} />`, a separate, distinct element) and the sitewide watermark itself (unrelated mechanism, unchanged) were both deliberately left untouched, per explicit instruction."
