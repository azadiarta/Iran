        - {file: "frontend/app/[locale]/contribute/page.tsx", via: "useTranslations() — NO namespace arg, root-level translator; calls t('contribute.*') exclusively"}
      note: "54 keys total (Phase 14: 41; Phase 15 +13). Phase 15 additions: amount_invalid (item M — inline error when amount fails /^\\d{0,9}(\\.\\d{0,2})?$/, paired with navigator.vibrate(120) if supported); take_photo/choose_file (item N — two separate file inputs, the camera one uses capture=\"environment\"); show_in_public_list_label/_hint + display_name_choice_* + custom_name_placeholder + message_label/_placeholder (items E/Z — new optional fields on the guest contribution form: show_in_public_list bool, display_name_choice enum, public_display_name, message, all persisted on fund.Contribution)."
    contributions:
      keys: [title, subtitle, no_contributions, anonymous, amount_label, date_label, message_label, prev, next, page_info]
      used_by:
        - {file: "frontend/app/[locale]/contributions/page.tsx", via: "useTranslations('contributions') — NEW (Phase 15, item E) public donors page at /[locale]/contributions, GET /api/fund/contributions/public/ (AllowAny, paginated). Lists only contributions with status=completed AND show_in_public_list=True; each row shows a computed display name (per display_name_choice: hidden never appears here, display_name, full_name, custom→public_display_name, guest→guest_name or anonymous), amount, date, and optional message. NEVER returns receipt_image (item F)."}
      note: "NEW namespace, 10 keys, added Phase 15 (item E). Linked from Navbar via nav.contributions."
    profile:
      keys: [title, edit_btn, save_btn, cancel_btn, change_password, old_password, new_password, confirm_new_password, group, joined, edit_profile, edit, cancel, save, save_password, full_name, display_name, email, phone, profile_updated, password_changed, save_error, password_error, my_contributions_title, my_contributions_total_approved, my_contributions_empty, my_contributions_rejection_reason, status_pending, status_pending_review, status_completed, status_failed]
      used_by:
        - {file: "frontend/app/[locale]/profile/page.tsx", via: "useTranslations('profile')"}
      note: "31 keys total (Phase 14: 22; Phase 15 +8 for items O/Z — 'My Contributions' section: my_contributions_* labels + status_* badges for pending/pending_review/completed/failed (rejected), sourced from GET /api/fund/contributions/mine/ → fundAPI.getMyContributions(), which also returns total_approved alongside the paginated results; rejected entries show their rejection_reason)."
    contact:
      keys: [title, email_label, phone_label, name_label, message_label, send_btn, no_contact, name_placeholder, contact_label, contact_placeholder, message_placeholder, send_button, success_msg, send_another]
      used_by:
        - {file: "frontend/app/[locale]/contact/page.tsx", via: "useTranslations('contact')"}
    help:
      keys: [title, subtitle, guest_heading, member_heading, admin_heading, guest_note, member_note, admin_note, "sections.<home|posts|expenses|contribute|contact|auth|comment|profile|logout|dashboard|members|groups|balance|manage_posts|manage_comments|payments|settings|activity_log|system_log|contributions_public|my_contributions|env_vars>"]
      used_by:
        - {file: "frontend/app/[locale]/help/page.tsx", via: "useTranslations('help')"}
      note: "help.sections is a NESTED object with 22 keys (Phase 14: 19; Phase 15 +3: contributions_public — group:guest, no permission gate; my_contributions — group:member, IsAuthenticated; env_vars — group:admin, permission can_manage_env_vars), one per guest/member/admin section heading — the set of sections actually RENDERED is filtered at runtime by useAuthStore permission checks (can_view_dashboard/can_manage_permissions/can_view_balance/can_post/can_approve_comments/can_manage_env_vars/is_superuser), mirroring AdminSidebar's gating."
    errors:
      keys: [not_found_title, not_found_msg, forbidden_title, forbidden_msg, unavailable_title, unavailable_msg, back_home]
      used_by:
        - {file: "frontend/app/[locale]/not-found/page.tsx", via: "useTranslations('errors')"}
        - {file: "frontend/app/[locale]/forbidden/page.tsx", via: "useTranslations('errors')"}
        - {file: "frontend/app/[locale]/unavailable/page.tsx", via: "useTranslations('errors')"}
    footer:
      keys: [slogan, copyright, dedication]
      used_by:
        - {file: "frontend/components/layout/Footer.tsx", via: "useTranslations('footer')"}
    common:
      keys: [loading, error, retry, close, prev, next, page_info, lightbox_hint, submitting, deactivated_title, deactivated_message, deactivated_contact_link]
      used_by:
        - {file: "frontend/app/[locale]/posts/page.tsx", via: "useTranslations('common') (aliased tc) — prev/next/page_info for pagination controls"}
        - {file: "frontend/app/[locale]/posts/[id]/page.tsx", via: "useTranslations('common') (aliased tc) — lightbox_hint (ImageLightbox), submitting (comment-submit button)"}
        - {file: "frontend/app/[locale]/expenses/page.tsx", via: "useTranslations('common') (aliased tc) — lightbox_hint (ImageLightbox receipt modal)"}
        - {file: "frontend/app/[locale]/expenses/[id]/page.tsx", via: "useTranslations('common') (aliased tc) — lightbox_hint (ImageLightbox), submitting (comment-submit button)"}
        - {file: "frontend/app/[locale]/page.tsx", via: "useTranslations() root translator — Phase 15 (item V): deactivated_title/_message/_contact_link render an amber warning banner when member?.is_active === false, with a link to /contact"}
        - {file: "frontend/app/[locale]/contact/page.tsx", via: "useTranslations('common') — Phase 15 (item V): same deactivated_* banner as the home page"}
      note: "12 keys total (Phase 13: 9; Phase 15 +3 for item V). loading/error/retry/close from the original set remain unused — grep confirms no call sites for those 4."
  admin_panel_i18n_policy: >
    The admin panel (frontend/app/[locale]/admin/**) does NOT use the
    messages/{en,fa}.json namespace system. Per the existing convention
    (Phase 7B), admin pages use INLINE bilingual strings via
    `isRTL ? '...' : '...'` ternaries, matching the dynamic-copy pattern
    already used in Phase 7A pages. So admin-panel copy changes do NOT
    touch messages/en.json or messages/fa.json — they are inline string
    edits in each admin page/component, gated on a local `isRTL`
    (derived from locale === 'fa') variable. This is the OPPOSITE of the
    EN/FA-pair invariant above (which applies only to messages/*.json).

