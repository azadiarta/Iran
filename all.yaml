i18n:
  invariant: >
    frontend/messages/en.json and frontend/messages/fa.json MUST always have
    IDENTICAL top-level AND nested key structure (verified: both currently
    have exactly the same 13 top-level keys in the same order: nav, landing,
    auth, posts, expenses, contribute, contributions, profile, contact, help,
    errors, footer, common — 333 leaf keys total each (Phase 35: landing.cta_contribute
    removed, see landing namespace note below), verified via python3
    json diff showing zero keys present in only one of the two files; see
    each namespace's own note below for its per-phase key-count breakdown.
    The former `heritage` namespace was REMOVED from both files in
    the Lion-and-Sun/heritage-icon visual redesign — see
    roadmap.change_heritage_emblem_visuals). ANY key added/removed/renamed in
    en.json MUST be mirrored in fa.json (Persian translation) in the SAME
    change — a missing key falls back to the key path string itself at
    runtime (next-intl behavior), producing visibly broken UI in whichever
    locale is missing it. fa.json additionally requires RTL-correct phrasing,
    not a literal translation when idiom differs.
  namespaces:
    nav:
      keys: [home, posts, expenses, contribute, help, contact, login, logout, profile, contributions, admin_panel]
      used_by:
        - {file: "frontend/components/layout/Navbar.tsx", via: "useTranslations('nav') — Phase 15: contributions (link to new public donors page) + admin_panel (Admin Panel entry button, shown when hasAdminAccess({isSuperuser, groupPermissions}) && !isDeactivated — Phase 17, gated via frontend/lib/adminNav.ts)"}
        - {file: "frontend/components/layout/Footer.tsx", via: "useTranslations('nav') (aliased tNav — footer reuses nav labels for its quick-link column)"}
      note: "AdminSidebar.tsx does NOT use this namespace (verified — no useTranslations call in that file at all); admin nav labels are inline isRTL strings, see admin_panel_i18n_policy."
    landing:
      keys: [headline, tagline, cta_join, cta_profile, cta_ready_title, cta_authed_title, cta_authed_desc, cta_view_posts, stats_members, stats_contributions, stats_balance, posts_title, how_title, step1_title, step1_desc, step1_title_member, step1_desc_member, step2_title, step2_desc, step3_title, step3_desc]
      used_by:
        - {file: "frontend/app/[locale]/page.tsx", via: "useTranslations() — NO namespace arg, root-level translator; calls t('landing.*')"}
      note: "Phase 24 (item 8, branding fix) — headline changed from the generic 'Group Fund'/'صندوق گروهی' to the organization's real name 'Birmingham Iranian Political Association'/'انجمن سیاسی ایرانیان بیرمنگام'. The same string swap was also applied to help.subtitle, help.sections.home.desc, and footer.copyright (all previously said 'Group Fund'/'صندوق گروهی' too) — see those namespaces' notes. Phase 35 — cta_contribute ('Contribute Now'/'کمک کنید') REMOVED: the Hero CTA button it powered was replaced by a language-switch button (toggles locale en<->fa and router.push()es to the equivalent /[otherLocale] path), whose 'فارسی'/'English' label is a hardcoded inline string (not an i18n key — same inline-bilingual convention as admin_panel_i18n_policy below, chosen because the label IS the target language's own name, not translatable UI copy)."
    auth:
      keys: [login_title, register_title, credential_label, password_label, confirm_password_label, full_name_label, display_name_label, phone_label, email_label, phone_or_email_hint, login_btn, register_btn, no_account, has_account, register_link, login_link]
      used_by:
