ect-wide 'a character counter must appear on every maxLength input, no exceptions, admin panel and public site alike' rule — the admin-panel half of this rule was completed in a still-earlier, separately-committed pass via AdminInput/AdminTextarea's own generic `typeof maxLength === 'number'` counter): posts/[id]/page.tsx and expenses/[id]/page.tsx gained a `{commentName.length}/50` counter under the guest-name input and a `{commentText.length}/250` counter under the comment-text textarea (both forms share the same comment UI shape); profile/comments/page.tsx gained a `{editText.length}/250` counter under the inline comment-edit textarea; login/page.tsx's credential field's error-only row was rebuilt into the same flex layout used by register/page.tsx's Field component (error/hint on the left, `{credential.length}/{EMAIL_MAX_LENGTH}` on the right) instead of showing only the validation error with no counter.", "NEW top-of-file sections written into info.yaml (the project's curated, future-session-facing rulebook distilled from this file): a 'project_conventions'-style consistency-principle block establishing that admin-panel-related things must stay internally consistent with each other and main-site-related things must stay internally consistent with each other (the character-counter rule is cited only as ONE illustrative example, not the sole rule), plus documented conventions for pages/routing, the cyan-on-near-black glassmorphism theme + RTL/i18n handling, and the technology stack/programming languages in use — written so that a future session can fully understand the project and its construction rules by reading ONLY all.yaml + info.yaml, without further explanation. NEW dedicated security-rules section enumerating the project's input/form security baseline (CAPTCHA everywhere including the Django admin, session-aware rate limiting, password strength, server-side-authoritative validation mirrored client-side, file-content verification on every upload, sanitize-and-cap on every text field). Corrected stale info.yaml content left over from before the two-tier short-text split: validation_logic's lingering SHORT_TEXT_MAX_LENGTH=150 references, validate_rate_limiting's pre-tightening throttle numbers (10/5/5/20/15) and missing SessionAwareScopedRateThrottle/admin-CAPTCHA mentions, form_admin_member_create's notes still describing the old length>=8-only password check, and form_admin_contribution_edit's notes still saying 'max 150 chars' for a field whose actual admin cap is 100.", "Verified clean: backend `python manage.py check` (0 issues, run against a throwaway sqlite DB via DB_ENGINE override since no Postgres is available in this environment); frontend `npx tsc --noEmit` (zero errors). No automated test suite exists in this project (confirmed pre-existing, unrelated to this phase)."]
