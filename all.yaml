meta:
  project: groupfund
  backend: django/python
  frontend: next.js/react/typescript
  db: postgresql
  deploy: "docker-compose (primary, any VPS — one command: docker compose up -d --build); Railway (single combined backend+frontend image, see Dockerfile.railway/railway.json — zero required service variables)"
  payment: "stripe (gbp primary, expandable: paypal, google_pay, multi-currency)"

rules:
  status: [done, in-progress, pending]
  kind: [class, function, constant, type]
  before_build: check needed_by + check imports internal availability
  after_build: update exports + update imports with status

progress:
  current_phase: 15
  current_task: "complete (except phase 10 — deferred per project decision)"
  phases:
    1:
      name: database
      status: done
      done: [entities defined, models created, split into 5 apps, project setup, migrations verified]
    2:
      name: project structure
      status: done
      done: [groupfund project, 5 apps, settings.py, requirements.txt, .env.example]
    3:
      name: authentication system
      status: done
      done: [Member→AbstractBaseUser, MemberAuthBackend, JWT simplejwt, register/login/logout/profile views, HasGroupPermission, IsSuperuser, IsActiveMember, accounts/urls, groupfund/urls]
    4:
      name: model updates + signals + utils
      status: done
      done: [DefaultSetting model, AccessGroup.is_default + save(), get_default_group_id(), Member.group SET_DEFAULT, Expense.withdrawn_by SET_NULL, Post.author SET_NULL, core/signals.py, core/utils.py, core/apps.py ready(), migrations verified]
    5:
      name: backend API (fund, posts, comments)
      status: done
      done: [fund/serializers, fund/views, fund/urls, posts/serializers, posts/views, posts/urls, groupfund/urls updated]
    6:
      name: backend API (members, groups, settings, dashboard, logs)
      status: done
      done: [accounts/member_views, accounts/member_urls, accounts/group_views, accounts/group_urls, core/serializers, core/settings_views, core/settings_urls, core/dashboard_views, core/dashboard_urls, logs/serializers, logs/views, logs/urls, accounts/serializers extended, groupfund/urls updated]
    7:
      name: payment system (manual bank transfer + PayPal)
      status: done
      done: [fund/models updated (pending_review status + receipt_image), payments app created, BasePaymentProvider, ManualPaymentProvider, PayPalPaymentProvider, PaymentFactory, payments/serializers, payments/views, payments/urls, migrations 0003 applied, groupfund/urls updated]
    8:
      name: Django admin panel (jazzmin)
      status: done
      done: [django-jazzmin added, JAZZMIN_SETTINGS + JAZZMIN_UI_TWEAKS, i18n setup, core/admin.py, accounts/admin.py, fund/admin.py + balance templates, posts/admin.py, logs/admin.py, payments/admin.py, can_view_balance permission seed, FundBalanceView gated on can_view_balance]
    9:
      name: frontend
      status: done
      done: [lib/api.ts (axios + interceptors + unwrap), authStore, langStore, i18n, messages en/fa, middleware, layouts, Navbar, Footer, animations (IranianSymbols, PageTransition, SplashScreen), pages (landing, login, register, posts, posts/[id], expenses, contribute, profile, contact, help, forbidden, unavailable, not-found), "ADMIN PANEL (7B): admin design system (styles/admin.css), AdminLayout/AdminTopBar/AdminSidebar + route protection, reusable admin components (AdminTable/AdminModal/AdminConfirmDialog/AdminStatCard/AdminBadge/admin form fields), toast system, 12 admin pages (dashboard/members/members-detail/groups/contributions/expenses/posts/comments/payments/settings/logs-activity/logs-system) — see Phase 7B section below; both flagged backend gaps (global comments endpoint, permissions-list endpoint) are now RESOLVED", "/help page (frontend/app/[locale]/help/page.tsx): permission-gated site guide — sections shown depend on guest/member/admin status & group permissions, new 'help' i18n namespace in messages/{en,fa}.json, linked from Navbar + Footer"]
    10:
      name: payment integration (Stripe / Google Pay)
      status: pending
    11:
      name: deploy
      status: done
      done: [requirements.txt (gunicorn, whitenoise, django-storages, boto3), backend/groupfund/wsgi.py, whitenoise middleware + STATICFILES_STORAGE, "S3-compatible media storage (DEFAULT_FILE_STORAGE=storages.backends.s3.S3Storage) — conditional on AWS_STORAGE_BUCKET_NAME env var, falls back to local MEDIA_ROOT for dev; supports AWS S3 / Cloudflare R2 / Backblaze B2 via AWS_S3_ENDPOINT_URL + AWS_S3_CUSTOM_DOMAIN", "MEDIA_URL→MEDIA_ROOT URL serving added to groupfund/urls.py (FIXED real gap — nothing served uploaded media before in dev OR prod-without-S3)", "CSRF_TRUSTED_ORIGINS derived from ALLOWED_HOSTS (FIXED real gap — admin POST/PATCH/DELETE would 403 in production without it)", "seed_initial_data management command (FIXED CRITICAL gap — Permission/AccessGroup/DefaultSetting rows were never seeded anywhere; fresh prod DB had a completely empty, non-functional permission system)", production security settings (SECURE_SSL_REDIRECT/HSTS/SESSION_COOKIE_SECURE/CSRF_COOKIE_SECURE/SECURE_PROXY_SSL_HEADER, conditional on DEBUG), LOGGING config, full Docker Compose deployment (docker-compose.yml, backend/Dockerfile + docker-entrypoint.sh, frontend/Dockerfile, Caddyfile reverse-proxy, .env.docker.example — see dedicated entries below; replaces the old Procfile/runtime.txt PaaS-style deploy, now removed), .env.example documented for production + S3 bucket env vars, "frontend/next.config.mjs dynamic remotePatterns from NEXT_PUBLIC_API_URL + optional NEXT_PUBLIC_MEDIA_URL (FIXED real gap — S3/CDN-hosted images would be blocked by next/image without this)", "DEPLOYMENT.md fully translated to Persian/Farsi", "second-pass hardening audit fixes: logging added to 6 previously-silent except blocks (posts/admin.py, fund/admin.py, accounts/models.py, payments/views.py, payments/manual.py, payments/paypal.py), select_related() added to fix N+1 queries in posts/views.py (Comment.author) and logs/views.py (SystemLog.related_member), @transaction.atomic added to PaymentInitiateView/ReceiptUploadView/MemberChangeGroupView, DRF DEFAULT_THROTTLE_CLASSES/DEFAULT_THROTTLE_RATES added to settings.py REST_FRAMEWORK (anon 100/hour, user 1000/hour) to mitigate brute-force on auth endpoints, ~13 hardcoded English strings in posts pages moved into the i18n posts namespace (en.json/fa.json), accessibility improvements to AdminConfirmDialog (role=alertdialog, aria-label) and post image gallery (descriptive alt text)", "RAILWAY SINGLE-SERVICE COMBINED IMAGE: replaced the 2-service Railway setup (which suffered from a Root-Directory/Dockerfile-detection caching quirk — a service whose Root Directory was changed to frontend kept building backend/Dockerfile) with ONE image/ONE service running both backend (gunicorn, 127.0.0.1:8000, internal-only) and frontend (Next.js standalone, Railway's $PORT) as two processes (docker-entrypoint.railway.sh, wait -n supervises both). New files: Dockerfile.railway (multi-stage, repo root), docker-entrypoint.railway.sh (repo root), backend/scripts/prepare.sh (DB-wait+migrate+seed+collectstatic, extracted from and reused by backend/docker-entrypoint.sh), frontend/public/.gitkeep (FIXED pre-existing bug — frontend/public/ didn't exist, breaking 'COPY --from=builder /frontend/public' in BOTH frontend/Dockerfile and Dockerfile.railway). railway.json now points dockerfilePath at Dockerfile.railway; frontend/railway.json removed (no second service). ZERO Railway service variables required. docker-compose/VPS path (docker-compose.yml, Caddyfile, backend/Dockerfile, frontend/Dockerfile) untouched except the prepare.sh refactor — fully backward compatible, re-verified via docker build+run.", "5 SEVERE PRE-EXISTING BUGS found + fixed during end-to-end Railway testing (all apply to docker-compose too, not just Railway): (1) infinite redirect loop on every /api/* and /admin/* proxied request (frontend/next.config.mjs rewrites()/skipTrailingSlashRedirect — APPEND_SLASH vs trailing-slash-stripping rewrite mismatch); (2) /admin/* completely unreachable via the proxy, 404'd as /en/admin/* (frontend/middleware.ts next-intl matcher didn't exclude /admin); (3) Django admin login always rejected correct credentials (backend/accounts/backends.py MemberAuthBackend.authenticate() didn't accept username= as sent by Django's AuthenticationForm); (4) every /admin/ page 500'd with AttributeError after login (backend/accounts/models.py Member missing get_all_permissions/get_user_permissions/get_group_permissions needed by jazzmin); (5) every /admin/ page 500'd with NoReverseMatch: set_language (backend/groupfund/urls.py missing path('i18n/', include('django.conf.urls.i18n')), needed by jazzmin's language switcher — its /i18n/setlang/ POST also added to next.config.mjs rewrites + middleware.ts matcher). All verified fixed via full end-to-end curl test pass against the built Railway combined image: /, /en, /api/payments/methods/, /admin/login/, /admin/ (unauthenticated redirect + authenticated dashboard), /static/admin/css/base.css, /i18n/setlang/, /en/admin."]
    12:
      name: "AI project map expansion (all.yaml)"
      status: done
      done: ["added top-level `roadmap:` section (12 task-oriented categories — change_ui_copy_translation, change_heritage_emblem_visuals, add_admin_page_or_feature, change_navbar_footer, change_public_page_layout_content, change_db_model_field, change_permissions_access_groups, add_modify_payment_provider, change_deployment_env_config, change_auth_login_flow, change_admin_component_library, change_zustand_store — each with description/entry_points/typical_files/order_of_operations/gotchas/see_also)", "added top-level `shared_components:` section — blast-radius registry for IranianSymbols.tsx exports (LionAndSun: 18 consumers, CulturalEmblem: 1, FaravaharSimple: 1, GeometricPattern: 2 — all verified per-file), the 3 zustand stores (useAuthStore: 24 consumers w/ per-file field usage, useLangStore: 3, useToastStore: 13), and the admin component library (AdminTable/AdminModal/AdminConfirmDialog/AdminStatCard/AdminBadge/AdminToastContainer + 6 admin/fields/* — each with a verified per-admin-page consumer list)", "added top-level `i18n:` section — EN/FA invariant (238 leaf keys, 13 namespaces, parity verified via python3 json diff), per-namespace key lists + consumer files, admin_panel_i18n_policy (admin panel uses inline isRTL ternaries, NOT messages/*.json)", "completed `files:` entries (imports/exports/needed_by) for all 53 previously note-only or missing frontend files: 13 public pages, 13 admin pages + admin layout, 9 layout/animation components (incl. marking frontend/components/animations/PageTransition.tsx as ORPHANED — zero importers), 12 admin component-library files, 3 zustand stores, frontend/lib/i18n.ts + frontend/lib/auth.ts (latter marked DEAD CODE — zero importers), messages/en.json + messages/fa.json (pointers to the new i18n: section), and 6 previously-undocumented frontend config files (package.json, tsconfig.json, tailwind.config.ts, postcss.config.js, .env.example, .gitignore) plus next-env.d.ts/public/.gitkeep", "fixed pre-existing YAML scanner error on line 7 (unquoted `payment:` value containing a bare colon)", "NOTE: progress:/meta: sections (lines 1-61) and pre-existing backend `files:` entries still contain unquoted flow-sequence values with embedded colons/brackets (e.g. `done: [...]` lists, `posts/[id]`) that make `yaml.safe_load` fail on the FULL file — this is pre-existing and out of scope for this pass; the NEW roadmap:/shared_components:/i18n: sections and all NEW/rewritten files: entries (this phase) are individually valid YAML (verified via yaml.safe_load on each)."]
    13:
      name: "i18n cleanup, detail pages, 5-item pagination, image-modal Escape fix, admin System Status"
      status: done
      done: ["Fixed remaining hardcoded-English leaks on the Persian site: AdminTable Prev/Next/Page-N buttons gained optional bilingual prevLabel/nextLabel/pageLabel (default 'Prev'/'Next', back-compat); AdminFileUpload gained an isRTL prop for its hint text + 'Clear' button; admin/settings Save button aria-label is now bilingual; posts list pagination now uses common.prev/next/page_info; posts/[id] guest-comment placeholder and 'Submitting…' now use posts.comment_name_placeholder/common.submitting.", "Backend pagination consolidated into NEW backend/core/pagination.py (paginate(queryset, request, serializer_class, page_size=5)), replacing 4 duplicated `_paginate` helpers in fund/views.py, posts/views.py, accounts/member_views.py, logs/views.py. Page sizes: members/posts/contributions/expenses 10→5 (the 'show last 5 items' lists); comments(global)=10 and activity/system logs=25 kept unchanged but now explicit. All 7 admin list pages (members/contributions/expenses/posts/comments/logs-activity/logs-system) updated with totalCount state + bilingual prevLabel/nextLabel/pageLabel.", "NEW shared frontend/components/common/ImageLightbox.tsx (Escape key + backdrop + X to close) — extracted from posts/[id]'s old local Lightbox (which had NO Escape handler) and used to replace expenses/page.tsx's ad-hoc receipt modal (the reported 'hard to close' bug), plus the new expense detail page.", "NEW expense detail page frontend/app/[locale]/expenses/[id]/page.tsx (full description, amount, date, withdrawn-by, receipt lightbox, comments+rating form) — backed by NEW backend ExpenseDetailView (GET /api/fund/expenses/{id}/, permissions mirror ExpenseListView's expense_list_visibility logic) and 3 new fundAPI methods (getExpenseDetail/getExpenseComments/createExpenseComment). expenses/page.tsx rows are now Links to the detail page (receipt thumbnail still opens the lightbox via stopPropagation), pageSize 10→5, and 22 new bilingual `expenses.*` i18n keys added.", "NEW bilingual custom-listbox component frontend/components/admin/fields/AdminSelectWithDescription.tsx (label+description per option, click-outside/Escape to close) and NEW frontend/lib/settingsMeta.ts (SETTINGS_META) driving a rewritten /admin/settings: select-type settings (default_currency, expense/post/member_profile_list_visibility, default_group) now render as bilingual dropdowns-with-description (default_group's options come from groupsAPI.getList()), require_comment_approval renders as an AdminToggle, and unmapped keys keep the old plain-AdminInput fallback.", "NEW admin System Status page frontend/app/[locale]/admin/system/page.tsx (route /admin/system, superuser-only, AdminSidebar entry with a Database icon) backed by NEW backend SystemStatusView (GET /api/settings/system-status/, superuser-only) — shows DB engine+connection status, DEBUG mode (warns if on in Railway), environment, media storage (S3/local), Django version, and AdminStatCard counts for members/posts/contributions/expenses/pending-comments."]
    14:
      name: "i18n generalization sweep (permissions/payments/settings), published-post-edit crash fix, real System Status logging, manual contribution/member creation, superuser group-change error message, clickable post cards"
      status: done
      done: ["i18n — admin permission labels: NEW frontend/lib/permissionsMeta.ts (PERMISSION_META, all 11 codenames' label+description in en/fa, mirroring backend/core/management/commands/seed_initial_data.py). AdminPermissionCheckbox gained an optional isRTL prop and now renders PERMISSION_META[perm.codename].label.fa/.en (fallback to raw perm.label for unmapped codenames); admin/groups/page.tsx's permission chips on each group card use the same lookup, and pass isRTL to AdminPermissionCheckbox in the create/edit modal — fixes English-only permission checkboxes/chips when managing groups in Persian.", "i18n — admin payment settings: NEW PAYMENT_SETTINGS_META export added to frontend/lib/settingsMeta.ts (bilingual label+description for all 9 payment_manual_*/payment_paypal_* keys). admin/payments/page.tsx's renderField() now uses it for a bilingual label + description <p> per field (removed the old English-only fieldLabel() helper and now-unused settings/byKey/useMemo state); Save button aria-label is now bilingual.", "i18n — admin/settings/page.tsx: removed the 3 remaining `<p className='...font-mono'>{s.key}</p>` debug lines (raw English setting keys like 'default_currency', 'require_comment_approval' shown to end users — the last English leak on this page) and unified the select/toggle/input row wrapper styling into one consistent boxed 'card' look (toggle row's styling extended to select and input/number rows).", "FIXED published-post-edit crash (item 7): admin/posts/page.tsx openEdit() was doing `res.data as unknown as PostDetail`, but postsAPI.getDetail() actually resolves `{post: PostDetail, comments: Comment[]}` per PostDetailView.get — so `editing.images` was undefined and `.length` threw 'Application error: a client-side exception has occurred', a CLIENT-SIDE React crash that never reached the backend (hence nothing in System Status). Now correctly reads `(res.data as unknown as { post: PostDetail }).post`.", "FIXED System Status never logging anything (item 5) — this was a REAL backend gap, not just a misunderstanding: NO code anywhere wrote to the SystemLog model. NEW backend/core/logging_handlers.py (SystemLogHandler, a logging.Handler subclass that creates SystemLog rows for WARNING+ records, with lazy model import + try/except to avoid app-loading-order issues and to never crash logging itself) wired into backend/groupfund/settings.py LOGGING as a new 'system_log' handler (level=WARNING) added to both the 'root' logger and the 'django' logger (which has propagate=False so django.request/django.security wouldn't otherwise reach root) — real backend errors/warnings (500s, security warnings) now appear in /admin/logs/system.", "i18n generalization sweep — display_name||full_name author/contributor fallback (item 2 + general instruction): PostAuthorSerializer/MemberMinimalSerializer always return both display_name and full_name, but ~10 frontend spots only checked display_name, showing blank/'—'/'Guest' for members who left display_name empty. Added `|| X.full_name` before the final fallback in: posts/page.tsx (PostCard author), posts/[id]/page.tsx (author), expenses/page.tsx + expenses/[id]/page.tsx (withdrawn_by), admin/page.tsx (contributor/expense withdrawn_by/post author — 3 spots), admin/posts/page.tsx (author column), admin/expenses/page.tsx (withdrawn_by column), admin/contributions/page.tsx (contributor column).", "i18n generalization sweep — hardcoded English aria-labels (item 4 + general instruction): fixed aria-label='Remove image' (admin/posts/page.tsx), aria-label='Delete' (admin/contributions/page.tsx), aria-label='Back' (admin/members/[id]/page.tsx) to bilingual isRTL ternaries (aria-label='Save' in admin/payments and admin/settings fixed as part of the payments/settings work above).", "NEW manual-contribution creation (item 8): backend ContributionManualCreateSerializer (fund/serializers.py — guest_name/amount/currency/payment_method/status/notes, currency defaults from DefaultSetting default_currency, validates amount>0 and guest_name required, defaults payment_method=manual/status=completed) + ContributionManualCreateView (fund/views.py, POST /api/fund/contributions/create-manual/, IsAuthenticated+can_manage_permissions, logs 'contribution_added_manually'). Frontend fundAPI.createManualContribution() (lib/api.ts) + admin/contributions/page.tsx '+ Add Contribution' button (gated canManage) opening an AdminModal form (guest_name, amount, currency/payment_method/status selects, optional notes).", "NEW manual member/account creation (item 10): backend MemberCreateSerializer(RegisterSerializer) (accounts/serializers.py — adds optional group_id, reuses all RegisterSerializer validation) + MemberCreateView (accounts/member_views.py, POST /api/members/create/, IsAuthenticated+can_manage_permissions, logs 'member_created_via_admin'). Frontend membersAPI.create() (lib/api.ts) + admin/members/page.tsx '+ Add Member' button opening an AdminModal form (full_name, display_name, phone, email, group select, password+confirm with client-side validation); inline useEffect fetch body extracted into a reusable load() function so the modal can refresh the list on success. 2 new ActivityLog.action choices added: contribution_added_manually, member_created_via_admin.", "IMPROVED superuser group-change error (item 9): admin/members/[id]/page.tsx saveGroup() now distinguishes a 403 response (MemberChangeGroupView intentionally refuses to change a superuser's group — by design) with a dedicated bilingual explanatory toast, instead of the generic 'Failed to change group' error for all failures.", "Whole-card clickable post listing (item 11): posts/page.tsx PostCard restructured so the entire card (thumbnail, title, author, date) is wrapped in the <Link> to the post detail page, not just a small trailing arrow icon; the arrow is now a decorative <span> (no nested links)."]
    15:
      name: "env-vars admin panel, admin nav/access overhaul, public contributions wall + admin contribution detail/edit, payment-method i18n, 5-star ratings, balance indicators, log improvements, scroll-lock, deactivated-member guard, expenses search/filter"
      status: done
      done: ["item A — NEW /admin/env-vars panel (can_manage_env_vars permission, 12th seeded permission): backend/core/runtime_config.py (ENV_VAR_REGISTRY, 17 keys/3 categories: live/restart/readonly), backend/core/middleware.py (RuntimeConfigMiddleware, 30s TTL in-process cache, append-only ALLOWED_HOSTS/CSRF/CORS extras — lockout-proof by construction), backend/core/models.py EnvVarOverride (+ migration 0003_envvaroverride), backend/core/env_vars_views.py/env_vars_urls.py (list/update/reset/reset-all), backend/groupfund/settings.py AUTO_DETECTED_DEFAULTS snapshot, EnvVarOverrideAdmin in core/admin.py for manual recovery. Frontend: NEW frontend/lib/envVarsMeta.ts + frontend/app/[locale]/admin/env-vars/page.tsx (per-section reset, reset-all behind AdminConfirmDialog, append-only chip editors for the *_EXTRA keys, restart-required badges).", "items B/C/L — admin nav/access overhaul: NEW frontend/lib/adminNav.ts (ADMIN_NAV_ITEMS/ADMIN_PERMISSIONS/isNavItemVisible) replaces AdminSidebar.tsx's hardcoded nav array AND admin/layout.tsx's hardcoded permission list (item B); the 'expenses' nav item now uses permission:['can_view_balance','can_expense'] (any-of) so a member with ONLY can_expense sees the admin panel and its Expenses entry — FIXED the 'empty panel' bug (item C); Navbar gained an 'Admin Panel' entry button (desktop dropdown + mobile drawer) gated on is_superuser || ADMIN_PERMISSIONS.some(hasPermission); admin/page.tsx gained a local AccessSummaryCard (quick-link grid to every ADMIN_NAV_ITEMS entry visible to the current member) shown to all non-superusers, replacing the old empty-state message for members without can_view_dashboard; backend DashboardStatsView response gained pending_contributions_count (mirrors pending_comments), surfaced as a badge on AdminSidebar's Contributions item via a new generic badgeKey mechanism.", "items D/M/N — contribute page: NEW frontend/lib/paymentMethodsMeta.ts translates payment.factory _METHOD_LABELS + the '{label} is not currently available' message to Persian (item D); the amount input is now validated against /^\\d{0,9}(\\.\\d{0,2})?$/ with an inline bilingual error + navigator.vibrate(120) (feature-detected) on rejection (item M); the receipt-upload step gained a second 'take photo' file input (accept='image/*' capture='environment') alongside the existing file picker, both setting the same receiptFile state (item N).", "items E/F/O/Z — contribution model + admin redesign: fund.Contribution gained show_in_public_list (bool), display_name_choice (TextChoices: hidden/display_name/full_name/custom), public_display_name, message (sanitized via strip_tags), rejection_reason, and amount widened decimal(10,2)→decimal(11,2) to match item M's 9-digit limit (migration 0004_contribution_display_name_choice_and_more). NEW endpoints: GET /api/fund/contributions/public/ (ContributionPublicListSerializer/ContributionPublicListView, AllowAny, paginated, NEVER returns receipt_image) powers NEW public page frontend/app/[locale]/contributions/page.tsx (donor wall: display name per display_name_choice, amount, date, optional message); GET /api/fund/contributions/{id}/ (ContributionAdminDetailSerializer/View) + PATCH /api/fund/contributions/{id}/edit/ (ContributionAdminEditSerializer/View, can_manage_permissions, every field incl. status freely re-editable in either direction, logs contribution_edited_by_admin with before/after) power new 'Details' (incl. ImageLightbox receipt preview + approve/reject with rejection_reason) and 'Edit' AdminModals in admin/contributions/page.tsx; GET /api/fund/contributions/mine/ (MyContributionsView, IsAuthenticated) powers a new 'My Contributions' section on profile/page.tsx (includes rejected items + rejection_reason, plus total_approved).", "items G/H/I/J — posts/lightbox/ratings: removed the now-redundant trailing-arrow <div> below each PostCard on posts/page.tsx (the whole card has been a <Link> since Phase 14, item G); multi-image post upload (AdminFileUpload + PostImageUploadView, getlist('images')) was investigated end-to-end and confirmed already fully functional — no code change needed (item H); ImageLightbox's close button redesigned to a lucide-react X icon in a larger w-11 h-11 circular cyan-glow hit target (item I, shared across posts/expenses/admin-contributions consumers); star ratings reduced from a 1-10 to a 1-5 scale everywhere — posts/[id]/page.tsx StarRating/StarDisplay now render 5 icons with larger gaps/sizes and '/5' labels, posts.PostComment.rating's MaxValueValidator(10)→MaxValueValidator(5) plus matching serializer validation (new posts migration, AlterField only — no data migration; existing 6-10 ratings clamp to 5 stars on display via Math.min(rating,5)) (item J).", "items K/Q/Y — decimal/balance display: admin/page.tsx's Fund Balance/Total Contributions/Total Expenses AdminStatCards gained decimals={2} (previously defaulted to 0, rounding e.g. £22.50 to '23' — Members card unchanged at decimals=0) (item K); the landing page's useCountUp hook no longer floors the final frame (was always Math.floor, even at progress===1) and the rendered value now uses maximumFractionDigits:2, so the homepage shows the same precise balance as the dashboard (item Q); NEW shared frontend/components/common/BalanceIndicator.tsx (self-gates on can_view_balance, fetches fundAPI.getBalance(), green #10b981 if >=0 else red #ef4444, 2-decimal formatting) added to Navbar (desktop+mobile) and AdminTopBar; expenses/page.tsx's existing balance card was updated to use the same sign-based color logic inline (item Y).", "items R/S/U — logs: admin/logs/system/page.tsx's level filter gained a real selectable 'All levels' option (was an AdminSelect placeholder option with disabled=true, which became permanently unselectable after picking any real level — AdminSelect itself untouched) (item R); backend/core/logging_handlers.py's SystemLogHandler.emit() now also extracts related_member and ip_address (X-Forwarded-For first, falling back to REMOTE_ADDR) from record.request when Django attaches one (django.request/django.security loggers), so /admin/logs/system can show which member/IP triggered a warning (item S); _log(...) call sites for ExpenseDeleteView, ContributionDeleteView, ContributionStatusUpdateView/ContributionAdminEditView, member activate/deactivate/delete, PostDeleteView, and comment delete/reject now pass richer extra_data snapshots (amount/currency/reason/before-after, etc.) of the affected object so the activity log retains details after deletion (item U).", "item T — NEW frontend/hooks/useBodyScrollLock.ts (sets document.body.style.overflow='hidden' while a boolean flag is true, restores previous value on cleanup); wired into AdminModal (useBodyScrollLock(isOpen)), AdminConfirmDialog (useBodyScrollLock(isOpen)), and ImageLightbox (useBodyScrollLock(true), always-mounted-while-open) so background page content can no longer scroll behind any of the site's glass overlays.", "item V — deactivated-member access: backend/accounts/backends.py's MemberAuthBackend.authenticate() no longer filters the lookup by is_active=True, so a deactivated member's credentials still authenticate and a token is issued; every OTHER permission class (IsActiveMember, HasGroupPermission, etc.) is UNCHANGED and still requires is_active=True, so in practice a deactivated member can only reach ProfileView plus whatever the frontend allows. NEW frontend/components/layout/DeactivatedGuard.tsx (rendered first by ClientLayout in both the admin-route and public-route branches) redirects to '/{locale}' from any route other than '/{locale}' or '/{locale}/contact' once member.is_active===false; Navbar filters navLinks down to just 'home'+'contact' for such members and hides the admin-panel entry; the landing page and contact page render a bilingual deactivation banner (common.deactivated_title/_message/_contact_link) when member?.is_active===false.", "items W/X — expenses page: row amounts now render in red (#ef4444, with a leading '-') instead of green, matching admin/expenses/page.tsx's pre-existing convention (item W); backend ExpenseListView gained a `search` query param (Q(short_reason__icontains=) | Q(description__icontains=)) alongside the existing date/amount filters, and frontend/app/[locale]/expenses/page.tsx gained a debounced search box plus date-from/to and amount-min/max filters (available to anyone who can already view the page — no new permission) (item X).", "item P — backend/accounts/admin.py AccessGroupAdmin.member_count and backend/accounts/serializers.py AccessGroupSerializer.get_member_count both now filter is_superuser=False, so a group's displayed member count (notably the default group, which superusers fall back into when group is NULL) no longer silently includes superuser accounts."]

roadmap:
  # Task-oriented navigation index. When the user asks for a change, find the
  # matching category below FIRST. Each entry has: description (what kinds of
  # requests map here), entry_points (open these files first), typical_files
  # (the full set usually touched, ordered by layer), order_of_operations
  # (sequence to follow), gotchas (cross-file traps that cause silent bugs if
  # missed), see_also (related roadmap/shared_components/i18n keys).
  # Reading order for a new task: meta -> rules -> progress -> roadmap (this
  # section) -> shared_components (blast-radius lookup) -> i18n (translation
  # lookup) -> files (full per-file index, consult only the specific files
  # named above).

  change_ui_copy_translation:
    description: "Change visible text/labels on PUBLIC pages (English and/or Persian). Admin-panel copy uses a different mechanism — see i18n.admin_panel_i18n_policy."
    entry_points:
      - "frontend/messages/en.json"
      - "frontend/messages/fa.json"
    typical_files:
      - "frontend/messages/en.json"
      - "frontend/messages/fa.json"
      - "the consuming page/component — see i18n.namespaces.<namespace>.used_by for the exact file"
    order_of_operations:
      - "1. Identify the i18n namespace the text belongs to (see i18n.namespaces — each namespace lists its keys and consumer files with the exact useTranslations() call pattern)."
      - "2. Edit the key under that namespace in BOTH en.json and fa.json (see i18n.invariant — a key present in only one locale falls back to the raw key-path string at runtime in the OTHER locale, producing visibly broken UI)."
      - "3. If ADDING a new key: match the consuming file's translator pattern — most pages call useTranslations('namespace') then t('key'); landing page.tsx and contribute/page.tsx use a root-level useTranslations() and call t('namespace.key') instead."
      - "4. If the text is in the ADMIN panel (frontend/app/[locale]/admin/**), it is an inline `isRTL ? '...' : '...'` ternary, NOT a messages/*.json key — edit the .tsx file directly (see i18n.admin_panel_i18n_policy). Do not add admin copy to messages/*.json."
    gotchas:
      - "fa.json MUST mirror en.json's key structure EXACTLY (i18n.invariant) — adding/renaming/removing a key in only one file breaks the OTHER locale's UI for that string (shows the raw key path)."
      - "the `common` namespace (loading/error/retry/close/prev/next/page_info/lightbox_hint/submitting) exists in both en.json/fa.json. As of Phase 13, prev/next/page_info/lightbox_hint/submitting ARE consumed (see i18n.namespaces.common.used_by — posts list pagination, posts/[id] and expenses[/[id]] comment-submit buttons + ImageLightbox hint); loading/error/retry/close remain UNUSED (verified via grep) — safe to extend, but don't assume those 4 are read anywhere."
      - "`help.sections` and `heritage.items` are NESTED objects (per-key sub-objects), not flat string keys — see i18n.namespaces.help / i18n.namespaces.heritage for their inner shapes before editing."
    see_also: ["i18n", "change_public_page_layout_content"]

  change_heritage_emblem_visuals:
    description: >
      User wants to change how the Lion-and-Sun / Faravahar / geometric
      pattern / generic cultural-emblem visuals look. ALL of these are
      emoji+CSS (CulturalEmblem/LionAndSun) or inline SVG
      (FaravaharSimple/GeometricPattern) — there are NO image files in the
      project (frontend/public/ is empty except .gitkeep).
    entry_points:
      - "frontend/components/animations/IranianSymbols.tsx"
    typical_files:
      - "frontend/components/animations/IranianSymbols.tsx"   # source of truth for all 4 exports
      - "frontend/app/[locale]/page.tsx"                       # landing — uses ALL 4 exports
      - "frontend/components/layout/Navbar.tsx"                # LionAndSun only
      - "frontend/components/layout/Footer.tsx"                # LionAndSun only
      - "frontend/components/layout/AdminSidebar.tsx"           # LionAndSun only
      - "frontend/components/layout/AdminTopBar.tsx"            # LionAndSun only
      - "frontend/components/admin/AdminTable.tsx"              # LionAndSun (empty-state icon)
      - "frontend/components/animations/SplashScreen.tsx"       # LionAndSun + GeometricPattern
      - "frontend/components/animations/PageTransition.tsx"     # LionAndSun — but UNUSED (see shared_components.IranianSymbols note)
    order_of_operations:
      - "1. Read shared_components.IranianSymbols for the FULL per-export needed_by list before editing — do not assume all consumers use all exports."
      - "2. If changing ONLY the emoji/color/size defaults of CulturalEmblem/LionAndSun: edit IranianSymbols.tsx only — the medallion wrapper (CulturalEmblem) is shared, so a color/size prop default change ripples to every LionAndSun call site automatically; check call sites still pass the props they expect (most pass only `size`, some pass `animated`)."
      - "3. If REPLACING an emoji/SVG with a real image asset: frontend/public/ is currently empty — would need to add image files there; next.config.mjs remotePatterns is NOT needed for local /public assets (only for next/image with external URLs); update IranianSymbols.tsx to use next/image, then verify every consumer's `size`/`className`/`animated` prop usage still makes sense for an <Image> element."
      - "4. If adding a NEW symbol/export: add it to IranianSymbols.tsx, add a needed_by entry under shared_components.IranianSymbols.exports for the new export, and update files['frontend/components/animations/IranianSymbols.tsx'].exports."
    gotchas:
      - "Landing page (page.tsx) is the ONLY consumer of CulturalEmblem/FaravaharSimple/GeometricPattern — changing their signature breaks ONLY that file, not the other consumers."
      - "LionAndSun is used in 17 places (15 direct app/component consumers + SplashScreen + PageTransition) — changing its prop signature (size/className/animated) breaks all 17."
      - "PageTransition.tsx imports LionAndSun and is itself UNUSED (zero importers, orphaned despite status:done) — editing it has NO visible effect; do not waste effort there unless also wiring it up into ClientLayout.tsx."
      - "All 'images' are emoji glyphs (🦁☀️🏛️🪦🗿📜📖) or inline SVG — there is no asset pipeline, no /public images, no next/image usage for these symbols today."
    see_also: ["shared_components.IranianSymbols", "change_public_page_layout_content", "change_navbar_footer"]

  add_admin_page_or_feature:
    description: "Add a new page/section to the admin panel (frontend/app/[locale]/admin/**) or extend an existing one with new functionality."
    entry_points:
      - "frontend/app/[locale]/admin/<closest-existing-similar>/page.tsx"   # use as a template
      - "frontend/lib/adminNav.ts"
    typical_files:
      - "frontend/app/[locale]/admin/<new>/page.tsx"            # new page
      - "frontend/lib/adminNav.ts"                               # ADMIN_NAV_ITEMS entry — single source of truth for AdminSidebar's nav link, admin/page.tsx's AccessSummaryCard, AND (via exported ADMIN_PERMISSIONS) admin/layout.tsx's route guard
      - "frontend/lib/api.ts"                                     # new API namespace + TS types, if a new backend endpoint is needed
      - "backend/<app>/views.py + backend/<app>/urls.py + backend/groupfund/urls.py"  # new backend endpoint, if needed
      - "frontend/app/[locale]/help/page.tsx"                     # add the new page to the permission->help-section mapping (help.sections), if relevant
    order_of_operations:
      - "1. Pick the closest existing admin page as a template — see shared_components.admin_component_library for which AdminTable/AdminModal/AdminConfirmDialog/AdminBadge/admin/fields/* components to reuse. Do NOT build new table/modal/form primitives."
      - "2. If a new backend endpoint is needed: add a view to backend/<app>/views.py, wire it in backend/<app>/urls.py + backend/groupfund/urls.py, extend the serializer in backend/<app>/serializers.py."
      - "3. Add a new API namespace/function + TS types to frontend/lib/api.ts."
      - "4. Create frontend/app/[locale]/admin/<new>/page.tsx — copy the structure of a similar page (imports from admin_component_library + useAuthStore + useToastStore), gate on the relevant permission via hasPermission()/member.is_superuser (see shared_components.useAuthStore for the pattern used by all 13 existing admin pages)."
      - "5. Add a new entry to ADMIN_NAV_ITEMS in frontend/lib/adminNav.ts ({key, href, label:{en,fa}, icon, permission?: string | string[], superuserOnly?, divider?, badgeKey?}). `permission` as an array means 'any of these is sufficient' (see the 'expenses' item, which uses ['can_view_balance','can_expense'])."
      - "6. If the page needs a NEW permission codename, follow roadmap.change_permissions_access_groups for the full propagation (backend permissions.py + seed_initial_data + frontend gating + adminNav.ts entry + help page mapping)."
      - "7. Admin panel pages do NOT use messages/*.json — all copy is inline isRTL ternaries (see i18n.admin_panel_i18n_policy)."
    gotchas:
      - "Every admin page renders inside AdminLayout.tsx (mounted by the admin/layout.tsx route guard) — AdminToastContainer is already mounted there, so useToastStore().show(...) just works; do not re-mount AdminToastContainer on the new page."
      - "admin/layout.tsx's route guard imports ADMIN_PERMISSIONS from frontend/lib/adminNav.ts — a deduplicated union of every `permission` value (string or string[]) across ALL non-superuserOnly ADMIN_NAV_ITEMS entries (is_superuser bypasses this check entirely). A brand-new permission codename is AUTOMATICALLY added to this guard as soon as it's referenced by an ADMIN_NAV_ITEMS entry (step 5) — there is no separate admin/layout.tsx edit to remember."
      - "AdminTable has no shared column-definition file — column.render functions are defined inline per-page (7 existing AdminTable-based pages each define their own columns); copying a similar page's columns is the fastest path."
    see_also: ["change_admin_component_library", "change_permissions_access_groups", "change_db_model_field", "shared_components.admin_component_library", "shared_components.adminNav"]

  change_navbar_footer:
    description: >
      Change the public navbar (logo/branding, nav links, language switcher,
      auth dropdown) or footer (links, copyright, dedication line).
    entry_points:
      - "frontend/components/layout/Navbar.tsx"
      - "frontend/components/layout/Footer.tsx"
    typical_files:
      - "frontend/components/layout/Navbar.tsx"
      - "frontend/components/layout/Footer.tsx"
      - "frontend/app/[locale]/ClientLayout.tsx"   # composes Navbar+Footer; admin routes skip both
      - "frontend/messages/en.json + frontend/messages/fa.json"  # nav.* and footer.* namespaces
      - "frontend/store/authStore.ts"   # auth dropdown state (isAuthenticated, member, hasPermission)
      - "frontend/store/langStore.ts"   # language switcher state
    order_of_operations:
      - "1. For LINK/label text changes: edit nav.* / footer.* keys in BOTH messages/en.json and messages/fa.json (see i18n EN/FA-pair invariant)."
      - "2. For new nav items: add the Link in Navbar.tsx (desktop + mobile drawer — two separate render blocks), add the i18n key pair, and if the link should also appear in AdminSidebar.tsx for parity, check that too."
      - "3. For branding/logo changes: Navbar.tsx and Footer.tsx both render <LionAndSun size=... /> — see shared_components.IranianSymbols (LionAndSun) for the full 17-consumer blast radius if changing the component itself vs just this call site's props."
      - "4. ClientLayout.tsx conditionally renders Navbar/Footer only on non-/admin routes — if adding a NEW top-level route that should behave like 'admin' (no public chrome), update the isAdminRoute check in ClientLayout.tsx."
    gotchas:
      - "Navbar has a SEPARATE mobile-drawer render block — nav-link changes must be made in BOTH places or mobile/desktop will diverge."
      - "Footer's dedication line (footer.dedication) is a deliberate fixed bilingual line — do not remove without confirming with the user (project-specific memorial text)."
      - "AdminTopBar.tsx (admin equivalent) duplicates Navbar's language-switcher and logout logic (per its file note: 'mirrors Navbar handleLanguageSwitch'/'mirrors Navbar handleLogout') — changes to Navbar's auth/lang logic should be mirrored there if AdminTopBar should stay in sync."
    see_also: ["shared_components.useLangStore", "shared_components.useAuthStore", "i18n.namespaces.nav", "i18n.namespaces.footer"]

  change_public_page_layout_content:
    description: "Change a public-facing page's layout/content/behavior (landing, login, register, posts, posts/[id], expenses, contribute, profile, contact, help, forbidden, unavailable, not-found)."
    entry_points:
      - "frontend/app/[locale]/<page>/page.tsx"
    typical_files:
      - "the target page.tsx — see its files entry for current imports/i18n_namespace/note"
      - "frontend/messages/en.json + frontend/messages/fa.json   # if changing copy — see change_ui_copy_translation"
      - "frontend/store/authStore.ts   # if changing auth-conditional rendering — see shared_components.useAuthStore for which fields this page already destructures"
      - "frontend/components/animations/IranianSymbols.tsx   # if the page renders LionAndSun/other symbols — see shared_components.IranianSymbols"
    order_of_operations:
      - "1. Read the target page's files.<path> entry for its current imports/i18n_namespace/note before editing."
      - "2. For copy/text changes: follow roadmap.change_ui_copy_translation (EN+FA pair)."
      - "3. For auth-conditional changes: check shared_components.useAuthStore's needed_by entry for this page to see which fields (member/isAuthenticated/hasPermission/...) it already uses."
      - "4. For visual/symbol changes: check shared_components.IranianSymbols for this page's specific export usage (most pages use ONLY LionAndSun; landing page.tsx uniquely uses all 4 exports)."
      - "5. forbidden/unavailable/not-found pages are interceptor REDIRECT TARGETS (axios 403/503/404 in frontend/lib/api.ts) — changing their ROUTE path requires updating the interceptor's router.replace()/redirect target too."
    gotchas:
      - "landing page.tsx (frontend/app/[locale]/page.tsx) is the single largest/most complex public page — multi-namespace root translator (landing/heritage/posts namespaces), all 4 IranianSymbols exports, AND auth-conditional CTA blocks. Treat a landing-page change as touching multiple roadmap categories at once."
      - "posts/[id]/page.tsx and expenses/page.tsx both use next/image — if NEXT_PUBLIC_MEDIA_URL changes, check next.config.mjs remotePatterns (see change_deployment_env_config)."
      - "forbidden/unavailable/not-found have `imports.internal: []` — they are intentionally dependency-free interceptor targets; don't add app-wide state (authStore/etc.) to them without checking why the interceptor routes here while unauthenticated."
    see_also: ["change_ui_copy_translation", "change_heritage_emblem_visuals", "change_zustand_store"]

  change_db_model_field:
    description: >
      Add/remove/rename a field on a Django model (Member, AccessGroup,
      Contribution, Expense, Post, Comment, DefaultSetting, etc.) and
      propagate the change end-to-end.
    entry_points:
      - "backend/<app>/models.py"   # accounts/fund/posts/core/logs/payments
    typical_files:
      - "backend/<app>/models.py"            # 1. field definition
      - "backend/<app>/migrations/"          # 2. makemigrations + migrate
      - "backend/<app>/serializers.py"       # 3. add/remove field in serializer fields list
      - "backend/<app>/views.py (or member_views.py / group_views.py / settings_views.py / dashboard_views.py)"  # 4. if field affects filtering/ordering/permissions
      - "backend/<app>/admin.py"             # 5. Django admin list_display/fields if surfaced there
      - "frontend/lib/api.ts"                # 6. update the matching TS type (e.g. Member, Contribution, Expense, PostDetail, etc. in `types` export)
      - "frontend/app/[locale]/**/page.tsx"  # 7. any page rendering/editing that field
      - "frontend/app/[locale]/admin/**/page.tsx"  # 8. any AdminTable column / AdminModal form field exposing it
      - "frontend/messages/en.json + frontend/messages/fa.json"  # 9. new label strings, EN+FA pair (see i18n section)
    order_of_operations:
      - "1. Edit backend/<app>/models.py field definition."
      - "2. Run makemigrations (creates backend/<app>/migrations/000X_*.py) — check files['backend/<app>/models.py'].needed_by for which serializers/views reference the model already."
      - "3. Update backend/<app>/serializers.py — add/remove the field name in `fields = [...]` (or Meta.fields)."
      - "4. Check backend/<app>/views.py for any filter_fields/ordering_fields/search_fields referencing the old field name."
      - "5. Update backend/<app>/admin.py jazzmin list_display/fieldsets if the field should be visible in /admin/."
      - "6. Update the corresponding TS type in frontend/lib/api.ts `types` export (e.g. MemberDetail, Expense, Contribution, PostDetail, AccessGroup, DefaultSettingItem)."
      - "7. Grep files[].needed_by for that TS type to find every frontend page/component consuming it, and update each (form fields, table columns, display)."
      - "8. If the field needs a new UI label, add EN+FA i18n keys per the i18n section's update invariant (or, for admin pages, edit the inline isRTL string directly — see i18n.admin_panel_i18n_policy)."
    gotchas:
      - "backend has full imports/exports/needed_by graphs — ALWAYS check needed_by on the model file first; frontend's lib/api.ts.exports.types entry is the single choke point for ALL frontend model shapes."
      - "Renaming a field requires checking BOTH the serializer `fields` list AND any `source=` kwargs, AND any frontend object destructuring (`const { old_name } = ...`)."
      - "Admin AdminTable columns are defined inline per-page (column.render functions) — there is no shared column-definition file, so each admin page touching that model must be checked individually (see shared_components.admin_component_library.components.AdminTable.needed_by for which pages use AdminTable)."
    see_also: ["add_admin_page_or_feature", "change_permissions_access_groups"]

  change_permissions_access_groups:
    description: "Change permission codenames, default groups/access levels, or who-can-do-what logic across backend and frontend."
    entry_points:
      - "backend/accounts/permissions.py"
      - "backend/core/utils.py"
    typical_files:
      - "backend/accounts/permissions.py"   # HasGroupPermission, IsSuperuser, IsActiveMember permission classes
      - "backend/core/utils.py"             # get_default_group_id
      - "backend/core/management/commands/seed_initial_data.py"  # Permission/AccessGroup/DefaultSetting seed rows — the ONLY place new permission codenames get created in the DB (12 codenames as of Phase 15 — see files['frontend/lib/permissionsMeta.ts'] for the bilingual list)
      - "backend/accounts/models.py"        # AccessGroup model, Member.group FK
      - "backend/<app>/views.py"            # permission_classes=[HasGroupPermission('<codename>')] on each view
      - "frontend/store/authStore.ts"       # hasPermission(codename) — public_interface
      - "frontend/components/admin/fields/AdminPermissionCheckbox.tsx"  # permission grid UI; hardcoded always-on entries can_contribute/can_comment
      - "frontend/app/[locale]/admin/groups/page.tsx"  # group CRUD + permission grid
      - "frontend/lib/adminNav.ts"          # ADMIN_NAV_ITEMS[].permission per nav item — single source for BOTH AdminSidebar's per-item gating AND admin/layout.tsx's ADMIN_PERMISSIONS route guard (Phase 15 refactor, items B/C/L)
      - "frontend/app/[locale]/help/page.tsx"          # permission -> help-section mapping, kept in parity with adminNav.ts's gating
    order_of_operations:
      - "1. Add the new permission codename to backend/core/management/commands/seed_initial_data.py (Permission row) — this is the ONLY seeding path; a codename not seeded here does not exist in the DB on fresh installs."
      - "2. Apply the permission to relevant backend/<app>/views.py via HasGroupPermission('<codename>') in permission_classes."
      - "3. If the codename should be assignable via the admin UI: AdminPermissionCheckbox.tsx's PermissionOption list is populated dynamically from permissionsAPI.getList() (backend/core/views.py PermissionListView) — no frontend hardcoding needed UNLESS it's one of the 'always-on locked' entries (can_contribute/can_comment), which ARE hardcoded in AdminPermissionCheckbox.tsx."
      - "4. Add frontend gating via useAuthStore().hasPermission('<codename>') (see shared_components.useAuthStore for the ~23 files already doing this — follow the same `member.is_superuser` bypass pattern used everywhere)."
      - "5. If the new permission should let a member into the admin panel at all AND/OR unlock a specific nav item, set/extend that item's `permission` field (string, or string[] meaning 'any of these is sufficient') on the relevant entry in ADMIN_NAV_ITEMS (frontend/lib/adminNav.ts). admin/layout.tsx's ADMIN_PERMISSIONS route guard is a deduplicated union DERIVED from ADMIN_NAV_ITEMS — no separate edit to admin/layout.tsx or AdminSidebar.tsx is needed."
      - "6. Add the new permission to help/page.tsx's help.sections mapping (kept in parity with adminNav.ts's gating per existing convention)."
    gotchas:
      - "is_superuser ALWAYS bypasses hasPermission checks on both frontend AND backend (IsSuperuser permission class) — every gated page/view has a parallel `member.is_superuser` OR-condition; forgetting it means superusers could lose access to a feature they should always have."
      - "AdminPermissionCheckbox.tsx hardcodes can_contribute/can_comment as 'always included regardless of what's checked' — these 2 codenames are baseline member permissions, not admin-assignable; do not add them to the dynamic grid."
      - "seed_initial_data is idempotent (get_or_create) but only runs on fresh/explicit invocation — renaming a codename does NOT rename it in already-deployed DBs; requires a migration or manual data-fix."
    see_also: ["add_admin_page_or_feature", "shared_components.useAuthStore", "shared_components.admin_component_library", "shared_components.adminNav"]

  add_modify_payment_provider:
    description: "Add or modify a payment provider (manual bank transfer / PayPal exist now; Stripe / Google Pay deferred per progress.phases.10)."
    entry_points:
      - "backend/payments/base.py"
      - "backend/payments/factory.py"
    typical_files:
      - "backend/payments/base.py"      # BasePaymentProvider abstract interface
      - "backend/payments/manual.py"    # ManualPaymentProvider
      - "backend/payments/paypal.py"    # PayPalPaymentProvider
      - "backend/payments/factory.py"   # PaymentFactory — provider registry/dispatch
      - "backend/payments/serializers.py"
      - "backend/payments/views.py"     # PaymentMethodsView / PaymentInitiateView / ReceiptUploadView
      - "backend/payments/urls.py"
      - "backend/core/management/commands/seed_initial_data.py"  # DefaultSetting rows: payment_manual_*/payment_paypal_*/payment_<new>_* enabled flags + config fields
      - "frontend/lib/api.ts"            # paymentsAPI — getMethods/initiate/uploadReceipt
      - "frontend/app/[locale]/contribute/page.tsx"   # 4-step wizard — method selection + per-method instructions rendering
      - "frontend/app/[locale]/admin/payments/page.tsx"  # admin settings UI — AdminToggle for *_enabled + AdminInput/AdminTextarea per config field
    order_of_operations:
      - "1. Implement a new provider class in backend/payments/<provider>.py subclassing BasePaymentProvider (see manual.py/paypal.py for the interface shape)."
      - "2. Register it in backend/payments/factory.py's PaymentFactory dispatch."
      - "3. Add new DefaultSetting rows (payment_<provider>_enabled + any config fields like account numbers/keys) to seed_initial_data.py — PaymentMethodsView reads these to decide which methods to show."
      - "4. Update frontend/lib/api.ts paymentsAPI types if the new provider has a different `instructions` shape than existing methods."
      - "5. frontend/app/[locale]/contribute/page.tsx's method-selection step + instructions-rendering step need a new branch for the provider's UI (see existing manual/paypal branches)."
      - "6. frontend/app/[locale]/admin/payments/page.tsx needs a new section (AdminToggle for enabled flag + AdminInput/AdminTextarea for config fields) — follow the existing MANUAL_FIELDS/PAYPAL_FIELDS local-constant pattern."
      - "7. If the provider needs settings NOT to appear on /admin/settings (the generic editor), add its key prefix to that page's PAYMENT_PREFIXES exclusion constant."
    gotchas:
      - "PAYMENT_PREFIXES (in admin/settings/page.tsx) and MANUAL_FIELDS/PAYPAL_FIELDS (in admin/payments/page.tsx) are LOCAL CONSTANTS, not shared config — a new provider's DefaultSetting keys must be added to BOTH the admin/payments inclusion list AND the admin/settings exclusion list, or its settings will appear in BOTH places (or neither)."
      - "progress.phases.10 (Stripe/Google Pay) is explicitly DEFERRED — do not assume any Stripe-specific scaffolding exists yet beyond meta.payment's note."
      - "ReceiptUploadView (manual/PayPal receipt flow) is provider-specific — a fully-automated provider (e.g. real Stripe) would SKIP the receipt-upload step entirely in contribute/page.tsx's wizard, requiring a step-count/flow branch, not just a new method option."
    see_also: ["change_db_model_field", "change_deployment_env_config"]

  change_deployment_env_config:
    description: "Change deployment/environment configuration across docker-compose, Railway, Dockerfiles, Caddyfile, or .env files."
    entry_points:
      - "docker-compose.yml"
      - "Dockerfile.railway"
    typical_files:
      - "docker-compose.yml"              # VPS/local multi-container: backend, frontend, db, caddy
      - "Dockerfile.railway"               # single combined image, repo root
      - "docker-entrypoint.railway.sh"     # repo root — supervises backend+frontend processes via wait -n
      - "backend/Dockerfile + backend/docker-entrypoint.sh"
      - "backend/scripts/prepare.sh"       # DB-wait + migrate + seed + collectstatic — shared by both entrypoints
      - "frontend/Dockerfile"
      - "Caddyfile"                        # VPS reverse-proxy
      - "railway.json"                     # points dockerfilePath at Dockerfile.railway
      - ".env.example / .env.docker.example"   # backend env vars
      - "frontend/.env.example"            # NEXT_PUBLIC_API_URL / NEXT_PUBLIC_SITE_NAME / NEXT_PUBLIC_MEDIA_URL
      - "backend/groupfund/settings.py"    # reads the env vars
      - "frontend/next.config.mjs"         # rewrites()/skipTrailingSlashRedirect/remotePatterns — derived from NEXT_PUBLIC_API_URL/NEXT_PUBLIC_MEDIA_URL
      - "frontend/middleware.ts"           # next-intl locale matcher — must exclude /admin and /i18n
      - "DEPLOYMENT.md"                    # Persian-translated deploy docs — keep in sync
    order_of_operations:
      - "1. Decide which deploy path is affected: Railway (single combined image, Dockerfile.railway + docker-entrypoint.railway.sh) vs docker-compose/VPS (docker-compose.yml + backend/Dockerfile + frontend/Dockerfile + Caddyfile) — backend/scripts/prepare.sh is SHARED by both."
      - "2. New env vars: add to BOTH .env.example (or .env.docker.example) AND backend/groupfund/settings.py (os.environ read); for frontend vars, also frontend/.env.example AND check next.config.mjs if it derives remotePatterns/rewrites from it."
      - "3. Railway requires ZERO service variables by design — if a new env var is REQUIRED (not optional with a sensible default), this breaks that guarantee; prefer optional with default."
      - "4. New routes needing proxy passthrough (like /i18n/setlang/ historically) must be added to BOTH frontend/next.config.mjs rewrites() AND frontend/middleware.ts's next-intl matcher exclusions, or they 404/redirect-loop."
      - "5. Update DEPLOYMENT.md (Persian) to document any new required steps/vars."
    gotchas:
      - "5 severe pre-existing bugs were already found+fixed in this area (see progress.phases.11.done) — infinite redirect loops and 404s on /admin and /i18n/setlang/ came from next.config.mjs rewrites + middleware.ts matcher being out of sync. ANY new top-level route added to the Next.js app that should bypass next-intl locale prefixing (like /admin) MUST be added to middleware.ts's matcher exclusion AND, if proxied through Next to Django, to next.config.mjs rewrites()."
      - "frontend/public/.gitkeep exists ONLY to make 'COPY --from=builder /frontend/public' succeed in both Dockerfiles — if real assets are EVER added to frontend/public/, this is no longer just a placeholder; don't delete .gitkeep casually since public/ might become empty again."
      - "NEXT_PUBLIC_* vars are baked into the JS bundle AT BUILD TIME — changing them requires a rebuild, not just a container restart/env change."
    see_also: ["add_modify_payment_provider", "change_db_model_field"]

  change_auth_login_flow:
    description: "Change authentication/login/register/token-refresh flow."
    entry_points:
      - "backend/accounts/backends.py"
      - "frontend/lib/api.ts"
      - "frontend/store/authStore.ts"
    typical_files:
      - "backend/accounts/backends.py"   # MemberAuthBackend — authenticate() accepts username= for Django admin compat too
      - "backend/accounts/views.py"      # register/login/logout/refresh — JWT simplejwt
      - "backend/accounts/serializers.py"
      - "backend/accounts/urls.py"
      - "frontend/lib/api.ts"            # authAPI (login/register) + axios interceptors (token attach/refresh, 403->/forbidden, 503->/unavailable, 404->/not-found)
      - "frontend/store/authStore.ts"    # persisted member/accessToken/refreshToken/isAuthenticated/hasPermission; login()/logout()/setTokens()
      - "frontend/app/[locale]/login/page.tsx"
      - "frontend/app/[locale]/register/page.tsx"
      - "frontend/middleware.ts"         # route/locale matcher — does NOT itself check auth tokens, just locale routing + /admin exclusion
    order_of_operations:
      - "1. Backend: MemberAuthBackend.authenticate() in backends.py is the single auth entry point — accepts BOTH `username=` (Django admin / AuthenticationForm) and the member's actual credential field; changes here affect BOTH Django admin login AND the JWT API login."
      - "2. accounts/views.py issues JWT tokens (simplejwt) on login/register — response shape is {tokens: {access, refresh}, member: {...}}."
      - "3. Frontend: login/register pages call authAPI.login/register, then authStore.login() persists {member, accessToken, refreshToken, isAuthenticated:true} to localStorage (zustand persist, key 'groupfund-auth')."
      - "4. lib/api.ts's axios interceptors attach `Authorization: Bearer <accessToken>` from authStore on every request, and on 401 attempt a token refresh; also redirect 403->/forbidden, 503->/unavailable, 404->/not-found (see roadmap.change_public_page_layout_content for those target pages)."
      - "5. login/register pages BOTH have a REDIRECT-IF-AUTHENTICATED guard (once hasHydrated, if isAuthenticated && member, router.replace(`/${locale}`)) — preserve this when modifying either page."
    gotchas:
      - "authStore is read by lib/api.ts's axios interceptors OUTSIDE React/zustand's hook context (interceptors call useAuthStore.getState() directly, not the hook) — same pattern as langStore/lib/api.ts's getLocalePrefix() reading localStorage directly (see shared_components.useLangStore note). Don't assume `useAuthStore()` (the hook form) works in non-component code."
      - "hasHydrated is a zustand-persist-specific flag — login/register pages render NOTHING until hasHydrated is true, to avoid a flash of the login form for an already-authenticated user whose persisted state hasn't loaded yet. Any new auth-gated page should follow the same hasHydrated-gate pattern (see shared_components.useAuthStore needed_by for which pages already do)."
      - "~23 files consume useAuthStore (see shared_components.useAuthStore) — changing the PUBLIC INTERFACE (login/logout/setTokens/hasPermission signatures) ripples to all of them, not just the login/register pages."
    see_also: ["change_zustand_store", "shared_components.useAuthStore", "change_permissions_access_groups"]

  change_admin_component_library:
    description: "Change a shared admin UI primitive (AdminTable/AdminModal/AdminConfirmDialog/AdminStatCard/AdminBadge/AdminToastContainer/admin/fields/*) — affects ALL consuming admin pages."
    entry_points:
      - "frontend/components/admin/<Component>.tsx"
      - "frontend/components/admin/fields/<Component>.tsx"
    typical_files:
      - "the target component file (frontend/components/admin/ or admin/fields/)"
      - "shared_components.admin_component_library.<components|fields>.<Name>.needed_by — EVERY file listed must be checked for prop-shape compatibility"
    order_of_operations:
      - "1. Read shared_components.admin_component_library.<components|fields>.<Name> for the FULL list of consuming admin pages BEFORE changing the component's props/exports."
      - "2. If changing a PROP'S TYPE or REMOVING a prop: grep every consumer in the needed_by list for that prop name and update each call site."
      - "3. If adding a NEW OPTIONAL prop with a sensible default: no consumer changes are strictly required, but consider whether existing consumers SHOULD opt in."
      - "4. If changing visual/styling only (no prop changes): no consumer changes needed, but visually spot-check at least one consumer from each distinct 'role' (e.g. AdminTable is used for both simple lists AND filter-heavy lists)."
    gotchas:
      - "AdminBadge's status->color mapping (pending/pending_review->amber, completed/approved/active->green, failed/rejected/inactive->red, fallback cyan) is used by 6 pages with DIFFERENT status vocabularies (contributions, members, members/[id], comments, dashboard, logs/system via LEVEL_STATUS mapping) — changing the mapping affects all 6 simultaneously; some pages pass an explicit `label` override, others rely on `status` alone."
      - "AdminTable<T> and AdminTableColumn<T> are GENERIC — there is no single shared column-definition file; each of the 7 consuming pages defines its own columns inline. A signature change to AdminTableColumn (e.g. renaming `render` to `cell`) requires editing all 7 pages' column arrays."
      - "AdminToastContainer is mounted ONCE via AdminLayout.tsx (not per-page) — do not add a second mount; all useToastStore consumers (13 admin pages + the container itself) share this single instance."
    see_also: ["shared_components.admin_component_library", "add_admin_page_or_feature", "change_zustand_store"]

  change_zustand_store:
    description: "Change one of the 3 zustand stores (authStore/langStore/toastStore) — check shared_components for the full consumer list before changing the store's public interface."
    entry_points:
      - "frontend/store/<name>Store.ts"
    typical_files:
      - "the target store file (frontend/store/authStore.ts | langStore.ts | toastStore.ts)"
      - "shared_components.use<Name>Store.needed_by — EVERY consumer file, with the SPECIFIC fields/methods each one uses"
    order_of_operations:
      - "1. Read shared_components.use<Name>Store for the full per-consumer field/method usage list BEFORE changing the store's public_interface."
      - "2. If RENAMING a field/method: grep every consumer's `uses:` list (in shared_components) for the old name and update each call site — for authStore (~23 consumers) and toastStore (13 consumers) this is a wide change."
      - "3. If the store uses zustand `persist` middleware (authStore, langStore — NOT toastStore): changing the persisted SHAPE may require a migration/version bump, or existing localStorage data becomes stale/incompatible (localStorage keys: 'groupfund-auth' / 'groupfund-lang')."
      - "4. langStore's locale ALSO independently syncs with localStorage key 'lang', which frontend/lib/api.ts's internal getLocalePrefix() reads directly (not via the store) — changing langStore's localStorage key or shape must be mirrored in lib/api.ts's getLocalePrefix() (the dead frontend/lib/auth.ts has its own unused copy too)."
    gotchas:
      - "toastStore has NO persist middleware (toasts are ephemeral) — unlike authStore/langStore."
      - "authStore's hasPermission(codename) is called with is_superuser-bypass logic DUPLICATED at every call site (`member?.is_superuser || hasPermission('...')`) rather than centralized in the store itself — centralizing this is purely additive/safe but leaves existing call sites inconsistent until each is migrated."
    see_also: ["shared_components.useAuthStore", "shared_components.useLangStore", "shared_components.useToastStore", "change_auth_login_flow"]

