he original LionAndSun calls, which were also un-animated). Since this removed the file's ONLY 2 LionAndSun usages, the import statement itself was changed from `import { LionAndSun } from ...` to `import { HandsEmblem } from ...` (not a second added import) — LionAndSun has zero remaining references in this file.", "Per the user's explicit clarifying instruction ('لوگو دست هم برای سایت باشه. همون عکس که توی هدر سایت استفاده میشه' — the hands image should also be the site's logo, the same image used in the site's header), this confirms Navbar.tsx (the site's header component, rendered on every public route via ClientLayout.tsx) was correctly identified as the second in-scope location, alongside the Hero-content icon — no other LionAndSun consumer (Footer.tsx, AdminSidebar.tsx, AdminTopBar.tsx, AdminTable.tsx, the 6 admin/public page-header icons, admin/layout.tsx, SplashScreen.tsx, PageTransition.tsx) was touched, per the doubly-emphasized 'don't change anywhere else' instruction.", "The sitewide watermark mechanism itself (frontend/components/layout/SiteBackground.tsx, mounted once in app/[locale]/layout.tsx) was NOT touched in any way — same file path, same opacity (0.07), same backgroundSize:'contain', same zIndex:-1, same fixed full-viewport positioning. Zero changes to that component, its mount point, or frontend/styles/admin.css's --admin-bg — fully satisfying the explicit 'بک گراند همین شکلی بمونه یا میزان محو بودن. بدون تغییر' (the background stays exactly as-is, including its blur/fade level — no change) instruction.", "Updated all.yaml: this phase entry; shared_components.IranianSymbols gained a new HandsEmblem export entry (signature/needed_by/note) and LionAndSun's needed_by list had its Navbar.tsx entry removed entirely + its page.tsx context string updated (consumer count 19->18); consumer_count_note updated; roadmap.change_heritage_emblem_visuals's entry_points/typical_files/gotchas updated (8->9 exports, Navbar.tsx now HandsEmblem-only, 20->18 LionAndSun consumer count); roadmap.change_navbar_footer's branding/logo-change step updated; files[] entries updated for frontend/app/[locale]/page.tsx (imports + note), frontend/components/layout/Navbar.tsx (imports + note), and frontend/components/animations/IranianSymbols.tsx (new HandsEmblem export + note + needed_by summary).", "Verified: frontend `npx tsc --noEmit` (zero errors) and `npm run build` (clean production build, all 31 routes compiled) re-run clean after all edits. NOTE: no browser/Playwright tool was available in this remote execution environment, so a live visual screenshot confirmation of the new HandsEmblem rendering at the correct size/aspect-ratio/position in both the Hero and the Navbar (desktop + mobile drawer, both locales) was not possible this phase — disclosed as a known verification-method limitation (same limitation already disclosed in Phase 37), not a silent gap. Verification was instead done by: (a) code review of the exact JSX call sites before/after, confirming only the 3 intended `<LionAndSun .../>` occurrences were replaced and the Hero-background occurrence + the watermark mechanism were left byte-for-byte unchanged; (b) re-deriving HANDS_EMBLEM_RATIO directly from the real JPEG's pixel dimensions via PIL, exactly mirroring how LION_AND_SUN_RATIO/FARAVAHAR_RATIO were originally derived, so the new component cannot stretch/distort the image at any size."]
