      done: ["item b — ContactMessageCreateView's MAX_PENDING_MESSAGES=4 cap (Phase 23, authenticated-only) extended to cover GUEST submitters too: for an unauthenticated submitter, .post() now counts ContactMessage.objects.filter(sender__isnull=True, contact_info=<submitted contact_info>, is_handled=False) and returns the same 429 once that count is already >=4 — scoped by exact contact_info match (a guest's only stable identity), so a different guest/contact_info is unaffected. Verified end-to-end via Django RequestFactory (DRF's APIClient hit a DisallowedHost on 'testserver' in this environment's ALLOWED_HOSTS, so the view was invoked directly): 4 submissions with the same contact_info succeed, the 5th returns 429, and a 5th submission with a DIFFERENT contact_info still succeeds.", "item c — investigated and confirmed ALREADY FULLY SATISFIED by Phase 24 item 7's single-modal moderation UX (no CommentDeleteView/ContributionDeleteView exist anywhere in posts/urls.py or fund/urls.py; admin/comments/page.tsx and admin/contributions/page.tsx each already have exactly one Eye button opening one AdminModal, with Reject already a reveal-then-confirm flow with an optional reason) — zero code changes needed this phase.", "item d — universal system-assigned tracking-code pattern, generalizing Phase 24's Contribution-only 'FUND-XXXXXX' format into ONE shared scheme reused for every user-submitted item site-wide. NEW backend/core/tracking_codes.py: generate_tracking_code(model_cls, letter, member_number=None) -> '{member_number:05d, or 00000 for a guest}{LETTER}{random 3-digit}' (e.g. '12345C555' for a member's comment, '00000F042' for a guest's contribution), retried up to 20x against existing rows for uniqueness (same retry-loop shape as Member._generate_member_number(), now factored into one shared helper instead of 3 near-duplicate staticmethods). Letter assignment is fixed per model, not random: C=posts.Comment (NEW field via posts/migrations/0005_comment_tracking_code.py, AddField(nullable)->RunPython backfill->AlterField non-nullable), F=fund.Contribution (reformatted from the old Phase-24 'FUND-XXXXXX' format to the new shared scheme via a pure-data migration fund/migrations/0006_contribution_tracking_code_reformat.py — no schema change, field already existed), M=core.ContactMessage (NEW field via core/migrations/0006_contactmessage_tracking_code.py, same 3-step pattern as Comment's). All three models gained an identical save() override (`if not self.tracking_code: ... self.tracking_code = generate_tracking_code(<Model>, '<letter>', member_number)`), each with a comment cross-referencing the other two models' letters for future-proofing. Visibility carefully scoped per the user's 'admin-panel-control-only, never shown to other users elsewhere' requirement: Comment.tracking_code is exposed ONLY on CommentAdminDetailSerializer (admin-gated detail view) — deliberately NEVER added to the public-shared CommentSerializer or to MyCommentSerializer, since CommentSerializer is reused verbatim by the fully-public CommentListView (AllowAny) and leaking it there would defeat the whole point; ContactMessage.tracking_code is exposed on the one shared ContactMessageSerializer (used by both the admin list/detail views AND the owner's own 'My Messages' view, mirroring the pre-existing sender_member_number precedent from Phase 24) but the owner-facing frontend page (profile/contact-messages/page.tsx) was verified to NOT render it. Admin-only search-by-tracking-code (`Q(tracking_code__icontains=search)`) added to CommentGlobalListView (posts/views.py) and ContactMessageListView (core/contact_views.py) — Contribution's was already searchable since Phase 24. Frontend: lib/api.ts's CommentDetail and ContactMessage interfaces gained tracking_code: string; admin/comments/page.tsx's detail modal and admin/contact-messages/page.tsx's table + detail modal display it (monospace); profile/comments/page.tsx, profile/contributions/page.tsx, and profile/contact-messages/page.tsx were each verified (grep, zero matches) to NOT display tracking_code or member_number anywhere, preserving admin-only visibility end-to-end.", "item e — activity-log actor/target precision pass, applied as a sitewide pattern per the user's explicit generalization instruction ('هرچی مثال زدم، به عنوان هدف مشخص در نظر نگیر... در کل سایت هر جای مشابه رو با این الگو پیش ببر'). NEW backend/core/log_utils.py: actor_display_for(actor) -> 'display_name or full_name (#member_number)' for a real Member, or the literal string 'guest' for None (never raw str(member), which previously only showed a name with no way to disambiguate two members sharing a display name) — and target_display_for(target) -> 'str(target) [tracking_code]' if the target model has one (Comment/Contribution/ContactMessage), else 'str(target) (#member_number)' if it has THAT instead (Member), else a plain str(target) fallback (Post/Expense/AccessGroup/etc., unchanged from before). Both helpers are now imported and used by every _log() helper implementation across the backend (posts/views.py, fund/views.py, payments/views.py, accounts/group_views.py, accounts/member_views.py, accounts/views.py [different call signature — actor_display_for applied at each of its 4 call sites individually, NOT inside a shared _log], core/contact_views.py — 7 distinct copies, all previously using bare str()/`.display_name or .full_name`) AND every direct ActivityLog.objects.create() call site found via an exhaustive `grep -rn ActivityLog.objects.create` across the whole backend (fund/admin.py x2 — approve/reject contribution admin actions, posts/admin.py x2 — approve/reject comment admin actions, accounts/admin.py x4 — activate/deactivate/save_model on MemberAdmin + set_as_default on AccessGroupAdmin, core/admin.py x1 — DefaultSettingAdmin.save_model, core/signals.py x1 of 3 — on_member_delete only; on_post_delete/on_expense_delete deliberately left unchanged since Post/Expense have neither tracking_code nor member_number to enrich, core/settings_views.py x1 — DefaultSettingUpdateView.patch). Net effect: every entry in /admin/logs/activity now names WHO acted with their member_number (or 'guest') and WHAT was acted on with its tracking_code/member_number where one exists, instead of an ambiguous bare name/UUID — satisfying the requirement that no admin can act on the system without it being precisely attributable. accounts/admin.py's bulk activate_members/deactivate_members actions kept their original `or str(pk)` fallback (target_display_for(None) returns '' which is falsy, so the fallback still triggers correctly if a member is deleted mid-loop). accounts/views.py's LoginView failed-login branch was deliberately left UNCHANGED for the no-Member-match case (the `display` variable there is a raw submitted credential string, not a Member object — actor_display_for() expects `.display_name`/`.member_number` attributes and would crash on a plain string); only the matched-Member branch (`found`) was converted to actor_display_for(found).", "Verified clean: python manage.py check (0 issues), python manage.py makemigrations --check --dry-run (no pending model changes — all 3 new/modified migrations this phase, posts/migrations/0005_comment_tracking_code.py + core/migrations/0006_contactmessage_tracking_code.py + fund/migrations/0006_contribution_tracking_code_reformat.py, were already created and applied to the local dev DB), npx tsc --noEmit (no errors) on lib/api.ts + admin/comments/page.tsx + admin/contact-messages/page.tsx."]
