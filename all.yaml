  adminNav:
    file: "frontend/lib/adminNav.ts"
    status: done
    note: "NEW (Phase 15, items B/C/L) — single source of truth for the admin sidebar, extracted from AdminSidebar.tsx's previously-inline ADMIN_NAV array. Adding a new admin page/permission now requires editing ONLY this file (plus admin/layout.tsx's redirect, via hasAdminAccess). Phase 17 (items c/e/f) replaced the old ADMIN_PERMISSIONS export with BASELINE_PERMISSIONS + hasAdminAccess() to implement the new 'default plan' admin-access rule — see below."
    exports:
      ADMIN_NAV_ITEMS:
        type: "Array<{ key: string; href: string; icon: LucideIcon; permission?: string | string[]; superuserOnly?: boolean; badgeKey?: string; label: {en, fa} }>"
        note: "permission as an array means 'any of these is sufficient' (used for the 'expenses' item: ['can_view_balance','can_expense'] — fixes item C, where a member with ONLY can_expense saw an empty admin panel because the old single-permission check required can_view_balance). 'contributions' item has badgeKey:'pendingContributionCount' (item L). Now 12 items (Phase 15 added a 13th, 'env-vars'; Phase 17 item a removed it again, along with its now-unused `Server` lucide-react icon import)."
      BASELINE_PERMISSIONS:
        type: "string[]"
        note: "NEW (Phase 17, items c/e/f) — REPLACES the old ADMIN_PERMISSIONS export. The 4 'default plan' permission codenames: ['can_comment','can_contribute','can_view_balance','can_view_posts'] — mirrors backend/accounts/models.py's BASELINE_GROUP_PERMISSIONS (duplicated deliberately across the FE/BE boundary; adminNav.ts has no backend import path). Every AccessGroup is seeded/created with exactly these 4 by default (see backend/accounts/models.py and accounts/serializers.py entries) — admin/groups/page.tsx's create-group modal also seeds its checkbox selection from this array."
      hasAdminAccess:
        signature: "(opts: { isSuperuser: boolean; groupPermissions?: string[] | null }) => boolean"
        note: "NEW (Phase 17, items c/e/f) — REPLACES the old `member.is_superuser || ADMIN_PERMISSIONS.some(hasPermission)` check. Returns true if isSuperuser, OR groupPermissions contains at least one codename OUTSIDE BASELINE_PERMISSIONS (i.e. any permission beyond the 4 'default plan' ones grants admin-panel access). A member whose group grants ONLY some/all of the 4 baseline permissions is a 'default plan' member and returns false — admin/layout.tsx redirects such members to /forbidden, and Navbar.tsx hides the 'Admin Panel' entry for them entirely."
      isNavItemVisible:
        signature: "(item, { isSuperuser, hasPermission }) => boolean"
        note: "true if isSuperuser, OR item has no permission requirement, OR (permission is a string and hasPermission(permission)), OR (permission is string[] and hasPermission(any))."
    needed_by:
