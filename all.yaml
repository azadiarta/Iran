meta:
  project: groupfund
  backend: django/python
  frontend: react/javascript
  db: postgresql
  deploy: "docker-compose (primary, any VPS — one command: docker compose up -d --build)"
  payment: stripe (gbp primary, expandable: paypal, google_pay, multi-currency)

rules:
  status: [done, in-progress, pending]
  kind: [class, function, constant, type]
  before_build: check needed_by + check imports internal availability
  after_build: update exports + update imports with status

progress:
  current_phase: 11
  current_task: "complete (except phase 10 — deferred per project decision)"
  phases:
    1:
      name: database
      status: done
      done: [entities defined, models created, split into 5 apps, project setup, migrations verified]
    2:
      name: project structure
      status: done
      done: [groupfund project, 5 apps, settings.py, requirements.txt, .env.example]
    3:
      name: authentication system
      status: done
      done: [Member→AbstractBaseUser, MemberAuthBackend, JWT simplejwt, register/login/logout/profile views, HasGroupPermission, IsSuperuser, IsActiveMember, accounts/urls, groupfund/urls]
    4:
      name: model updates + signals + utils
      status: done
      done: [DefaultSetting model, AccessGroup.is_default + save(), get_default_group_id(), Member.group SET_DEFAULT, Expense.withdrawn_by SET_NULL, Post.author SET_NULL, core/signals.py, core/utils.py, core/apps.py ready(), migrations verified]
    5:
      name: backend API (fund, posts, comments)
      status: done
      done: [fund/serializers, fund/views, fund/urls, posts/serializers, posts/views, posts/urls, groupfund/urls updated]
    6:
      name: backend API (members, groups, settings, dashboard, logs)
      status: done
      done: [accounts/member_views, accounts/member_urls, accounts/group_views, accounts/group_urls, core/serializers, core/settings_views, core/settings_urls, core/dashboard_views, core/dashboard_urls, logs/serializers, logs/views, logs/urls, accounts/serializers extended, groupfund/urls updated]
    7:
      name: payment system (manual bank transfer + PayPal)
      status: done
      done: [fund/models updated (pending_review status + receipt_image), payments app created, BasePaymentProvider, ManualPaymentProvider, PayPalPaymentProvider, PaymentFactory, payments/serializers, payments/views, payments/urls, migrations 0003 applied, groupfund/urls updated]
    8:
      name: Django admin panel (jazzmin)
      status: done
      done: [django-jazzmin added, JAZZMIN_SETTINGS + JAZZMIN_UI_TWEAKS, i18n setup, core/admin.py, accounts/admin.py, fund/admin.py + balance templates, posts/admin.py, logs/admin.py, payments/admin.py, can_view_balance permission seed, FundBalanceView gated on can_view_balance]
    9:
      name: frontend
      status: done
      done: [lib/api.ts (axios + interceptors + unwrap), authStore, langStore, i18n, messages en/fa, middleware, layouts, Navbar, Footer, animations (IranianSymbols, PageTransition, SplashScreen), pages (landing, login, register, posts, posts/[id], expenses, contribute, profile, contact, help, forbidden, unavailable, not-found), "ADMIN PANEL (7B): admin design system (styles/admin.css), AdminLayout/AdminTopBar/AdminSidebar + route protection, reusable admin components (AdminTable/AdminModal/AdminConfirmDialog/AdminStatCard/AdminBadge/admin form fields), toast system, 12 admin pages (dashboard/members/members-detail/groups/contributions/expenses/posts/comments/payments/settings/logs-activity/logs-system) — see Phase 7B section below; both flagged backend gaps (global comments endpoint, permissions-list endpoint) are now RESOLVED", "/help page (frontend/app/[locale]/help/page.tsx): permission-gated site guide — sections shown depend on guest/member/admin status & group permissions, new 'help' i18n namespace in messages/{en,fa}.json, linked from Navbar + Footer"]
    10:
      name: payment integration (Stripe / Google Pay)
      status: pending
    11:
      name: deploy
      status: done
      done: [requirements.txt (gunicorn, whitenoise, django-storages, boto3), backend/groupfund/wsgi.py, whitenoise middleware + STATICFILES_STORAGE, "S3-compatible media storage (DEFAULT_FILE_STORAGE=storages.backends.s3.S3Storage) — conditional on AWS_STORAGE_BUCKET_NAME env var, falls back to local MEDIA_ROOT for dev; supports AWS S3 / Cloudflare R2 / Backblaze B2 via AWS_S3_ENDPOINT_URL + AWS_S3_CUSTOM_DOMAIN", "MEDIA_URL→MEDIA_ROOT URL serving added to groupfund/urls.py (FIXED real gap — nothing served uploaded media before in dev OR prod-without-S3)", "CSRF_TRUSTED_ORIGINS derived from ALLOWED_HOSTS (FIXED real gap — admin POST/PATCH/DELETE would 403 in production without it)", "seed_initial_data management command (FIXED CRITICAL gap — Permission/AccessGroup/DefaultSetting rows were never seeded anywhere; fresh prod DB had a completely empty, non-functional permission system)", production security settings (SECURE_SSL_REDIRECT/HSTS/SESSION_COOKIE_SECURE/CSRF_COOKIE_SECURE/SECURE_PROXY_SSL_HEADER, conditional on DEBUG), LOGGING config, full Docker Compose deployment (docker-compose.yml, backend/Dockerfile + docker-entrypoint.sh, frontend/Dockerfile, Caddyfile reverse-proxy, .env.docker.example — see dedicated entries below; replaces the old Procfile/runtime.txt PaaS-style deploy, now removed), .env.example documented for production + S3 bucket env vars, "frontend/next.config.mjs dynamic remotePatterns from NEXT_PUBLIC_API_URL + optional NEXT_PUBLIC_MEDIA_URL (FIXED real gap — S3/CDN-hosted images would be blocked by next/image without this)", "DEPLOYMENT.md fully translated to Persian/Farsi", "second-pass hardening audit fixes: logging added to 6 previously-silent except blocks (posts/admin.py, fund/admin.py, accounts/models.py, payments/views.py, payments/manual.py, payments/paypal.py), select_related() added to fix N+1 queries in posts/views.py (Comment.author) and logs/views.py (SystemLog.related_member), @transaction.atomic added to PaymentInitiateView/ReceiptUploadView/MemberChangeGroupView, DRF DEFAULT_THROTTLE_CLASSES/DEFAULT_THROTTLE_RATES added to settings.py REST_FRAMEWORK (anon 100/hour, user 1000/hour) to mitigate brute-force on auth endpoints, ~13 hardcoded English strings in posts pages moved into the i18n posts namespace (en.json/fa.json), accessibility improvements to AdminConfirmDialog (role=alertdialog, aria-label) and post image gallery (descriptive alt text)"]

files:

  # ─── PROJECT CONFIG ────────────────────────────────────────────────────────

  "backend/groupfund/settings.py":
    status: done
    kind: config
    key_settings:
      installed_apps: [jazzmin, django.contrib.admin, django.contrib.auth, django.contrib.contenttypes, django.contrib.sessions, django.contrib.messages, django.contrib.staticfiles, rest_framework, rest_framework_simplejwt.token_blacklist, corsheaders, core, accounts, fund, posts, logs, payments]
      auth_user_model: accounts.Member
      authentication_backends: [accounts.backends.MemberAuthBackend]
      db_engine: postgresql (override: DB_ENGINE env for local sqlite testing)
      db_env_vars: "DATABASE_URL (preferred — parsed via urlparse; auto-provided by Railway's Postgres plugin and most PaaS) with fallback to discrete DB_NAME/DB_USER/DB_PASSWORD/DB_HOST/DB_PORT (used by docker-compose, which sets these explicitly)"
      railway_auto_detection: "_on_railway := bool(RAILWAY_ENVIRONMENT), always injected by Railway. When true: DEBUG defaults to False (vs True elsewhere), RAILWAY_PUBLIC_DOMAIN is appended to ALLOWED_HOSTS + CSRF_TRUSTED_ORIGINS (own domain — needed for same-origin /admin/ session+CSRF), and CORS_ALLOWED_ORIGIN_REGEXES trusts the whole *.up.railway.app suffix (safe — API is JWT-bearer-only, CORS_ALLOW_CREDENTIALS never enabled, so the strict CSRF allowlist for the cookie-authenticated admin is untouched) so the frontend service (a different up.railway.app subdomain, unknown in advance) can call the API with zero manual CORS wiring. Net effect: only SECRET_KEY + DATABASE_URL (Postgres plugin reference) + NEXT_PUBLIC_API_URL (backend domain reference) need to be set by hand — 3 variables total, all overridable via the usual env vars for non-Railway hosts."
      media: "conditional on AWS_STORAGE_BUCKET_NAME env var: if set → DEFAULT_FILE_STORAGE=storages.backends.s3.S3Storage (django-storages), MEDIA_URL derived from AWS_S3_CUSTOM_DOMAIN / AWS_S3_ENDPOINT_URL / default S3 URL (supports AWS S3, Cloudflare R2, Backblaze B2, ...); if unset → local MEDIA_ROOT=backend/media, MEDIA_URL=/media/ for dev. DEFAULT_FILE_STORAGE used (not STORAGES dict) — Django raises ImproperlyConfigured if both STORAGES and STATICFILES_STORAGE are set"
      static: "STATIC_ROOT=backend/staticfiles, STATIC_URL=/static/, STATICFILES_STORAGE=whitenoise.storage.CompressedManifestStaticFilesStorage"
      middleware: "whitenoise.middleware.WhiteNoiseMiddleware added directly after SecurityMiddleware"
      storages_app: "'storages' (django-storages) added to INSTALLED_APPS"
      cors: CORS_ALLOWED_ORIGINS from env
      auth_env_vars: [SECRET_KEY, DEBUG, ALLOWED_HOSTS]
      csrf_trusted_origins: "derived from ALLOWED_HOSTS (https:// + each non-local host) unless CSRF_TRUSTED_ORIGINS env override is set — required for Django admin POST/PATCH/DELETE to pass CSRF checks behind a TLS-terminating reverse proxy (e.g. Caddy in the Docker setup, which sets it explicitly to PUBLIC_URL); fixes a real gap: was previously unset, which 403s all unsafe admin requests once DEBUG=False"
      simple_jwt: ACCESS=1day, REFRESH=7days, ROTATE=true, BLACKLIST=true
      drf_default_auth: JWTAuthentication
      drf_default_permission: IsAuthenticated
      production_security: "SECURE_PROXY_SSL_HEADER always set (works behind any TLS-terminating reverse proxy, e.g. Caddy in the Docker setup); when DEBUG=False also sets SECURE_SSL_REDIRECT/SECURE_HSTS_SECONDS/SECURE_HSTS_INCLUDE_SUBDOMAINS/SECURE_HSTS_PRELOAD/SESSION_COOKIE_SECURE/CSRF_COOKIE_SECURE/X_FRAME_OPTIONS — note docker-compose.yml hardcodes SECURE_SSL_REDIRECT=False since Caddy↔backend traffic is plain HTTP (TLS already terminated at the edge), avoiding an infinite redirect loop"
      logging: "console handler; INFO in DEBUG, WARNING in production"
    imports:
      external: [{from: os, items: [environ]}, {from: pathlib, items: [Path]}, {from: datetime, items: [timedelta]}]
      internal: []
    exports: []
    needed_by: []

  "backend/groupfund/wsgi.py":
    status: done
    kind: config
    note: "standard Django WSGI entry-point — required by gunicorn for production deploys (see backend/docker-entrypoint.sh: exec gunicorn groupfund.wsgi --bind 0.0.0.0:8000)"
    imports:
      external: [{from: os, items: [environ]}, {from: django.core.wsgi, items: [get_wsgi_application]}]
      internal: []
    exports:
      - {name: application, kind: constant, type: WSGI application}
    needed_by: []

  "backend/groupfund/urls.py":
    status: done
    note: "added MEDIA_URL→MEDIA_ROOT serving (fixes a real gap: nothing served uploaded media before): static() helper when DEBUG and no S3 bucket; django.views.static.serve fallback when DEBUG=False and AWS_STORAGE_BUCKET_NAME is unset (ephemeral but functional out of the box); no-op (S3/CDN serves directly) when AWS_STORAGE_BUCKET_NAME is set"
    imports:
      external: [{from: django.conf, items: [settings]}, {from: django.conf.urls.static, items: [static]}, {from: django.contrib, items: [admin]}, {from: django.urls, items: [path, include, re_path]}, {from: django.views.static, items: [serve]}]
      internal:
        - {file: "backend/accounts/urls.py",        items: [urlpatterns], status: available}
        - {file: "backend/accounts/member_urls.py", items: [urlpatterns], status: available}
        - {file: "backend/accounts/group_urls.py",  items: [urlpatterns], status: available}
        - {file: "backend/fund/urls.py",            items: [urlpatterns], status: available}
        - {file: "backend/posts/urls.py",           items: [urlpatterns], status: available}
        - {file: "backend/logs/urls.py",            items: [urlpatterns], status: available}
        - {file: "backend/core/settings_urls.py",   items: [urlpatterns], status: available}
        - {file: "backend/core/dashboard_urls.py",  items: [urlpatterns], status: available}
        - {file: "backend/core/urls.py",            items: [urlpatterns], status: available}
        - {file: "backend/payments/urls.py",         items: [urlpatterns], status: available}
    exports: []
    needed_by: []

  "docker-compose.yml":
    status: done
    kind: config
    note: "single-command orchestration of db (postgres:16-alpine) + backend + frontend + proxy (Caddy); reads root .env (5 user vars: PUBLIC_HOST/PUBLIC_URL/SECRET_KEY/POSTGRES_PASSWORD/SITE_NAME), wires CORS_ALLOWED_ORIGINS/CSRF_TRUSTED_ORIGINS/ALLOWED_HOSTS automatically from PUBLIC_HOST/PUBLIC_URL, hardcodes SECURE_SSL_REDIRECT=False (Caddy terminates TLS), declares named volumes postgres_data/media_data/static_data/caddy_data/caddy_config for full persistence across rebuilds"
    needed_by: []

  "backend/Dockerfile":
    status: done
    kind: config
    note: "python:3.12-slim image; build context is repo root (requirements.txt lives there, not in backend/); installs runtime + temporary build deps for psycopg2/Pillow then purges them; ENTRYPOINT docker-entrypoint.sh; EXPOSE 8000"
    needed_by: []

  "backend/docker-entrypoint.sh":
    status: done
    kind: config
    note: "container startup script — replaces Procfile's release+web phases: waits for DB via Python socket probe, then migrate --noinput → seed_initial_data (idempotent) → collectstatic --noinput → exec gunicorn groupfund.wsgi --bind 0.0.0.0:8000"
    needed_by: []

  "backend/.dockerignore":
    status: done
    kind: config
    note: "excludes __pycache__, .env*, sqlite db, media/staticfiles/logs, .git, markdown, venv from the backend build context"
    needed_by: []

  "frontend/Dockerfile":
    status: done
    kind: config
    note: "3-stage build (deps → builder → runner) on node:20-alpine; bakes NEXT_PUBLIC_API_URL/NEXT_PUBLIC_SITE_NAME/NEXT_PUBLIC_MEDIA_URL as build ARGs/ENV before npm run build (required — these are embedded into the client bundle at build time, see lib/api.ts); runner stage copies .next/standalone + .next/static + public, sets HOSTNAME=0.0.0.0, runs node server.js — requires output: 'standalone' in next.config.mjs"
    needed_by: []

  "frontend/.dockerignore":
    status: done
    kind: config
    note: "excludes node_modules, .next, out, .env*, .git, markdown from the frontend build context"
    needed_by: []

  "Caddyfile":
    status: done
    kind: config
    note: "reverse proxy config keyed on {$PUBLIC_HOST} — routes /api/*, /admin/*, /media/*, /static/* to backend:8000 and everything else to frontend:3000; auto-provisions/renews free Let's Encrypt HTTPS for real domains and gracefully serves plain HTTP for bare IPs/localhost, eliminating CORS by serving frontend+backend from one origin"
    needed_by: []

  ".env.docker.example":
    status: done
    kind: config
    note: "template users copy to .env — exactly 5 beginner-friendly documented vars (PUBLIC_HOST, PUBLIC_URL, SECRET_KEY, POSTGRES_PASSWORD, SITE_NAME); everything else (db name/user, DB_HOST=db, ports) is fixed in docker-compose.yml"
    needed_by: []

  "railway.json":
    status: done
    kind: config
    note: "tells Railway's backend service (root directory = repo root) to build with the SAME backend/Dockerfile used for docker-compose (builder: DOCKERFILE, dockerfilePath: backend/Dockerfile, build context = repo root) instead of auto-detecting via Railpack — so Railway runs the exact same container (docker-entrypoint.sh: wait-for-db → migrate → seed_initial_data → collectstatic → gunicorn) as any other Docker host. No startCommand needed; the image's ENTRYPOINT handles it. Pairs with settings.py's DATABASE_URL/RAILWAY_PUBLIC_DOMAIN auto-detection and docker-entrypoint.sh's $PORT-aware gunicorn bind so the only Railway-specific step left is linking the Postgres plugin's DATABASE_URL variable."
    needed_by: []

  "frontend/railway.json":
    status: done
    kind: config
    note: "tells Railway's frontend service (root directory = frontend) to build with the SAME frontend/Dockerfile used for docker-compose (builder: DOCKERFILE, dockerfilePath: Dockerfile relative to root directory, build context = frontend/) — Railway passes service variables matching the Dockerfile's declared ARGs (NEXT_PUBLIC_API_URL/NEXT_PUBLIC_SITE_NAME/NEXT_PUBLIC_MEDIA_URL) as Docker build args automatically, so the same standalone-output image and bundle-baking behavior is reused everywhere."
    needed_by: []


