        - {file: "frontend/app/[locale]/register/page.tsx", via: "useTranslations('auth')"}
    posts:
      keys: [title, search_placeholder, no_posts, read_more, comments_title, add_comment, comment_name, comment_name_placeholder, comment_text, comment_rating, comment_submit, comment_pending, anonymous, comment_text_required, name_required, comment_submit_error, back_to_posts, updated_label, no_comments, not_found, error_loading_detail, error_loading_list, error_loading_home, login_required_list, login_required_detail, login_required_home, login_cta]
