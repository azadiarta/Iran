      - {name: _cache, kind: "module-level dict", note: "{data: dict, expires_at: float} — mutated directly by core/env_vars_views.py._bust_cache() to force an immediate refresh after an admin edit"}
    needed_by:
      - {file: "backend/groupfund/settings.py",   items: [RuntimeConfigMiddleware], status: available, note: "first entry in MIDDLEWARE"}
      - {file: "backend/core/env_vars_views.py", items: [_cache (as runtime_middleware._cache)], status: available, note: "_bust_cache() helper"}

