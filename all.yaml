  "frontend/next.config.mjs":
    status: done
    kind: config
    note: "renamed from next.config.ts — Next.js 14.2.5 does not support TS config files (added in Next 15); wraps config with createNextIntlPlugin. images.remotePatterns built dynamically: always allows NEXT_PUBLIC_API_URL host (path /media/**) for locally-served media; additionally allows NEXT_PUBLIC_MEDIA_URL host (path /**) when set, for S3-bucket/CDN-hosted media (FIXED real gap — without this, next/image throws 'hostname is not configured' for any S3-hosted image once AWS_STORAGE_BUCKET_NAME is enabled on the backend). skipTrailingSlashRedirect: true added + rewrites() restructured (FIXED CRITICAL pre-existing bug — every /api/* and /admin/* request through this proxy was an infinite redirect loop: Next stripped the trailing slash before rewriting, Django's APPEND_SLASH then 301-redirected back to the slashed URL, which Next rewrote again, forever). New rules: bare '/api/'→backend '/api/' and '/api/:path+/'→backend '/api/:path+/' (and same pair for '/admin/'), plus '/i18n/:path+/'→backend '/i18n/:path+/' (django.conf.urls.i18n's set_language, used by the jazzmin admin language switcher — see groupfund/urls.py); '/static/:path*' and '/media/:path*' unchanged (no trailing-slash convention). Discovered + fixed during end-to-end testing of the Railway combined image (Dockerfile.railway) but applies to ALL deploy modes (docker-compose too)."

