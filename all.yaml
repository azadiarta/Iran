i18n:
  invariant: >
    frontend/messages/en.json and frontend/messages/fa.json MUST always have
    IDENTICAL top-level AND nested key structure (verified: both currently
    have exactly the same 13 top-level keys in the same order: nav, landing,
    heritage, auth, posts, expenses, contribute, profile, contact, help,
    errors, footer, common). ANY key added/removed/renamed in en.json MUST be
    mirrored in fa.json (Persian translation) in the SAME change — a missing
    key falls back to the key path string itself at runtime (next-intl
    behavior), producing visibly broken UI in whichever locale is missing it.
    fa.json additionally requires RTL-correct phrasing, not a literal
    translation when idiom differs.
  namespaces:
    nav:
      keys: [home, posts, expenses, contribute, help, contact, login, logout, profile]
      used_by:
        - {file: "frontend/components/layout/Navbar.tsx", via: "useTranslations('nav')"}
        - {file: "frontend/components/layout/Footer.tsx", via: "useTranslations('nav') (aliased tNav — footer reuses nav labels for its quick-link column)"}
      note: "AdminSidebar.tsx does NOT use this namespace (verified — no useTranslations call in that file at all); admin nav labels are inline isRTL strings, see admin_panel_i18n_policy."
    landing:
      keys: [headline, tagline, cta_join, cta_profile, cta_contribute, cta_ready_title, cta_authed_title, cta_authed_desc, cta_view_posts, stats_members, stats_contributions, stats_balance, posts_title, how_title, step1_title, step1_desc, step1_title_member, step1_desc_member, step2_title, step2_desc, step3_title, step3_desc]
      used_by:
        - {file: "frontend/app/[locale]/page.tsx", via: "useTranslations() — NO namespace arg, root-level translator; calls t('landing.*')"}
    heritage:
      keys: ["title", "subtitle", "items.<persepolis|pasargadae|naqshe_rostam|hafez|saadi>.{name,desc}"]
      used_by:
        - {file: "frontend/app/[locale]/page.tsx", via: "useTranslations() root translator; calls t('heritage.title'), t('heritage.subtitle'), t(`heritage.items.${key}.name`/desc) for each of the 5 items"}
    auth:
      keys: [login_title, register_title, credential_label, password_label, confirm_password_label, full_name_label, display_name_label, phone_label, email_label, phone_or_email_hint, login_btn, register_btn, no_account, has_account, register_link, login_link]
      used_by:
        - {file: "frontend/app/[locale]/login/page.tsx", via: "useTranslations('auth')"}
        - {file: "frontend/app/[locale]/register/page.tsx", via: "useTranslations('auth')"}
    posts:
      keys: [title, search_placeholder, no_posts, read_more, comments_title, add_comment, comment_name, comment_text, comment_rating, comment_submit, comment_pending, anonymous, comment_text_required, name_required, comment_submit_error, back_to_posts, updated_label, no_comments, not_found, error_loading_detail, error_loading_list, error_loading_home, login_required_list, login_required_detail, login_required_home, login_cta]
      used_by:
        - {file: "frontend/app/[locale]/posts/page.tsx", via: "useTranslations('posts')"}
        - {file: "frontend/app/[locale]/posts/[id]/page.tsx", via: "useTranslations('posts')"}
        - {file: "frontend/app/[locale]/page.tsx", via: "useTranslations() root translator; calls t('posts.no_posts'), t('posts.read_more'), t('posts.login_required_home'), t('posts.login_cta'), t('posts.error_loading_home')"}
    expenses:
      keys: [title, balance_label, balance_unavailable, amount, reason, date, by, no_expenses, login_required, login_cta, prev, next, page_info]
      used_by:
        - {file: "frontend/app/[locale]/expenses/page.tsx", via: "useTranslations('expenses')"}
    contribute:
      keys: [title, amount_label, method_label, your_name, next_btn, back_btn, upload_receipt, upload_hint, uploading, success_title, success_msg, reference, copy, copied, unavailable_msg, step1, step2, step3, step4, step_amount, step_instructions, step_receipt, step_done, back, next, back_home, guest_name_label, guest_name_placeholder, amount_to_send, bank_name, account_name, account_number, sort_code, reference_label, paypal_email, paypal_link, continue_receipt, receipt_desc, click_to_upload, error_generic, upload_error]
      used_by:
        - {file: "frontend/app/[locale]/contribute/page.tsx", via: "useTranslations() — NO namespace arg, root-level translator; calls t('contribute.*') exclusively"}
      note: "41 keys total — full list verified directly against messages/en.json (and fa.json, identical key set)."
    profile:
      keys: [title, edit_btn, save_btn, cancel_btn, change_password, old_password, new_password, confirm_new_password, group, joined, edit_profile, edit, cancel, save, save_password, full_name, display_name, email, phone, profile_updated, password_changed, save_error, password_error]
      used_by:
        - {file: "frontend/app/[locale]/profile/page.tsx", via: "useTranslations('profile')"}
      note: "22 keys total — verified directly against messages/en.json (corrects an earlier 14-key draft estimate)."
    contact:
      keys: [title, email_label, phone_label, name_label, message_label, send_btn, no_contact, name_placeholder, contact_label, contact_placeholder, message_placeholder, send_button, success_msg, send_another]
      used_by:
        - {file: "frontend/app/[locale]/contact/page.tsx", via: "useTranslations('contact')"}
    help:
      keys: [title, subtitle, guest_heading, member_heading, admin_heading, guest_note, member_note, admin_note, "sections.<home|posts|expenses|contribute|contact|auth|comment|profile|logout|dashboard|members|groups|balance|manage_posts|manage_comments|payments|settings|activity_log|system_log>"]
      used_by:
        - {file: "frontend/app/[locale]/help/page.tsx", via: "useTranslations('help')"}
      note: "help.sections is a NESTED object with 19 keys, one per guest/member/admin section heading — the set of sections actually RENDERED is filtered at runtime by useAuthStore permission checks (can_view_dashboard/can_manage_permissions/can_view_balance/can_post/can_approve_comments/is_superuser), mirroring AdminSidebar's gating."
    errors:
      keys: [not_found_title, not_found_msg, forbidden_title, forbidden_msg, unavailable_title, unavailable_msg, back_home]
      used_by:
        - {file: "frontend/app/[locale]/not-found/page.tsx", via: "useTranslations('errors')"}
        - {file: "frontend/app/[locale]/forbidden/page.tsx", via: "useTranslations('errors')"}
        - {file: "frontend/app/[locale]/unavailable/page.tsx", via: "useTranslations('errors')"}
    footer:
      keys: [slogan, copyright, dedication]
      used_by:
        - {file: "frontend/components/layout/Footer.tsx", via: "useTranslations('footer')"}
    common:
      keys: [loading, error, retry, close, prev, next]
      used_by: []
      note: "VERIFIED UNUSED — defined identically in both en.json/fa.json but zero call sites found via grep for 'common.'/useTranslations('common'). Safe to repurpose or extend; not currently wired into any component."
  admin_panel_i18n_policy: >
    The admin panel (frontend/app/[locale]/admin/**) does NOT use the
    messages/{en,fa}.json namespace system. Per the existing convention
    (Phase 7B), admin pages use INLINE bilingual strings via
    `isRTL ? '...' : '...'` ternaries, matching the dynamic-copy pattern
    already used in Phase 7A pages. So admin-panel copy changes do NOT
    touch messages/en.json or messages/fa.json — they are inline string
    edits in each admin page/component, gated on a local `isRTL`
    (derived from locale === 'fa') variable. This is the OPPOSITE of the
    EN/FA-pair invariant above (which applies only to messages/*.json).

files:

  # ─── PROJECT CONFIG ────────────────────────────────────────────────────────

  "backend/groupfund/settings.py":
    status: done
    kind: config
    key_settings:
      installed_apps: [jazzmin, django.contrib.admin, django.contrib.auth, django.contrib.contenttypes, django.contrib.sessions, django.contrib.messages, django.contrib.staticfiles, rest_framework, rest_framework_simplejwt.token_blacklist, corsheaders, core, accounts, fund, posts, logs, payments]
      auth_user_model: accounts.Member
      authentication_backends: [accounts.backends.MemberAuthBackend]
      db_engine: postgresql (override: DB_ENGINE env for local sqlite testing); falls back to django.db.backends.sqlite3 (BASE_DIR/db.sqlite3) when neither DATABASE_URL nor DB_NAME is set
      db_env_vars: "DATABASE_URL (preferred — parsed via urlparse; auto-provided by Railway's Postgres plugin and most PaaS) with fallback to discrete DB_NAME/DB_USER/DB_PASSWORD/DB_HOST/DB_PORT (used by docker-compose, which sets these explicitly); if NEITHER is set (e.g. a Railway backend service with no Postgres plugin attached), DATABASES falls back to a local SQLite file at BASE_DIR/db.sqlite3 — ephemeral on Railway (wiped on every redeploy/restart) but lets the whole project fit in a 2-service Railway plan (backend+frontend, no Postgres) for real testing. VALIDATION (FIXED real gap): if DATABASE_URL is set but urlparse() yields no hostname or a non-postgres scheme (e.g. an unresolved Railway variable reference like the literal string '${{Postgres.DATABASE_URL}}' when the reference didn't bind to the right service name), settings.py logs a logging.getLogger(__name__).warning(...) and treats it as unset, falling through to DB_NAME/SQLite instead of configuring Postgres with HOST='localhost' (which previously caused migrate to fail and crash-looped the whole container on every boot)."
      railway_auto_detection: "_on_railway := bool(RAILWAY_ENVIRONMENT), always injected by Railway. When true: SECRET_KEY auto-derives from sha256(RAILWAY_PROJECT_ID+RAILWAY_SERVICE_ID) if not set explicitly, DEBUG defaults to False (vs True elsewhere), RAILWAY_PUBLIC_DOMAIN (if a public domain was generated) and RAILWAY_PRIVATE_DOMAIN (always present, *.railway.internal — used for service-to-service traffic) are both appended to ALLOWED_HOSTS + CSRF_TRUSTED_ORIGINS, and CORS_ALLOWED_ORIGIN_REGEXES trusts the whole *.up.railway.app suffix (kept for back-compat/custom setups — safe since the API is JWT-bearer-only and CORS_ALLOW_CREDENTIALS is never enabled). Combined with the SQLite DB fallback above, the recommended Railway layout is now a SINGLE service built from the repo-root railway.json/Dockerfile.railway (see those entries) — backend (gunicorn) and frontend (Next.js) run as two processes in one container, talking over 127.0.0.1, with the frontend's next.config.mjs rewrites() proxying /api,/admin,/i18n,/static,/media to the backend. ZERO service variables are required: PORT is Railway-injected and used by the Next.js server, BACKEND_INTERNAL_URL is hardcoded to http://127.0.0.1:8000 in Dockerfile.railway. Everything else (DEBUG, SECRET_KEY, ALLOWED_HOSTS, CSRF, DB, migrate/seed/collectstatic, HTTPS) remains automatic and overridable via the usual env vars for non-Railway hosts. The old 2-service layout (separate backend/frontend Railway services) is no longer recommended — see DEPLOYMENT.md."
      media: "conditional on AWS_STORAGE_BUCKET_NAME env var: if set → DEFAULT_FILE_STORAGE=storages.backends.s3.S3Storage (django-storages), MEDIA_URL derived from AWS_S3_CUSTOM_DOMAIN / AWS_S3_ENDPOINT_URL / default S3 URL (supports AWS S3, Cloudflare R2, Backblaze B2, ...); if unset → local MEDIA_ROOT=backend/media, MEDIA_URL=/media/ for dev. DEFAULT_FILE_STORAGE used (not STORAGES dict) — Django raises ImproperlyConfigured if both STORAGES and STATICFILES_STORAGE are set"
      static: "STATIC_ROOT=backend/staticfiles, STATIC_URL=/static/, STATICFILES_STORAGE=whitenoise.storage.CompressedManifestStaticFilesStorage"
      middleware: "whitenoise.middleware.WhiteNoiseMiddleware added directly after SecurityMiddleware"
      storages_app: "'storages' (django-storages) added to INSTALLED_APPS"
      cors: CORS_ALLOWED_ORIGINS from env
      auth_env_vars: [SECRET_KEY, DEBUG, ALLOWED_HOSTS]
      csrf_trusted_origins: "derived from ALLOWED_HOSTS (https:// + each non-local host) unless CSRF_TRUSTED_ORIGINS env override is set — required for Django admin POST/PATCH/DELETE to pass CSRF checks behind a TLS-terminating reverse proxy (e.g. Caddy in the Docker setup, which sets it explicitly to PUBLIC_URL); fixes a real gap: was previously unset, which 403s all unsafe admin requests once DEBUG=False"
      simple_jwt: ACCESS=1day, REFRESH=7days, ROTATE=true, BLACKLIST=true
      drf_default_auth: JWTAuthentication
      drf_default_permission: IsAuthenticated
      production_security: "SECURE_PROXY_SSL_HEADER always set (works behind any TLS-terminating reverse proxy, e.g. Caddy in the Docker setup); when DEBUG=False also sets SECURE_SSL_REDIRECT/SECURE_HSTS_SECONDS/SECURE_HSTS_INCLUDE_SUBDOMAINS/SECURE_HSTS_PRELOAD/SESSION_COOKIE_SECURE/CSRF_COOKIE_SECURE/X_FRAME_OPTIONS — note docker-compose.yml hardcodes SECURE_SSL_REDIRECT=False since Caddy↔backend traffic is plain HTTP (TLS already terminated at the edge), avoiding an infinite redirect loop"
      logging: "console handler; INFO in DEBUG, WARNING in production"
    imports:
      external: [{from: os, items: [environ]}, {from: pathlib, items: [Path]}, {from: datetime, items: [timedelta]}]
      internal: []
    exports: []
    needed_by: []

  "backend/groupfund/wsgi.py":
    status: done
    kind: config
    note: "standard Django WSGI entry-point — required by gunicorn for production deploys (see backend/docker-entrypoint.sh: exec gunicorn groupfund.wsgi --bind 0.0.0.0:8000)"
    imports:
      external: [{from: os, items: [environ]}, {from: django.core.wsgi, items: [get_wsgi_application]}]
      internal: []
    exports:
      - {name: application, kind: constant, type: WSGI application}
    needed_by: []

  "backend/groupfund/urls.py":
    status: done
    note: "added MEDIA_URL→MEDIA_ROOT serving (fixes a real gap: nothing served uploaded media before): static() helper when DEBUG and no S3 bucket; django.views.static.serve fallback when DEBUG=False and AWS_STORAGE_BUCKET_NAME is unset (ephemeral but functional out of the box); no-op (S3/CDN serves directly) when AWS_STORAGE_BUCKET_NAME is set. Also added path('i18n/', include('django.conf.urls.i18n')) as the first urlpattern (FIXED real gap — django-jazzmin's admin theme renders {% url 'set_language' %} in its language switcher since USE_I18N=True + 2 LANGUAGES are configured, but this URL was never registered, so EVERY /admin/ page raised NoReverseMatch/500 — discovered + fixed while end-to-end testing the Railway combined image; the corresponding /i18n/setlang/ POST is proxied to the backend via frontend/next.config.mjs and excluded from next-intl locale-redirects via frontend/middleware.ts)"
    imports:
      external: [{from: django.conf, items: [settings]}, {from: django.conf.urls.static, items: [static]}, {from: django.contrib, items: [admin]}, {from: django.urls, items: [path, include, re_path]}, {from: django.views.static, items: [serve]}]
      internal:
        - {file: "backend/accounts/urls.py",        items: [urlpatterns], status: available}
        - {file: "backend/accounts/member_urls.py", items: [urlpatterns], status: available}
        - {file: "backend/accounts/group_urls.py",  items: [urlpatterns], status: available}
        - {file: "backend/fund/urls.py",            items: [urlpatterns], status: available}
        - {file: "backend/posts/urls.py",           items: [urlpatterns], status: available}
        - {file: "backend/logs/urls.py",            items: [urlpatterns], status: available}
