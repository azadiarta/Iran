      status: done
      done: ["NEW 13th seeded permission can_view_member_details (seed_initial_data.py PERMISSIONS dict + frontend/lib/permissionsMeta.ts entry) — deliberately separate from can_manage_permissions so an admin can be granted ONLY read access to member profiles, never write/edit/delete. backend/accounts/member_views.py gained a new _can_view_member_details(user) helper (True for superusers, or can_manage_permissions, or can_view_member_details — read OR-gate) used ALONGSIDE the pre-existing _is_admin(user) helper (UNCHANGED, still only can_manage_permissions, still gates every write view) so the new permission can never escalate to a write capability: MemberListView and MemberDetailView (GET only) now accept either helper's pass, while MemberUpdateView/MemberChangeGroupView/MemberToggleActiveView/MemberDeleteView/MemberCreateView remain strictly _is_admin-only.", "NEW backend/accounts/member_views.py MemberFullProfileView (GET /api/members/<id>/full-profile/, permission_classes=[IsAuthenticated, HasGroupPermission('can_manage_permissions') | HasGroupPermission('can_view_member_details')]) — an aggregator that, given a member id, returns {member, comments, contributions, contact_messages, activity_logs} by querying posts.Comment/fund.Contribution/core.ContactMessage/logs.ActivityLog (all via function-local imports to avoid circular-import risk across apps) filtered to that member and serialized with the EXISTING per-action serializers (CommentAdminDetailSerializer, ContributionAdminDetailSerializer, ContactMessageSerializer, ActivityLogSerializer) — zero changes needed to any of those four serializers. Route added to backend/accounts/member_urls.py as member-full-profile, appended after the other <uuid:pk>/... routes — no ordering conflict since Django's path() is anchored (<uuid:pk>/ alone never matches the longer <uuid:pk>/full-profile/ path).", "Frontend: frontend/lib/api.ts gained the MemberFullProfile interface ({member: MemberDetail, comments: CommentDetail[], contributions: Contribution[], contact_messages: ContactMessage[], activity_logs: ActivityLogEntry[]}) + membersAPI.getFullProfile(id) (GET .../full-profile/, unwrapped via the existing axios interceptor exactly like every other endpoint — res.data as unknown as MemberFullProfile). frontend/app/[locale]/admin/members/page.tsx now computes both canView (= canManage || hasPermission('can_view_member_details')) and the pre-existing canManage, gates the whole page/list-fetch on canView, and gates the '+ Add Member' button + row edit affordances on canManage only, so a details-only admin can browse and open members but not create/edit/deactivate/delete any of them.", "frontend/app/[locale]/admin/members/[id]/page.tsx — substantially extended (not rewritten): top-level guard changed from `if (!canManage)` to `if (!canViewDetails)` (canViewDetails = canManage || hasPermission('can_view_member_details')); the entire pre-existing management grid (profile-edit form, group-change form, password-reset form, deactivate/delete danger-zone) is now wrapped in `{canManage && (...)}` so a details-only admin sees zero write controls; data-fetch effect now calls membersAPI.getFullProfile(id) (gated on canViewDetails) and only additionally calls groupsAPI.getList() when canManage (the group-change form's dropdown source — skipped entirely for read-only viewers). NEW always-visible (whenever canViewDetails) 2-column grid of 4 categorized read-only sections — Comments, Contributions, Contact Messages, Activity Log — each with an icon+title+count header (MessageSquare/HandCoins/Mail/ScrollText from lucide-react), a max-h-80 scrollable card list, an empty-state message, and per-item AdminBadge status pills (reusing AdminBadge's existing pending/approved/active/failed/rejected style map unchanged) plus a local fmt(n) currency-formatting helper copied verbatim from admin/contributions/page.tsx.", "help/page.tsx's HelpSection.permission type widened from `string` to `string | string[]` (isVisible() now does section.permission.some(hasPermission) when an array) so the existing 'members' section entry could become permission: ['can_manage_permissions','can_view_member_details'] (OR semantics, mirroring adminNav.ts's pre-existing array-permission convention) instead of needing a second near-duplicate help entry; messages/en.json + messages/fa.json help.sections.members.desc text updated (no new keys — EN/FA parity preserved) to mention the narrower view-only permission and what it unlocks.", "No DB model changes this phase (verified via `manage.py makemigrations --check --dry-run` -> 'No changes detected') — can_view_member_details is a Permission row (seeded data, not a schema change) like every other permission added in prior phases."]
    22:
