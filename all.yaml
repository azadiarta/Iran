      name: "Superuser-profile view/edit lockdown (self-or-superuser only, group/deactivate/delete still unconditionally blocked), member_number 5-digit length+uniqueness bugfix with real-time frontend validation, and 3 new info.yaml meta-rules formalizing frontend/backend limit-mirroring + malicious-input validation + the AI agent read-first/update-last workflow"
      status: done
      done: ["Superuser profile lockdown — closed a real, previously-unrestricted gap: backend/accounts/member_views.py:MemberDetailView.get() and MemberFullProfileView.get() had NO superuser-target restriction at all before this phase (any admin with can_manage_permissions or can_view_member_details could view a superuser's full profile, including their comments/contributions/contact messages/activity log) even though MemberChangeGroupView/MemberToggleActiveView/MemberDeleteView already unconditionally refused to ACT on a superuser target. Both views now compute `is_owner = request.user.pk == member.pk` and return api_error('Cannot view superuser profile.', status_code=403) whenever `member.is_superuser and not is_owner and not request.user.is_superuser` — so a non-superuser admin can no longer view a superuser's profile under any circumstance, while the superuser themselves or any OTHER superuser still can. The same is_owner-or-superuser relaxation was applied to MemberUpdateView.patch() and ChangePasswordView.post() (which is the same data the user asked to be lockable for 'profile' specifically, i.e. view+edit) — both previously allowed owner-only edits of a superuser row (a non-owner can_manage_permissions admin was already blocked there from a prior phase); now any superuser can also edit/reset-password for another superuser. Deliberately left UNCHANGED and unconditionally blocked for every actor including other superusers, per the user's explicit carve-out ('بجز گروه دسترسیش' — except their access group): MemberChangeGroupView (still always 403s on a superuser target), MemberToggleActiveView (still always 403s — deactivate), MemberDeleteView (still always 403s — delete); these three remain the strictest tier, reasoned as deliberately irreversible/high-risk actions distinct from a reversible profile edit. Frontend admin/members/[id]/page.tsx: new `accessDenied` state, set when the full-profile fetch's catch block detects a 403 response status, rendering a dedicated bilingual 'this is a superuser account, only the superuser or another superuser may view this profile' card instead of the page's normal content. The management-grid wrapper condition was relaxed from `canManage && !target.is_superuser` to `canManage && (!target.is_superuser || currentMember?.is_superuser)` so a superuser viewer now sees the profile-edit and password-change forms for a superuser target — but the group-change form and the entire danger-zone block are each separately wrapped in their own `{!target.is_superuser && (...)}` guard INSIDE that grid, so they stay hidden even from another superuser, matching the backend's unconditional group/deactivate/delete block. The old single amber 'this is a superuser account' banner was split into two distinct conditional banners: one shown to a non-superuser admin (canManage && target.is_superuser && !currentMember?.is_superuser) reiterating view/edit is blocked entirely, and one shown to a superuser viewing another superuser (currentMember?.is_superuser && target.is_superuser) explicitly listing what remains editable (profile, password) vs. permanently blocked (group, deactivate, delete) even for them. admin/members/page.tsx: the list table's 'actions' column now renders a plain 'Restricted'/'محدود شده' label instead of the View button whenever `m.is_superuser && !currentMember?.is_superuser` — so a non-superuser admin can no longer even navigate to a superuser's detail page from the list (defense-in-depth on top of the page-level accessDenied guard, since MemberListItem already exposed is_superuser and currentMember was already available via the existing useAuthStore() destructure, requiring zero new state).", "member_number 5-digit length + uniqueness bugfix — the admin-only 'reassign a member's 5-digit code' box (MemberChangeNumberView, superuser-only, Phase 29) had NO length restriction on the frontend: its AdminInput used `type='number'`, and HTML silently IGNORES the `maxLength` attribute on `type='number'` inputs, so a superuser could type an arbitrarily long number (or paste one) with zero client-side feedback, and AdminInput's own counter only ever renders `typeof maxLength === 'number'` — which was never set here, so no counter ever appeared either. Backend previously validated only int-parseability and the [10000,99999] range, with NO explicit digit-length check, meaning e.g. a value like 010000 (parsed as int 10000) or numbers entered via a non-browser client bypassing the range some other way had no defense-in-depth length gate. Fixed end-to-end with new shared constants — backend/core/validators.py: MEMBER_NUMBER_LENGTH=5, MEMBER_NUMBER_MIN=10000, MEMBER_NUMBER_MAX=99999 (mirrored 1:1 by frontend/lib/validation.ts's identical constants + a new memberNumberFormatError(isRTL) bilingual message). backend/accounts/member_views.py:MemberChangeNumberView.patch() now checks `len(str(raw_number)) > MEMBER_NUMBER_LENGTH` and returns a field-keyed 'Must be {N} digits or fewer.' error BEFORE attempting int() conversion, in addition to the pre-existing (unchanged) range check and the pre-existing (unchanged, and confirmed to have ALREADY been correctly enforced server-side even before this phase) `Member.objects.filter(member_number=new_number).exclude(pk=member.pk).exists()` uniqueness check — what changed for uniqueness was only how the frontend surfaces that pre-existing error (see below), not the backend logic itself. Frontend admin/members/[id]/page.tsx: the AdminInput's type changed from 'number' to 'text' with `inputMode='numeric'` + `pattern='[0-9]*'` (keeps the numeric keyboard on mobile while letting `maxLength` actually take effect) and `maxLength={MEMBER_NUMBER_LENGTH}` (restores AdminInput's built-in live counter, now correctly showing e.g. '3/5' as the superuser types). New `handleMemberNumberChange(value)` handler strips non-digits, slices to MEMBER_NUMBER_LENGTH, and sets a real-time `memberNumberError` (via the new shared memberNumberFormatError) whenever the in-progress value is shorter than 5 digits or out of [10000,99999] — mirroring every other real-time-validated field on the site (password strength, phone, email). `saveMemberNumber`'s catch block now narrows the axios error to extract `data.errors.member_number[0]` and sets it as `memberNumberError` (inline, under the input, via AdminInput's existing `error` prop) instead of only firing a generic toast — so a duplicate-number submission (the pre-existing backend uniqueness check firing) now displays the specific 'این شماره عضویت قبلاً استفاده شده است.'/'This member number is already in use.' message directly under the box in real time, not just as a toast. The submit button's `disabled` condition also gained `|| !!memberNumberError`.", "3 new info.yaml meta-rules — security_rules.baseline gained sec_frontend_limit_needs_backend_mirror (every frontend length/format/range limit must have a matching, authoritative backend limit added in the SAME change, not as a follow-up) and sec_validate_malicious_input_both_layers (every piece of user-originated input — form field, query param, or upload — must be validated as not malicious on BOTH frontend and backend, never just a presence check, in either the admin panel or the public site). project_conventions gained a new ai_agent_workflow subsection: any AI session must read info.yaml AND all.yaml IN FULL before starting work, and at the end of the work must update both files to match reality using the exact same existing structure (no new section styles, no silent drift) whenever anything documented in either file changed.", "Updated info.yaml: the 2 new security_rules.baseline items above; the new project_conventions.ai_agent_workflow subsection (with a cross-reference sentence added to the pre-existing validation_and_limits_consistency rule); forms.form_admin_member_edit_profile and forms.form_admin_member_change_number notes rewritten to document the relaxed owner-or-superuser gating and the member_number bugfix respectively; forms.form_admin_member_change_group notes rewritten to explicitly flag it as the ONE deliberately-unrelaxed exception; auth_permission_checks.backend_auth's ep_member_detail/ep_member_update/ep_member_change_group/ep_member_change_password/ep_member_full_profile entries and auth_IsSuperuser's notes all updated to document the new view-gating matrix; validation_logic gained a new validate_member_number item under account_and_admin_security (subcategory count 2->3, validation_logic.total_count 13->14); validate_shared_backend/validate_shared_frontend notes updated to mention the 3 new MEMBER_NUMBER_* constants and memberNumberFormatError.", "Verified info.yaml parses cleanly via `python3 -c \"import yaml; yaml.safe_load(open('info.yaml'))\"` after all edits; backend `python manage.py check` and frontend `npx tsc --noEmit` re-run clean with zero issues/errors across every file touched in this phase (backend/core/validators.py, backend/accounts/member_views.py, frontend/lib/validation.ts, frontend/app/[locale]/admin/members/page.tsx, frontend/app/[locale]/admin/members/[id]/page.tsx). No automated test suite exists in this project (confirmed pre-existing, unrelated to this phase)."]
