  adminNav:
    file: "frontend/lib/adminNav.ts"
    status: done
    note: "NEW (Phase 15, items B/C/L) — single source of truth for the admin sidebar, extracted from AdminSidebar.tsx's previously-inline ADMIN_NAV array. Adding a new admin page/permission now requires editing ONLY this file (plus admin/layout.tsx's redirect uses ADMIN_PERMISSIONS automatically)."
    exports:
      ADMIN_NAV_ITEMS:
        type: "Array<{ key: string; href: string; icon: LucideIcon; permission?: string | string[]; superuserOnly?: boolean; badgeKey?: string; label: {en, fa} }>"
        note: "permission as an array means 'any of these is sufficient' (used for the 'expenses' item: ['can_view_balance','can_expense'] — fixes item C, where a member with ONLY can_expense saw an empty admin panel because the old single-permission check required can_view_balance). 'contributions' item has badgeKey:'pendingContributionCount' (item L). New 'env-vars' item (icon: Server, permission: 'can_manage_env_vars', item A)."
      ADMIN_PERMISSIONS:
        type: "string[]"
        note: "deduplicated union of every permission referenced in ADMIN_NAV_ITEMS (flattening string|string[]) plus implicit superuser bypass. Used by admin/layout.tsx's route-guard (replacing its old hardcoded list) AND by Navbar.tsx to decide whether to show the 'Admin Panel' entry button (item B: member.is_superuser || ADMIN_PERMISSIONS.some(hasPermission))."
      isNavItemVisible:
        signature: "(item, { isSuperuser, hasPermission }) => boolean"
        note: "true if isSuperuser, OR item has no permission requirement, OR (permission is a string and hasPermission(permission)), OR (permission is string[] and hasPermission(any))."
    needed_by:
