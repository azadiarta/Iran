      PasargadaeIcon:
        signature: "{ size?: number; className?: string; animated?: boolean }"
        needed_by:
          - {file: "frontend/app/[locale]/page.tsx", context: "Hero background corner decoration (size=180, opacity .05, color #9ca3af, -top-6 -end-6) AND CTA section corner decoration (size=140, opacity .05, -top-8 -start-8)"}
        note: "hand-drawn inline currentColor SVG (viewBox 0 0 100 100) — the Tomb of Cyrus the Great (Pasargadae), a gabled stone chamber atop a 6-tier stepped plinth."
      NaqsheRostamIcon:
        signature: "{ size?: number; className?: string; animated?: boolean }"
        needed_by:
          - {file: "frontend/app/[locale]/page.tsx", context: "Stats Bar section corner decoration, size=130, opacity .06, color #b45309, -bottom-6 -end-6"}
        note: "hand-drawn inline currentColor SVG (viewBox 0 0 100 100) — cross-shaped Achaemenid rock-cut tomb facade (Naqsh-e Rostam) carved into a cliff face."
