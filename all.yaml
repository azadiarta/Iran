    37:
      name: "Bugfix — Persian-Indic digits could render on the English ('/en') version of the site, sitewide"
      status: done
      done: ["Root cause — exactly 2 call sites sitewide called `Number.prototype.toLocaleString(undefined, {...})`, i.e. with NO explicit locale argument: frontend/app/[locale]/page.tsx's `StatCard` (landing-page stats bar count-up) and frontend/components/admin/AdminStatCard.tsx's internal `CountUp` sub-component (used by every admin-dashboard stat card). Passing `undefined` makes the JS runtime fall back to the BROWSER/OS's own default Intl locale, which is entirely independent of this app's own `/en` vs `/fa` next-intl route — a browser/OS set to Persian renders Persian-Indic digits (۰۱۲۳۴۵۶۷۸۹) via this call even while the app is actively serving its `/en` (English) route. An exhaustive sitewide grep for every `toLocaleString(`/`toLocaleDateString(`/`Intl.NumberFormat(`/`Intl.DateTimeFormat(` call confirmed these were the ONLY 2 sites with this bug — all ~36 other call sites already correctly resolve an explicit locale string from the page's own `locale` route param (`locale === 'fa' ? 'fa-IR' : 'en-US'` for numbers, `'fa-IR' : 'en-GB'` for dates), a pre-existing, already-proven convention that both fixes below replicate exactly rather than inventing a new pattern.", "Fix 1 — frontend/app/[locale]/page.tsx: `StatCard` gained a required `locale: string` prop (passed by all 3 call sites in the Stats Bar section as `locale={locale}`, reading the page's own pre-existing `useParams().locale`); its render changed from `counted.toLocaleString(undefined, {maximumFractionDigits:2})` to `counted.toLocaleString(locale === 'fa' ? 'fa-IR' : 'en-US', {maximumFractionDigits:2})`, mirroring this same file's own `formatDate` helper's pre-existing `locale === 'fa' ? 'fa-IR' : 'en-GB'` pattern a few lines below.", "Fix 2 — frontend/components/admin/AdminStatCard.tsx: added an optional `locale?: string` prop (default 'en') to `AdminStatCardProps`, threaded into the internal `CountUp` sub-component (also gained `locale?: string`, default 'en') and its `toLocaleString` call (now `locale === 'fa' ? 'fa-IR' : 'en-US'` instead of `undefined`). Since this is a SHARED component, every existing JSX call site was updated to pass `locale={locale}` so the fix actually takes effect everywhere — admin/page.tsx (4 call sites: Fund Balance/Total Contributions/Total Expenses/Members) and admin/system/page.tsx (6 call sites: Total Members/Active Members/Posts/Contributions/Expenses/Pending Comments); both pages already had `locale` in scope via their own pre-existing `useParams()` call, so no new state was needed.", "Scope decision — left UNCHANGED 5 pre-existing call sites that hardcode `Number(amount).toLocaleString('en-GB', {...})` unconditionally (frontend/components/common/BalanceIndicator.tsx, and the amount-formatters in contributions/page.tsx, expenses/page.tsx, expenses/[id]/page.tsx, profile/contributions/page.tsx): these always render Western-Arabic digits regardless of the app's locale, so they do NOT reproduce the reported bug (English mode never shows Persian digits there) — the user's explicit ask was specifically 'when the site is in English, numbers must be English', not 'Persian mode must show Persian numerals everywhere', so touching these was out of scope for this fix and was not attempted.", "Verified clean: frontend `npx tsc --noEmit` (zero errors) and `npm run build` (clean production build, all 31 routes compiled). Behavior of the fix mechanism itself was directly confirmed via a Node.js Intl check: `(12345.6).toLocaleString('fa-IR', ...)` produces Persian-Indic digits (۱۲٬۳۴۵٫۶) while `.toLocaleString('en-US', ...)` always produces Western digits regardless of the host's own default Intl locale — proving the fix (hardcoding the locale string from the app's own route state) eliminates the runtime/browser-default dependency that caused the bug, whereas the old `undefined`-locale calls were exactly the failure mode this proves. NOTE: no browser/Playwright tool was available in this remote execution environment, so a live screenshot-based visual confirmation (e.g. forcing a Persian-locale browser profile and checking the English route) was not possible this phase — disclosed as a known verification-method limitation, not a silent gap; the fix was instead verified by code review + build + the Node.js Intl-behavior proof above."]
