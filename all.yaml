      SaadiIcon:
        signature: "{ size?: number; className?: string; animated?: boolean }"
        needed_by:
          - {file: "frontend/app/[locale]/page.tsx", context: "How It Works section corner decoration, size=90, opacity .07, color #10b981, top-4 start-4"}
