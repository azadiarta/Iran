i18n:
  invariant: >
    frontend/messages/en.json and frontend/messages/fa.json MUST always have
    IDENTICAL top-level AND nested key structure (verified Phase 15: both
    currently have exactly the same 14 top-level keys in the same order:
    nav, landing, heritage, auth, posts, expenses, contribute, contributions,
    profile, contact, help, errors, footer, common — 312 leaf keys total,
    verified via python3 recursive-key-diff, 0 mismatches). ANY key
    added/removed/renamed in en.json MUST be mirrored in fa.json (Persian
    translation) in the SAME change — a missing key falls back to the key
    path string itself at runtime (next-intl behavior), producing visibly
    broken UI in whichever locale is missing it. fa.json additionally
    requires RTL-correct phrasing, not a literal translation when idiom
    differs.
  namespaces:
    nav:
      keys: [home, posts, expenses, contribute, help, contact, login, logout, profile, contributions, admin_panel]
      used_by:
        - {file: "frontend/components/layout/Navbar.tsx", via: "useTranslations('nav') — Phase 15: contributions (link to new public donors page) + admin_panel (Admin Panel entry button, shown when member.is_superuser || ADMIN_PERMISSIONS.some(hasPermission), gated via frontend/lib/adminNav.ts)"}
        - {file: "frontend/components/layout/Footer.tsx", via: "useTranslations('nav') (aliased tNav — footer reuses nav labels for its quick-link column)"}
      note: "AdminSidebar.tsx does NOT use this namespace (verified — no useTranslations call in that file at all); admin nav labels are inline isRTL strings, see admin_panel_i18n_policy."
    landing:
      keys: [headline, tagline, cta_join, cta_profile, cta_contribute, cta_ready_title, cta_authed_title, cta_authed_desc, cta_view_posts, stats_members, stats_contributions, stats_balance, posts_title, how_title, step1_title, step1_desc, step1_title_member, step1_desc_member, step2_title, step2_desc, step3_title, step3_desc]
      used_by:
        - {file: "frontend/app/[locale]/page.tsx", via: "useTranslations() — NO namespace arg, root-level translator; calls t('landing.*')"}
    heritage:
      keys: ["title", "subtitle", "items.<persepolis|pasargadae|naqshe_rostam|hafez|saadi>.{name,desc}"]
