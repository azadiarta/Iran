    status: done
    kind: module
    note: "NEW (Phase 15, item A) — 3 APIViews behind IsAuthenticated + HasGroupPermission('can_manage_env_vars'). EnvVarListView (GET) serializes every ENV_VAR_REGISTRY key via _serialize() (key, section, category, value_type, requires_restart, source, value, and `base` for csv_extra keys). EnvVarUpdateView (PATCH /<key>/) validates per value_type: bool requires a JSON bool; csv_extra requires a list[str], rejects '*' and any item already covered by `base` (no-lockout guarantee), de-dupes, stores json.dumps(list); string/secret store the raw string; secret_regenerate (SECRET_KEY only) requires {confirm: true} and calls get_random_secret_key() — readonly-category keys 400. On success, upserts core.models.EnvVarOverride via update_or_create, calls _bust_cache() for 'live' keys, and ActivityLog 'env_var_updated' with extra_data={key, old, new}. EnvVarResetView (POST /<key>/reset/) deletes that key's override row (logs 'env_var_reset' only if a row existed). EnvVarResetAllView (POST /reset-all/) deletes ALL override rows in one go and logs 'env_var_reset_all' with extra_data={keys: [...]}."
