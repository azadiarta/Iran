    note: "NEW (Phase 14) — SystemLogHandler(logging.Handler), registered in groupfund/settings.py LOGGING. emit() maps the stdlib logging level to SystemLog.level (debug/info/warning/error/critical) and creates a SystemLog row with source=record.name, message=self.format(record); imports logs.models.SystemLog INSIDE emit() (avoids app-loading-order issues) and wraps the whole body in try/except Exception: pass (a logging call must never itself raise/crash the request). Fixes the previously-empty /admin/system System Status log — see backend/groupfund/settings.py.key_settings.logging. Phase 15 (item S): emit() now also reads record.request (attached by django.request/django.security log records) and, when present, sets SystemLog.related_member = request.user (if authenticated) and SystemLog.ip_address (X-Forwarded-For first hop, else REMOTE_ADDR) — both fields already existed on logs.models.SystemLog/SystemLogSerializer (Phase 14) but were always NULL until now; surfaced as new columns in admin/logs/system/page.tsx. Phase 19: NEW Quiet4xxFilter(logging.Filter) — django.utils.log.log_response() (called from BaseHandler.get_response() for every response with status_code>=400) logs ALL 4xx responses ('Unauthorized: /api/posts/', 'Forbidden: ...', 'Not Found: ...', etc.) via the 'django.request' logger at WARNING, regardless of whether anything is actually wrong (e.g. an anonymous visitor's homepage widgets 401ing on /api/fund/balance/ and /api/posts/ is normal/expected). filter() reads record.status_code (set by log_response's extra=) and demotes record.levelno/levelname from WARNING to INFO when status_code<500, leaving genuine 5xx server errors untouched — keeps Railway's console logs and the admin /admin/logs/system page focused on real problems instead of routine guest-traffic 401s."
