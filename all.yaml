pped the inline `background: '#0a0a0f'` from its outermost wrapper's `style={{...}}`, keeping only `minHeight: '100vh'`), posts/[id] (2 occurrences — two separate wrapper divs in that file), expenses/[id] (2 occurrences, same pattern). Without this cleanup the watermark mount in layout.tsx would have been invisible on every one of these pages, since each was independently repainting an identical opaque color directly on top of it.", "frontend/styles/admin.css — --admin-bg changed from opaque #05050a to semi-transparent rgba(5,5,10,0.93), since the admin shell (.admin-shell, one shared layout component covering every /admin/** screen) would otherwise fully occlude the watermark the same way the 18 page wrappers did; a single CSS-variable edit covers the entire admin panel.", "Landing page Hero CTA — replaced the 'Contribute Now' button (Link to /{locale}/contribute, i18n key landing.cta_contribute) with a language-switch button, per explicit request ('دکمه تغییر زبان، در صفحه اول بجای دکمه کمک کنید باشه'): new handleLanguageSwitch() toggles `locale` (en<->fa) via useLangStore's setLocale and router.push()es pathname with the locale segment swapped. Button label ('فارسی' when locale is 'en', 'English' when locale is 'fa') is a hardcoded inline string, not an i18n key — mirrors Navbar.tsx's pre-existing language-switcher convention, and is correct precisely because the label names the TARGET locale rather than being translatable UI copy. landing.cta_contribute removed from BOTH messages/en.json and messages/fa.json (verified zero other call sites) — leaf-key count 333 each, still matched, after removal (was 334).", "Updated info.yaml: project_summary.quick_stats.total_reusable_ui_components 25->26; project_conventions.theme_and_ui rule extended to mention the sitewide watermark + the admin-shell transparency change; ui_components.total_count 25->26, layout_components.count 7->8, new ui_SiteBackground entry added; routes.route_home note extended to mention the CTA->lang