meta:
  project: groupfund
  backend: django/python
  frontend: next.js/react/typescript
  db: postgresql
  deploy: "docker-compose (primary, any VPS — one command: docker compose up -d --build); Railway (single combined backend+frontend image, see Dockerfile.railway/railway.json — zero required service variables)"
  payment: "stripe (gbp primary, expandable: paypal, google_pay, multi-currency)"

rules:
  status: [done, in-progress, pending]
  kind: [class, function, constant, type]
  before_build: check needed_by + check imports internal availability
  after_build: update exports + update imports with status

progress:
  current_phase: 40
  current_task: "complete (except phase 10 — deferred per project decision)"
  phases:
    1:
      name: database
      status: done
      done: [entities defined, models created, split into 5 apps, project setup, migrations verified]
    2:
      name: project structure
      status: done
      done: [groupfund project, 5 apps, settings.py, requirements.txt, .env.example]
    3:
      name: authentication system
      status: done
      done: [Member→AbstractBaseUser, MemberAuthBackend, JWT simplejwt, register/login/logout/profile views, HasGroupPermission, IsSuperuser, IsActiveMember, accounts/urls, groupfund/urls]
    4:
      name: model updates + signals + utils
      status: done
      done: [DefaultSetting model, AccessGroup.is_default + save(), get_default_group_id(), Member.group SET_DEFAULT, Expense.withdrawn_by SET_NULL, Post.author SET_NULL, core/signals.py, core/utils.py, core/apps.py ready(), migrations verified]
    5:
      name: backend API (fund, posts, comments)
      status: done
      done: [fund/serializers, fund/views, fund/urls, posts/serializers, posts/views, posts/urls, groupfund/urls updated]
    6:
      name: backend API (members, groups, settings, dashboard, logs)
      status: done
      done: [accounts/member_views, accounts/member_urls, accounts/group_views, accounts/group_urls, core/serializers, core/settings_views, core/settings_urls, core/dashboard_views, core/dashboard_urls, logs/serializers, logs/views, logs/urls, accounts/serializers extended, groupfund/urls updated]
    7:
      name: payment system (manual bank transfer + PayPal)
      status: done
      done: [fund/models updated (pending_review status + receipt_image), payments app created, BasePaymentProvider, ManualPaymentProvider, PayPalPaymentProvider, PaymentFactory, payments/serializers, payments/views, payments/urls, migrations 0003 applied, groupfund/urls updated]
    8:
      name: Django admin panel (jazzmin)
      status: done
      done: [django-jazzmin added, JAZZMIN_SETTINGS + JAZZMIN_UI_TWEAKS, i18n setup, core/admin.py, accounts/admin.py, fund/admin.py + balance templates, posts/admin.py, logs/admin.py, payments/admin.py, can_view_balance permission seed, FundBalanceView gated on can_view_balance]
    9:
      name: frontend
      status: done
      done: [lib/api.ts (axios + interceptors + unwrap), authStore, langStore, i18n, messages en/fa, middleware, layouts, Navbar, Footer, animations (IranianSymbols, PageTransition, SplashScreen), pages (landing, login, register, posts, "posts/[id]", expenses, contribute, profile, contact, help, forbidden, unavailable, not-found), "ADMIN PANEL (7B): admin design system (styles/admin.css), AdminLayout/AdminTopBar/AdminSidebar + route protection, reusable admin components (AdminTable/AdminModal/AdminConfirmDialog/AdminStatCard/AdminBadge/admin form fields), toast system, 12 admin pages (dashboard/members/members-detail/groups/contributions/expenses/posts/comments/payments/settings/logs-activity/logs-system) — see Phase 7B section below; both flagged backend gaps (global comments endpoint, permissions-list endpoint) are now RESOLVED", "/help page (frontend/app/[locale]/help/page.tsx): permission-gated site guide — sections shown depend on guest/member/admin status & group permissions, new 'help' i18n namespace in messages/{en,fa}.json, linked from Navbar + Footer"]
    10:
      name: payment integration (Stripe / Google Pay)
      status: pending
    11:
      name: deploy
      status: done
      done: [requirements.txt (gunicorn, whitenoise, django-storages, boto3), backend/groupfund/wsgi.py, whitenoise middleware + STATICFILES_STORAGE, "S3-compatible media storage (DEFAULT_FILE_STORAGE=storages.backends.s3.S3Storage) — conditional on AWS_STORAGE_BUCKET_NAME env var, falls back to local MEDIA_ROOT for dev; supports AWS S3 / Cloudflare R2 / Backblaze B2 via AWS_S3_ENDPOINT_URL + AWS_S3_CUSTOM_DOMAIN", "MEDIA_URL→MEDIA_ROOT URL serving added to groupfund/urls.py (FIXED real gap — nothing served uploaded media before in dev OR prod-without-S3)", "CSRF_TRUSTED_ORIGINS derived from ALLOWED_HOSTS (FIXED real gap — admin POST/PATCH/DELETE would 403 in production without it)", "seed_initial_data management command (FIXED CRITICAL gap — Permission/AccessGroup/DefaultSetting rows were never seeded anywhere; fresh prod DB had a completely empty, non-functional permission system)", production security settings (SECURE_SSL_REDIRECT/HSTS/SESSION_COOKIE_SECURE/CSRF_COOKIE_SECURE/SECURE_PROXY_SSL_HEADER, conditional on DEBUG), LOGGING config, full Docker Compose deployment (docker-compose.yml, backend/Dockerfile + docker-entrypoint.sh, frontend/Dockerfile, Caddyfile reverse-proxy, .env.docker.example — see dedicated entries below; replaces the old Procfile/runtime.txt PaaS-style deploy, now removed), .env.example documented for production + S3 bucket env vars, "frontend/next.config.mjs dynamic remotePatterns from NEXT_PUBLIC_API_URL + optional NEXT_PUBLIC_MEDIA_URL (FIXED real gap — S3/CDN-hosted images would be blocked by next/image without this)", "DEPLOYMENT.md fully translated to Persian/Farsi", "second-pass hardening audit fixes: logging added to 6 previously-silent except blocks (posts/admin.py, fund/admin.py, accounts/models.py, payments/views.py, payments/manual.py, payments/paypal.py), select_related() added to fix N+1 queries in posts/views.py (Comment.author) and logs/views.py (SystemLog.related_member), @transaction.atomic added to PaymentInitiateView/ReceiptUploadView/MemberChangeGroupView, DRF DEFAULT_THROTTLE_CLASSES/DEFAULT_THROTTLE_RATES added to settings.py REST_FRAMEWORK (anon 100/hour, user 1000/hour) to mitigate brute-force on auth endpoints, ~13 hardcoded English strings in posts pages moved into the i18n posts namespace (en.json/fa.json), accessibility improvements to AdminConfirmDialog (role=alertdialog, aria-label) and post image gallery (descriptive alt text)", "RAILWAY SINGLE-SERVICE COMBINED IMAGE: replaced the 2-service Railway setup (which suffered from a Root-Directory/Dockerfile-detection caching quirk — a service whose Root Directory was changed to frontend kept building backend/Dockerfile) with ONE image/ONE service running both backend (gunicorn, 127.0.0.1:8000, internal-only) and frontend (Next.js standalone, Railway's $PORT) as two processes (docker-entrypoint.railway.sh, wait -n supervises both). New files: Dockerfile.railway (multi-stage, repo root), docker-entrypoint.railway.sh (repo root), backend/scripts/prepare.sh (DB-wait+migrate+seed+collectstatic, extracted from and reused by backend/docker-entrypoint.sh), frontend/public/.gitkeep (FIXED pre-existing bug — frontend/public/ didn't exist, breaking 'COPY --from=builder /frontend/public' in BOTH frontend/Dockerfile and Dockerfile.railway). railway.json now points dockerfilePath at Dockerfile.railway; frontend/railway.json removed (no second service). ZERO Railway service variables required. docker-compose/VPS path (docker-compose.yml, Caddyfile, backend/Dockerfile, frontend/Dockerfile) untouched except the prepare.sh refactor — fully backward compatible, re-verified via docker build+run.", "5 SEVERE PRE-EXISTING BUGS found + fixed during end-to-end Railway testing (all apply to docker-compose too, not just Railway): (1) infinite redirect loop on every /api/* and /admin/* proxied request (frontend/next.config.mjs rewrites()/skipTrailingSlashRedirect — APPEND_SLASH vs trailing-slash-stripping rewrite mismatch); (2) /admin/* completely unreachable via the proxy, 404'd as /en/admin/* (frontend/middleware.ts next-intl matcher didn't exclude /admin); (3) Django admin login always rejected correct credentials (backend/accounts/backends.py MemberAuthBackend.authenticate() didn't accept username= as sent by Django's AuthenticationForm); (4) every /admin/ page 500'd with AttributeError after login (backend/accounts/models.py Member missing get_all_permissions/get_user_permissions/get_group_permissions needed by jazzmin); (5) every /admin/ page 500'd with NoReverseMatch: set_language (backend/groupfund/urls.py missing path('i18n/', include('django.conf.urls.i18n')), needed by jazzmin's language switcher — its /i18n/setlang/ POST also added to next.config.mjs rewrites + middleware.ts matcher). All verified fixed via full end-to-end curl test pass against the built Railway combined image: /, /en, /api/payments/methods/, /admin/login/, /admin/ (unauthenticated redirect + authenticated dashboard), /static/admin/css/base.css, /i18n/setlang/, /en/admin."]
    12:
      name: "AI project map expansion (all.yaml)"
      status: done
      done: ["added top-level `roadmap:` section (12 task-oriented categories — change_ui_copy_translation, change_heritage_emblem_visuals, add_admin_page_or_feature, change_navbar_footer, change_public_page_layout_content, change_db_model_field, change_permissions_access_groups, add_modify_payment_provider, change_deployment_env_config, change_auth_login_flow, change_admin_component_library, change_zustand_store — each with description/entry_points/typical_files/order_of_operations/gotchas/see_also)", "added top-level `shared_components:` section — blast-radius registry for IranianSymbols.tsx exports (LionAndSun: 18 consumers, CulturalEmblem: 1, FaravaharSimple: 1, GeometricPattern: 2 — all verified per-file), the 3 zustand stores (useAuthStore: 24 consumers w/ per-file field usage, useLangStore: 3, useToastStore: 13), and the admin component library (AdminTable/AdminModal/AdminConfirmDialog/AdminStatCard/AdminBadge/AdminToastContainer + 6 admin/fields/* — each with a verified per-admin-page consumer list)", "added top-level `i18n:` section — EN/FA invariant (238 leaf keys, 13 namespaces, parity verified via python3 json diff), per-namespace key lists + consumer files, admin_panel_i18n_policy (admin panel uses inline isRTL ternaries, NOT messages/*.json)", "completed `files:` entries (imports/exports/needed_by) for all 53 previously note-only or missing frontend files: 13 public pages, 13 admin pages + admin layout, 9 layout/animation components (incl. marking frontend/components/animations/PageTransition.tsx as ORPHANED — zero importers), 12 admin component-library files, 3 zustand stores, frontend/lib/i18n.ts + frontend/lib/auth.ts (latter marked DEAD CODE — zero importers), messages/en.json + messages/fa.json (pointers to the new i18n: section), and 6 previously-undocumented frontend config files (package.json, tsconfig.json, tailwind.config.ts, postcss.config.js, .env.example, .gitignore) plus next-env.d.ts/public/.gitkeep", "fixed pre-existing YAML scanner error on line 7 (unquoted `payment:` value containing a bare colon)", "NOTE: progress:/meta: sections (lines 1-61) and pre-existing backend `files:` entries still contain unquoted flow-sequence values with embedded colons/brackets (e.g. `done: [...]` lists, `posts/[id]`) that make `yaml.safe_load` fail on the FULL file — this is pre-existing and out of scope for this pass; the NEW roadmap:/shared_components:/i18n: sections and all NEW/rewritten files: entries (this phase) are individually valid YAML (verified via yaml.safe_load on each)."]
    13:
      name: "i18n cleanup, detail pages, 5-item pagination, image-modal Escape fix, admin System Status"
      status: done
      done: ["Fixed remaining hardcoded-English leaks on the Persian site: AdminTable Prev/Next/Page-N buttons gained optional bilingual prevLabel/nextLabel/pageLabel (default 'Prev'/'Next', back-compat); AdminFileUpload gained an isRTL prop for its hint text + 'Clear' button; admin/settings Save button aria-label is now bilingual; posts list pagination now uses common.prev/next/page_info; posts/[id] guest-comment placeholder and 'Submitting…' now use posts.comment_name_placeholder/common.submitting.", "Backend pagination consolidated into NEW backend/core/pagination.py (paginate(queryset, request, serializer_class, page_size=5)), replacing 4 duplicated `_paginate` helpers in fund/views.py, posts/views.py, accounts/member_views.py, logs/views.py. Page sizes: members/posts/contributions/expenses 10→5 (the 'show last 5 items' lists); comments(global)=10 and activity/system logs=25 kept unchanged but now explicit. All 7 admin list pages (members/contributions/expenses/posts/comments/logs-activity/logs-system) updated with totalCount state + bilingual prevLabel/nextLabel/pageLabel.", "NEW shared frontend/components/common/ImageLightbox.tsx (Escape key + backdrop + X to close) — extracted from posts/[id]'s old local Lightbox (which had NO Escape handler) and used to replace expenses/page.tsx's ad-hoc receipt modal (the reported 'hard to close' bug), plus the new expense detail page.", "NEW expense detail page frontend/app/[locale]/expenses/[id]/page.tsx (full description, amount, date, withdrawn-by, receipt lightbox, comments+rating form) — backed by NEW backend ExpenseDetailView (GET /api/fund/expenses/{id}/, permissions mirror ExpenseListView's expense_list_visibility logic) and 3 new fundAPI methods (getExpenseDetail/getExpenseComments/createExpenseComment). expenses/page.tsx rows are now Links to the detail page (receipt thumbnail still opens the lightbox via stopPropagation), pageSize 10→5, and 22 new bilingual `expenses.*` i18n keys added.", "NEW bilingual custom-listbox component frontend/components/admin/fields/AdminSelectWithDescription.tsx (label+description per option, click-outside/Escape to close) and NEW frontend/lib/settingsMeta.ts (SETTINGS_META) driving a rewritten /admin/settings: select-type settings (default_currency, expense/post/member_profile_list_visibility, default_group) now render as bilingual dropdowns-with-description (default_group's options come from groupsAPI.getList()), require_comment_approval renders as an AdminToggle, and unmapped keys keep the old plain-AdminInput fallback.", "NEW admin System Status page frontend/app/[locale]/admin/system/page.tsx (route /admin/system, superuser-only, AdminSidebar entry with a Database icon) backed by NEW backend SystemStatusView (GET /api/settings/system-status/, superuser-only) — shows DB engine+connection status, DEBUG mode (warns if on in Railway), environment, media storage (S3/local), Django version, and AdminStatCard counts for members/posts/contributions/expenses/pending-comments."]
    14:
      name: "i18n generalization sweep (permissions/payments/settings), published-post-edit crash fix, real System Status logging, manual contribution/member creation, superuser group-change error message, clickable post cards"
      status: done
      done: ["i18n — admin permission labels: NEW frontend/lib/permissionsMeta.ts (PERMISSION_META, all 11 codenames' label+description in en/fa, mirroring backend/core/management/commands/seed_initial_data.py). AdminPermissionCheckbox gained an optional isRTL prop and now renders PERMISSION_META[perm.codename].label.fa/.en (fallback to raw perm.label for unmapped codenames); admin/groups/page.tsx's permission chips on each group card use the same lookup, and pass isRTL to AdminPermissionCheckbox in the create/edit modal — fixes English-only permission checkboxes/chips when managing groups in Persian.", "i18n — admin payment settings: NEW PAYMENT_SETTINGS_META export added to frontend/lib/settingsMeta.ts (bilingual label+description for all 9 payment_manual_*/payment_paypal_* keys). admin/payments/page.tsx's renderField() now uses it for a bilingual label + description <p> per field (removed the old English-only fieldLabel() helper and now-unused settings/byKey/useMemo state); Save button aria-label is now bilingual.", "i18n — admin/settings/page.tsx: removed the 3 remaining `<p className='...font-mono'>{s.key}</p>` debug lines (raw English setting keys like 'default_currency', 'require_comment_approval' shown to end users — the last English leak on this page) and unified the select/toggle/input row wrapper styling into one consistent boxed 'card' look (toggle row's styling extended to select and input/number rows).", "FIXED published-post-edit crash (item 7): admin/posts/page.tsx openEdit() was doing `res.data as unknown as PostDetail`, but postsAPI.getDetail() actually resolves `{post: PostDetail, comments: Comment[]}` per PostDetailView.get — so `editing.images` was undefined and `.length` threw 'Application error: a client-side exception has occurred', a CLIENT-SIDE React crash that never reached the backend (hence nothing in System Status). Now correctly reads `(res.data as unknown as { post: PostDetail }).post`.", "FIXED System Status never logging anything (item 5) — this was a REAL backend gap, not just a misunderstanding: NO code anywhere wrote to the SystemLog model. NEW backend/core/logging_handlers.py (SystemLogHandler, a logging.Handler subclass that creates SystemLog rows for WARNING+ records, with lazy model import + try/except to avoid app-loading-order issues and to never crash logging itself) wired into backend/groupfund/settings.py LOGGING as a new 'system_log' handler (level=WARNING) added to both the 'root' logger and the 'django' logger (which has propagate=False so django.request/django.security wouldn't otherwise reach root) — real backend errors/warnings (500s, security warnings) now appear in /admin/logs/system.", "i18n generalization sweep — display_name||full_name author/contributor fallback (item 2 + general instruction): PostAuthorSerializer/MemberMinimalSerializer always return both display_name and full_name, but ~10 frontend spots only checked display_name, showing blank/'—'/'Guest' for members who left display_name empty. Added `|| X.full_name` before the final fallback in: posts/page.tsx (PostCard author), posts/[id]/page.tsx (author), expenses/page.tsx + expenses/[id]/page.tsx (withdrawn_by), admin/page.tsx (contributor/expense withdrawn_by/post author — 3 spots), admin/posts/page.tsx (author column), admin/expenses/page.tsx (withdrawn_by column), admin/contributions/page.tsx (contributor column).", "i18n generalization sweep — hardcoded English aria-labels (item 4 + general instruction): fixed aria-label='Remove image' (admin/posts/page.tsx), aria-label='Delete' (admin/contributions/page.tsx), aria-label='Back' (admin/members/[id]/page.tsx) to bilingual isRTL ternaries (aria-label='Save' in admin/payments and admin/settings fixed as part of the payments/settings work above).", "NEW manual-contribution creation (item 8): backend ContributionManualCreateSerializer (fund/serializers.py — guest_name/amount/currency/payment_method/status/notes, currency defaults from DefaultSetting default_currency, validates amount>0 and guest_name required, defaults payment_method=manual/status=completed) + ContributionManualCreateView (fund/views.py, POST /api/fund/contributions/create-manual/, IsAuthenticated+can_manage_permissions, logs 'contribution_added_manually'). Frontend fundAPI.createManualContribution() (lib/api.ts) + admin/contributions/page.tsx '+ Add Contribution' button (gated canManage) opening an AdminModal form (guest_name, amount, currency/payment_method/status selects, optional notes).", "NEW manual member/account creation (item 10): backend MemberCreateSerializer(RegisterSerializer) (accounts/serializers.py — adds optional group_id, reuses all RegisterSerializer validation) + MemberCreateView (accounts/member_views.py, POST /api/members/create/, IsAuthenticated+can_manage_permissions, logs 'member_created_via_admin'). Frontend membersAPI.create() (lib/api.ts) + admin/members/page.tsx '+ Add Member' button opening an AdminModal form (full_name, display_name, phone, email, group select, password+confirm with client-side validation); inline useEffect fetch body extracted into a reusable load() function so the modal can refresh the list on success. 2 new ActivityLog.action choices added: contribution_added_manually, member_created_via_admin.", "IMPROVED superuser group-change error (item 9): admin/members/[id]/page.tsx saveGroup() now distinguishes a 403 response (MemberChangeGroupView intentionally refuses to change a superuser's group — by design) with a dedicated bilingual explanatory toast, instead of the generic 'Failed to change group' error for all failures.", "Whole-card clickable post listing (item 11): posts/page.tsx PostCard restructured so the entire card (thumbnail, title, author, date) is wrapped in the <Link> to the post detail page, not just a small trailing arrow icon; the arrow is now a decorative <span> (no nested links)."]
    15:
      name: "env-vars admin panel, admin nav/access overhaul, public contributions wall + admin contribution detail/edit, payment-method i18n, 5-star ratings, balance indicators, log improvements, scroll-lock, deactivated-member guard, expenses search/filter"
      status: done
      done: ["item A — NEW /admin/env-vars panel (can_manage_env_vars permission, 12th seeded permission): backend/core/runtime_config.py (ENV_VAR_REGISTRY, 17 keys/3 categories: live/restart/readonly), backend/core/middleware.py (RuntimeConfigMiddleware, 30s TTL in-process cache, append-only ALLOWED_HOSTS/CSRF/CORS extras — lockout-proof by construction), backend/core/models.py EnvVarOverride (+ migration 0003_envvaroverride), backend/core/env_vars_views.py/env_vars_urls.py (list/update/reset/reset-all), backend/groupfund/settings.py AUTO_DETECTED_DEFAULTS snapshot, EnvVarOverrideAdmin in core/admin.py for manual recovery. Frontend: NEW frontend/lib/envVarsMeta.ts + frontend/app/[locale]/admin/env-vars/page.tsx (per-section reset, reset-all behind AdminConfirmDialog, append-only chip editors for the *_EXTRA keys, restart-required badges).", "items B/C/L — admin nav/access overhaul: NEW frontend/lib/adminNav.ts (ADMIN_NAV_ITEMS/ADMIN_PERMISSIONS/isNavItemVisible) replaces AdminSidebar.tsx's hardcoded nav array AND admin/layout.tsx's hardcoded permission list (item B); the 'expenses' nav item now uses permission:['can_view_balance','can_expense'] (any-of) so a member with ONLY can_expense sees the admin panel and its Expenses entry — FIXED the 'empty panel' bug (item C); Navbar gained an 'Admin Panel' entry button (desktop dropdown + mobile drawer) gated on is_superuser || ADMIN_PERMISSIONS.some(hasPermission); admin/page.tsx gained a local AccessSummaryCard (quick-link grid to every ADMIN_NAV_ITEMS entry visible to the current member) shown to all non-superusers, replacing the old empty-state message for members without can_view_dashboard; backend DashboardStatsView response gained pending_contributions_count (mirrors pending_comments), surfaced as a badge on AdminSidebar's Contributions item via a new generic badgeKey mechanism.", "items D/M/N — contribute page: NEW frontend/lib/paymentMethodsMeta.ts translates payment.factory _METHOD_LABELS + the '{label} is not currently available' message to Persian (item D); the amount input is now validated against /^\\d{0,9}(\\.\\d{0,2})?$/ with an inline bilingual error + navigator.vibrate(120) (feature-detected) on rejection (item M); the receipt-upload step gained a second 'take photo' file input (accept='image/*' capture='environment') alongside the existing file picker, both setting the same receiptFile state (item N).", "items E/F/O/Z — contribution model + admin redesign: fund.Contribution gained show_in_public_list (bool), display_name_choice (TextChoices: hidden/display_name/full_name/custom), public_display_name, message (sanitized via strip_tags), rejection_reason, and amount widened decimal(10,2)→decimal(11,2) to match item M's 9-digit limit (migration 0004_contribution_display_name_choice_and_more). NEW endpoints: GET /api/fund/contributions/public/ (ContributionPublicListSerializer/ContributionPublicListView, AllowAny, paginated, NEVER returns receipt_image) powers NEW public page frontend/app/[locale]/contributions/page.tsx (donor wall: display name per display_name_choice, amount, date, optional message); GET /api/fund/contributions/{id}/ (ContributionAdminDetailSerializer/View) + PATCH /api/fund/contributions/{id}/edit/ (ContributionAdminEditSerializer/View, can_manage_permissions, every field incl. status freely re-editable in either direction, logs contribution_edited_by_admin with before/after) power new 'Details' (incl. ImageLightbox receipt preview + approve/reject with rejection_reason) and 'Edit' AdminModals in admin/contributions/page.tsx; GET /api/fund/contributions/mine/ (MyContributionsView, IsAuthenticated) powers a new 'My Contributions' section on profile/page.tsx (includes rejected items + rejection_reason, plus total_approved).", "items G/H/I/J — posts/lightbox/ratings: removed the now-redundant trailing-arrow <div> below each PostCard on posts/page.tsx (the whole card has been a <Link> since Phase 14, item G); multi-image post upload (AdminFileUpload + PostImageUploadView, getlist('images')) was investigated end-to-end and confirmed already fully functional — no code change needed (item H); ImageLightbox's close button redesigned to a lucide-react X icon in a larger w-11 h-11 circular cyan-glow hit target (item I, shared across posts/expenses/admin-contributions consumers); star ratings reduced from a 1-10 to a 1-5 scale everywhere — posts/[id]/page.tsx StarRating/StarDisplay now render 5 icons with larger gaps/sizes and '/5' labels, posts.PostComment.rating's MaxValueValidator(10)→MaxValueValidator(5) plus matching serializer validation (new posts migration, AlterField only — no data migration; existing 6-10 ratings clamp to 5 stars on display via Math.min(rating,5)) (item J).", "items K/Q/Y — decimal/balance display: admin/page.tsx's Fund Balance/Total Contributions/Total Expenses AdminStatCards gained decimals={2} (previously defaulted to 0, rounding e.g. £22.50 to '23' — Members card unchanged at decimals=0) (item K); the landing page's useCountUp hook no longer floors the final frame (was always Math.floor, even at progress===1) and the rendered value now uses maximumFractionDigits:2, so the homepage shows the same precise balance as the dashboard (item Q); NEW shared frontend/components/common/BalanceIndicator.tsx (self-gates on can_view_balance, fetches fundAPI.getBalance(), green #10b981 if >=0 else red #ef4444, 2-decimal formatting) added to Navbar (desktop+mobile) and AdminTopBar; expenses/page.tsx's existing balance card was updated to use the same sign-based color logic inline (item Y).", "items R/S/U — logs: admin/logs/system/page.tsx's level filter gained a real selectable 'All levels' option (was an AdminSelect placeholder option with disabled=true, which became permanently unselectable after picking any real level — AdminSelect itself untouched) (item R); backend/core/logging_handlers.py's SystemLogHandler.emit() now also extracts related_member and ip_address (X-Forwarded-For first, falling back to REMOTE_ADDR) from record.request when Django attaches one (django.request/django.security loggers), so /admin/logs/system can show which member/IP triggered a warning (item S); _log(...) call sites for ExpenseDeleteView, ContributionDeleteView, ContributionStatusUpdateView/ContributionAdminEditView, member activate/deactivate/delete, PostDeleteView, and comment delete/reject now pass richer extra_data snapshots (amount/currency/reason/before-after, etc.) of the affected object so the activity log retains details after deletion (item U).", "item T — NEW frontend/hooks/useBodyScrollLock.ts (sets document.body.style.overflow='hidden' while a boolean flag is true, restores previous value on cleanup); wired into AdminModal (useBodyScrollLock(isOpen)), AdminConfirmDialog (useBodyScrollLock(isOpen)), and ImageLightbox (useBodyScrollLock(true), always-mounted-while-open) so background page content can no longer scroll behind any of the site's glass overlays.", "item V — deactivated-member access: backend/accounts/backends.py's MemberAuthBackend.authenticate() no longer filters the lookup by is_active=True, so a deactivated member's credentials still authenticate and a token is issued; every OTHER permission class (IsActiveMember, HasGroupPermission, etc.) is UNCHANGED and still requires is_active=True, so in practice a deactivated member can only reach ProfileView plus whatever the frontend allows. NEW frontend/components/layout/DeactivatedGuard.tsx (rendered first by ClientLayout in both the admin-route and public-route branches) redirects to '/{locale}' from any route other than '/{locale}' or '/{locale}/contact' once member.is_active===false; Navbar filters navLinks down to just 'home'+'contact' for such members and hides the admin-panel entry; the landing page and contact page render a bilingual deactivation banner (common.deactivated_title/_message/_contact_link) when member?.is_active===false.", "items W/X — expenses page: row amounts now render in red (#ef4444, with a leading '-') instead of green, matching admin/expenses/page.tsx's pre-existing convention (item W); backend ExpenseListView gained a `search` query param (Q(short_reason__icontains=) | Q(description__icontains=)) alongside the existing date/amount filters, and frontend/app/[locale]/expenses/page.tsx gained a debounced search box plus date-from/to and amount-min/max filters (available to anyone who can already view the page — no new permission) (item X).", "item P — backend/accounts/admin.py AccessGroupAdmin.member_count and backend/accounts/serializers.py AccessGroupSerializer.get_member_count both now filter is_superuser=False, so a group's displayed member count (notably the default group, which superusers fall back into when group is NULL) no longer silently includes superuser accounts."]
