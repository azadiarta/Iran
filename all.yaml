        signature: "{ size?: number; className?: string; animated?: boolean }"
        needed_by:
          - {file: "frontend/app/[locale]/page.tsx", context: "Recent Posts section corner decoration, size=90, opacity .07, color #b91c1c, top-4 end-4"}
