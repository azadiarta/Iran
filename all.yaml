  # ─── Env Vars admin panel (Phase 15, item A) ───────────────────────────────
  # Single source of truth: backend/core/runtime_config.py.ENV_VAR_REGISTRY.
  # 4 files together implement GET/PATCH/reset for the "Environment Variables"
  # admin page, plus a 30s-TTL request middleware that applies the 'live'
  # category overrides (DEBUG / *_EXTRA host+CORS+CSRF lists) on top of
  # AUTO_DETECTED_DEFAULTS (backend/groupfund/settings.py) — see that file's
  # key_settings.env_vars_panel note for the full append-only/no-lockout design.

  "backend/core/runtime_config.py":
    status: done
    kind: module
    note: "NEW (Phase 15, item A) — single source of truth for the /admin/env-vars panel. ENV_VAR_REGISTRY maps each manageable key to {section, category ('live'|'restart'|'readonly'), value_type ('bool'|'csv_extra'|'string'|'secret'|'secret_regenerate'), requires_restart, env_name, current (zero-arg callable for the *effective* current value, e.g. masked for secrets via _mask()), and for the 3 *_EXTRA csv_extra keys also `base` (callable returning the relevant AUTO_DETECTED_DEFAULTS list)}. 17 keys total across 3 categories (4 live + 8 restart + 5 readonly) — live: DEBUG, ALLOWED_HOSTS_EXTRA, CSRF_TRUSTED_ORIGINS_EXTRA, CORS_ALLOWED_ORIGINS_EXTRA; restart: SECURE_SSL_REDIRECT, AWS_STORAGE_BUCKET_NAME, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_REGION_NAME, AWS_S3_ENDPOINT_URL, AWS_S3_CUSTOM_DOMAIN, SECRET_KEY; readonly: RAILWAY_ENVIRONMENT, DATABASE_URL (via _database_info(), password masked), NEXT_PUBLIC_API_URL, NEXT_PUBLIC_SITE_NAME, NEXT_PUBLIC_MEDIA_URL. get_source(key) reports 'override'|'env'|'default'|'auto-detected' for the UI's source badge. Mirrored bilingual metadata (label/description/effect/suggested chips) lives in frontend/lib/envVarsMeta.ts — ENV_VAR_META keys must stay in sync with this registry's keys."
    imports:
      external: [{from: os, items: [environ]}, {from: django.conf, items: [settings]}]
      internal:
        - {from: "backend/core/models.py", items: [{name: EnvVarOverride, status: available}], note: "lazy-imported inside get_source()"}
    exports:
      - {name: ENV_VAR_REGISTRY, kind: constant, type: "dict[str, dict]", description: "14-key registry described above"}
      - {name: get_source, kind: function, signature: "(key: str) -> 'env'|'override'|'auto-detected'|'default'"}
    needed_by:
      - {file: "backend/core/env_vars_views.py", items: [ENV_VAR_REGISTRY, get_source], status: available}
      - {file: "backend/core/middleware.py",     items: [implicit — _LIVE_KEYS subset of ENV_VAR_REGISTRY keys is hardcoded separately for the hot path], status: available}

  "backend/core/middleware.py":
    status: done
    kind: module
    note: "NEW (Phase 15, item A) — RuntimeConfigMiddleware, first entry in MIDDLEWARE (before CorsMiddleware, see backend/groupfund/settings.py) so DEBUG/ALLOWED_HOSTS/CSRF/CORS are correct for the rest of the request pipeline. On every request, refreshes a process-local cache (_cache, TTL=30s) of EnvVarOverride rows for the 4 'live' keys (DEBUG, ALLOWED_HOSTS_EXTRA, CSRF_TRUSTED_ORIGINS_EXTRA, CORS_ALLOWED_ORIGINS_EXTRA) via a try/except-wrapped query (a transient DB hiccup just keeps the previous/default values — never breaks a request). settings.DEBUG = override or AUTO_DETECTED_DEFAULTS['DEBUG']; for the 3 *_EXTRA keys, settings.ALLOWED_HOSTS/CSRF_TRUSTED_ORIGINS/CORS_ALLOWED_ORIGINS = AUTO_DETECTED_DEFAULTS[...] + json.loads(override) — i.e. ALWAYS appended to the auto-detected base, never replacing it, so a bad/empty override can never lock the admin panel out of itself. core.env_vars_views._bust_cache() sets _cache['expires_at']=0 after a live-key update/reset so the change is visible on the very next request instead of waiting up to 30s."
    imports:
      external: [{from: json, items: [json]}, {from: time, items: [time]}, {from: django.conf, items: [settings]}]
