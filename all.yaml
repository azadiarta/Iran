      status: done
      done: ["Problem: frontend/app/[locale]/admin/members/[id]/page.tsx's Phase 21 categorized sections (Comments/Contributions/Contact Messages/Activity Log) rendered the FULL list of each member's items in a max-h-80 scrollable div, unusable for a member with e.g. 50 comments and 50 messages (everything stacked linearly). Fix keeps full admin control capability intact by deep-linking into the SAME existing admin list pages (not stripped-down bespoke views), pre-filtered to just that one member.", "Backend: added optional member-scoped query-param filters to the two admin list views that didn't already have one: CommentGlobalListView gained `author` (filters qs.filter(author_id=author_id), backend/posts/views.py) and ContactMessageListView gained `sender` (qs.filter(sender_id=sender_id), backend/core/contact_views.py). ContributionListView (fund/views.py) and ActivityLogListView (logs/views.py) already supported contributor=/actor= respectively from earlier phases; only their frontend wiring was missing.", "Frontend lib/api.ts: commentsAPI.getList gained an `author?: string` filter (-> ?author=), fundAPI.getContributions gained `contributor?: string` (-> ?contributor=, backend already supported it), contactAPI.getList gained `sender?: string` (-> ?sender=). logsAPI.getActivity unchanged (actor? already existed both sides).", "All 4 admin domain pages (admin/comments, admin/contributions, admin/contact-messages, admin/logs/activity) now accept the SAME deep-link URL contract `?member=<memberId>&name=<urlEncodedFullName>` via useSearchParams(), seeding a memberFilterId/memberFilterName state pinned independently of the page's own search/status/date filters, mapped internally to that page's domain-specific backend param (author/contributor/sender/actor respectively; activity log reused its pre-existing free-text actorFilter/appliedFilters.actor state, just seeded from the URL instead of adding a parallel field) and combinable with them. Each page gained a clearMemberFilter() that resets only the pin and router.replace()s the URL clean, plus a new admin-glass-card banner ('Showing X for member: Y' / 'نمایش... عضو: ...' + 'Clear filter' button, cyan border) shown above the filter form whenever the pin is active.", "frontend/app/[locale]/admin/members/[id]/page.tsx: each of the 4 section headers is now a flex justify-between row, the existing icon+title+count on the left, plus a new conditional (shown only when the section has >=1 item) 'View all'/'مشاهده همه' button (ExternalLink icon, color matched to that section's existing icon color: cyan comments, green contributions, amber contact messages, violet activity log) that router.push()es to /{locale}/admin/{comments|contributions|contact-messages|logs/activity}?member={id}&name={encodeURIComponent(target.full_name)}. Each section body changed from .map() over the full array inside a scrollable max-h-80 div to .slice(0,3).map() inside a plain non-scrolling div; correct 'most recent first' ordering relies on MemberFullProfileView's 4 querysets already being .order_by('-created_at') (established in Phase 21), so slicing the first 3 needs no new backend sorting.", "Verified clean: python manage.py check (0 issues), npx tsc --noEmit (no errors), npm run build (compiled successfully, full route table incl. all 4 touched admin pages + admin/members/[id])."]
