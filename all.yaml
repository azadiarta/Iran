          display_name_choice: "choices via DisplayNameChoice [hidden, display_name, full_name, custom], default display_name — NEW (Phase 15, item E). Controls how ContributionPublicListSerializer.get_display_name() computes the public display name."
          public_display_name: "str(100), blank — NEW (Phase 15, item E). Used only when display_name_choice=custom; sanitized+length-capped via core.validators.sanitize_and_limit in serializers (was strip_tags-only prior to the input-validation-security hardening pass)."
          message: "str(150), blank — NEW (Phase 15, item E). Optional public message shown on /contributions; sanitized+length-capped via core.validators.sanitize_and_limit (was strip_tags-only prior to the input-validation-security hardening pass)."
          rejection_reason: "text, blank — NEW (Phase 15, item F/Z). Set by admins via ContributionAdminEditView when rejecting a contribution; surfaced to the contributor via MyContributionsView/MyContributionSerializer."
          created_at: datetime, auto
          updated_at: datetime, auto
        meta: {ordering: [-created_at]}
        nested_enum:
          - name: DisplayNameChoice
            kind: "models.TextChoices"
