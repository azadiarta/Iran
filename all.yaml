  "frontend/components/layout/AuthSync.tsx":
    status: done
    kind: component
    note: "NEW (Phase 23, item A) — fixes a bug where an admin changing a member's group/permissions, or toggling a member's active status, had NO effect on that member's current browser session until they manually logged out and back in (the JWT access token and the persisted authStore `member` object are both stale snapshots from login time, and nothing previously refreshed them). Headless component (returns null), rendered by ClientLayout.tsx as the very first element in both the admin-route and public-route branches. On mount (and whenever hasHydrated/isAuthenticated change), if hasHydrated && isAuthenticated, calls authAPI.getProfile() immediately and then again every SYNC_INTERVAL_MS=30_000 via setInterval, and on each successful response overwrites the authStore member via setMember(res.data) — so member.group_permissions, member.is_superuser, and member.is_active all converge to the backend's current truth within 30 seconds, without requiring a logout. A `cancelled` flag set in the effect cleanup prevents a setMember call from a stale in-flight request after unmount/auth-change. A failed request (e.g. a 401 if the refresh token itself is also invalid) is silently swallowed in a catch — the shared axios interceptor already handles logout-on-failed-refresh elsewhere, so AuthSync does not need its own error UI."
    imports:
      external: [{from: react, items: [useEffect]}]
      internal:
        - {file: "frontend/lib/api.ts", items: [authAPI], status: available}
        - {file: "frontend/store/authStore.ts", items: [useAuthStore, "type Member"], status: available}
