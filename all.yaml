actMessage type were added (part C); DashboardData gained pending_contact_messages_count?: number (part C). Phase 21 — added a new MemberFullProfile interface ({member: MemberDetail, comments: CommentDetail[], contributions: Contribution[], contact_messages: ContactMessage[], activity_logs: ActivityLogEntry[]}) + membersAPI.getFullProfile(id) → GET /api/members/{id}/full-profile/, unwrapped via the standard interceptor like every other endpoint. Phase 22 — added member-scoped filter params powering the member-detail page's per-section 'View all' deep-link (?member=<id>): commentsAPI.getList gained filters.author?: string (-> ?author=), fundAPI.getContributions gained filters.contributor?: string (-> ?contributor=, backend param already existed), contactAPI.getList gained filters.sender?: string (-> ?sender=); logsAPI.getActivity unchanged (filters.actor? already existed both sides). Phase 23 — MemberListItem gained is_superuser: boolean (inherited by MemberDetail, since `MemberDetail extends MemberListItem`), used by admin/members pages to lock down superuser rows/profiles in the UI (items A/B). settingsAPI.getPublicSettings REWRITTEN: previously a raw `axios.get` call that deliberately bypassed the shared `api` instance's interceptor (to dodge the 403→/forbidden redirect for guests), it now calls the shared `api` instance against the new genuinely-public backend endpoint GET /api/settings/public/ (backend/core/settings_views.py PublicSettingListView, AllowAny) inside a try/catch returning null on failure — simpler and no longer relies on bypassing the interceptor, since the endpoint itself no longer needs auth. contactAPI gained getMine(page) → GET /api/contact/mine/?page= (IsAuthenticated, paginated ContactMessage[]) for the new 'My Contact Messages' profile sub-page (item C). Phase 29 — added postsAPI.getAdminList(page, {search?, author?, date_from?, date_to?}) → GET /api/posts/admin/ (admin, paginated PostAdminDetail[]), and membersAPI.updateMemberNumber(id, memberNumber) → PATCH /api/members/{id}/number/ (superuser-only); added types MemberAdminBrief {id, display_name, full_name, member_number} and PostAdminDetail extends Omit<PostDetail, 'author'> {tracking_code, author: MemberAdminBrief | null} (the Omit is needed because PostDetail.author is the public PostAuthor shape with a non-nullable display_name, while MemberAdminBrief's display_name is nullable — incompatible without the override); CommentDetail's `author` field was also retyped from CommentAuthor to MemberAdminBrief | null (same admin-brief shape, reused rather than duplicated). Phase 30 — postsAPI.getList's signature changed from `(page=1, search='')` to `(page=1, filters: {search?, date_from?, date_to?} = {})`, mirroring getAdminList's pre-existing filters-object pattern, so the public posts page can pass date_from/date_to alongside search; the homepage's 3-post-preview call site (app/[locale]/page.tsx) simplified from `getList(1, '')` to `getList(1)`. Phase 31 — every public unauthenticated write method gained a required captcha_token: string field: authAPI.register's payload, authAPI.login (signature changed from (credential, password) to (credential, password, captcha_token)), postsAPI.createComment's data type, fundAPI.createExpenseComment's data type, paymentsAPI.initiate's payload, contactAPI.submit's data type. Phase 32 — added membersAPI.getPublicCount() → GET /api/members/count/ (AllowAny, returns {count}) for the homepage's public stats bar, and settingsAPI.getPublicSettings consumption was extended on the page.tsx call site to read the new landing_headline_*/landing_tagline_* keys."
