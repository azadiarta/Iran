      done: ["Established TWO new canonical, shared validation modules — one per stack, mirroring the same rules — replacing the prior per-file ad-hoc inline checks (regexes/strip_tags calls duplicated across many serializers/components). NEW backend/core/validators.py exports PHONE_REGEX (strict `^00\\d{6,15}$` — '00' international-prefix format, NOT '+', per explicit user requirement), LENIENT_PHONE_REGEX (accepts '00' or '+' — used only for read/display-path leniency, never for new submissions), SHORT_TEXT_MAX_LENGTH=150, LONG_TEXT_PUBLIC_MAX_LENGTH=250, LONG_TEXT_ADMIN_MAX_LENGTH=550, ALLOWED_IMAGE_FORMATS={JPEG,PNG}, and functions validate_phone_format/validate_phone_lenient/validate_email_format/validate_phone_or_email/sanitize_text (strip_tags+strip)/validate_max_length/sanitize_and_limit (the combined sanitize+cap helper now used almost everywhere text was previously only strip_tags(...).strip()'d)/validate_image_content (Pillow Image.open()+img.verify() against the format allowlist — rejects SVG entirely and any file whose real content doesn't match an actual allowed raster format, independent of extension/declared content-type)/validate_pdf_content (`%PDF-` magic-byte check)/validate_image_file/validate_receipt_file (image-or-PDF). NEW frontend/lib/validation.ts mirrors every rule client-side: SHORT_TEXT_MAX_LENGTH/LONG_TEXT_PUBLIC_MAX_LENGTH/LONG_TEXT_ADMIN_MAX_LENGTH (same 150/250/550 values), PHONE_PLACEHOLDER='00447700900000', isValidPhoneStrict/isValidPhoneLenient/isValidEmail/isValidPhoneOrEmail, and bilingual message helpers phoneHint/phoneFormatError/phoneOrEmailFormatError/maxLengthError consumed by both next-intl pages (register/login/profile/contact/contribute) and the inline-isRTL admin/* pages.", "Applied the universal length caps + sanitize_and_limit (HTML-stripped AND length-capped server-side, native maxLength attribute + matching client-side check) to EVERY user-submitted text field found across both stacks during a full sweep, not just the few named examples: backend/accounts/serializers.py (RegisterSerializer.validate_full_name/_display_name, MemberUpdateSerializer same two + a changed-value-only strict-phone re-check, LoginSerializer.credential gained max_length=254 — the one field in the entire auth flow that had NO cap at all before this pass, AccessGroupCreateSerializer/AccessGroupUpdateSerializer.validate_name/_description), backend/core/serializers.py (DefaultSettingSerializer.validate_value, ContactMessageCreateSerializer.validate_name/_contact_info/_message), backend/core/settings_views.py (_validate_value now applies a generic 550-char cap to every DefaultSetting PLUS format validation for contact_email/payment_paypal_email and contact_phone), backend/posts/serializers.py (PostCreateSerializer/PostUpdateSerializer.validate_title/_body, CommentCreateSerializer.validate_guest_name/_text, CommentAdminEditSerializer/CommentOwnerEditSerializer same), backend/fund/serializers.py (ContributionCreateSerializer/ContributionManualCreateSerializer/ContributionAdminEditSerializer.validate_guest_name/_notes/_message/_public_display_name/_rejection_reason, ExpenseCreateSerializer.validate_short_reason/_description), backend/payments/serializers.py (PaymentInitiateSerializer.validate_guest_name/_notes/_message/_public_display_name), backend/accounts/member_views.py (MemberToggleActiveView's deactivation `reason` — previously `.strip()`-only with no cap and no required-check, now sanitize_and_limit'd to 550 and required). Frontend mirror: frontend/app/[locale]/register/page.tsx (full_name<=35, display_name<=20, strict phone format via isValidPhoneStrict, email format check, password minimum raised 6->8 chars, maxLength props added to all 4 relevant fields, phone placeholder changed from '+44 7700 900000' to the '00'-format PHONE_PLACEHOLDER), frontend/app/[locale]/login/page.tsx (NEW isValidPhoneOrEmail pre-submit check + maxLength={254} added to the credential input, mirroring the backend's new cap), frontend/app/[locale]/profile/page.tsx (full_name/display_name/email/phone edit form gained the same checks + maxLengths, phone re-validated as strict-format ONLY when changed from the existing value, matching MemberUpdateSerializer's changed-value-only backend pattern; password-change form gained a client-side minimum-8 + match check), frontend/app/[locale]/contact/page.tsx (name/contact/message maxLength 100/150/250), frontend/app/[locale]/contribute/page.tsx (guestName maxLength 50), and every admin/* page that accepts free text (groups, expenses, posts, payments, settings, comments, contributions, members, members/[id], contact-messages) — each AdminInput/AdminTextarea now carries the project-mandated maxLength (150 single-line, 250 public-textarea-equivalent admin fields stay at the existing field-specific cap, 550 for genuinely long admin-only fields like rejection reasons/deactivation reasons/descriptions).", "Hardened all THREE file/image upload entry points (post images, expense receipts, payment/contribution receipts) to verify real file CONTENT, not just file extension or client-supplied MIME type, eliminating the SVG-stored-XSS / mislabeled-file vector entirely: backend/posts/views.py's PostCreateView and PostImageUploadView now call core.validators.validate_image_file (Pillow-verified) instead of a manual `if img.size > max_mb*1024*1024` extension-blind size-only check; backend/fund/serializers.py's ExpenseCreateSerializer.validate_receipt_image delegates to validate_image_file the same way; backend/payments/serializers.py's ReceiptUploadSerializer.validate_receipt_image was fully rewritten from a manual extension+size check to core.validators.validate_receipt_file (accepts a real Pillow-verified image OR a real %PDF--signed PDF, rejecting anything else regardless of filename/extension).", "Independent full-codebase verification sweep (background agent, research-only, spanning the entire frontend beyond just the admin pages plus all 3 upload paths) found exactly ONE genuine remaining gap — LoginSerializer.credential's missing max_length, fixed in this same phase as described above — confirming the rest of the sweep (admin pages' AdminInput/AdminTextarea prop-passthrough, the public-site forms, the upload validators) had no further actionable issues.", "Verified clean end-to-end: backend `manage.py check` (0 issues) and `manage.py makemigrations --check --dry-run` (no pending model changes — the 4 new migrations this phase, accounts/0006_alter_member_deactivation_reason.py + core/0007_alter_contactmessage_message_and_more.py + fund/0007_alter_contribution_notes_and_more.py + posts/0006_alter_comment_rejection_reason_alter_comment_text_and_more.py, are AlterField-only length-cap migrations already created and applied); frontend `npx tsc --noEmit` (zero errors) and `npm run build` (all 32 routes compiled successfully)."]
    28:
      name: "all search/filter inputs converted to real-time debounced (site + admin panel), safe_filter query-param hardening against unhandled 500s"
      status: done
      done: ["Problem: of the project's 8 total search/filter UIs, only 2 (frontend/app/[locale]/posts/page.tsx and expenses/page.tsx) were already real-time (debounced); the other 6 — all in the admin panel — required clicking a submit button to apply filters (a <form onSubmit={...}> wrapping the search input(s) + an explicit Apply/submit button), an inconsistent UX the user wanted unified site-wide. Converted ALL 6 remaining pages to the SAME 300ms debounce pattern already established by posts/expenses: a useEffect watching the raw input state, setTimeout(() => { setAppliedState(trimmed); setPage(1); }, 300) with a clearTimeout cleanup, removing the <form>/onSubmit/submit-button entirely (filters now apply automatically as the admin types, no button needed) and converting the wrapping <form> to a plain <div>. Two sub-patterns were used depending on each page's pre-existing field mix: (a) single-field debounce, only wrapping the free-text search input, on pages where the other filter controls (selects/date inputs) were already instant via direct onChange — frontend/app/[locale]/admin/members/page.tsx (search by name/ID, removed the unused Search icon import too), admin/comments/page.tsx (search, alongside 2 already-instant selects), admin/contact-messages/page.tsx (search, alongside an already-instant status select), admin/contributions/page.tsx (search, alongside already-instant status/method selects + date_from/date_to, grid narrowed xl:grid-cols-6 -> xl:grid-cols-5); (b) combined multi-field debounce, one useEffect watching an array of every filter field and writing one combined appliedFilters object, used where NOTHING on the page was previously instant — admin/logs/activity/page.tsx (actor/action/date_from/date_to, grid narrowed lg:grid-cols-5 -> lg:grid-cols-4; the unrelated clearMemberFilter()/memberFilterName deep-link banner from Phase 22 was left untouched) and admin/logs/system/page.tsx (level/source/date_from/date_to, same grid narrowing). No shared/centralized debounce hook exists anywhere in the frontend (confirmed by inspecting the posts/expenses precedent before extending it) — each of the 8 pages still implements its own inline setTimeout/clearTimeout, by design, to stay consistent with the pre-existing convention rather than introducing a new abstraction mid-pass.", "Security hardening discovered and fixed as a direct consequence of the real-time conversion: every filter newly confirmed to be live now sends a request on EVERY keystroke instead of only on an explicit user-reviewed submit, multiplying how often a malformed/garbage query-param value reaches the backend. Investigation confirmed there is still no global DRF exception handler in this project (re-confirmed via a fresh whole-backend grep) — so any GET list view building a `.filter(**kwargs)` straight from an unvalidated query param against a typed field (a UUID FK exact-match, a DateField/DateTimeField range, a DecimalField range, or a GenericIPAddressField) raises an UNCAUGHT ValueError/TypeError/django.core.exceptions.ValidationError the instant Django tries to coerce a malformed string to that field's Python type, surfacing as a raw, unhandled Django 500 instead of a clean JSON error — a real availability/robustness gap, now far easier to trigger by mistake or by an attacker fuzzing query params in real time. NEW backend/core/validators.py:safe_filter(queryset, **lookups) — wraps queryset.filter(**lookups) in try/except (ValueError, TypeError, DjangoValidationError): return queryset.none(), chosen over a global exception handler (out of scope, an unrequested architectural change) and over per-field regex pre-validation (more code, same outcome) specifically because every affected endpoint is already permission-gated, so 'empty result for a garbage filter value' introduces no privilege boundary at all and is the more intuitive behavior than either crashing or silently ignoring the bad filter. Applied at every vulnerable call site found via a backend-wide sweep: accounts/member_views.py MemberListView (group__id), logs/views.py ActivityLogListView (actor__id, created_at__date range, ip_address) and SystemLogListView (created_at__date range), fund/views.py ContributionListView (created_at__date range, contributor__id) and ExpenseListView (expense_date range, amount range, withdrawn_by__id), posts/views.py CommentGlobalListView (author_id), core/contact_views.py ContactMessageListView (sender_id) — every other filter already being a plain icontains/exact string match or an enum-style choices-checked value was left as-is, since those can't raise on arbitrary input.", "Updated info.yaml: quick_stats.total_realtime_search_inputs corrected from 2 to 8; the search_inputs category's old two-way split (realtime_debounced: 2, manual_submit_filters: 6) was collapsed into one realtime_debounced: 8 list (every item's label/notes updated to drop '(manual submit)' and describe the new debounce + safe_filter wiring), notes_general rewritten to state all 8 existing search inputs are now real-time and that there is still no shared debounce hook; validation_logic.validate_shared_backend's notes gained a paragraph documenting safe_filter and where it's used.", "Verified clean end-to-end: backend `manage.py check` (0 issues); a live Django-shell sanity check proving safe_filter actually prevents a crash on deliberately malformed UUID/date query values (each returned a 0-count queryset instead of raising); frontend `npx tsc --noEmit` (zero errors) and `npm run build` (all 32 routes, including all 6 modified admin pages, compiled and generated successfully)."]
    29:
      name: "superuser-only member_number reassignment with cross-model tracking_code cascade; admin-only post search/filter endpoint mirroring the comments/contributions pattern; public post-list search fix"
      status: done
      done: ["Feature 1 — member_number is a Member's permanent 5-digit public ID, embedded as the first 5 characters of every tracking_code this member has ever been attributed (Comment 'C', Contribution 'F', ContactMessage 'M', Post 'P' — see core/tracking_codes.py's generate_tracking_code). Until now it was immutable post-creation (only auto-assigned once, at registration, via Member._generate_member_number()), with no admin path to reassign it even though a real operational need exists (e.g. correcting a typo'd number, or freeing/reassigning a number for organizational reasons). NEW backend/accounts/member_views.py:MemberChangeNumberView (PATCH /api/members/{id}/number/, registered in member_urls.py between group/ and toggle-active/) is deliberately gated on permission_classes=[IsAuthenticated, IsSuperuser] rather than the file's usual _is_admin/can_manage_permissions check — and checks the ACTING admin's own is_superuser, not the target member's — making it the one view in this file that intentionally works even when editing another superuser's record (every other write view here explicitly refuses to touch a superuser target). Validates the submitted member_number is an integer in [10000, 99999] (plain try/except int() + range check, no serializer) and unique excluding the member's own current row (Member.objects.filter(member_number=new_number).exclude(pk=member.pk).exists()), returning api_error with a field-keyed errors.member_number message on either failure (mirrors the rest of the file's hand-rolled validation style rather than introducing a serializer just for this one field). On success, wrapped in @transaction.atomic: updates Member.member_number, then for each of Comment/Contribution/ContactMessage/Post (function-local imports to avoid new app-level circular-import risk, same convention as MemberFullProfileView's existing function-local imports in this same file) rewrites ONLY the first 5 characters of every already-attributed row's tracking_code to the new zero-padded prefix (`new_prefix + row.tracking_code[5:]`) via one bulk_update() per model — the letter and random 3-digit suffix are left untouched, so a row's tracking_code changes its owner-identifying prefix but keeps its own identity. Logs member_number_changed to ActivityLog with {old_number, new_number}. Frontend: admin/members/[id]/page.tsx gained a new always-rendered (when `currentMember?.is_superuser`) 'Member Number' form/card — deliberately placed OUTSIDE the existing `{canManage && !target.is_superuser}` block that gates the rest of the management grid, so it remains visible and usable even on a target superuser's profile page (where that whole grid is otherwise replaced by an explanatory card, per Phase 23 item B) — with client-side range validation, a warning explaining the cascade effect, and an error path that surfaces the backend's specific errors.member_number message (e.g. duplicate-number) when present. New membersAPI.updateMemberNumber(id, memberNumber) in frontend/lib/api.ts.", "Feature 2 — the admin panel's comments and contributions lists each have a dedicated admin-only search/filter list endpoint (CommentGlobalListView, ContributionListView) returning an admin-detail serializer with tracking_code + the author's member_number, but posts had no equivalent — admin/posts/page.tsx only had the public PostListView/PostSerializer to work with, so admins could neither search posts by tracking_code/author nor see a post's tracking_code at all. NEW backend/posts/serializers.py:PostAdminDetailSerializer (fields: id, tracking_code, author(nested), title, body, images, created_at, updated_at) mirrors CommentAdminDetailSerializer's admin-detail pattern; its author field reuses a serializer renamed in this same phase from CommentAuthorSerializer to MemberAdminBriefSerializer (generic admin-only member brief — id/display_name/full_name/member_number — since it is no longer Comment-specific once PostAdminDetailSerializer also needs it; never used by any public serializer). NEW backend/posts/views.py:PostAdminListView (GET /api/posts/admin/, permission_classes=[IsAuthenticated, HasGroupPermission('can_post')], registered in posts/urls.py BEFORE the bare <uuid:pk>/ route) supports search (OR-matching title/body/author.full_name/author.display_name/tracking_code via icontains, built with django.db.models.Q) plus author (exact Member id) and date_from/date_to (created_at date range) — the latter three wrapped in core.validators.safe_filter (Phase 28's hardening helper) since author is a UUID FK exact-match and date_from/date_to coerce to date objects, both of which can raise on malformed input. While building this, also fixed a latent, unrelated bug discovered in the process: the PUBLIC PostListView (GET /api/posts/, AllowAny) already accepted a `search` query param from postsAPI.getList() — matching the frontend's call signature — but silently ignored it server-side (no corresponding `.filter()` was ever applied); it now actually filters title/body via icontains, same Q-OR pattern as the new admin endpoint. Frontend: admin/posts/page.tsx switched its list source from postsAPI.getList to the new postsAPI.getAdminList(page, {search}), added a debounced (300ms) search box above the table (mirroring Phase 28's admin/comments/page.tsx pattern) and a monospace tracking_code column between Title and Author; its row-summary type changed PostSummary -> the new PostAdminDetail (frontend/lib/api.ts: PostAdminDetail extends Omit<PostDetail, 'author'> {tracking_code, author: MemberAdminBrief | null} — the Omit is required because PostDetail.author's display_name is non-nullable while MemberAdminBrief's is nullable; CommentDetail's author field was likewise retyped from CommentAuthor to MemberAdminBrief | null, reusing the same admin-brief shape instead of keeping two near-duplicate interfaces).", "Updated info.yaml: project_summary counters bumped (total_forms 22->23, total_realtime_search_inputs 8->9, total_api_endpoints/total_view_classes/total_serializers/total_url_patterns each +2); added form_admin_member_change_number under forms.admin_data_entry_forms; added search_admin_posts under search_inputs.realtime_debounced (and removed the now-obsolete placeholder search_admin_posts_absent from no_search_input); added ep_member_change_number under api_endpoints.member_endpoints and ep_post_admin_list under api_endpoints.post_endpoints (plus an updated ep_post_list note for the search-param fix); added ser_PostAdminDetailSerializer and renamed ser_CommentAuthorSerializer -> ser_MemberAdminBriefSerializer under serializers.posts_serializers; updated auth_permission_checks.auth_IsSuperuser's notes to mention the MemberChangeNumberView exception; updated tracking_code_scheme.tracking_code_format to list all 4 lettered models (was documented as only 3 — Post's 'P' letter and core/tracking_codes.py had already existed in the codebase from an earlier, undocumented session, so this corrected stale pre-existing documentation as well as covering the new cascade-rewrite behavior) and added backend/core/tracking_codes.py + backend/accounts/member_views.py to its location list.", "Verified clean end-to-end: backend `python manage.py check` (0 issues, 0 silenced), `python manage.py makemigrations --check --dry-run` (no pending model changes — both features are view/serializer/frontend-only, no model fields added), `python manage.py test posts accounts` (0 tests — no existing suite for these apps, unchanged); frontend `npx tsc --noEmit` (zero errors) and `npm run build` (all 32 routes compiled successfully, including admin/posts at 6.17 kB and admin/members/[id] at 10.7 kB)."]
    30:
      name: "email format/length hardening (EMAIL_MAX_LENGTH=75), real-time phone/email validation feedback on register/login/profile, register hint cross-contamination bugfix, public post-list debounced advanced search"
      status: done
      done: ["Commit e2ba62a — backend/core/validators.py gained EMAIL_MAX_LENGTH=75 (Django's EmailField model default is 254, but real addresses never get remotely close, so this caps the field sane everywhere it's entered); wired into validate_email_format (length check BEFORE the Django email-format check) and into validate_phone_or_email's email branch. Closed a real, previously-undetected gap: RegisterSerializer.validate_email and MemberUpdateSerializer.validate_email had ZERO format/length checking before this phase (unlike phone, which already called validate_phone_format/validate_phone_lenient) despite validate_email_format already existing in core/validators.py for this exact purpose — both now call it (RegisterSerializer unconditionally when non-empty; MemberUpdateSerializer only when the new value differs from self.instance.email, changed-value-only, mirroring its pre-existing phone pattern so a member with a legacy long/malformed email isn't locked out of saving unrelated profile edits). LoginSerializer.credential's max_length lowered from a literal 254 to the now-imported EMAIL_MAX_LENGTH constant (=75), removing the one duplicated literal. frontend/lib/validation.ts mirrors the same EMAIL_MAX_LENGTH=75 constant, applied to register's email maxLength and login's credential maxLength.", "Real-time (per-keystroke) validation feedback, previously limited to password-strength on register, extended to phone AND email on register/login/profile. register/page.tsx + profile/page.tsx gained handlePhoneChange/handleEmailChange (update form state + a fieldErrors entry together on every keystroke). login/page.tsx gained a single handleCredentialChange for its one combined 'credential' box, built on a NEW frontend/lib/validation.ts:detectCredentialKind(value) classifier — a first-character heuristic only (digit or '+' => phone, anything else => email; empty => null) used PURELY to choose which inline hint/error to display. This classification is explicitly advisory-only and never gates submission: handleSubmit still calls the unconditional isValidPhoneOrEmail(credential) OR-check (valid email format OR lenient '00'-or-'+' phone format) at submit time, so a misdetected 'kind' can never block a credential that is genuinely valid as the other type — this was an explicit safety requirement (a phone-typing user must never be blocked by email-format validation, and vice versa). NEW frontend/lib/validation.ts:phoneLenientFormatError() bilingual message for login's credential box specifically (distinct from the strict-format register/profile message, since login's LENIENT_PHONE_REGEX still accepts legacy '+'-prefixed numbers for backward compatibility).", "Fixed a pre-existing register-page bug where the phone field's hint and the email field's hint could cross-contaminate — typing into the (still-empty) email field caused the phone field to wrongly show its own format-hint text instead of staying neutral, and vice versa. Root cause: the phone hint's condition checked email's state in its negative branch instead of phone's own value first. Restructured both hints to check the field's own value first, falling back to the OTHER field's state only when the field itself is empty.", "Follow-up commit b1e6e05 (same phase, fixes the just-added phoneLenientFormatError text) — the lenient phone regex genuinely still accepts a pre-existing '+'-prefixed number for backward compatibility on LOGIN, but the displayed error message incorrectly invited a user to type '+' for new input; both EN and FA strings were corrected to mention only the '00' prefix, leaving the underlying regex itself unchanged.", "Extended the public posts page (frontend/app/[locale]/posts/page.tsx) with the same debounced advanced search already used in the admin panel: a new SlidersHorizontal-icon toggle reveals dateFrom/dateTo date inputs, debounced together with the existing text search in the same single 300ms timer (one combined useEffect rather than a second independent debounce). postsAPI.getList's signature changed from (page, search) to (page, {search, date_from, date_to}) — backend PostListView (AllowAny, public) now applies date_from/date_to via core.validators.safe_filter (Phase 28's helper, since these coerce to date objects and can raise on malformed input) and the search match was widened from title/body-only to also OR-match author.full_name/author.display_name — still deliberately excluding tracking_code, which stays admin-only and is never exposed to PostSerializer.", "Updated info.yaml in the same commit: search_inputs.search_posts notes describes the new advanced-search toggle and widened author-name match; validation_logic.validate_shared_backend/validate_shared_frontend/validate_accounts/validate_frontend_pattern notes all gained Phase 30 paragraphs documenting EMAIL_MAX_LENGTH, detectCredentialKind, phoneLenientFormatError, and the register hint bugfix.", "Verified clean: backend `python manage.py check` (0 issues); frontend `npx tsc --noEmit` (zero errors) and `npm run build` (all routes compiled successfully)."]
    31:
      name: "Cloudflare Turnstile CAPTCHA + per-view DRF rate limiting on every public unauthenticated write endpoint (login, register, contact, post/expense comments, contribution initiate)"
      status: done
      done: ["Commit d28c536 — two independent, additive anti-abuse layers added to the 5 public-facing write endpoints that don't require authentication: a CAPTCHA challenge and a per-view request-rate ceiling, neither replacing the other. NEW backend/core/captcha.py:verify_captcha(token, remote_ip=None) posts the frontend-supplied token + settings.TURNSTILE_SECRET_KEY + remote_ip to Cloudflare's https://challenges.cloudflare.com/turnstile/v0/siteverify via stdlib urllib (zero new pip dependency), returns bool(result['success']). Fails closed by design: a missing token, a network error, or any other exception during the verify request (caught broadly, logged via logger.exception) all return False rather than raising, so a captcha-service outage blocks the gated form instead of silently bypassing it. settings.TURNSTILE_SECRET_KEY defaults to Cloudflare's published always-passes test secret (1x0000000000000000000000000000000AA) when the env var is unset, so every gated endpoint works out of the box in dev with zero signup.", "Backend wiring — each of the 5 views calls verify_captcha() at the very top of post(), before any serializer or business logic runs, and returns 400 on failure: accounts/views.py RegisterView/LoginView (LoginView's pre-existing `ip = _get_client_ip(request)` line was moved earlier, before the captcha check, rather than duplicated), core/contact_views.py ContactMessageCreateView (uses the file's existing api_error helper, before the MAX_PENDING_MESSAGES pending-count check), posts/views.py CommentCreateView (before _resolve_comment_target — shared by both post- and expense-comment routes, so one code path gates both), payments/views.py PaymentInitiateView (inside the existing @transaction.atomic post(), before PaymentInitiateSerializer validation). Each of the same 5 views also gained a throttle_scope class attribute resolved against 5 new DEFAULT_THROTTLE_RATES scopes in settings.py: login=10/hour, register=5/hour, contact=5/hour, comment=20/hour, contribution=15/hour — additive on top of the pre-existing global AnonRateThrottle/UserRateThrottle rates (anon 100/hour, user 1000/hour) from the Phase-11 hardening pass; a view with no throttle_scope is unaffected. settings.py's REST_FRAMEWORK.DEFAULT_THROTTLE_CLASSES gained rest_framework.throttling.ScopedRateThrottle to make throttle_scope take effect.", "NEW zero-dependency frontend/components/common/Turnstile.tsx — no @marsidev/react-turnstile or similar package; loads Cloudflare's api.js script itself via a module-level singleton Promise (loadTurnstileScript()), then calls window.turnstile.render(). Props: onVerify(token), onExpire?, resetKey? (incrementing it calls window.turnstile.reset(widgetId), since each token is single-use, so a fresh token can be obtained after a failed submit). Site key resolves from NEXT_PUBLIC_TURNSTILE_SITE_KEY, defaulting to Cloudflare's published always-passes test site key (1x00000000000000000000AA) — works in dev with zero setup, mirroring the backend's test-secret default.", "Frontend wiring — added to every form that creates data without authentication, and ONLY those: login, register, contact, post-comment (+ its expense-comment twin on expenses/[id]/page.tsx, which shares CommentCreateView with target_type='expense'), and contribute's payment-initiate step. Each form disables submit until a token is issued and sends captcha_token with the request; forms that can be resubmitted after a failure (contact's 'send another', any failed submit) bump a captchaResetKey state to force Turnstile to reset and re-render, since a token is single-use and a stale one must never be left able to enable the submit button. contribute/page.tsx's canProceed gate gained `&& !!captchaToken`. Deliberately EXCLUDED from every authenticated /admin/* panel form — the single shared login form (used by both ordinary members and admins/superusers) is the panel's only entry point, so gating it there satisfies CAPTCHA-on-entry-point for the whole admin panel without ever putting a CAPTCHA inside the authenticated admin UI itself.", "frontend/lib/api.ts — authAPI.register's payload and authAPI.login's signature, postsAPI.createComment's and fundAPI.createExpenseComment's data type, paymentsAPI.initiate's payload, and contactAPI.submit's data type all gained a required captcha_token: string field/parameter. .env.docker.example/.env.example/docker-compose.yml gained TURNSTILE_SITE_KEY + TURNSTILE_SECRET_KEY (root) and docker-compose passes TURNSTILE_SECRET_KEY to the backend service + NEXT_PUBLIC_TURNSTILE_SITE_KEY as a frontend build ARG; frontend/.env.example gained NEXT_PUBLIC_TURNSTILE_SITE_KEY; frontend/Dockerfile declares/forwards the matching ARG/ENV.", "Updated info.yaml in a separate follow-up commit: quick_stats (total_reusable_ui_components 24->25, source_files_read 165->167); Phase 31 notes appended to forms.form_login/form_register/form_contact/form_contribute_initiate/form_post_comment and to api_calls.api_authAPI/api_postsAPI/api_fundAPI/api_paymentsAPI/api_contactAPI and to api_endpoints.ep_auth_register/ep_auth_login/ep_comment_create_post/ep_payment_initiate/ep_contact_submit; NEW ui_components item ui_Turnstile (common_and_animation_components, count 24->25); NEW validation_logic.subcategories.anti_abuse_protections (count 2: validate_captcha_backend, validate_rate_limiting), validation_logic.total_count 7->9.", "Verified clean: backend `python manage.py check` (0 issues); frontend `npx tsc --noEmit` (zero errors) and `npm run build` (compiled successfully). No automated test suite exists in this project (confirmed pre-existing, unrelated to this phase) — verification is limited to these static/build checks."]
