    kind: page
    route: "/{locale}/admin/members/{id}"
    note: "membersAPI.getProfile/updateProfile/changeGroup/changePassword/toggleActive/delete — profile edit form, group-change form, password-change form (gated can_change_any_password), danger zone (deactivate via AdminConfirmDialog, delete gated can_delete_member). Phase 14 — saveGroup's catch block now narrows the axios error (unknown, manual 'response'/'status' checks) and shows a dedicated bilingual toast when the backend returns 403 (MemberChangeGroupView intentionally rejects changing a superuser's group: 'گروه کاربران سوپریوزر را نمی‌توان تغییر داد.'/'The group of a superuser account cannot be changed.'), falling back to the generic 'Failed to change group' toast for other errors; also fixed the back-button's hardcoded aria-label='Back' → bilingual ({isRTL ? 'بازگشت' : 'Back'}). Phase 17 (item g) — new state `deactivateReason` (string); toggleActive() now computes `wasActive = !!target?.is_active` and calls `membersAPI.toggleActive(id, wasActive ? deactivateReason.trim() : undefined)` (reason sent only when deactivating), then locally updates `target.deactivation_reason`/`deactivated_by_name` (the latter from `currentMember?.display_name || currentMember?.full_name`) and resets `deactivateReason` on success. The deactivate AdminConfirmDialog now passes `target.is_active && <AdminTextarea label='Deactivation reason (shown to the member)' value={deactivateReason} onChange=... rows={3} />` as `children` (only shown when about to deactivate, not reactivate); its `onClose` also resets `deactivateReason`. A new amber 'Danger Zone' info block renders `target.deactivation_reason`/`target.deactivated_by_name` (Reason/By) whenever `!target.is_active && (deactivation_reason || deactivated_by_name)`. Phase 20 (part B) — the page header subtitle now also shows the member's immutable numeric ID: `{target.display_name} · #{target.member_number} · {target.group_name || '—'}`. Phase 21 — substantially extended for the new can_view_member_details permission: new `canViewDetails = canManage || hasPermission('can_view_member_details')` controls the page's top-level access guard (was canManage-only) AND wraps the ENTIRE pre-existing management grid (profile/group/password forms + danger zone) in `{canManage && (...)}`, so a details-only viewer sees the header + the 4 new read-only sections below but zero write controls. The data-fetch effect now calls the new `membersAPI.getFullProfile(id)` (gated on canViewDetails) instead of getProfile, destructuring `{member, comments, contributions, contact_messages, activity_logs}` into 5 state variables; `groupsAPI.getList()` (the group-change dropdown's source) is now fetched only `if (canManage)` — skipped entirely for read-only viewers. NEW always-visible 2-column grid of 4 categorized read-only sections (Comments/Contributions/Contact Messages/Activity Log), each: icon+title+`({count})` header, `max-h-80 overflow-y-auto` scrollable card list, an empty-state message, and per-item cards — Comments show target_label/AdminBadge(status)/text/rating/rejection_reason(if rejected)/date; Contributions show fmt(amount)+currency/AdminBadge(status)/payment_method/rejection_reason(if status==='failed')/date (note: Contribution's rejected-equivalent status value is 'failed', NOT 'rejected' — confirmed against fund/models.py's Contribution.Status); Contact Messages show contact_info/an AdminBadge with a `label` override (handled/pending, since ContactMessage has no native 'status' field)/message/date; Activity Log shows action (underscores→spaces)/target_display/created_at (toLocaleString, includes time). A local `fmt(n)` currency-formatting helper (copied verbatim from admin/contributions/page.tsx) backs the Contributions section. Phase 22 — each section's header is now `flex items-center justify-between` (title+count on the left, plus a new conditional 'View all'/'مشاهده همه' button with an ExternalLink icon on the right, shown only when the section has ≥1 item) that `router.push()`es to `/{locale}/admin/{comments|contributions|contact-messages|logs/activity}?member={id}&name={encodeURIComponent(target.full_name)}` (color matched per section: cyan/green/amber/violet); each body changed from `.map()` over the full array (inside the old `max-h-80 overflow-y-auto` div) to `.slice(0,3).map()` (inside a plain non-scrolling div) — correct recency relies on MemberFullProfileView's querysets already being `.order_by('-created_at')` (Phase 21). Phase 23 (item B) — the header subtitle now also shows a bold amber 'سوپریوزر'/'Superuser' label instead of `target.group_name` when `target.is_superuser`: `{target.display_name} · #{target.member_number} · {target.is_superuser ? <Superuser label> : (target.group_name || '—')}`. Phase 23 (item B) — when `canManage && target.is_superuser`, the ENTIRE management grid (profile/group/password/danger-zone) is now replaced by a single amber `ShieldCheck`-icon explanatory card ('این یک حساب سوپریوزر است...'/'This is a superuser account...') instead of being rendered — closes a gap where the backend already refused group-change/deactivate/delete on a superuser but the frontend still showed those forms (and the profile-edit form, which the backend ALSO now refuses for non-owners, see backend/accounts/member_views.py MemberUpdateView). For a non-superuser target, `canManage` still renders the original grid unchanged. Phase 29 — added a new member_number reassignment form, gated on `currentMember?.is_superuser` and deliberately placed OUTSIDE the `{canManage && !target.is_superuser}` block (it's its own top-level `{currentMember?.is_superuser && (...)}` section) so it stays visible/usable even when viewing another superuser's profile, where the rest of the management grid is replaced by the explanatory card. Local state `memberNumberInput`/`savingMemberNumber`; `saveMemberNumber(e)` validates client-side (must parse as an integer in [10000, 99999], else a bilingual 'warning' toast) before calling membersAPI.updateMemberNumber(id, parsed), then replaces `target` wholesale with the response body (MemberDetailSerializer data) and clears the input on success. On error it narrows the axios error (unknown, manual 'response'/'data'/'errors' checks, same defensive-narrowing style as saveGroup's 403 handling from Phase 14) to surface the backend's specific `errors.member_number[0]` message (e.g. duplicate-number) when present, falling back to a generic bilingual failure toast otherwise. Phase 30 — the profile-edit form's email AdminInput's `maxLength` changed from a hardcoded 254 to the shared `EMAIL_MAX_LENGTH` (75); no real-time validation was added here, preserving the admin panel's toast-on-submit convention. Phase 34 — superuser-profile lockdown: NEW `accessDenied` state, set when the full-profile fetch's catch block detects a 403 response status, rendering a dedicated bilingual access-denied card instead of the page's normal content. The management-grid wrapper relaxed from `canManage && !target.is_superuser` to `canManage && (!target.is_superuser || currentMember?.is_superuser)`, so a superuser viewer now sees the profile-edit and password-change forms for a superuser target — but the group-change form and the entire danger-zone block are each separately re-wrapped in their own `{!target.is_superuser && (...)}` guard INSIDE that grid, so they stay hidden even from another superuser (matches the backend's still-unconditional group/deactivate/delete block). The old single amber 'superuser account' banner was split into two conditional banners: one for a non-superuser admin (view/edit fully blocked) and one for a superuser viewing another superuser (lists what's editable — profile, password — vs. permanently blocked — group, deactivate, delete). Phase 34 — member_number bugfix: the form's AdminInput changed from `type='number'` (which silently ignores `maxLength`, the root cause of the no-length-limit bug) to `type='text'` + `inputMode='numeric'` + `pattern='[0-9]*'` + `maxLength={MEMBER_NUMBER_LENGTH}` (restores AdminInput's live counter). NEW `memberNumberError` state + `handleMemberNumberChange(value)` handler (strips non-digits, slices to 5, sets a real-time error via the new shared `memberNumberFormatError` whenever the in-progress value is short or out of range) gives this box the same real-time validation pattern as password/phone/email elsewhere on the site. `saveMemberNumber`'s catch block now narrows the axios error to extract `data.errors.member_number[0]` and sets it as `memberNumberError` (shown inline via AdminInput's `error` prop) instead of only firing a generic toast — so the backend's pre-existing uniqueness check now surfaces its duplicate-number message in real time, under the box, not just as a toast. Submit button's `disabled` also gained `|| !!memberNumberError`."
    imports:
