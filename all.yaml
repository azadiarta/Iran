meta:
  project: groupfund
  backend: django/python
  frontend: react/javascript
  db: postgresql
  deploy: railway
  payment: stripe (gbp primary, expandable: paypal, google_pay, multi-currency)

rules:
  status: [done, in-progress, pending]
  kind: [class, function, constant, type]
  before_build: check needed_by + check imports internal availability
  after_build: update exports + update imports with status

progress:
  current_phase: 3
  current_task: complete
  phases:
    1:
      name: database
      status: done
      done: [entities defined, models created, split into 5 apps, project setup, migrations verified]
    2:
      name: project structure
      status: done
      done: [groupfund project, 5 apps, settings.py, requirements.txt, .env.example]
    3:
      name: authentication system
      status: done
      done: [Member→AbstractBaseUser, MemberAuthBackend, JWT simplejwt, register/login/logout/profile views, HasGroupPermission, IsSuperuser, IsActiveMember, accounts/urls, groupfund/urls]
    4:
      name: backend API (fund, posts, logs, core)
      status: pending
      next: [serializers, views, urls for fund/posts/logs/core, payments/service]
    5:
      name: frontend
      status: pending
    6:
      name: payment integration
      status: pending
    7:
      name: deploy
      status: pending
    3:
      name: frontend
      status: pending
    4:
      name: payment integration
      status: pending
    5:
      name: deploy
      status: pending

files:

  # ─── PROJECT CONFIG ────────────────────────────────────────────────────────

  "backend/groupfund/settings.py":
    status: done
    kind: config
    key_settings:
      installed_apps: [django.contrib.admin, django.contrib.auth, django.contrib.contenttypes, django.contrib.sessions, django.contrib.messages, django.contrib.staticfiles, rest_framework, rest_framework_simplejwt.token_blacklist, corsheaders, core, accounts, fund, posts, logs]
      auth_user_model: accounts.Member
      authentication_backends: [accounts.backends.MemberAuthBackend]
      db_engine: postgresql (override: DB_ENGINE env for local sqlite testing)
      db_env_vars: [DB_NAME, DB_USER, DB_PASSWORD, DB_HOST, DB_PORT]
      media: MEDIA_ROOT=backend/media, MEDIA_URL=/media/
      static: STATIC_ROOT=backend/staticfiles, STATIC_URL=/static/
      cors: CORS_ALLOWED_ORIGINS from env
      auth_env_vars: [SECRET_KEY, DEBUG, ALLOWED_HOSTS]
      simple_jwt: ACCESS=1day, REFRESH=7days, ROTATE=true, BLACKLIST=true
      drf_default_auth: JWTAuthentication
      drf_default_permission: IsAuthenticated
    imports:
      external: [{from: os, items: [environ]}, {from: pathlib, items: [Path]}, {from: datetime, items: [timedelta]}]
      internal: []
    exports: []
    needed_by: []

  "backend/groupfund/urls.py":
    status: done
    imports:
      external: [{from: django.contrib, items: [admin]}, {from: django.urls, items: [path, include]}]
      internal:
        - {file: "backend/accounts/urls.py", items: [urlpatterns], status: available}
        - {file: "backend/core/urls.py",     items: [urlpatterns], status: pending}
        - {file: "backend/fund/urls.py",     items: [urlpatterns], status: pending}
        - {file: "backend/posts/urls.py",    items: [urlpatterns], status: pending}
        - {file: "backend/logs/urls.py",     items: [urlpatterns], status: pending}
    exports: []
    needed_by: []

  # ─── CORE APP ──────────────────────────────────────────────────────────────

  "backend/core/models.py":
    status: done
    imports:
      external: [{from: uuid, items: [uuid4]}, {from: django.db, items: [models]}]
      internal: []
    exports:
      - name: Permission
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          codename: str(50), unique
          label: str(100)
          description: str(350), blank
          created_at: datetime, auto
        meta: {ordering: [codename]}
    needed_by:
      - {file: "backend/accounts/models.py",  items: [Permission], status: available}
      - {file: "backend/core/serializers.py", items: [Permission], status: pending}
      - {file: "backend/core/views.py",       items: [Permission], status: pending}

  "backend/core/serializers.py":
    status: pending
    imports:
      external: [{from: rest_framework, items: [serializers]}]
      internal:
        - {from: "backend/core/models.py", items: [{name: Permission, status: available}]}
    exports:
      - {name: PermissionSerializer, kind: class, type: DRF ModelSerializer, fields: [id, codename, label, description]}
    needed_by:
      - {file: "backend/core/views.py",           items: [PermissionSerializer], status: pending}
      - {file: "backend/accounts/serializers.py", items: [PermissionSerializer], status: pending}

  "backend/core/views.py":
    status: pending
    imports:
      external: [{from: rest_framework.viewsets, items: [ReadOnlyModelViewSet]}]
      internal:
        - {from: "backend/core/models.py",      items: [{name: Permission, status: available}]}
        - {from: "backend/core/serializers.py", items: [{name: PermissionSerializer, status: pending}]}
    exports:
      - {name: PermissionViewSet, kind: class, type: DRF ReadOnlyModelViewSet}
    needed_by:
      - {file: "backend/core/urls.py", items: [PermissionViewSet], status: pending}

  "backend/core/urls.py":
    status: pending
    imports:
      external: [{from: rest_framework.routers, items: [DefaultRouter]}]
      internal:
        - {from: "backend/core/views.py", items: [{name: PermissionViewSet, status: pending}]}
    exports:
      - {name: urlpatterns, kind: constant, type: list}
    needed_by:
      - {file: "backend/groupfund/urls.py", items: [urlpatterns], status: in-progress}

  # ─── ACCOUNTS APP ──────────────────────────────────────────────────────────

  "backend/accounts/models.py":
    status: done
    note: "Member updated to AbstractBaseUser for AUTH_USER_MODEL + simplejwt support"
    imports:
      external:
        - {from: uuid, items: [uuid4]}
        - {from: django.db, items: [models]}
        - {from: django.core.exceptions, items: [ValidationError]}
        - {from: django.contrib.auth.models, items: [AbstractBaseUser, BaseUserManager]}
      internal:
        - {from: "backend/core/models.py", items: [{name: Permission, status: available}]}
    exports:
      - name: MemberManager
        kind: class
        type: Django BaseUserManager
        methods:
          - {signature: "create_user(password, **extra_fields) -> Member"}
          - {signature: "create_superuser(email, password, **extra_fields) -> Member", note: "terminal only — no API endpoint"}
      - name: AccessGroup
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          name: str(20), unique
          description: str(350), blank
          permissions: M2M → core.Permission
          created_at: datetime, auto
          updated_at: datetime, auto
        meta: {ordering: [name]}
      - name: Member
        kind: class
        type: Django AbstractBaseUser
        fields:
          id: UUID, pk, auto
          full_name: str(35)
          display_name: str(20), blank
          group: FK → AccessGroup, PROTECT, null=True (superuser may have no group)
          phone: str(20), unique, null=True (stored as NULL not '')
          email: EmailField, unique, null=True (stored as NULL not '')
          password: from AbstractBaseUser (set via set_password())
          last_login: from AbstractBaseUser
          is_active: bool, default True
          is_staff: bool, default False
          is_superuser: bool, default False
          created_at: datetime, auto
          updated_at: datetime, auto
        username_field: email
        required_fields: [full_name]
        validation: "clean() → phone OR email required"
        meta: {ordering: [full_name]}
    needed_by:
      - {file: "backend/fund/models.py",          items: [Member], status: available}
      - {file: "backend/posts/models.py",         items: [Member], status: available}
      - {file: "backend/logs/models.py",          items: [Member], status: available}
      - {file: "backend/accounts/backends.py",    items: [Member], status: available}
      - {file: "backend/accounts/serializers.py", items: [AccessGroup, Member], status: available}
      - {file: "backend/accounts/views.py",       items: [Member], status: available}

  "backend/accounts/backends.py":
    status: done
    imports:
      external: [{from: django.contrib.auth.backends, items: [BaseBackend]}]
      internal:
        - {from: "backend/accounts/models.py", items: [{name: Member, status: available}]}
    exports:
      - name: MemberAuthBackend
        kind: class
        type: Django auth backend
        methods:
          - {signature: "authenticate(request, credential: str, password: str) -> Member | None", note: "'@' in credential → email lookup, else phone lookup"}
          - {signature: "get_user(user_id: UUID) -> Member | None"}
    needed_by:
      - {file: "backend/groupfund/settings.py", items: [MemberAuthBackend], status: available}

  "backend/accounts/serializers.py":
    status: done
    imports:
      external:
        - {from: rest_framework, items: [serializers]}
        - {from: rest_framework_simplejwt.tokens, items: [RefreshToken]}
      internal:
        - {from: "backend/accounts/models.py", items: [{name: AccessGroup, status: available}, {name: Member, status: available}]}
        - {from: "backend/core/models.py",     items: [{name: Permission, status: available}]}
    exports:
      - name: RegisterSerializer
        kind: class
        type: DRF ModelSerializer
        fields: [full_name, display_name, phone, email, password(write_only), password_confirm(write_only)]
        validation: [phone OR email required, passwords match, phone/email unique]
        on_save: [set_password(), assign default AccessGroup]
      - name: LoginSerializer
        kind: class
        type: DRF Serializer
        fields: [credential(str — phone or email), password(write_only)]
      - name: MemberProfileSerializer
        kind: class
        type: DRF ModelSerializer
        fields: [id, full_name, display_name, email, phone, group_name, group_permissions(list), is_active, created_at]
        note: "group_permissions returns ['*'] for superuser"
    needed_by:
      - {file: "backend/accounts/views.py", items: [RegisterSerializer, LoginSerializer, MemberProfileSerializer], status: available}

  "backend/accounts/permissions.py":
    status: done
    imports:
      external: [{from: rest_framework.permissions, items: [BasePermission]}]
      internal: []
    exports:
      - {name: IsActiveMember,       kind: class,    type: DRF BasePermission, description: "passes if member.is_active=True"}
      - {name: IsSuperuser,          kind: class,    type: DRF BasePermission, description: "passes ONLY for superuser — no API endpoint creates superuser"}
      - {name: HasGroupPermission,   kind: function, signature: "(codename: str) -> Type[BasePermission]", description: "factory — returns a permission class that checks group.permissions for the given codename; superuser always passes"}
    needed_by:
      - {file: "backend/fund/views.py",  items: [HasGroupPermission, IsActiveMember], status: pending}
      - {file: "backend/posts/views.py", items: [HasGroupPermission, IsActiveMember], status: pending}
      - {file: "backend/logs/views.py",  items: [HasGroupPermission, IsSuperuser],    status: pending}

  "backend/accounts/views.py":
    status: done
    imports:
      external:
        - {from: django.contrib.auth, items: [authenticate]}
        - {from: rest_framework.permissions, items: [AllowAny, IsAuthenticated]}
        - {from: rest_framework.response, items: [Response]}
        - {from: rest_framework.views, items: [APIView]}
        - {from: rest_framework_simplejwt.tokens, items: [RefreshToken]}
        - {from: rest_framework_simplejwt.exceptions, items: [TokenError]}
      internal:
        - {from: "backend/accounts/models.py",      items: [{name: Member, status: available}]}
        - {from: "backend/accounts/serializers.py", items: [{name: RegisterSerializer, status: available}, {name: LoginSerializer, status: available}, {name: MemberProfileSerializer, status: available}]}
        - {from: "backend/logs/models.py",          items: [{name: ActivityLog, status: available}]}
    exports:
      - {name: RegisterView, kind: class, type: DRF APIView, endpoint: "POST /api/auth/register/", auth: public,         logs: registered}
      - {name: LoginView,    kind: class, type: DRF APIView, endpoint: "POST /api/auth/login/",    auth: public,         logs: login / failed_login}
      - {name: LogoutView,   kind: class, type: DRF APIView, endpoint: "POST /api/auth/logout/",   auth: required,       logs: logout, note: "blacklists refresh token"}
      - {name: ProfileView,  kind: class, type: DRF APIView, endpoint: "GET /api/auth/profile/",   auth: required}
    needed_by:
      - {file: "backend/accounts/urls.py", items: [RegisterView, LoginView, LogoutView, ProfileView], status: available}

  "backend/accounts/urls.py":
    status: done
    imports:
      external: [{from: django.urls, items: [path]}, {from: rest_framework_simplejwt.views, items: [TokenRefreshView]}]
      internal:
        - {from: "backend/accounts/views.py", items: [{name: RegisterView, status: available}, {name: LoginView, status: available}, {name: LogoutView, status: available}, {name: ProfileView, status: available}]}
    exports:
      - {name: urlpatterns, kind: constant, type: list, routes: ["POST register/", "POST login/", "POST logout/", "GET profile/", "POST token/refresh/"]}
    needed_by:
      - {file: "backend/groupfund/urls.py", items: [urlpatterns], status: available}

  # ─── FUND APP ──────────────────────────────────────────────────────────────

  "backend/fund/models.py":
    status: done
    imports:
      external: [{from: uuid, items: [uuid4]}, {from: django.db, items: [models]}]
      internal:
        - {from: "backend/accounts/models.py", items: [{name: Member, status: available}]}
    exports:
      - name: Contribution
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          contributor: FK → accounts.Member, SET_NULL, null (null = guest)
          guest_name: str(50), blank
          amount: decimal(10,2)
          currency: str(3), default GBP
          payment_method: choices [stripe, paypal, google_pay, manual, other]
          status: choices [pending, completed, failed], default pending
          notes: text, blank
          created_at: datetime, auto
          updated_at: datetime, auto
        meta: {ordering: [-created_at]}
      - name: Expense
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          withdrawn_by: FK → accounts.Member, PROTECT
          amount: decimal(10,2)
          short_reason: str(100)
          description: text, blank
          receipt_image: ImageField, upload_to receipts/, blank
          expense_date: date
          created_at: datetime, auto
          updated_at: datetime, auto
        meta: {ordering: [-expense_date]}
    needed_by:
      - {file: "backend/fund/serializers.py", items: [Contribution, Expense], status: pending}
      - {file: "backend/fund/views.py",       items: [Contribution, Expense], status: pending}
      - {file: "backend/payments/service.py", items: [Contribution], status: pending}

  "backend/fund/serializers.py":
    status: pending
    imports:
      external: [{from: rest_framework, items: [serializers]}]
      internal:
        - {from: "backend/fund/models.py", items: [{name: Contribution, status: available}, {name: Expense, status: available}]}
    exports:
      - {name: ContributionSerializer, kind: class, type: DRF ModelSerializer, fields: [id, contributor, guest_name, amount, currency, payment_method, status, notes, created_at]}
      - {name: ExpenseSerializer,      kind: class, type: DRF ModelSerializer, fields: [id, withdrawn_by, amount, short_reason, description, receipt_image, expense_date, created_at]}
      - {name: FundSummarySerializer,  kind: class, type: DRF Serializer,      fields: [total_contributions(decimal), total_expenses(decimal), balance(decimal), is_balance_visible(bool)]}
    needed_by:
      - {file: "backend/fund/views.py", items: [ContributionSerializer, ExpenseSerializer, FundSummarySerializer], status: pending}

  "backend/fund/views.py":
    status: pending
    imports:
      external:
        - {from: rest_framework.viewsets, items: [ModelViewSet]}
        - {from: rest_framework.views, items: [APIView]}
        - {from: rest_framework.response, items: [Response]}
      internal:
        - {from: "backend/fund/models.py",      items: [{name: Contribution, status: available}, {name: Expense, status: available}]}
        - {from: "backend/fund/serializers.py", items: [{name: ContributionSerializer, status: pending}, {name: ExpenseSerializer, status: pending}, {name: FundSummarySerializer, status: pending}]}
        - {from: "backend/payments/service.py", items: [{name: create_payment_intent, status: pending}, {name: handle_webhook, status: pending}]}
    exports:
      - {name: ContributionViewSet, kind: class, type: DRF ModelViewSet}
      - {name: ExpenseViewSet,      kind: class, type: DRF ModelViewSet}
      - {name: FundSummaryView,     kind: class, type: DRF APIView, description: "returns totals/balance — respects admin visibility toggle"}
      - {name: StripeWebhookView,   kind: class, type: DRF APIView, description: "receives Stripe webhook, calls handle_webhook()"}
    needed_by:
      - {file: "backend/fund/urls.py", items: [ContributionViewSet, ExpenseViewSet, FundSummaryView, StripeWebhookView], status: pending}

  "backend/fund/urls.py":
    status: pending
    imports:
      external: [{from: rest_framework.routers, items: [DefaultRouter]}, {from: django.urls, items: [path]}]
      internal:
        - {from: "backend/fund/views.py", items: [{name: ContributionViewSet, status: pending}, {name: ExpenseViewSet, status: pending}, {name: FundSummaryView, status: pending}, {name: StripeWebhookView, status: pending}]}
    exports:
      - {name: urlpatterns, kind: constant, type: list}
    needed_by:
      - {file: "backend/groupfund/urls.py", items: [urlpatterns], status: in-progress}

  # ─── POSTS APP ─────────────────────────────────────────────────────────────

  "backend/posts/models.py":
    status: done
    imports:
      external:
        - {from: uuid, items: [uuid4]}
        - {from: django.db, items: [models]}
        - {from: django.contrib.contenttypes.fields, items: [GenericForeignKey]}
        - {from: django.contrib.contenttypes.models, items: [ContentType]}
        - {from: django.core.validators, items: [MinValueValidator, MaxValueValidator]}
      internal:
        - {from: "backend/accounts/models.py", items: [{name: Member, status: available}]}
    exports:
      - name: Post
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          author: FK → accounts.Member, PROTECT
          title: str(150)
          body: text
          created_at: datetime, auto
          updated_at: datetime, auto
        meta: {ordering: [-created_at]}
      - name: PostImage
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          post: FK → Post, CASCADE
          image: ImageField, upload_to posts/
          uploaded_at: datetime, auto
      - name: Comment
        kind: class
        type: Django Model
        fields:
          id: UUID, pk, auto
          author: FK → accounts.Member, SET_NULL, null (null = guest)
          guest_name: str(50), blank
          content_type: FK → ContentType
          object_id: UUID
          content_object: GenericFK (targets Post or Expense)
          text: text
          rating: int(1-10), null
          is_approved: bool, default False
          created_at: datetime, auto
          updated_at: datetime, auto
        meta: {ordering: [-created_at], indexes: [[content_type, object_id]]}
    needed_by:
      - {file: "backend/posts/serializers.py", items: [Post, PostImage, Comment], status: pending}
      - {file: "backend/posts/views.py",       items: [Post, PostImage, Comment], status: pending}

  "backend/posts/serializers.py":
    status: pending
    imports:
      external: [{from: rest_framework, items: [serializers]}]
      internal:
        - {from: "backend/posts/models.py", items: [{name: Post, status: available}, {name: PostImage, status: available}, {name: Comment, status: available}]}
    exports:
      - {name: PostImageSerializer, kind: class, type: DRF ModelSerializer, fields: [id, image, uploaded_at]}
      - {name: PostSerializer,      kind: class, type: DRF ModelSerializer, fields: [id, author, title, body, images(nested PostImageSerializer), created_at, updated_at]}
      - {name: CommentSerializer,   kind: class, type: DRF ModelSerializer, fields: [id, author, guest_name, text, rating, is_approved, created_at]}
    needed_by:
      - {file: "backend/posts/views.py", items: [PostSerializer, PostImageSerializer, CommentSerializer], status: pending}

  "backend/posts/views.py":
    status: pending
    imports:
      external: [{from: rest_framework.viewsets, items: [ModelViewSet]}]
      internal:
        - {from: "backend/posts/models.py",      items: [{name: Post, status: available}, {name: Comment, status: available}]}
        - {from: "backend/posts/serializers.py", items: [{name: PostSerializer, status: pending}, {name: PostImageSerializer, status: pending}, {name: CommentSerializer, status: pending}]}
    exports:
      - {name: PostViewSet,    kind: class, type: DRF ModelViewSet}
      - {name: CommentViewSet, kind: class, type: DRF ModelViewSet, description: "handles approval workflow — is_approved toggle for admins"}
    needed_by:
      - {file: "backend/posts/urls.py", items: [PostViewSet, CommentViewSet], status: pending}

  "backend/posts/urls.py":
    status: pending
    imports:
      external: [{from: rest_framework.routers, items: [DefaultRouter]}]
      internal:
        - {from: "backend/posts/views.py", items: [{name: PostViewSet, status: pending}, {name: CommentViewSet, status: pending}]}
    exports:
      - {name: urlpatterns, kind: constant, type: list}
    needed_by:
      - {file: "backend/groupfund/urls.py", items: [urlpatterns], status: in-progress}

  # ─── LOGS APP ──────────────────────────────────────────────────────────────

  "backend/logs/models.py":
    status: done
    imports:
      external:
        - {from: uuid, items: [uuid4]}
        - {from: django.db, items: [models]}
        - {from: django.contrib.contenttypes.models, items: [ContentType]}
      internal:
        - {from: "backend/accounts/models.py", items: [{name: Member, status: available}]}
    exports:
      - name: ActivityLog
        kind: class
        type: Django Model
        immutable: true
        fields:
          id: UUID, pk, auto
          actor: FK → accounts.Member, SET_NULL, null (null = anonymous)
          actor_display: str(100), snapshot at action time
          action: str(100) [created_post, deleted_comment, changed_permission, login, logout, failed_login, contributed, added_expense, approved_comment, edited_post, deleted_post, changed_group, created_member, deactivated_member]
          target_type: FK → ContentType, null
          target_id: UUID, null
          target_display: str(255), snapshot at action time
          ip_address: GenericIPAddressField, null
          extra_data: JSON, null (before/after values for edits)
          created_at: datetime, auto
        meta: {ordering: [-created_at], indexes: [[actor, action], [target_type, target_id]]}
      - name: SystemLog
        kind: class
        type: Django Model
        immutable: true
        superuser_only: true
        fields:
          id: UUID, pk, auto
          level: choices [debug, info, warning, error, critical]
          source: str(100) e.g. payment.stripe / auth.login / api.contribution
          message: text
          extra_data: JSON, null (stack traces, request/response data)
          related_member: FK → accounts.Member, SET_NULL, null
          ip_address: GenericIPAddressField, null
          created_at: datetime, auto
        meta: {ordering: [-created_at]}
    needed_by:
      - {file: "backend/logs/serializers.py", items: [ActivityLog, SystemLog], status: pending}
      - {file: "backend/logs/views.py",       items: [ActivityLog, SystemLog], status: pending}

  "backend/logs/serializers.py":
    status: pending
    imports:
      external: [{from: rest_framework, items: [serializers]}]
      internal:
        - {from: "backend/logs/models.py", items: [{name: ActivityLog, status: available}, {name: SystemLog, status: available}]}
    exports:
      - {name: ActivityLogSerializer, kind: class, type: DRF ModelSerializer, fields: [id, actor_display, action, target_display, ip_address, extra_data, created_at]}
      - {name: SystemLogSerializer,   kind: class, type: DRF ModelSerializer, fields: [id, level, source, message, extra_data, related_member, ip_address, created_at]}
    needed_by:
      - {file: "backend/logs/views.py", items: [ActivityLogSerializer, SystemLogSerializer], status: pending}

  "backend/logs/views.py":
    status: pending
    imports:
      external: [{from: rest_framework.viewsets, items: [ReadOnlyModelViewSet]}]
      internal:
        - {from: "backend/logs/models.py",      items: [{name: ActivityLog, status: available}, {name: SystemLog, status: available}]}
        - {from: "backend/logs/serializers.py", items: [{name: ActivityLogSerializer, status: pending}, {name: SystemLogSerializer, status: pending}]}
    exports:
      - {name: ActivityLogViewSet, kind: class, type: DRF ReadOnlyModelViewSet, description: "superuser sees all; group admins see scoped by member"}
      - {name: SystemLogViewSet,   kind: class, type: DRF ReadOnlyModelViewSet, description: "superuser ONLY"}
    needed_by:
