      name: "comment moderation overhaul (Contribution-style status/edit/detail + My Comments page), unique 5-digit member_number, Contact Us backend persistence + admin review page"
      status: done
      done: ["part A — posts.Comment replaced its binary is_approved (Boolean) with a 3-state Comment.Status TextChoices (pending/approved/rejected, default pending) + rejection_reason (TextField, blank) — migration posts/0004_comment_status.py adds both fields, backfills status from the old is_approved (True→approved, False→pending) via RunPython, then drops is_approved entirely (no dual-field compat shim, per project convention). New per-action serializers mirroring fund/serializers.py's Contribution pattern exactly: CommentStatusSerializer (quick approve/reject, no reason), CommentAdminDetailSerializer (full detail incl. target_type/target_label SerializerMethodFields resolving Post.title or Expense.short_reason via content_object), CommentAdminEditSerializer (admin can edit text/rating/status/rejection_reason, freely re-editable in any status direction), CommentOwnerEditSerializer (author-only: text/rating, and update() unconditionally forces status back to pending + clears rejection_reason — 'editing reverts to pending review' per the explicit user requirement), MyCommentSerializer (for the new 'mine' list). New views: CommentStatusUpdateView (replaces the old CommentApproveView), CommentAdminDetailView, CommentAdminEditView (all gated can_approve_comments — chosen over can_manage_permissions specifically so an admin who can approve/reject can also attach a rejection_reason through the same permission tier, avoiding a UX inconsistency), CommentUpdateView (owner-only, 403s for non-owners), MyCommentsView (GET /comments/mine/, IsAuthenticated). CommentDeleteView's permission loosened from admin-only to IsAuthenticated + a new _can_modify_comment() helper (mirrors the existing _can_modify_post pattern) so the comment's own author can now delete it too, alongside the pre-existing admin-only path — behavior for admins is unchanged. posts/admin.py, core/dashboard_views.py (pending_comments query), and both public-facing comment-list filters (post/expense detail pages) updated from is_approved to status=='approved'. Frontend: admin/comments/page.tsx FULLY REWRITTEN to mirror admin/contributions/page.tsx (status/target_type filters, Details modal with inline approve/reject-with-reason, Edit modal with freely-editable status); 2 NEW profile sub-pages — frontend/app/[locale]/profile/comments/page.tsx ('My Comments': commentsAPI.getMine(), owner edit-reverts-to-pending, owner delete) and frontend/app/[locale]/profile/contributions/page.tsx (the pre-existing 'My Contributions' block extracted verbatim out of profile/page.tsx, which now shows just two small link-cards to the two sub-pages instead of inlining either list). help.sections gained a my_comments entry (group:member) next to my_contributions; messages/en.json+fa.json profile namespace gained status_approved/status_rejected/back_to_profile + 12 my_comments_* keys (46 keys total, was 31).", "part B — accounts.Member gained member_number (PositiveIntegerField, unique, null=True/blank=True only to permit the migration, editable=False) — assigned exactly once via a save() override calling the new staticmethod _generate_member_number() (random.randint(10000,99999) retried up to 20x against existing rows; the range alone guarantees both 'always 5 digits' and 'never starts with 0'). Migration accounts/0005_member_member_number.py adds the field then backfills every existing Member with a unique number via an equivalent RunPython routine (historical models can't call the custom save(), so the generation logic is duplicated inline in the migration — same one-off duplication pattern used by similar backfill migrations elsewhere in the project). member_number is now serialized (read-only) in MemberProfileSerializer/MemberListSerializer/MemberDetailSerializer, displayed in profile/page.tsx's header, admin/members/page.tsx (new monospace #NNNNN column) and admin/members/[id]/page.tsx's header subtitle, and searchable: MemberListView's search query was rewritten from chained qs.filter()|qs.filter() OR-ing to Q objects so an additional `if search.isdigit(): q |= Q(member_number=int(search))` exact-match clause could be added (exact match chosen over icontains specifically to avoid an IntegerField icontains cast risk that behaves differently between SQLite-dev and Postgres-prod).", "part C — the Contact Us form was previously 100% decorative (opened a mailto: link, nothing persisted server-side — confirmed zero backend model/view/url existed for it before this phase). NEW core.ContactMessage model (UUID pk, name/contact_info/message, sender FK→Member SET_NULL nullable — filled only when the submitter was authenticated, is_handled bool default False, handled_by FK→Member SET_NULL related_name='+', handled_at, created_at, ordering=['-created_at']) via migration core/0005_contactmessage.py. NEW ContactMessageCreateSerializer (strip_tags-sanitized, same pattern as fund/serializers.py's validate_message) + ContactMessageSerializer (admin read view, sender_label/handled_by_label SerializerMethodFields). NEW backend/core/contact_views.py (ContactMessageCreateView — POST, AllowAny; ContactMessageListView — GET, can_manage_contact_messages, filterable is_handled+search, paginated; ContactMessageToggleHandledView — PATCH .../toggle-handled/, same toggle pattern as accounts/member_views.py's MemberToggleActiveView) + backend/core/contact_urls.py, wired into groupfund/urls.py as /api/contact/. NEW 12th seeded permission can_manage_contact_messages (seed_initial_data.py) + matching entry in frontend/lib/permissionsMeta.ts. DashboardView gained pending_contact_messages_count (permission-gated, same badge pattern as pending_comments/pending_contributions), surfaced as a new AdminSidebar badge via adminNav.ts's badgeKey union + a new state read in AdminLayout.tsx. NEW admin page frontend/app/[locale]/admin/contact-messages/page.tsx (simpler than comments/contributions — no approve/reject, just a binary mark-handled/revert toggle + a read-only Details modal) wired into adminNav.ts. frontend/app/[locale]/contact/page.tsx's handleSubmit replaced the old mailto:-only no-op with a real async contactAPI.submit() call, with submitting/submitError state and a bilingual error box (new contact.submit_error i18n key, 15 keys total, was 14); help.sections gained a contact_messages entry (group:admin, permission can_manage_contact_messages) next to activity_log."]
    21:
