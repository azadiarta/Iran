      - {name: MemberDetailView,       kind: class, type: DRF APIView, endpoint: "GET    /api/members/{id}/",                  auth: "dynamic(member_profile_visibility) OR can_manage_permissions OR can_view_member_details (Phase 21)", note: "full detail to owner or admin (or now, a read-only member-details viewer). Phase 34 — NEW: returns 403 'Cannot view superuser profile.' whenever `member.is_superuser and not is_owner and not request.user.is_superuser`; previously this view had NO superuser-target restriction at all (the literal bug being fixed)."}
      - {name: MemberFullProfileView,  kind: class, type: DRF APIView, endpoint: "GET    /api/members/{id}/full-profile/",     auth: "can_manage_permissions OR can_view_member_details", note: "NEW (Phase 21) — aggregator returning {member, comments, contributions, contact_messages, activity_logs} for one member, each filtered to that member and serialized with the EXISTING per-action serializers (CommentAdminDetailSerializer/ContributionAdminDetailSerializer/ContactMessageSerializer/ActivityLogSerializer) via function-local imports across posts/fund/core/logs apps. Backs the admin/members/[id]/page.tsx categorized read-only sections; purely read-only, zero side effects, not logged to ActivityLog (a GET, like MemberDetailView). Phase 34 — same superuser-view 403 guard added as MemberDetailView, since this is the endpoint admin/members/[id]/page.tsx actually calls to render the profile."}
      - {name: MemberUpdateView,       kind: class, type: DRF APIView, endpoint: "PATCH  /api/members/{id}/update/",           auth: owner or can_manage_permissions, note: "Phase 23 (item B): a non-owner admin can no longer PATCH a superuser's profile — 403 'Cannot edit superuser profile.' (a superuser can still edit their own profile as owner). Phase 34 — relaxed from owner-only to owner-OR-superuser: the 403 now only fires when `not is_owner and not request.user.is_superuser`, so any superuser can edit another superuser's profile, per the user's explicit request that superuser profiles be editable by 'the superuser themselves or another superuser.'"}
      - {name: MemberChangeNumberView, kind: class, type: DRF APIView, endpoint: "PATCH  /api/members/{id}/number/",           auth: IsSuperuser, note: "NEW (Phase 29) — gated solely on the ACTING admin's own is_superuser (not the target's), unlike every other write view in this file; intentionally works even when the target member is also a superuser. Validates member_number is an int in [10000, 99999] and unique (excluding self) via plain try/except + a filter().exclude(pk=...).exists() check (no serializer), then @transaction.atomic: updates Member.member_number and rewrites the 5-digit tracking_code prefix (only `row.tracking_code[:5]`, leaving the letter + random suffix untouched) on every Comment/Contribution/ContactMessage/Post already attributed to the member, via per-model bulk_update(). Logs member_number_changed to ActivityLog with {old_number, new_number}. Returns MemberDetailSerializer(member).data. Phase 34 — fixed a real bug: the frontend box backing this endpoint had no length limit at all (type='number' silently ignores maxLength), so this view gained an explicit `len(str(raw_number)) > MEMBER_NUMBER_LENGTH` digit-count check (new shared core.validators constants MEMBER_NUMBER_LENGTH=5/MIN=10000/MAX=99999) BEFORE the int() cast, as defense-in-depth on top of the pre-existing (unchanged) range + uniqueness checks."}
      - {name: MemberChangeGroupView,  kind: class, type: DRF APIView, endpoint: "PATCH  /api/members/{id}/group/",            auth: can_manage_permissions, note: "cannot change superuser group (returns 403 — frontend admin/members/[id]/page.tsx now shows a dedicated bilingual message for this 403, Phase 14). Phase 34 — deliberately left UNCHANGED and unconditional: this is the one exception the user explicitly carved out ('بجز گروه دسترسیش') when otherwise relaxing superuser-profile access — a superuser's access group can never be changed by ANY actor, including another superuser, from the admin panel."}
      - {name: MemberToggleActiveView, kind: class, type: DRF APIView, endpoint: "PATCH  /api/members/{id}/toggle-active/",    auth: can_manage_permissions, note: "cannot deactivate superuser. Phase 15 (item U): _log(...) extra_data now includes {member_id, member_name, previous_state} so /admin/logs/activity shows exactly which member and what state it flipped from — pairs with item V (deactivated members can still log in, see accounts/backends.py). Phase 17 (item g): accepts an optional body field `reason` (str). When deactivating (is_active True→False): sets member.deactivation_reason = reason.strip() and member.deactivated_by = request.user. When reactivating (False→True): clears both back to '' / None. _log(...) extra_data also gains {reason: member.deactivation_reason}. Response is still MemberListSerializer(member).data. Phase 34 — deliberately left UNCHANGED and unconditional, same reasoning as MemberChangeGroupView: deactivation is treated as a higher-risk, less-reversible action than a profile edit, so it stays blocked for every actor including other superusers."}
      - {name: MemberDeleteView,       kind: class, type: DRF APIView, endpoint: "DELETE /api/members/{id}/delete/",           auth: can_delete_member, note: "cannot delete superuser. Phase 15 (item U): ActivityLog extra_data now includes {member_id, member_name, email, phone, group, previous_state} — a full snapshot of the member being deleted, since the row itself is gone afterwards. Phase 34 — deliberately left UNCHANGED and unconditional, same reasoning as MemberChangeGroupView/MemberToggleActiveView: deletion is irreversible and stays blocked for every actor including other superusers."}
      - {name: ChangePasswordView,     kind: class, type: DRF APIView, endpoint: "POST   /api/members/{id}/change-password/",  auth: owner(needs old_pw) or can_change_any_password, note: "cannot change superuser password. Phase 34 — relaxed identically to MemberUpdateView: the superuser-target block now only fires when `not is_owner and not request.user.is_superuser`, so any superuser can reset another superuser's password."}
    needed_by:
      - {file: "backend/accounts/member_urls.py", items: [MemberListView, MemberCreateView, MemberDetailView, MemberFullProfileView, MemberUpdateView, MemberChangeGroupView, MemberChangeNumberView, MemberToggleActiveView, MemberDeleteView, ChangePasswordView], status: available}

