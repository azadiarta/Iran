er needs the code in hand to quote it back to an admin for follow-up. Backend: MyCommentSerializer (backend/posts/serializers.py) gained 'tracking_code' to its fields list (MyContributionSerializer and ContactMessageSerializer already included it from Phase 24/25, so no other backend change was needed). Frontend: messages/en.json + fa.json gained a new profile-namespace key tracking_code_label ('Tracking code'/'کد پیگیری'); frontend/lib/api.ts's MyComment interface gained `tracking_code: string`; all three owner-facing pages — profile/comments/page.tsx, profile/contributions/page.tsx, profile/contact-messages/page.tsx — now render a small monospace `{t('tracking_code_label')}: {code}` line in each item card's info block (still admin-panel-only visibility is preserved for OTHER members' items — these pages only ever list the logged-in member's own rows via getMine()/filter(author=request.user), so no cross-member leak is introduced).", "Verified clean: python manage.py check (0 issues), python manage.py makemigrations --check --dry-run (no pending model changes — MyCommentSerializer's change is a serializer field-list addition only, tracking_code already existed on the Comment model since Phase 25's migration), npx tsc --noEmit (no errors) on lib/api.ts + the 3 profile pages + both admin pages."]
