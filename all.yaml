      note: "28 keys total (was 27). Phase 13 — added comment_name_placeholder, replacing hardcoded English 'Your name' placeholder in the guest-comment form. Phase 24 — comment_rating is now mandatory: comment_rating's label changed from 'Rating (optional)'/'امتیاز (اختیاری)' to plain 'Rating'/'امتیاز', and a NEW comment_rating_required key (client-side validation message, shown when a guest/member tries to submit a comment with no star selected) was added; the guest-comment form's default rating state is no longer 0/null."
      used_by:
