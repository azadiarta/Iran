    40:
      name: "two-tier site lockdown system (superuser-only + permission-gated) with priority enforcement, cute animated lockdown page, and superuser invisibility hardening across member list/detail and activity log"
      status: done
      done: ["Feature request — two independent admin-toggleable site-lockdown switches, both disabling the site for visitors but with different scope: (1) a superuser-only switch that disables the ENTIRE site/backend for EVERYONE except the superuser, including every other admin; (2) a permission-gated switch (new can_toggle_lockdown permission) that disables the site only for ordinary members, leaving the superuser AND every admin (even one holding just a single non-baseline permission) with full, unrestricted access to the site and admin panel. Both require a message to be entered when turned on, shown on a dedicated cute/animated full-screen lockdown page. Priority rule (explicitly requested twice): switch (1) always wins — turning it on while switch (2) is active automatically and silently turns switch (2) off first, server-side, persisted (not just shadowed by evaluation order), so it can never 'reactivate' later when switch (1) is turned back off.", "Backend storage/state — NEW backend/core/lockdown.py: 4 DefaultSetting keys (superuser_lockdown_enabled/_message, permission_lockdown_enabled/_message, all seeded false/'' in seed_initial_data.py's DEFAULT_SETTINGS) deliberately excluded from the generic settings endpoints — settings_views.py's DefaultSettingListView now does .exclude(key__in=LOCKDOWN_KEYS) and DefaultSettingUpdateView 404s on any LOCKDOWN_KEYS key — they are written ONLY through the dedicated lockdown views below, so the precedence rule can never be bypassed via the generic settings-update endpoint. get_lockdown_state() returns (kind, message) where kind is None/'superuser'/'permission', checking superuser_lockdown_enabled before permission_lockdown_enabled (superuser-kind always reported first if somehow both were on, though in practice the toggle views make that state unreachable). is_admin_member(user) mirrors frontend hasAdminAccess(): True for is_superuser, or for a member whose group holds any permission outside accounts.models.BASELINE_GROUP_PERMISSIONS.", "Backend views — NEW backend/core/lockdown_views.py, NEW backend/core/lockdown_urls.py (mounted at api/lockdown/ in groupfund/urls.py, between contact/ and the DEBUG-only media block). LockdownStatusView (GET /api/lockdown/, AllowAny) returns {kind, message} — read by every client unconditionally, even anonymous ones. SuperuserLockdownToggleView (PATCH /api/lockdown/superuser/, permission_classes=[IsAuthenticated, IsSuperuser] — the only check in the codebase gating out every admin, not just ordinary members) requires a non-empty message (sanitize_and_limit, LONG_TEXT_ADMIN_MAX_LENGTH) when enabling; if the permission-kind lockdown is currently on, it is forcibly persisted off first (with its own permission_lockdown_auto_disabled ActivityLog entry) before the superuser lockdown is turned on — this is the concrete implementation of the priority rule. PermissionLockdownToggleView (PATCH /api/lockdown/permission/, permission_classes=[IsAuthenticated, HasGroupPermission('can_toggle_lockdown')]) returns 409 if the superuser lockdown is already active, refusing to silently override it — the admin must turn that one off first. Both toggle views log superuser_lockdown_enabled/disabled or permission_lockdown_enabled/disabled to ActivityLog with the message in extra_data, and return the post-update {kind, message} wrapped in api_success(message='Lockdown updated.').", "Backend enforcement — NEW backend/core/middleware.py:SiteLockdownMiddleware, registered in groupfund/settings.py's MIDDLEWARE list right after AuthenticationMiddleware. Inspects every /api/* request (Django's own /admin/ site is untouched — already superuser-only via is_staff); exempts /api/auth/* and /api/lockdown/* by path prefix so a blocked visitor can still authenticate and every client can still poll/toggle lockdown status. When a lockdown is active: kind='superuser' allows only an authenticated is_superuser user; kind='permission' allows any is_admin_member(user) (superuser or admin). Resolves request.user manually via rest_framework_simplejwt's JWTAuthentication when unset, since simplejwt only resolves request.user at DRF's view-dispatch layer, not via Django's session-only AuthenticationMiddleware — a JWT-bearer request reaching this middleware would otherwise always appear anonymous. A blocked request gets a 503 JSON body {success:false, message, errors:null, lockdown: kind} — this is the real, server-enforced gate; the frontend overlay below is UX only.", "New seeded permission — can_toggle_lockdown added to seed_initial_data.py's PERMISSIONS dict ('Can Toggle Lockdown' — enable/disable the permission-based lockdown; superuser bypasses via IsSuperuser/HasGroupPermission's built-in superuser short-circuit, same as every other can_* permission).", "Superuser invisibility hardening (separate but related sub-requirement) — superuser must never appear in the admin member list/detail to any other admin, and superuser-actor activity-log entries must be invisible to every other admin; only the superuser can see their own such entries. backend/accounts/member_views.py: MemberListView.get() now does qs.exclude(is_superuser=True) unless request.user.is_superuser; MemberDetailView.get() and MemberFullProfileView.get() both 404 (not 403, to avoid even confirming existence) when the target is_superuser and the requester isn't that same superuser (checked by pk, before the existing is_owner/_can_view_member_details logic). backend/logs/views.py: ActivityLogListView.get() does qs.exclude(actor__is_superuser=True) unless request.user.is_superuser; ActivityLogDetailView.get() 404s if the log's actor is a superuser and the requester isn't. NOTE — the system-log requirement ('system logs related to superuser invisible to every admin') needed NO new code: SystemLogListView/SystemLogDetailView (backend/logs/views.py) have been permission_classes=[IsAuthenticated, IsSuperuser]-gated since their original creation in Phase 6, so no admin (only the superuser) could ever see ANY system log, superuser-related or not — verified via `git log -S` that this gating predates this phase and was never loosened.", "Frontend state/sync — NEW frontend/store/lockdownStore.ts: non-persisted Zustand store {kind, message, hasLoaded, setStatus} — deliberately NOT using the persist middleware (unlike authStore/langStore), since lockdown truth must always reflect the server, never a stale value replayed from localStorage on next load. NEW frontend/components/layout/LockdownSync.tsx: mounted at root (ClientLayout.tsx) unconditionally for every visitor including anonymous ones (unlike AuthSync, which only matters once a token exists) — polls lockdownAPI.getStatus() on mount and every 20s, writing into lockdownStore; safe because GET /api/lockdown/ is AllowAny and exempt from SiteLockdownMiddleware.", "Frontend lockdown page — NEW frontend/components/lockdown/LockdownPage.tsx: position:fixed;inset:0;zIndex:9999 full-screen overlay, reusing SplashScreen's established dark #0a0a0f background + amber #fbbf24 glow + radial-gradient/grid backdrop visual language, but with its own bespoke animated mascot (SleepyLock — inline SVG lock body/shackle/keyhole with closed crescent-eye paths, a breathing scale/y framer-motion loop, and 3 floating fading 'Z' letters) instead of SplashScreen's LionAndSun emblem, since this page means 'come back later' rather than 'welcome'. Shows a bilingual (en/fa, RTL-aware) title/subtitle plus the admin-entered message in a styled box (whiteSpace: pre-wrap).", "Frontend gating — frontend/app/[locale]/ClientLayout.tsx now reads useLockdownStore + useAuthStore + hasAdminAccess() to compute isBlocked with deny-by-default semantics: until authStore.hasHydrated is true, the visitor is treated as NOT exempt (mirrors the backend's is_admin_member() allowlist philosophy — never assume innocence before proof). kind='superuser' exempts only member?.is_superuser; kind='permission' exempts hasAdminAccess({isSuperuser, groupPermissions: member?.group_permissions}). The /[locale]/login route is always exempt from isBlocked (regardless of kind) so an exempt superuser/admin always has a way to sign in and lift the lockdown even while it's active. When blocked, renders ONLY <AuthSync/><LockdownSync/><LockdownPage/> — short-circuiting the rest of the tree (no Navbar/Footer/admin shell, no children). LockdownSync is now also mounted on the normal (non-blocked) admin-route and public-route render branches, alongside the pre-existing AuthSync/DeactivatedGuard.", "Frontend admin UI — NEW frontend/app/[locale]/admin/lockdown/page.tsx, added to ADMIN_NAV_ITEMS in lib/adminNav.ts (key 'lockdown', icon Lock, permission: 'can_toggle_lockdown' — superuser sees it unconditionally via isNavItemVisible()'s superuser bypass at the top of the function, before any permission check). Page renders the superuser-only toggle card ONLY when member.is_superuser (the entire card, not just the AdminToggle, so a non-superuser admin never even sees that this switch exists) using AdminToggle + AdminConfirmDialog with a required AdminTextarea (message) when turning on, calling lockdownAPI.toggleSuperuser(enabled, message). Renders the permission-gated toggle card when isSuperuser || hasPermission('can_toggle_lockdown'), same AdminToggle/AdminConfirmDialog/AdminTextarea pattern calling lockdownAPI.togglePermission, disabled (greyed out, with an explanatory amber note) whenever kind==='superuser'; its confirm handler specially recognizes a 409 response and shows a distinct 'superuser lockdown is already active' toast instead of the generic failure toast. A status banner at the top uses the existing AdminBadge component (status='inactive' for superuser-kind, 'pending' for permission-kind, 'active' for open — these three values/colors already existed in AdminBadge from prior phases, so no AdminBadge changes were needed) plus the current message in quotes. A 'no access' card is shown if the viewer is neither superuser nor can_toggle_lockdown-holder.", "Frontend plumbing — frontend/lib/api.ts gained LockdownStatus interface + lockdownAPI (getStatus/toggleSuperuser/togglePermission); frontend/lib/permissionsMeta.ts gained the can_toggle_lockdown bilingual entry (label + description, en/fa) so it renders correctly in the group-permission-checkbox UI on admin/groups.", "Verified clean: backend `python manage.py check` (0 issues), `python manage.py makemigrations --check --dry-run` (no pending model changes — lockdown state lives in DefaultSetting rows, no new model/migration needed). Frontend `npx tsc --noEmit` (zero errors) and `npm run build` (all 33 routes compiled successfully, including the new /admin/lockdown route). Smoke-tested via a temporary `npm run start` production server: curled /, /admin/lockdown, /login, /contact — all returned HTTP 200 with full real HTML (30-68KB) and no error-page markers, confirming the new ClientLayout wiring, lockdownStore, and LockdownSync/LockdownPage components introduce no runtime crashes in the default (unlocked) state. NOTE — this phase was developed concurrently with main's phases 33-39 (password strength/CAPTCHA-admin-login/watermark/emblem work); merged into main's history via a deliberate, manually-resolved git merge (not a blind auto-merge) — see the member_views.py superuser-gating reconciliation note below.", "Merge reconciliation (backend/accounts/member_views.py) — main's concurrent commit 63ba897 independently added a DIFFERENT superuser-profile guard to the same two view methods this phase touches (MemberDetailView.get(), MemberFullProfileView.get()): a 403 'Cannot view superuser profile' that exempted ANY is_superuser requester, not just the literal same account. This phase's own guard (404 'Member not found', exempting ONLY request.user.pk == member.pk) is strictly stricter and was kept as the SOLE check in both methods — main's redundant/shadowed 403 branch was removed during the merge rather than left as dead code, since the literal task requirement was 'invisible to every other admin, visible only when the logged-in user IS the superuser [themselves]' (singular account, no 'any superuser' exception). MemberUpdateView.patch() and ChangePasswordView.post() were NOT touched by this phase (only main modified them) and were left exactly as main resolved them (self-or-any-superuser, 403) — that pair governs editing, a distinct concern from this phase's visibility requirement, and changing already-merged, non-conflicting code outside this phase's stated scope was deliberately avoided."]

roadmap:
  # Task-oriented navigation index. When the user asks for a change, find the
  # matching category below FIRST. Each entry has: description (what kinds of
  # requests map here), entry_points (open these files first), typical_files
  # (the full set usually touched, ordered by layer), order_of_operations
  # (sequence to follow), gotchas (cross-file traps that cause silent bugs if
  # missed), see_also (related roadmap/shared_components/i18n keys).
  # Reading order for a new task: meta -> rules -> progress -> roadmap (this
  # section) -> shared_components (blast-radius lookup) -> i18n (translation
  # lookup) -> files (full per-file index, consult only the specific files
  # named above).

  change_ui_copy_translation:
    description: "Change visible text/labels on PUBLIC pages (English and/or Persian). Admin-panel copy uses a different mechanism — see i18n.admin_panel_i18n_policy."
    entry_points:
      - "frontend/messages/en.json"
      - "frontend/messages/fa.json"
    typical_files:
      - "frontend/messages/en.json"
      - "frontend/messages/fa.json"
      - "the consuming page/component — see i18n.namespaces.<namespace>.used_by for the exact file"
    order_of_operations:
      - "1. Identify the i18n namespace the text belongs to (see i18n.namespaces — each namespace lists its keys and consumer files with the exact useTranslations() call pattern)."
      - "2. Edit the key under that namespace in BOTH en.json and fa.json (see i18n.invariant — a key present in only one locale falls back to the raw key-path string at runtime in the OTHER locale, producing visibly broken UI)."
      - "3. If ADDING a new key: match the consuming file's translator pattern — most pages call useTranslations('namespace') then t('key'); landing page.tsx and contribute/page.tsx use a root-level useTranslations() and call t('namespace.key') instead."
      - "4. If the text is in the ADMIN panel (frontend/app/[locale]/admin/**), it is an inline `isRTL ? '...' : '...'` ternary, NOT a messages/*.json key — edit the .tsx file directly (see i18n.admin_panel_i18n_policy). Do not add admin copy to messages/*.json."
    gotchas:
      - "fa.json MUST mirror en.json's key structure EXACTLY (i18n.invariant) — adding/renaming/removing a key in only one file breaks the OTHER locale's UI for that string (shows the raw key path)."
      - "the `common` namespace (loading/error/retry/close/prev/next/page_info/lightbox_hint/submitting) exists in both en.json/fa.json. As of Phase 13, prev/next/page_info/lightbox_hint/submitting ARE consumed (see i18n.namespaces.common.used_by — posts list pagination, posts/[id] and expenses[/[id]] comment-submit buttons + ImageLightbox hint); loading/error/retry/close remain UNUSED (verified via grep) — safe to extend, but don't assume those 4 are read anywhere."
      - "`help.sections` is a NESTED object (per-key sub-objects), not a flat string key — see i18n.namespaces.help for its inner shape before editing."
    see_also: ["i18n", "change_public_page_layout_content"]

  change_heritage_emblem_visuals:
    description: >
      User wants to change how the Lion-and-Sun / Faravahar / geometric
      pattern / Iranian-heritage-landmark visuals look. LionAndSun and
      FaravaharSimple are <img> tags pointing at Public Domain SVG assets in
      frontend/public/symbols/ (lion-and-sun.svg, faravahar.svg).
      GeometricPattern and the 5 heritage-landmark icons (PersepolisIcon,
      PasargadaeIcon, NaqsheRostamIcon, HafezIcon, SaadiIcon) are hand-drawn
      inline `currentColor` SVGs defined directly in IranianSymbols.tsx.
    entry_points:
      - "frontend/components/animations/IranianSymbols.tsx"
      - "frontend/public/symbols/"   # lion-and-sun.svg, faravahar.svg
    typical_files:
      - "frontend/components/animations/IranianSymbols.tsx"   # source of truth for all 9 exports + shared internal GlowPulse helper
      - "frontend/public/symbols/lion-and-sun.svg"             # LionAndSun source asset (PD, Wikimedia Commons "Lion and Sun.svg")
      - "frontend/public/symbols/faravahar.svg"                # FaravaharSimple source asset (PD, Wikimedia Commons "Faravahar-Gold.svg")
      - "frontend/public/branding/ipa-birmingham.jpg"          # HandsEmblem source asset (Phase 38) — same file as the sitewide watermark (SiteBackground.tsx), shown here at full opacity instead
      - "frontend/app/[locale]/page.tsx"                       # landing — uses ALL 9 exports (LionAndSun, HandsEmblem, GeometricPattern, FaravaharSimple, PersepolisIcon, PasargadaeIcon, NaqsheRostamIcon, HafezIcon, SaadiIcon)
      - "frontend/components/layout/Navbar.tsx"                # HandsEmblem only (Phase 38 — no longer LionAndSun)
      - "frontend/components/layout/Footer.tsx"                # LionAndSun only
      - "frontend/components/layout/AdminSidebar.tsx"           # LionAndSun only
      - "frontend/components/layout/AdminTopBar.tsx"            # LionAndSun only
      - "frontend/components/admin/AdminTable.tsx"              # LionAndSun (empty-state icon)
      - "frontend/components/animations/SplashScreen.tsx"       # LionAndSun + GeometricPattern
      - "frontend/components/animations/PageTransition.tsx"     # LionAndSun — but UNUSED (see shared_components.IranianSymbols note)
    order_of_operations:
      - "1. Read shared_components.IranianSymbols for the FULL per-export needed_by list before editing — do not assume all consumers use all exports."
      - "2. LionAndSun/FaravaharSimple are thin <img> wrappers around frontend/public/symbols/*.svg, sized via a fixed aspect-ratio constant (LION_AND_SUN_RATIO ~1.385 / FARAVAHAR_RATIO ~2.123) — to change the artwork itself, replace the SVG file in frontend/public/symbols/ (keep it Public Domain / properly licensed) and update the ratio constant if the new file's intrinsic viewBox aspect ratio differs. LionAndSun wraps its <img> in a size×size flex-centered <div> so the size×size bounding-box assumption all 20 consumers rely on still holds even though the source artwork itself is not square."
      - "3. GeometricPattern and the 5 heritage-landmark icons (PersepolisIcon/PasargadaeIcon/NaqsheRostamIcon/HafezIcon/SaadiIcon) are hand-drawn inline `currentColor` SVGs (viewBox 0 0 100 100) — edit the <path>/<rect>/etc. elements directly in IranianSymbols.tsx. `animated=true` wraps any of these (except GeometricPattern) in the shared internal GlowPulse helper (2s drop-shadow pulse); GeometricPattern instead does a continuous 360°/20s rotation when animated."
      - "4. If adding a NEW symbol/export: add it to IranianSymbols.tsx, add a needed_by entry under shared_components.IranianSymbols.exports for the new export, and update files['frontend/components/animations/IranianSymbols.tsx'].exports."
    gotchas:
      - "LionAndSun is used in 18 places (16 direct app/component consumers + SplashScreen + PageTransition) — changing its prop signature (size/className/animated) breaks all 18. The {size?, className?, animated?} SymbolProps signature was preserved across the <img>-based rewrite, so no consumer needed changes. As of Phase 38, Navbar.tsx and page.tsx's hero-foreground icon use HandsEmblem instead (same SymbolProps signature) — see shared_components.IranianSymbols.exports.HandsEmblem."
      - "PageTransition.tsx imports LionAndSun and is itself UNUSED (zero importers, orphaned despite status:done) — editing it has NO visible effect; do not waste effort there unless also wiring it up into ClientLayout.tsx."
      - "The 5 heritage-landmark icons are used ONLY on the landing page (frontend/app/[locale]/page.tsx), as small/large low-opacity (opacity 0.05-0.07) absolutely-positioned background decorations in the Hero, Stats Bar, Recent Posts, How It Works, and CTA sections (`pointer-events-none select-none`, `hidden sm:block`/`hidden md:block`, logical `start`/`end` positioning for RTL) — they are intentionally NOT a page focal point. There is no longer a dedicated 'Iranian Heritage' grid section (removed; the `heritage` i18n namespace was removed from en.json/fa.json along with it — see i18n.invariant)."
      - "frontend/public/symbols/*.svg are referenced via plain <img src=\"/symbols/...svg\">, NOT next/image — avoids next.config.mjs dangerouslyAllowSVG changes. If migrating to next/image, dangerouslyAllowSVG + a CSP would need to be configured."
    see_also: ["shared_components.IranianSymbols", "change_public_page_layout_content", "change_navbar_footer"]

  add_admin_page_or_feature:
    description: "Add a new page/section to the admin panel (frontend/app/[locale]/admin/**) or extend an existing one with new functionality."
    entry_points:
      - "frontend/app/[locale]/admin/<closest-existing-similar>/page.tsx"   # use as a template
      - "frontend/lib/adminNav.ts"
    typical_files:
      - "frontend/app/[locale]/admin/<new>/page.tsx"            # new page
      - "frontend/lib/adminNav.ts"                               # ADMIN_NAV_ITEMS entry — single source of truth for AdminSidebar's nav link and admin/page.tsx's AccessSummaryCard; admin/layout.tsx's route guard uses hasAdminAccess()/BASELINE_PERMISSIONS (Phase 17), not ADMIN_NAV_ITEMS directly
      - "frontend/lib/api.ts"                                     # new API namespace + TS types, if a new backend endpoint is needed
      - "backend/<app>/views.py + backend/<app>/urls.py + backend/groupfund/urls.py"  # new backend endpoint, if needed
      - "frontend/app/[locale]/help/page.tsx"                     # add the new page to the permission->help-section mapping (help.sections), if relevant
    order_of_operations:
      - "1. Pick the closest existing admin page as a template — see shared_components.admin_component_library for which AdminTable/AdminModal/AdminConfirmDialog/AdminBadge/admin/fields/* components to reuse. Do NOT build new table/modal/form primitives."
      - "2. If a new backend endpoint is needed: add a view to backend/<app>/views.py, wire it in backend/<app>/urls.py + backend/groupfund/urls.py, extend the serializer in backend/<app>/serializers.py."
      - "3. Add a new API namespace/function + TS types to frontend/lib/api.ts."
      - "4. Create frontend/app/[locale]/admin/<new>/page.tsx — copy the structure of a similar page (imports from admin_component_library + useAuthStore + useToastStore), gate on the relevant permission via hasPermission()/member.is_superuser (see shared_components.useAuthStore for the pattern used by all 13 existing admin pages)."
      - "5. Add a new entry to ADMIN_NAV_ITEMS in frontend/lib/adminNav.ts ({key, href, label:{en,fa}, icon, permission?: string | string[], superuserOnly?, divider?, badgeKey?}). `permission` as an array means 'any of these is sufficient' (see the 'expenses' item, which uses ['can_view_balance','can_expense'])."
      - "6. If the page needs a NEW permission codename, follow roadmap.change_permissions_access_groups for the full propagation (backend permissions.py + seed_initial_data + frontend gating + adminNav.ts entry + help page mapping)."
      - "7. Admin panel pages do NOT use messages/*.json — all copy is inline isRTL ternaries (see i18n.admin_panel_i18n_policy)."
    gotchas:
      - "Every admin page renders inside AdminLayout.tsx (mounted by the admin/layout.tsx route guard) — AdminToastContainer is already mounted there, so useToastStore().show(...) just works; do not re-mount AdminToastContainer on the new page."
      - "admin/layout.tsx's route guard calls hasAdminAccess({isSuperuser, groupPermissions}) from frontend/lib/adminNav.ts (Phase 17, items c/e/f) — a member passes if isSuperuser OR their group has at least one permission codename NOT in BASELINE_PERMISSIONS (the 4 'default plan' codenames: can_comment/can_contribute/can_view_balance/can_view_posts). A brand-new permission codename referenced by a new ADMIN_NAV_ITEMS entry is AUTOMATICALLY 'outside BASELINE_PERMISSIONS' (unless you add it to BASELINE_PERMISSIONS too), so it grants admin access on its own — no separate admin/layout.tsx edit needed."
      - "AdminTable has no shared column-definition file — column.render functions are defined inline per-page (7 existing AdminTable-based pages each define their own columns); copying a similar page's columns is the fastest path."
    see_also: ["change_admin_component_library", "change_permissions_access_groups", "change_db_model_field", "shared_components.admin_component_library", "shared_components.adminNav"]

  manage_site_lockdown:
    description: "Change anything about the two-tier site lockdown feature (Phase 40): the superuser-only switch, the can_toggle_lockdown permission-gated switch, the priority rule between them, the SiteLockdownMiddleware enforcement, the lockdown page UI, or the superuser-invisibility hardening that shipped alongside it."
    entry_points:
      - "backend/core/lockdown.py"           # get_lockdown_state() / is_admin_member() — the two pure-logic helpers everything else calls
      - "frontend/app/[locale]/admin/lockdown/page.tsx"
    typical_files:
      - "backend/core/lockdown.py"                      # DefaultSetting keys + get_lockdown_state() + is_admin_member()
      - "backend/core/lockdown_views.py"                # LockdownStatusView / SuperuserLockdownToggleView / PermissionLockdownToggleView — priority rule lives in SuperuserLockdownToggleView.patch()
      - "backend/core/lockdown_urls.py"
      - "backend/core/middleware.py"                     # SiteLockdownMiddleware — the actual server-side enforcement; the frontend page is UX only
      - "backend/groupfund/settings.py"                  # MIDDLEWARE registration (must stay after AuthenticationMiddleware)
      - "backend/core/settings_views.py"                 # LOCKDOWN_KEYS exclusion from the generic settings list/update endpoints
      - "backend/core/management/commands/seed_initial_data.py"   # can_toggle_lockdown permission + 4 lockdown_* DefaultSetting seed rows
      - "frontend/store/lockdownStore.ts"                # non-persisted Zustand store — never add `persist` here, lockdown truth must always come from the server
      - "frontend/components/layout/LockdownSync.tsx"    # unconditional polling (runs for anonymous visitors too, unlike AuthSync)
      - "frontend/components/lockdown/LockdownPage.tsx"  # the full-screen animated overlay shown to a blocked visitor
      - "frontend/app/[locale]/ClientLayout.tsx"         # isBlocked deny-by-default gating logic + the /login exemption
      - "frontend/app/[locale]/admin/lockdown/page.tsx"  # the two toggle cards (superuser-only card is conditionally rendered, not just conditionally enabled)
      - "frontend/lib/api.ts"                            # LockdownStatus + lockdownAPI
      - "frontend/lib/adminNav.ts"                       # ADMIN_NAV_ITEMS 'lockdown' entry (permission: 'can_toggle_lockdown')
      - "backend/accounts/member_views.py"               # superuser-invisibility: MemberListView/MemberDetailView/MemberFullProfileView
      - "backend/logs/views.py"                          # superuser-invisibility: ActivityLogListView/ActivityLogDetailView (SystemLog views were already IsSuperuser-only pre-existing, untouched)
    order_of_operations:
      - "1. Server-side enforcement and client-side gating are TWO SEPARATE mechanisms that must always agree — SiteLockdownMiddleware (backend/core/middleware.py) is the real gate; ClientLayout.tsx's isBlocked is UX only. A change to who is exempt MUST be made in BOTH is_admin_member() (backend/core/lockdown.py) AND hasAdminAccess() (frontend/lib/adminNav.ts) — they are independent re-implementations of the same allowlist rule, not shared code."
      - "2. The priority rule (superuser-kind always wins) is enforced in exactly one place: SuperuserLockdownToggleView.patch() forcibly persists permission_lockdown_enabled=false before turning superuser_lockdown_enabled=true on. Do not add a second enforcement point (e.g. in get_lockdown_state()) — that would mask bugs instead of fixing them at the source."
      - "3. Lockdown state lives entirely in 4 DefaultSetting rows (LOCKDOWN_KEYS in core/lockdown.py), not a dedicated model — there is no migration to run when changing this feature's *behavior*, only when changing its *shape* (e.g. adding a 3rd lockdown kind)."
      - "4. Both /api/auth/* and /api/lockdown/* must stay in SiteLockdownMiddleware's _EXEMPT_PREFIXES no matter what else changes — breaking either one would permanently lock out even the superuser (no way to log in or to see/lift the lockdown)."
    gotchas:
      - "The superuser-only toggle card in admin/lockdown/page.tsx is wrapped in `{isSuperuser && (...)}` — an entire conditional render, not just a disabled/hidden AdminToggle — so a non-superuser admin never learns the switch exists at all, matching the 'must NOT be shown at all' requirement."
      - "rest_framework_simplejwt does not populate request.user via Django's AuthenticationMiddleware (session-only) — SiteLockdownMiddleware must resolve a JWT-bearer request's user manually (see _resolve_user()). Any new middleware placed BEFORE SiteLockdownMiddleware that also needs request.user has this same trap."
      - "DefaultSettingListView/DefaultSettingUpdateView exclude LOCKDOWN_KEYS — if a future generic 'export all settings' or 'reset settings' admin feature is added, it must also explicitly exclude LOCKDOWN_KEYS or it will silently expose/let-admins-edit lockdown state, bypassing the toggle views' validation and the priority rule entirely."
    see_also: ["add_admin_page_or_feature", "change_permissions_access_groups", "change_zustand_store"]

  change_navbar_footer:
    description: >
      Change the public navbar (logo/branding, nav links, language switcher,
      auth dropdown) or footer (links, copyright, dedication line).
    entry_points:
      - "frontend/components/layout/Navbar.tsx"
      - "frontend/components/layout/Footer.tsx"
    typical_files:
      - "frontend/components/layout/Navbar.tsx"
      - "frontend/components/layout/Footer.tsx"
      - "frontend/app/[locale]/ClientLayout.tsx"   # composes Navbar+Footer; admin routes skip both
      - "frontend/messages/en.json + frontend/messages/fa.json"  # nav.* and footer.* namespaces
      - "frontend/store/authStore.ts"   # auth dropdown state (isAuthenticated, member, hasPermission)
      - "frontend/store/langStore.ts"   # language switcher state
    order_of_operations:
      - "1. For LINK/label text changes: edit nav.* / footer.* keys in BOTH messages/en.json and messages/fa.json (see i18n EN/FA-pair invariant)."
      - "2. For new nav items: add the Link in Navbar.tsx (desktop + mobile drawer — two separate render blocks), add the i18n key pair, and if the link should also appear in AdminSidebar.tsx for parity, check that too."
      - "3. For branding/logo changes: Footer.tsx renders <LionAndSun size=... />; Navbar.tsx renders <HandsEmblem size=... /> (Phase 38 — swapped from LionAndSun to the org's real emblem photo, frontend/public/branding/ipa-birmingham.jpg) — see shared_components.IranianSymbols for the full per-export consumer/blast-radius lists if changing either component itself vs just a call site's props."
      - "4. ClientLayout.tsx conditionally renders Navbar/Footer only on non-/admin routes — if adding a NEW top-level route that should behave like 'admin' (no public chrome), update the isAdminRoute check in ClientLayout.tsx."
    gotchas:
      - "Navbar has a SEPARATE mobile-drawer render block — nav-link changes must be made in BOTH places or mobile/desktop will diverge."
      - "Footer's dedication line (footer.dedication) is a deliberate fixed bilingual line — do not remove without confirming with the user (project-specific memorial text)."
      - "AdminTopBar.tsx (admin equivalent) duplicates Navbar's language-switcher and logout logic (per its file note: 'mirrors Navbar handleLanguageSwitch'/'mirrors Navbar handleLogout') — changes to Navbar's auth/lang logic should be mirrored there if AdminTopBar should stay in sync."
    see_also: ["shared_components.useLangStore", "shared_components.useAuthStore", "i18n.namespaces.nav", "i18n.namespaces.footer"]

  change_public_page_layout_content:
    description: "Change a public-facing page's layout/content/behavior (landing, login, register, posts, posts/[id], expenses, contribute, profile, contact, help, forbidden, unavailable, not-found)."
    entry_points:
      - "frontend/app/[locale]/<page>/page.tsx"
    typical_files:
      - "the target page.tsx — see its files entry for current imports/i18n_namespace/note"
      - "frontend/messages/en.json + frontend/messages/fa.json   # if changing copy — see change_ui_copy_translation"
      - "frontend/store/authStore.ts   # if changing auth-conditional rendering — see shared_components.useAuthStore for which fields this page already destructures"
      - "frontend/components/animations/IranianSymbols.tsx   # if the page renders LionAndSun/other symbols — see shared_components.IranianSymbols"
    order_of_operations:
      - "1. Read the target page's files.<path> entry for its current imports/i18n_namespace/note before editing."
      - "2. For copy/text changes: follow roadmap.change_ui_copy_translation (EN+FA pair)."
      - "3. For auth-conditional changes: check shared_components.useAuthStore's needed_by entry for this page to see which fields (member/isAuthenticated/hasPermission/...) it already uses."
      - "4. For visual/symbol changes: check shared_components.IranianSymbols for this page's specific export usage (most pages use ONLY LionAndSun; landing page.tsx uniquely uses all 4 exports)."
      - "5. forbidden/unavailable/not-found pages are interceptor REDIRECT TARGETS (axios 403/503/404 in frontend/lib/api.ts) — changing their ROUTE path requires updating the interceptor's router.replace()/redirect target too."
    gotchas:
      - "landing page.tsx (frontend/app/[locale]/page.tsx) is the single largest/most complex public page — multi-namespace root translator (landing/posts namespaces), all 8 IranianSymbols exports, AND auth-conditional CTA blocks. Treat a landing-page change as touching multiple roadmap categories at once."
      - "posts/[id]/page.tsx and expenses/page.tsx both use next/image — if NEXT_PUBLIC_MEDIA_URL changes, check next.config.mjs remotePatterns (see change_deployment_env_config)."
      - "forbidden/unavailable/not-found have `imports.internal: []` — they are intentionally dependency-free interceptor targets; don't add app-wide state (authStore/etc.) to them without checking why the interceptor routes here while unauthenticated."
    see_also: ["change_ui_copy_translation", "change_heritage_emblem_visuals", "change_zustand_store"]

  add_sitewide_watermark:
    description: >
      Add/change a sitewide background image/watermark that shows behind
      every route (public AND /admin/**), without stretching/cropping the
      source image and without distracting from page content. Added Phase
      35 (the Iranian Political Association (Birmingham) emblem,
      frontend/public/branding/ipa-birmingham.jpg, at opacity 0.07).
    entry_points:
      - "frontend/components/layout/SiteBackground.tsx"
      - "frontend/app/[locale]/layout.tsx"
    typical_files:
      - "frontend/components/layout/SiteBackground.tsx"   # the watermark div itself — see its files entry
      - "frontend/app/[locale]/layout.tsx"                 # mounts <SiteBackground /> as the first child of <body>, ONCE, for every route
      - "frontend/styles/admin.css"                        # --admin-bg must be semi-transparent (rgba), not opaque, or the admin shell fully occludes the watermark
      - "frontend/public/branding/<image>"                 # the source image asset
    order_of_operations:
      - "1. Place the source image under frontend/public/branding/ (new dir, sibling to the existing frontend/public/symbols/)."
      - "2. SiteBackground.tsx: position:fixed, inset:0, pointer-events-none, aria-hidden, zIndex:-1 (NOT 0/unset — negative z-index is required so it paints behind in-flow page content but still in front of <body>'s own background-color; see CSS2.1 stacking-context rules), backgroundImage url(...), backgroundSize:'contain' (preserves aspect ratio — NEVER 'cover' or 'auto' if the requirement is 'no stretching/cropping'), low opacity (0.05-0.1 range used so far)."
      - "3. Mount <SiteBackground /> exactly ONCE, as the first child inside <body> in app/[locale]/layout.tsx (the single shared root layout for every route, public and admin alike — see ClientLayout.tsx's conditional branching). Do NOT add it per-page."
      - "4. Audit every page.tsx for a redundant full-page opaque wrapper background (this codebase's pages each independently repaint bg-[#0a0a0f]/style={{background:'#0a0a0f'}} — harmless on its own since it matches body's own color, but it fully occludes anything placed behind it). Remove these wrappers' background — removing a color identical to what's already behind it cannot cause a visual regression, but leaving it in place will make the watermark invisible on that page."
      - "5. For the admin panel specifically: change frontend/styles/admin.css's --admin-bg from an opaque hex to a semi-transparent rgba() of the same color (e.g. #05050a -> rgba(5,5,10,0.93)) — the admin shell is ONE shared layout component (.admin-shell), not a per-page pattern, so this single CSS variable edit covers every admin screen."
      - "6. Verify with Playwright screenshots (see /tmp/symcheck/ harness convention used in past sessions) across both locales (en/fa, LTR/RTL), scrolled and unscrolled, on at least one hero-style page and one modal/card-style page."
    gotchas:
      - "Phase 35 found AND removed 18 separate page.tsx files with this exact redundant opaque-wrapper pattern (register, posts, contact, login, contribute, forbidden, unavailable, not-found, help, expenses, contributions, profile + its 3 sub-pages, landing page.tsx, posts/[id], expenses/[id] — the last two had it TWICE each, two different wrapping divs per file). If a NEW page is added later with the same `bg-[#0a0a0f]` wrapper habit, it will silently defeat the watermark on that one page only — grep for `bg-\\[#0a0a0f\\]\\|background: '#0a0a0f'` across app/**/*.tsx to re-audit."
      - "Credential-gated verification: the admin-panel half of this change was verified by code-review (same opaque->semi-transparent mechanism, already proven on the public site) rather than a live Playwright screenshot, because locating admin/superuser login credentials to drive a headless browser into /admin/** is out of scope for an unattended agent session and was correctly refused by the Claude Code auto mode classifier as an unrelated credential-search pattern. A human with admin credentials should do one visual sanity check on /admin/** after any future change to this area."
      - "z-index:-1 is load-bearing — z-index:0 or no z-index would put the watermark in the SAME stacking context as in-flow content and it would paint OVER (not behind) some elements depending on DOM order, not behind everything as intended."
    see_also: ["change_public_page_layout_content", "change_admin_component_library", "change_navbar_footer"]

  change_db_model_field:
    description: >
      Add/remove/rename a field on a Django model (Member, AccessGroup,
      Contribution, Expense, Post, Comment, DefaultSetting, etc.) and
      propagate the change end-to-end.
    entry_points:
      - "backend/<app>/models.py"   # accounts/fund/posts/core/logs/payments
    typical_files:
      - "backend/<app>/models.py"            # 1. field definition
      - "backend/<app>/migrations/"          # 2. makemigrations + migrate
      - "backend/<app>/serializers.py"       # 3. add/remove field in serializer fields list
      - "backend/<app>/views.py (or member_views.py / group_views.py / settings_views.py / dashboard_views.py)"  # 4. if field affects filtering/ordering/permissions
      - "backend/<app>/admin.py"             # 5. Django admin list_display/fields if surfaced there
      - "frontend/lib/api.ts"                # 6. update the matching TS type (e.g. Member, Contribution, Expense, PostDetail, etc. in `types` export)
      - "frontend/app/[locale]/**/page.tsx"  # 7. any page rendering/editing that field
      - "frontend/app/[locale]/admin/**/page.tsx"  # 8. any AdminTable column / AdminModal form field exposing it
      - "frontend/messages/en.json + frontend/messages/fa.json"  # 9. new label strings, EN+FA pair (see i18n section)
    order_of_operations:
      - "1. Edit backend/<app>/models.py field definition."
      - "2. Run makemigrations (creates backend/<app>/migrations/000X_*.py) — check files['backend/<app>/models.py'].needed_by for which serializers/views reference the model already."
      - "3. Update backend/<app>/serializers.py — add/remove the field name in `fields = [...]` (or Meta.fields)."
      - "4. Check backend/<app>/views.py for any filter_fields/ordering_fields/search_fields referencing the old field name."
      - "5. Update backend/<app>/admin.py jazzmin list_display/fieldsets if the field should be visible in /admin/."
      - "6. Update the corresponding TS type in frontend/lib/api.ts `types` export (e.g. MemberDetail, Expense, Contribution, PostDetail, AccessGroup, DefaultSettingItem)."
      - "7. Grep files[].needed_by for that TS type to find every frontend page/component consuming it, and update each (form fields, table columns, display)."
      - "8. If the field needs a new UI label, add EN+FA i18n keys per the i18n section's update invariant (or, for admin pages, edit the inline isRTL string directly — see i18n.admin_panel_i18n_policy)."
    gotchas:
      - "backend has full imports/exports/needed_by graphs — ALWAYS check needed_by on the model file first; frontend's lib/api.ts.exports.types entry is the single choke point for ALL frontend model shapes."
      - "Renaming a field requires checking BOTH the serializer `fields` list AND any `source=` kwargs, AND any frontend object destructuring (`const { old_name } = ...`)."
      - "Admin AdminTable columns are defined inline per-page (column.render functions) — there is no shared column-definition file, so each admin page touching that model must be checked individually (see shared_components.admin_component_library.components.AdminTable.needed_by for which pages use AdminTable)."
    see_also: ["add_admin_page_or_feature", "change_permissions_access_groups"]

  change_permissions_access_groups:
    description: "Change permission codenames, default groups/access levels, or who-can-do-what logic across backend and frontend."
    entry_points:
      - "backend/accounts/permissions.py"
      - "backend/core/utils.py"
    typical_files:
      - "backend/accounts/permissions.py"   # HasGroupPermission, IsSuperuser, IsActiveMember permission classes
      - "backend/core/utils.py"             # get_default_group_id
      - "backend/core/management/commands/seed_initial_data.py"  # Permission/AccessGroup/DefaultSetting seed rows — the ONLY place new permission codenames get created in the DB (11 codenames as of Phase 17 — can_manage_env_vars removed; see files['frontend/lib/permissionsMeta.ts'] for the bilingual list)
      - "backend/accounts/models.py"        # AccessGroup model, Member.group FK
      - "backend/<app>/views.py"            # permission_classes=[HasGroupPermission('<codename>')] on each view
      - "frontend/store/authStore.ts"       # hasPermission(codename) — public_interface
      - "frontend/components/admin/fields/AdminPermissionCheckbox.tsx"  # permission grid UI; hardcoded always-on entries can_contribute/can_comment
      - "frontend/app/[locale]/admin/groups/page.tsx"  # group CRUD + permission grid
      - "frontend/lib/adminNav.ts"          # ADMIN_NAV_ITEMS[].permission drives AdminSidebar's per-item gating; admin/layout.tsx's route guard uses hasAdminAccess()/BASELINE_PERMISSIONS instead (Phase 17, items c/e — was ADMIN_PERMISSIONS in Phase 15, items B/C/L)
      - "frontend/app/[locale]/help/page.tsx"          # permission -> help-section mapping, kept in parity with adminNav.ts's gating
    order_of_operations:
      - "1. Add the new permission codename to backend/core/management/commands/seed_initial_data.py (Permission row) — this is the ONLY seeding path; a codename not seeded here does not exist in the DB on fresh installs."
      - "2. Apply the permission to relevant backend/<app>/views.py via HasGroupPermission('<codename>') in permission_classes."
      - "3. If the codename should be assignable via the admin UI: AdminPermissionCheckbox.tsx's PermissionOption list is populated dynamically from permissionsAPI.getList() (backend/core/views.py PermissionListView) — no frontend hardcoding needed UNLESS it's one of the 'always-on locked' entries (can_contribute/can_comment), which ARE hardcoded via AdminPermissionCheckbox.tsx's `alwaysOn` prop default."
      - "4. Add frontend gating via useAuthStore().hasPermission('<codename>') (see shared_components.useAuthStore for the ~23 files already doing this — follow the same `member.is_superuser` bypass pattern used everywhere)."
      - "5. If the new permission should let a member into the admin panel at all AND/OR unlock a specific nav item, set/extend that item's `permission` field (string, or string[] meaning 'any of these is sufficient') on the relevant entry in ADMIN_NAV_ITEMS (frontend/lib/adminNav.ts). Separately (Phase 17), admin/layout.tsx/Navbar.tsx's hasAdminAccess() check is driven by BASELINE_PERMISSIONS, NOT by ADMIN_NAV_ITEMS — a brand-new permission codename outside BASELINE_PERMISSIONS automatically grants admin-panel access to any group that has it, with no separate edit needed."
      - "6. Add the new permission to help/page.tsx's help.sections mapping (kept in parity with adminNav.ts's gating per existing convention)."
    gotchas:
      - "is_superuser ALWAYS bypasses hasPermission checks on both frontend AND backend (IsSuperuser permission class) — every gated page/view has a parallel `member.is_superuser` OR-condition; forgetting it means superusers could lose access to a feature they should always have."
      - "AdminPermissionCheckbox.tsx hardcodes can_contribute/can_comment as 'always included regardless of what's checked' via its `alwaysOn` prop default — these 2 codenames are 2 of the 4 BASELINE_GROUP_PERMISSIONS; do not add them to the dynamic grid. NOTE (Phase 17): the backend no longer force-includes these 2 either, but this UI-side lock was left in place — see frontend/components/admin/fields/AdminPermissionCheckbox.tsx's note."
      - "seed_initial_data is idempotent (get_or_create) but only runs on fresh/explicit invocation — renaming a codename does NOT rename it in already-deployed DBs; requires a migration or manual data-fix."
    see_also: ["add_admin_page_or_feature", "shared_components.useAuthStore", "shared_components.admin_component_library", "shared_components.adminNav"]

  add_modify_payment_provider:
    description: "Add or modify a payment provider (manual bank transfer / PayPal exist now; Stripe / Google Pay deferred per progress.phases.10)."
    entry_points:
      - "backend/payments/base.py"
      - "backend/payments/factory.py"
    typical_files:
      - "backend/payments/base.py"      # BasePaymentProvider abstract interface
      - "backend/payments/manual.py"    # ManualPaymentProvider
      - "backend/payments/paypal.py"    # PayPalPaymentProvider
      - "backend/payments/factory.py"   # PaymentFactory — provider registry/dispatch
      - "backend/payments/serializers.py"
      - "backend/payments/views.py"     # PaymentMethodsView / PaymentInitiateView / ReceiptUploadView
      - "backend/payments/urls.py"
      - "backend/core/management/commands/seed_initial_data.py"  # DefaultSetting rows: payment_manual_*/payment_paypal_*/payment_<new>_* enabled flags + config fields
      - "frontend/lib/api.ts"            # paymentsAPI — getMethods/initiate/uploadReceipt
      - "frontend/app/[locale]/contribute/page.tsx"   # 4-step wizard — method selection + per-method instructions rendering
      - "frontend/app/[locale]/admin/payments/page.tsx"  # admin settings UI — AdminToggle for *_enabled + AdminInput/AdminTextarea per config field
    order_of_operations:
      - "1. Implement a new provider class in backend/payments/<provider>.py subclassing BasePaymentProvider (see manual.py/paypal.py for the interface shape)."
      - "2. Register it in backend/payments/factory.py's PaymentFactory dispatch."
      - "3. Add new DefaultSetting rows (payment_<provider>_enabled + any config fields like account numbers/keys) to seed_initial_data.py — PaymentMethodsView reads these to decide which methods to show."
      - "4. Update frontend/lib/api.ts paymentsAPI types if the new provider has a different `instructions` shape than existing methods."
      - "5. frontend/app/[locale]/contribute/page.tsx's method-selection step + instructions-rendering step need a new branch for the provider's UI (see existing manual/paypal branches)."
      - "6. frontend/app/[locale]/admin/payments/page.tsx needs a new section (AdminToggle for enabled flag + AdminInput/AdminTextarea for config fields) — follow the existing MANUAL_FIELDS/PAYPAL_FIELDS local-constant pattern."
      - "7. If the provider needs settings NOT to appear on /admin/settings (the generic editor), add its key prefix to that page's PAYMENT_PREFIXES exclusion constant."
    gotchas:
      - "PAYMENT_PREFIXES (in admin/settings/page.tsx) and MANUAL_FIELDS/PAYPAL_FIELDS (in admin/payments/page.tsx) are LOCAL CONSTANTS, not shared config — a new provider's DefaultSetting keys must be added to BOTH the admin/payments inclusion list AND the admin/settings exclusion list, or its settings will appear in BOTH places (or neither)."
      - "progress.phases.10 (Stripe/Google Pay) is explicitly DEFERRED — do not assume any Stripe-specific scaffolding exists yet beyond meta.payment's note."
      - "ReceiptUploadView (manual/PayPal receipt flow) is provider-specific — a fully-automated provider (e.g. real Stripe) would SKIP the receipt-upload step entirely in contribute/page.tsx's wizard, requiring a step-count/flow branch, not just a new method option."
    see_also: ["change_db_model_field", "change_deployment_env_config"]

  change_deployment_env_config:
    description: "Change deployment/environment configuration across docker-compose, Railway, Dockerfiles, Caddyfile, or .env files."
    entry_points:
      - "docker-compose.yml"
      - "Dockerfile.railway"
    typical_files:
      - "docker-compose.yml"              # VPS/local multi-container: backend, frontend, db, caddy
      - "Dockerfile.railway"               # single combined image, repo root
      - "docker-entrypoint.railway.sh"     # repo root — supervises backend+frontend processes via wait -n
      - "backend/Dockerfile + backend/docker-entrypoint.sh"
      - "backend/scripts/prepare.sh"       # DB-wait + migrate + seed + collectstatic — shared by both entrypoints
      - "frontend/Dockerfile"
      - "Caddyfile"                        # VPS reverse-proxy
      - "railway.json"                     # points dockerfilePath at Dockerfile.railway
      - ".env.example / .env.docker.example"   # backend env vars
      - "frontend/.env.example"            # NEXT_PUBLIC_API_URL / NEXT_PUBLIC_SITE_NAME / NEXT_PUBLIC_MEDIA_URL
      - "backend/groupfund/settings.py"    # reads the env vars
      - "frontend/next.config.mjs"         # rewrites()/skipTrailingSlashRedirect/remotePatterns — derived from NEXT_PUBLIC_API_URL/NEXT_PUBLIC_MEDIA_URL
      - "frontend/middleware.ts"           # next-intl locale matcher — must exclude /admin and /i18n
      - "DEPLOYMENT.md"                    # Persian-translated deploy docs — keep in sync
    order_of_operations:
      - "1. Decide which deploy path is affected: Railway (single combined image, Dockerfile.railway + docker-entrypoint.railway.sh) vs docker-compose/VPS (docker-compose.yml + backend/Dockerfile + frontend/Dockerfile + Caddyfile) — backend/scripts/prepare.sh is SHARED by both."
      - "2. New env vars: add to BOTH .env.example (or .env.docker.example) AND backend/groupfund/settings.py (os.environ read); for frontend vars, also frontend/.env.example AND check next.config.mjs if it derives remotePatterns/rewrites from it."
      - "3. Railway requires ZERO service variables by design — if a new env var is REQUIRED (not optional with a sensible default), this breaks that guarantee; prefer optional with default."
      - "4. New routes needing proxy passthrough (like /i18n/setlang/ historically) must be added to BOTH frontend/next.config.mjs rewrites() AND frontend/middleware.ts's next-intl matcher exclusions, or they 404/redirect-loop."
      - "5. Update DEPLOYMENT.md (Persian) to document any new required steps/vars."
    gotchas:
      - "5 severe pre-existing bugs were already found+fixed in this area (see progress.phases.11.done) — infinite redirect loops and 404s on /admin and /i18n/setlang/ came from next.config.mjs rewrites + middleware.ts matcher being out of sync. ANY new top-level route added to the Next.js app that should bypass next-intl locale prefixing (like /admin) MUST be added to middleware.ts's matcher exclusion AND, if proxied through Next to Django, to next.config.mjs rewrites()."
      - "frontend/public/ now contains real assets (frontend/public/symbols/lion-and-sun.svg + faravahar.svg, see files entries; Phase 35 added frontend/public/branding/ipa-birmingham.jpg, the sitewide watermark source image, see roadmap.add_sitewide_watermark) in addition to .gitkeep — don't delete .gitkeep regardless, since a hypothetical future removal of symbols/+branding/ would make public/ empty again and break 'COPY --from=builder /frontend/public' in both Dockerfiles."
      - "NEXT_PUBLIC_* vars are baked into the JS bundle AT BUILD TIME — changing them requires a rebuild, not just a container restart/env change."
    see_also: ["add_modify_payment_provider", "change_db_model_field"]

  change_auth_login_flow:
    description: "Change authentication/login/register/token-refresh flow."
    entry_points:
      - "backend/accounts/backends.py"
      - "frontend/lib/api.ts"
      - "frontend/store/authStore.ts"
    typical_files:
      - "backend/accounts/backends.py"   # MemberAuthBackend — authenticate() accepts username= for Django admin compat too
      - "backend/accounts/views.py"      # register/login/logout/refresh — JWT simplejwt
      - "backend/accounts/serializers.py"
      - "backend/accounts/urls.py"
      - "frontend/lib/api.ts"            # authAPI (login/register) + axios interceptors (token attach/refresh, 403->/forbidden, 503->/unavailable, 404->/not-found)
      - "frontend/store/authStore.ts"    # persisted member/accessToken/refreshToken/isAuthenticated/hasPermission; login()/logout()/setTokens()
      - "frontend/app/[locale]/login/page.tsx"
      - "frontend/app/[locale]/register/page.tsx"
      - "frontend/middleware.ts"         # route/locale matcher — does NOT itself check auth tokens, just locale routing + /admin exclusion
    order_of_operations:
      - "1. Backend: MemberAuthBackend.authenticate() in backends.py is the single auth entry point — accepts BOTH `username=` (Django admin / AuthenticationForm) and the member's actual credential field; changes here affect BOTH Django admin login AND the JWT API login."
      - "2. accounts/views.py issues JWT tokens (simplejwt) on login/register — response shape is {tokens: {access, refresh}, member: {...}}."
      - "3. Frontend: login/register pages call authAPI.login/register, then authStore.login() persists {member, accessToken, refreshToken, isAuthenticated:true} to localStorage (zustand persist, key 'groupfund-auth')."
      - "4. lib/api.ts's axios interceptors attach `Authorization: Bearer <accessToken>` from authStore on every request, and on 401 attempt a token refresh; also redirect 403->/forbidden, 503->/unavailable, 404->/not-found (see roadmap.change_public_page_layout_content for those target pages)."
      - "5. login/register pages BOTH have a REDIRECT-IF-AUTHENTICATED guard (once hasHydrated, if isAuthenticated && member, router.replace(`/${locale}`)) — preserve this when modifying either page."
    gotchas:
      - "authStore is read by lib/api.ts's axios interceptors OUTSIDE React/zustand's hook context (interceptors call useAuthStore.getState() directly, not the hook) — same pattern as langStore/lib/api.ts's getLocalePrefix() reading localStorage directly (see shared_components.useLangStore note). Don't assume `useAuthStore()` (the hook form) works in non-component code."
      - "hasHydrated is a zustand-persist-specific flag — login/register pages render NOTHING until hasHydrated is true, to avoid a flash of the login form for an already-authenticated user whose persisted state hasn't loaded yet. Any new auth-gated page should follow the same hasHydrated-gate pattern (see shared_components.useAuthStore needed_by for which pages already do)."
      - "~23 files consume useAuthStore (see shared_components.useAuthStore) — changing the PUBLIC INTERFACE (login/logout/setTokens/hasPermission signatures) ripples to all of them, not just the login/register pages."
    see_also: ["change_zustand_store", "shared_components.useAuthStore", "change_permissions_access_groups"]

  change_admin_component_library:
    description: "Change a shared admin UI primitive (AdminTable/AdminModal/AdminConfirmDialog/AdminStatCard/AdminBadge/AdminToastContainer/admin/fields/*) — affects ALL consuming admin pages."
    entry_points:
      - "frontend/components/admin/<Component>.tsx"
      - "frontend/components/admin/fields/<Component>.tsx"
    typical_files:
      - "the target component file (frontend/components/admin/ or admin/fields/)"
      - "shared_components.admin_component_library.<components|fields>.<Name>.needed_by — EVERY file listed must be checked for prop-shape compatibility"
    order_of_operations:
      - "1. Read shared_components.admin_component_library.<components|fields>.<Name> for the FULL list of consuming admin pages BEFORE changing the component's props/exports."
      - "2. If changing a PROP'S TYPE or REMOVING a prop: grep every consumer in the needed_by list for that prop name and update each call site."
      - "3. If adding a NEW OPTIONAL prop with a sensible default: no consumer changes are strictly required, but consider whether existing consumers SHOULD opt in."
      - "4. If changing visual/styling only (no prop changes): no consumer changes needed, but visually spot-check at least one consumer from each distinct 'role' (e.g. AdminTable is used for both simple lists AND filter-heavy lists)."
    gotchas:
      - "AdminBadge's status->color mapping (pending/pending_review->amber, completed/approved/active->green, failed/rejected/inactive->red, fallback cyan) is used by 6 pages with DIFFERENT status vocabularies (contributions, members, members/[id], comments, dashboard, logs/system via LEVEL_STATUS mapping) — changing the mapping affects all 6 simultaneously; some pages pass an explicit `label` override, others rely on `status` alone."
      - "AdminTable<T> and AdminTableColumn<T> are GENERIC — there is no single shared column-definition file; each of the 7 consuming pages defines its own columns inline. A signature change to AdminTableColumn (e.g. renaming `render` to `cell`) requires editing all 7 pages' column arrays."
      - "AdminToastContainer is mounted ONCE via AdminLayout.tsx (not per-page) — do not add a second mount; all useToastStore consumers (13 admin pages + the container itself) share this single instance."
    see_also: ["shared_components.admin_component_library", "add_admin_page_or_feature", "change_zustand_store"]

  change_zustand_store:
    description: "Change one of the 3 zustand stores (authStore/langStore/toastStore) — check shared_components for the full consumer list before changing the store's public interface."
    entry_points:
      - "frontend/store/<name>Store.ts"
    typical_files:
      - "the target store file (frontend/store/authStore.ts | langStore.ts | toastStore.ts)"
      - "shared_components.use<Name>Store.needed_by — EVERY consumer file, with the SPECIFIC fields/methods each one uses"
    order_of_operations:
      - "1. Read shared_components.use<Name>Store for the full per-consumer field/method usage list BEFORE changing the store's public_interface."
      - "2. If RENAMING a field/method: grep every consumer's `uses:` list (in shared_components) for the old name and update each call site — for authStore (~23 consumers) and toastStore (13 consumers) this is a wide change."
      - "3. If the store uses zustand `persist` middleware (authStore, langStore — NOT toastStore): changing the persisted SHAPE may require a migration/version bump, or existing localStorage data becomes stale/incompatible (localStorage keys: 'groupfund-auth' / 'groupfund-lang')."
      - "4. langStore's locale ALSO independently syncs with localStorage key 'lang', which frontend/lib/api.ts's internal getLocalePrefix() reads directly (not via the store) — changing langStore's localStorage key or shape must be mirrored in lib/api.ts's getLocalePrefix() (the dead frontend/lib/auth.ts has its own unused copy too)."
    gotchas:
      - "toastStore has NO persist middleware (toasts are ephemeral) — unlike authStore/langStore."
      - "authStore's hasPermission(codename) is called with is_superuser-bypass logic DUPLICATED at every call site (`member?.is_superuser || hasPermission('...')`) rather than centralized in the store itself — centralizing this is purely additive/safe but leaves existing call sites inconsistent until each is migrated."
    see_also: ["shared_components.useAuthStore", "shared_components.useLangStore", "shared_components.useToastStore", "change_auth_login_flow"]

shared_components:
  # The "blast radius" registry. For each shared export/store/component, the
  # FULL list of files that import/use it, with per-file context. Use this
  # BEFORE changing any shared export's signature/behavior — every file listed
  # under `needed_by` must be checked for compatibility.

  IranianSymbols:
    file: "frontend/components/animations/IranianSymbols.tsx"
    exports:
      LionAndSun:
        signature: "{ size?: number; className?: string; animated?: boolean }"
        needed_by:
          - {file: "frontend/app/[locale]/page.tsx", context: "hero background only (size=280, opacity .15) — the hero foreground icon was swapped to HandsEmblem in Phase 38"}
          - {file: "frontend/components/layout/Footer.tsx", context: "brand mark"}
          - {file: "frontend/components/layout/AdminSidebar.tsx", context: "brand logo (collapsed/expanded)"}
          - {file: "frontend/components/layout/AdminTopBar.tsx", context: "'Admin Panel' brand mark"}
          - {file: "frontend/components/admin/AdminTable.tsx", context: "empty-state icon, dimmed, size=56"}
          - {file: "frontend/app/[locale]/login/page.tsx", context: "page header icon"}
          - {file: "frontend/app/[locale]/register/page.tsx", context: "page header icon"}
          - {file: "frontend/app/[locale]/help/page.tsx", context: "page header icon"}
          - {file: "frontend/app/[locale]/contact/page.tsx", context: "page header icon"}
          - {file: "frontend/app/[locale]/admin/layout.tsx", context: "route-protection loading spinner"}
          - {file: "frontend/app/[locale]/admin/page.tsx", context: "dashboard header icon"}
          - {file: "frontend/app/[locale]/admin/members/[id]/page.tsx", context: "page header icon"}
          - {file: "frontend/app/[locale]/admin/payments/page.tsx", context: "page header icon"}
          - {file: "frontend/app/[locale]/admin/settings/page.tsx", context: "page header icon"}
          - {file: "frontend/app/[locale]/admin/groups/page.tsx", context: "page header icon"}
          - {file: "frontend/app/[locale]/admin/system/page.tsx", context: "loading-state centerpiece (size=48, animated) — Phase 13"}
          - {file: "frontend/components/animations/SplashScreen.tsx", context: "splash centerpiece, size=140, glow-pulse"}
          - {file: "frontend/components/animations/PageTransition.tsx", context: "transition overlay spinner, size=40 — NOTE: PageTransition itself is UNUSED (zero importers, orphaned), see its files entry"}
        note: "Renders <img src=\"/symbols/lion-and-sun.svg\"> (Public Domain — Wikimedia Commons 'Lion and Sun.svg', the official historical Iranian Lion-and-Sun emblem) inside a size×size flex-centered <div> (LION_AND_SUN_RATIO ~1.385 preserves the source's non-square aspect ratio within the square bounding box every consumer expects). `animated` wraps the result in the shared internal GlowPulse helper. 18 consumers total (all 18 listed above; count includes SplashScreen + PageTransition; Phase 17 removed the admin/env-vars/page.tsx consumer along with the whole page; Phase 38 removed the Navbar.tsx consumer entirely AND removed the page.tsx hero-foreground usage, both swapped to the new HandsEmblem export — was 19)."
      HandsEmblem:
        signature: "{ size?: number; className?: string; animated?: boolean }"
        needed_by:
          - {file: "frontend/app/[locale]/page.tsx", context: "hero foreground icon (size=140, animated) — replaces the previous LionAndSun there, full opacity, directly above the headline; enlarged from the initial 72 to 140 per explicit follow-up request (Phase 39) so it reads as a clear visual focal point, not a small icon"}
          - {file: "frontend/components/layout/Navbar.tsx", context: "brand logo — desktop header (size=32) AND mobile drawer header (size=28), replaces the previous LionAndSun in both"}
        note: "Renders <img src=\"/branding/ipa-birmingham.jpg\"> — the SAME source file SiteBackground.tsx uses as the sitewide low-opacity (0.07) watermark — but here at full/native opacity, inside a size×size flex-centered <div> (HANDS_EMBLEM_RATIO = 833/748 ~1.114, the image's real intrinsic pixel dimensions, preserves aspect ratio within the square bounding box). `animated` wraps the result in the shared internal GlowPulse helper (used on the page.tsx hero usage only, matching the original LionAndSun call there; the 2 Navbar.tsx usages are un-animated, matching their original LionAndSun calls). Added Phase 38, per explicit request to use the org's real emblem photo as the literal hero/header logo instead of the historical Lion-and-Sun, while leaving the sitewide background watermark itself completely unchanged (same file, same opacity, same SiteBackground.tsx mechanism — untouched)."
      FaravaharSimple:
        signature: "{ size?: number; className?: string; animated?: boolean }"
        needed_by:
          - {file: "frontend/app/[locale]/page.tsx", context: "CTA section decoration, size=80, animated — present for BOTH authenticated and guest CTA variants"}
        note: "Renders <img src=\"/symbols/faravahar.svg\"> (Public Domain — Wikimedia Commons 'Faravahar-Gold.svg') at width=size, height=size/FARAVAHAR_RATIO (~2.123). `animated` wraps the result in the shared internal GlowPulse helper."
      GeometricPattern:
