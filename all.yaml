      done: ["Password strength — backend/core/validators.py gained _password_strength_errors(password)/validate_password_strength(password) (4 ordered checks: length>=PASSWORD_MIN_LENGTH(8), letter+digit mix present, >=1 uppercase letter, >=1 special/non-alnum character) and a PasswordStrengthValidator class (validate()/get_help_text()) wired into settings.py AUTH_PASSWORD_VALIDATORS=[{'NAME':'core.validators.PasswordStrengthValidator'}] — this makes the rule apply automatically to Django's own admin password-change form and the createsuperuser/changepassword CLI commands, not just the DRF API, with zero extra wiring. frontend/lib/validation.ts gained passwordStrengthError(password, isRTL) mirroring the same 4 checks in the same order (so the first client-side error a user sees always matches what the server would reject with), wired into every password field on the site: register/page.tsx, profile/page.tsx (password-change), admin/members/page.tsx (create), admin/members/[id]/page.tsx (edit/reset).", "Session-aware rate limiting — NEW backend/core/throttles.py:SessionAwareScopedRateThrottle subclasses DRF's ScopedRateThrottle; authenticated requests are unchanged (parent behavior, keyed on user id); anonymous requests fold the Django session key into the cache identity (request.session.save() is forced if no session key exists yet) so an attacker must rotate BOTH their IP and their session cookie to reset the counter, not just spoof/rotate IP alone — justified in the file's docstring by this being a site that organizes real-world political activity and is a realistic targeted-abuse target, not a generic SaaS. Wired into settings.py REST_FRAMEWORK.DEFAULT_THROTTLE_CLASSES in place of the Phase-31 plain ScopedRateThrottle. DEFAULT_THROTTLE_RATES tightened on the same 5 scopes introduced in Phase 31: login 10->6/hour, register 5->4/hour, contact 5->4/hour, comment 20->12/hour, contribution 15->8/hour (global anon/user rates unchanged at 100/hour, 1000/hour).", "Admin