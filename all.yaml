    note: "next-intl middleware — locales: [en, fa], defaultLocale: en, localePrefix: always. matcher excludes api|admin|i18n|static|media|_next|_vercel + any path with a dot, so the Django-proxied prefixes (next.config.mjs rewrites()) are never locale-redirected (FIXED CRITICAL pre-existing bug — /admin and /i18n were unreachable via the proxy: next-intl redirected /admin/login/ → /en/admin/login/, a 404, and /i18n/setlang/ → /en/i18n/setlang, breaking the admin language switcher). Discovered + fixed during end-to-end testing of the Railway combined image but applies to ALL deploy modes."

