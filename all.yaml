      done: ["item A (bugfix) — Problem: when an admin changed a logged-in member's group/permissions, or deactivated/reactivated them, the change had ZERO effect on that member's already-open browser session until they manually logged out and back in — the JWT access token and the persisted authStore `member` object are both point-in-time snapshots from login, and nothing previously refreshed either one mid-session, so a just-deactivated member could keep using permission-gated UI for up to the access token's full lifetime. Fix: NEW frontend/components/layout/AuthSync.tsx, a headless (returns null) component that, once hasHydrated && isAuthenticated, calls authAPI.getProfile() immediately on mount and again every 30s via setInterval (SYNC_INTERVAL_MS), overwriting the authStore member via setMember() on each successful response — group_permissions/is_superuser/is_active all converge to the backend's current truth within 30 seconds with no logout required. A `cancelled` flag in the effect cleanup guards against a stale in-flight response firing setMember after unmount/auth-change; failures (e.g. a 401 from a since-also-invalidated refresh token) are silently swallowed since the shared axios interceptor already owns logout-on-failed-refresh. Wired into frontend/app/[locale]/ClientLayout.tsx as the very first rendered element (before <DeactivatedGuard>) in BOTH the admin-route and public-route branches, so every permission-gated surface (Navbar admin-panel link, DeactivatedGuard's route bounce, admin/layout.tsx's guard, every HasGroupPermission-style frontend check) now reads from a member object that self-heals within 30s of any admin-side change.", "item B (bugfix/lockdown) — Problem: a non-owner admin with can_manage_permissions could open ANY member's detail page in admin/members/[id]/page.tsx and edit/deactivate/delete a superuser account, or change a superuser's group — none of the existing _is_admin-gated write views special-cased the TARGET being a superuser (only the ACTOR's permissions were checked), so the management grid silently let an ordinary permission-holder demote or lock out a superuser. Backend: backend/accounts/serializers.py's MemberListSerializer and MemberDetailSerializer both gained `is_superuser` to their fields list (both already use read_only_fields = fields, so it's automatically read-only) so the frontend can detect the target's superuser status without a separate request; backend/accounts/member_views.py's MemberUpdateView (the one write view that had NOT already special-cased a superuser target — MemberChangeGroupView/MemberToggleActiveView/MemberDeleteView already refused to act on one) now also returns a 403 if the target member is a superuser and the requester isn't that same superuser. Frontend: admin/members/page.tsx's table 'group' column now renders a bold amber 'سوپریوزر'/'Superuser' label instead of m.group_name whenever m.is_superuser is true (no separate column added — same visual slot, just a different label/style for that row). admin/members/[id]/page.tsx: the header subtitle's group-name segment is replaced the same way for a superuser target, and — more importantly — the entire pre-existing management grid (profile-edit form, group-change form, password-reset form, deactivate/delete danger-zone) is now wrapped in `canManage && !target.is_superuser`, with a NEW explanatory ShieldCheck info card (icon already imported in Phase 21 for an unrelated block, so no new import needed) rendered in its place whenever `canManage && target.is_superuser`, explaining that superuser accounts can only be managed directly (e.g. via Django admin/shell), not through this panel — read-only categorized sections (Comments/Contributions/Contact Messages/Activity Log, Phase 21) remain visible regardless, since those are inherently read-only and pose no lockout risk.", "item C — NEW 'My Contact Messages' member-facing page, completing the 3-page 'My X' set alongside My Comments/My Contributions (Phase 20). Backend: NEW backend/core/contact_views.py MyContactMessagesView (GET /api/contact/mine/, IsAuthenticated) returning the requesting member's own ContactMessage rows (filter(sender=request.user), ordered -created_at, paginated via the existing ContactMessageSerializer) — routed in backend/core/contact_urls.py as `mine/`, declared BEFORE the catch-all `<uuid:pk>/...` patterns per the project's established literal-before-catch-all URL ordering convention. Frontend: NEW frontend/app/[locale]/profile/contact-messages/page.tsx, structurally mirroring profile/comments/page.tsx and profile/contributions/page.tsx (back-link, glass card, loading skeleton, empty state, Prev/Next pager at pageSize=5 shown only once totalCount>pageSize, login-redirect guard) via the new contactAPI.getMine(page); each card shows contact_info, a locale-aware formatted created_at, a 2-color status pill (a local statusStyle(handled) helper — green if is_handled else amber — simpler than the 3-color comments/contributions status since ContactMessage has only a binary is_handled flag and no rejection state), the message text, and — when handled — a 'handled by' line naming the admin (handled_by_label, already exposed by ContactMessageSerializer since Phase 20). This view is read-only by design (no edit/delete, unlike My Comments) since the backend ContactMessage model itself has nothing for an owner to revise. frontend/app/[locale]/profile/page.tsx gained a third small link-card ('My Messages'/'پیام‌های من' -> /{locale}/profile/contact-messages, Mail icon, alongside the existing My Contributions/My Comments cards) and frontend/app/[locale]/help/page.tsx gained a third SECTIONS entry {key:'my_messages', group:'member'} next to my_comments. messages/en.json + fa.json profile namespace gained 5 keys (my_messages_title, my_messages_empty, my_messages_status_pending, my_messages_status_handled, my_messages_handled_by — 51 keys total, was 46) and help.sections gained 1 entry's worth of keys (24 keys total, was 23).", "items D/E — the Contact Us form (frontend/app/[locale]/contact/page.tsx) previously always rendered blank name/contact fields even for a logged-in member, forcing them to retype their own name and giving admins no quick way to match a submission to a member record. Now, once `mounted && member`, the name field auto-fills from member.full_name and becomes disabled/dimmed (opacity-60, cursor-not-allowed) so a logged-in member can't accidentally submit under a different name, and a NEW read-only `#{member.member_number ?? ''}` input (member_id_label, monospace, leveraging the Phase 20 member_number field) appears directly below it so admins reviewing /admin/contact-messages can immediately cross-reference the sender against /admin/members search (which already supports exact member_number matching since Phase 20) — guest (logged-out) submitters see the form exactly as before, fully editable. Paired backend cap: backend/core/contact_views.py's ContactMessageCreateView gained a MAX_PENDING_MESSAGES = 4 module constant; for an AUTHENTICATED submitter only (guests are exempt, since they have no stable identity to rate-limit against), .post() first counts ContactMessage.objects.filter(sender=request.user, is_handled=False) and returns 429 if it's already >= 4, preventing one member from flooding the unhandled-messages queue. contact/page.tsx's submit-error handler now narrows the caught axios error to read err.response.status: a 429 shows the new contact.pending_limit_error i18n key instead of the generic contact.submit_error (2 new contact.* keys — pending_limit_error, member_id_label — 17 keys total, was 15).", "item G — the site previously had no admin-configurable public contact email/phone, and no genuinely-public settings endpoint to serve them (the existing settings list view required can_manage_settings). backend/core/management/commands/seed_initial_data.py's DEFAULT_SETTINGS gained 2 new keys, contact_email and contact_phone (both default '', inserted after the 3 visibility settings and before the payment_manual_* block). NEW backend/core/settings_views.py PublicSettingListView (AllowAny) restricted to a deliberately tiny module-level allowlist constant PUBLIC_SETTING_KEYS = ['contact_email', 'contact_phone'] (queries DefaultSetting.objects.filter(key__in=PUBLIC_SETTING_KEYS) — this allowlist-by-construction means no other setting, even a future one, is ever accidentally exposed publicly without an explicit code change), routed in backend/core/settings_urls.py as `public/`, declared before the catch-all `<str:key>/` pattern. frontend/lib/settingsMeta.ts gained matching SETTINGS_META entries for both keys (type: 'text', widening the SettingMeta.type union from 'select'|'toggle'|'number' to also include 'text') so admins can edit them from the existing settings admin page with no bespoke UI. frontend/lib/api.ts's settingsAPI.getPublicSettings was simplified from a raw-axios bypass-of-the-shared-interceptor approach to a normal call against the shared `api` instance hitting the new genuinely-public /api/settings/public/ endpoint. frontend/app/[locale]/contact/page.tsx's pre-existing contact-info display block (added in an earlier phase, previously fed by a workaround) now sources from this same simplified call; when both keys are unset (still '') the block falls back to its pre-existing 'no contact info configured' notice exactly as before.", "Verified clean: python manage.py check (0 issues) and python manage.py makemigrations --check (no model changes this phase — items A/B/C/D/E/G were all view/serializer/frontend-only, no new fields), npx tsc --noEmit (no errors)."]
    24:
      name: "8-item precision pass — admin-configurable AuthSync interval, contribution tracking_code + search, pending/pending_review label clarity, mandatory comment rating, comment-delete + contribution-delete removal sitewide, unified single-modal admin moderation UX (comments + contributions), landing-page branding fix"
      status: done
      done: ["item 1 — AuthSync's hardcoded 30s polling interval is now admin-configurable. NEW DefaultSetting key auth_sync_interval_seconds (seed_initial_data.py, default '15' — also lowers the out-of-the-box default from 30s to 15s), validated server-side as a positive integer (backend/core/settings_views.py's _validate_value, same branch as the pre-existing max_receipt_image_size_mb check) and added to the public-settings allowlist PUBLIC_SETTING_KEYS (so an unauthenticated/not-yet-synced client can still read it) — editable from the existing /admin/settings page via a new frontend/lib/settingsMeta.ts SETTINGS_META entry (type: 'number', bilingual label/description), no bespoke admin UI needed. frontend/components/layout/AuthSync.tsx's effect now calls settingsAPI.getPublicSettings() once on mount, parses auth_sync_interval_seconds (falling back to the new DEFAULT_SYNC_INTERVAL_MS = 15_000 if the setting is missing/non-numeric/<=0), and only then starts sync() + setInterval(sync, intervalMs) — the immediate first sync() call still always fires before the interval is armed, same as before.", "item 2 — contributions previously had no system-assigned lookup code and no general search box in /admin/contributions (only status/payment_method/date_from/date_to filters), making it hard for an admin to find a contribution a contributor references by phone/email. NEW fund.Contribution.tracking_code (CharField, unique, editable=False, blank=True; format 'FUND-XXXXXX', 6 random digits) via NEW migration fund/migrations/0005_contribution_tracking_code.py, assigned exactly once via a save() override + _generate_tracking_code() staticmethod (retried up to 20x against existing rows, mirrors Member._generate_member_number()'s pattern from Phase 20) — system-generated only, never user-supplied, immutable once set. Exposed (read-only) on ContributionSerializer/ContributionAdminDetailSerializer/MyContributionSerializer. backend ContributionListView gained a `search` query param (Q(guest_name__icontains) | Q(contributor__full_name__icontains) | Q(contributor__display_name__icontains) | Q(tracking_code__icontains)) — date_from/date_to/status/payment_method/contributor filters were already present from earlier phases, only `search` is new. Frontend: fundAPI.getContributions gained a `search` filter param; admin/contributions/page.tsx's filter bar (see item 7 below for its full redesign) gained a search input wired to this param, and the table + detail modal both display tracking_code (monospace).", "item 3 — the user asked why /admin/contributions and 'My Contributions' show both a 'Pending'/'در انتظار' and a 'Pending Review'/'در انتظار بررسی' status and suspected one was redundant. Investigation confirmed PENDING_REVIEW is load-bearing, not redundant: backend/payments/views.py's ReceiptUploadView explicitly transitions a Contribution from PENDING to PENDING_REVIEW when a payment receipt is uploaded (PENDING = contribution created, awaiting payment; PENDING_REVIEW = receipt uploaded, awaiting admin verification) — removing either status would break that flow. The actual issue was wording, not redundancy: admin/contributions/page.tsx gained a local (non-i18n) STATUS_LABELS(isRTL) function and profile/contributions/page.tsx gained an equivalent local contribStatusLabel map, both rendering 'در انتظار پرداخت'/'Awaiting Payment' for pending and 'در انتظار بررسی رسید'/'Awaiting Receipt Review' for pending_review instead of the old generic wording — implemented as page-local hardcoded bilingual maps rather than edited i18n keys specifically because messages/{en,fa}.json's profile namespace's status_pending key is SHARED with profile/comments/page.tsx's unrelated Comment.status badge (pending/approved/rejected, a non-payment concept) — editing the shared key's wording to be payment-specific would have incorrectly relabeled pending COMMENTS as 'awaiting payment' too. Net i18n cleanup: status_pending_review/status_completed/status_failed (profile namespace) were removed from messages/en.json + fa.json as now-orphaned (status_pending itself was kept, unclarified, since profile/comments/page.tsx still needs it for its own pending state).", "item 4 — comment star ratings were optional (CommentCreateSerializer.validate_rating allowed `None`, the public comment forms defaulted to no stars selected and could submit with rating absent). Now mandatory everywhere a comment can be created or edited: backend/posts/serializers.py's CommentCreateSerializer.validate_rating and CommentOwnerEditSerializer.validate_rating both now reject `value is None` (previously only validated the 1-5 range when a value was present) with message 'A rating between 1 and 5 is required.'. Frontend: posts/[id]/page.tsx + expenses/[id]/page.tsx's guest/member comment forms enforce a rating selection before submit (existing client-side validation paths reused, default rating state no longer 0/empty); profile/comments/page.tsx's owner-edit form removed its '0 = No rating' select option entirely and changed its default/fallback rating from 0 to 1 in both startEdit() and the save payload (no more `|| null` rating fallback). NEW i18n key comment_rating_required added to BOTH the posts and expenses namespaces (client-side validation message); comment_rating's label text changed from 'Rating (optional)'/'امتیاز (اختیاری)' to plain 'Rating'/'امتیاز' in both namespaces too, since it no longer is optional.", "item 5/6 (continuation of Phase 20's privacy work, extended further) — Comment's public-facing serializer no longer exposes an `author` object at all (CommentSerializer.fields dropped `author` entirely, keeping only the pre-existing author_label string fallback) — author detail (id/display_name/full_name/member_number) is now exclusively available through CommentAuthorSerializer, used ONLY by the admin-gated CommentAdminDetailSerializer, mirroring fund/serializers.py's MemberMinimalSerializer (public, no member_number) vs MemberAdminMinimalSerializer (admin-only, has member_number) split from Phase 20. The 5-digit member_number admin-visibility rule was also extended to core.ContactMessage: ContactMessageSerializer gained sender_member_number (a SerializerMethodField reading obj.sender.member_number) — wired into admin/contact-messages/page.tsx's table 'Sender' column and detail modal as a trailing '(#NNNNN)' next to sender_label, exactly matching the existing contributor/(#member_number) and author/(#member_number) display pattern already used in admin/contributions/page.tsx and admin/comments/page.tsx.", "item 7 (no-delete + single-modal moderation UX) — per explicit user request ('اولا که کلا اون حذف نباید باشه... دوم کلا یدونه دکمه علامت چشم باشه... بعد علت رد هم زمانی بیاد بالا، که دکمه رد رو میزنی... می‌تونه خالی هم باشه'): (a) CommentDeleteView/ContributionDeleteView and their `<pk>/delete/` URL routes were REMOVED ENTIRELY from posts/urls.py+views.py and fund/urls.py+views.py (along with posts/views.py's now-unused _can_modify_comment helper) — no comment or contribution is deletable by anyone, owner or admin, anymore (Post/Expense/Member delete and Django admin were explicitly out of scope and are unchanged); commentsAPI.delete/fundAPI.deleteContribution removed from frontend/lib/api.ts, and profile/comments/page.tsx's owner-delete UI (Trash2 button, 2-step confirm, deleting/deleteError state) was removed in full. (b) admin/comments/page.tsx and admin/contributions/page.tsx were BOTH rewritten around a single unified pattern: one Eye-icon button per row (replacing the old Eye+Pencil+Approve+Reject+Delete button row) opens ONE AdminModal containing everything — an always-visible info section, a permission-gated editable-fields-with-Save-button section (canManage only; read-only plain text for view-only permission holders), and a status-actions section shown only for actionable statuses. (c) Reject is now a genuine 2-step reveal-then-confirm flow with an OPTIONAL reason: clicking 'Reject' reveals an AdminTextarea (label 'دلیل رد (اختیاری)'/'Rejection reason (optional)') + Confirm/Cancel, and confirming sends whatever text is present (including empty string) — no blocking 'reason required' validation, unlike the old reject flow. admin/contributions/page.tsx additionally lost its old free-form bidirectional Status dropdown (previously a second, conflicting path to change status outside Approve/Reject) for consistency with the comments page. Both pages route their Approve/Reject actions through the *_edit_ endpoint (fundAPI.updateContribution / commentsAPI.update with `{status, rejection_reason?}`), not the narrower *_status_ endpoint, specifically so the in-place detail-modal state update after each action always carries the full admin-detail shape (receipt_image, rejection_reason, tracking_code, member_number, etc.) instead of risking an accidental field loss from a narrower response shape.", "item 8 — the landing page, /help, and the footer all referred to the site by the generic placeholder name 'Group Fund'/'صندوق گروهی' instead of the actual organization name. messages/en.json + fa.json: landing.headline, help.subtitle, help.sections.home.desc, and footer.copyright all updated to 'Birmingham Iranian Political Association'/'انجمن سیاسی ایرانیان بیرمنگام' — pure text-content changes, no key structure changes, no code changes needed (all 4 were already i18n-driven, not hardcoded in any .tsx file).", "Verified clean: python manage.py check (0 issues), python manage.py makemigrations --check --dry-run (no pending model changes beyond the one new fund/migrations/0005_contribution_tracking_code.py, already created and applied), npx tsc --noEmit (no errors), npm run build (compiled successfully, full route table generated including both rewritten admin pages and both edited profile sub-pages)."]
