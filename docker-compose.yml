services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: groupfund
      POSTGRES_USER: groupfund
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groupfund -d groupfund"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${PUBLIC_HOST}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_URL}
      CSRF_TRUSTED_ORIGINS: ${PUBLIC_URL}
      # Caddy terminates TLS in front of this container, so traffic between
      # Caddy and backend is always plain HTTP. Without this, Django would see
      # a non-HTTPS request and redirect forever (infinite redirect loop).
      SECURE_SSL_REDIRECT: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: groupfund
      DB_USER: groupfund
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      # Cloudflare Turnstile CAPTCHA secret key. Defaults (in settings.py) to
      # Cloudflare's published "always passes" test key when unset, so the
      # site works out of the box — set a real key before going public.
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}
        NEXT_PUBLIC_SITE_NAME: ${SITE_NAME:-Group Fund}
        NEXT_PUBLIC_MEDIA_URL: ""
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_URL: ${PUBLIC_URL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  postgres_data:
  media_data:
  static_data:
  caddy_data:
  caddy_config:
