state_management:
  scope: frontend
  total_count: 5
  description: "All client-side state patterns. The project uses Zustand (NOT Redux); React Context is used only by next-intl for i18n, not for app data."
  subcategories:
    zustand_stores:
      count: 3
      items:
        - id: state_authStore
          label: authStore — current member, token, group/permissions
          scope: frontend
          location: [frontend/store/authStore.ts, frontend/components/layout/AuthSync.tsx]
          notes: "persist middleware, localStorage key 'groupfund-auth'. Holds member object (incl. phone, type def at line 9), accessToken, refreshToken. Read by hasAdminAccess()/isNavItemVisible() and DeactivatedGuard."
        - id: state_langStore
          label: langStore — locale preference
          scope: frontend
          location: [frontend/store/langStore.ts]
          notes: "persist middleware, localStorage key 'groupfund-lang'. Works alongside (not instead of) the next-intl [locale] URL segment."
        - id: state_toastStore
          label: toastStore — toast notification queue
          scope: frontend
          location: [frontend/store/toastStore.ts, frontend/components/admin/AdminToastContainer.tsx]
          notes: "No persist — ephemeral, in-memory only. Used for nearly all 'toast validation'/error notes referenced in the forms category."
    other_state_patterns:
      count: 2
      items:
        - id: state_local_component_state
          label: Local component state (useState) — dominant pattern
          scope: frontend
          location: ["UNKNOWN — pervasive across nearly all frontend/app/[locale]/**/page.tsx files, not a single location"]
          notes: "Every form, filter, and modal in the forms/action_buttons/search_inputs categories manages its own field values via React useState in the page/component file itself — there is no centralized form-state library (no React Hook Form/Formik) and no global data-fetching cache (no React Query/SWR)."
        - id: state_nextintl_context
          label: next-intl NextIntlClientProvider — locale/messages context
          scope: frontend
          location: [frontend/lib/i18n.ts, frontend/middleware.ts]
          notes: "React Context used strictly for i18n message lookup (useTranslations hook), not for application data/business state. See i18n_localization category."

