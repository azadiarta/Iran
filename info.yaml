          notes: "Used by PermissionListView. Note: backend/core/serializers.py also defines RelativeImageField, a custom ImageField subclass (not a serializer itself) used to render relative media URLs — shared utility, not counted in the 46 serializer total."
        - id: ser_DefaultSettingSerializer
