    accounts_serializers:
      count: 12
      items:
        - id: ser_RegisterSerializer
          label: RegisterSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "validate_email, validate_phone, validate() enforce phone-or-email present + uniqueness. Used by RegisterView."
        - id: ser_MemberCreateSerializer
          label: MemberCreateSerializer (extends RegisterSerializer)
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "Adds group assignment for admin-created members. Used by MemberCreateView."
        - id: ser_LoginSerializer
          label: LoginSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "Plain Serializer, fields: credential, password. Used by LoginView."
        - id: ser_MemberProfileSerializer
          label: MemberProfileSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "Read-only profile shape including phone, email. Used by ProfileView/MemberDetailView."
        - id: ser_MemberListSerializer
          label: MemberListSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "Lighter-weight list-row shape. Used by MemberListView."
        - id: ser_MemberDetailSerializer
          label: MemberDetailSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "Read-only, includes phone/email (lines ~132-142). Used by MemberDetailView/MemberFullProfileView."
        - id: ser_MemberUpdateSerializer
          label: MemberUpdateSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "validate_email, validate_phone, validate() (lines ~166-184) — same phone-or-email enforcement as RegisterSerializer. Used by MemberUpdateView."
        - id: ser_ChangePasswordSerializer
          label: ChangePasswordSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "validate() (~line 192) checks new_password===confirm — this is where the server-side password match check lives (frontend does NOT duplicate this check for own-profile change-password)."
        - id: ser__PermissionMinimalSerializer
