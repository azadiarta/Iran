          location: [frontend/middleware.ts, frontend/lib/i18n.ts, frontend/next.config.mjs]
          notes: "locales: ['en','fa'], defaultLocale: 'en', localePrefix: 'always'. Matcher excludes /api, /admin (Django), /i18n, /static, /media, /_next, /_vercel from locale-prefix redirection (these are Django-proxied paths, not Next.js app routes — see next.config.mjs rewrites())."
        - id: i18n_admin_inline_ternary
          label: "Admin panel: inline isRTL ? '...' : '...' ternaries (NOT messages/*.json)"
          scope: frontend
          location: ["UNKNOWN — pervasive across frontend/app/[locale]/admin/**"]
          notes: "Explicitly documented split convention: the entire /admin/* panel does NOT use the messages/*.json translation files — every admin page hardcodes both English and Persian strings inline via isRTL-style ternaries instead. To translate/update admin panel text, each admin page.tsx must be edited directly; there is no central admin-translation file."
