api_endpoints:
  scope: backend
  total_count: 65
  description: "Every Django URL pattern / DRF APIView / API endpoint in the backend (merged into one category — see methodology note at top of file: this codebase has zero Django Forms and zero ViewSets, so views/urls/endpoints are 1:1 isomorphic and listing them three times would be pure duplication). All routes are mounted under root urlpatterns in backend/groupfund/urls.py. 65 items below represent 67 actual routes total (quick_stats.total_api_endpoints) — two items (ep_comment_admin_edit_update_detail groups 3 routes; this is explicitly noted per-item) cover more than one route each."
  subcategories:
    auth_endpoints:
      count: 5
      items:
        - id: ep_auth_register
          label: "POST /api/auth/register/"
          scope: backend
          location: [backend/accounts/urls.py, backend/accounts/views.py, backend/accounts/serializers.py]
          notes: "RegisterView + RegisterSerializer. AllowAny. Creates Member, auto-assigns default AccessGroup, issues JWT pair."
        - id: ep_auth_login
          label: "POST /api/auth/login/"
          scope: backend
          location: [backend/accounts/urls.py, backend/accounts/views.py, backend/accounts/backends.py, backend/accounts/serializers.py]
          notes: "LoginView + LoginSerializer. AllowAny. Delegates to MemberAuthBackend.authenticate() (phone-or-email lookup via '@' in credential)."
        - id: ep_auth_logout
          label: "POST /api/auth/logout/"
          scope: backend
          location: [backend/accounts/urls.py, backend/accounts/views.py]
          notes: "LogoutView. Blacklists the refresh token (rest_framework_simplejwt blacklist app)."
        - id: ep_auth_profile
          label: "GET /api/auth/profile/"
          scope: backend
          location: [backend/accounts/urls.py, backend/accounts/views.py]
          notes: "ProfileView. IsAuthenticated. Returns the requesting member's own profile."
        - id: ep_auth_token_refresh
          label: "POST /api/auth/token/refresh/"
          scope: backend
          location: [backend/accounts/urls.py, backend/accounts/views.py]
          notes: "SafeTokenRefreshView + SafeTokenRefreshSerializer (custom subclass of TokenRefreshSerializer/TokenRefreshView, likely adds is_active re-check on refresh)."
    member_endpoints:
