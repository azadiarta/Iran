contact_data_fields:
  scope: both
  total_count: 3
  description: "Disambiguates the THREE distinct, unrelated pieces of 'phone/contact' data in this codebase — a common source of confusion. Directly answers the quality-test question 'how many phone number fields exist and where.'"
  subcategories:
    items:
      count: 3
      items:
        - id: contact_member_phone
          label: "Member.phone — the ONLY dedicated phone-number field in the system"
          scope: both
          location:
            - backend/accounts/models.py
            - backend/accounts/serializers.py
            - backend/accounts/backends.py
            - backend/accounts/member_views.py
            - backend/accounts/admin.py
            - frontend/app/[locale]/register/page.tsx
            - frontend/app/[locale]/profile/page.tsx
            - frontend/app/[locale]/admin/members/page.tsx
            - frontend/app/[locale]/admin/members/[id]/page.tsx
            - frontend/store/authStore.ts
            - frontend/lib/api.ts
          notes: "CharField(max_length=20, unique=True, null=True, blank=True). Individually optional but Member.clean() requires phone OR email. NO regex/format validation anywhere (frontend or backend) — only presence/uniqueness checks. Used as an alternate login credential (MemberAuthBackend: '@' in credential -> email, else phone). Rendered as <input type=\"tel\"> in register/page.tsx (lines ~308-318) and profile/page.tsx (lines ~315-326, read-only display 381-384), and as AdminInput in admin/members forms (line ~256, ~278)."
        - id: contact_contactmessage_contact_info
          label: "ContactMessage.contact_info — generic free-text field, NOT phone-specific"
          scope: backend
          location: [backend/core/models.py, backend/core/serializers.py, "frontend/app/[locale]/contact/page.tsx"]
          notes: "CharField(max_length=150). Despite the name, this is NOT a phone field — it accepts any contact method the guest/member chooses to type (email, phone, social handle, etc.). Must not be confused with Member.phone when counting 'phone fields'."
        - id: contact_defaultsetting_contact_phone
          label: "DefaultSetting key 'contact_phone' — the organization's own public phone number"
          scope: backend
