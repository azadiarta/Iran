# ============================================================
# NOTE ON METHODOLOGY
# This file was generated by reading all.yaml in full (3557 lines)
# plus direct verification of live source code. One discrepancy was
# found and has since been fixed in all.yaml: it documented
# CommentDeleteView (posts/views.py) and ContributionDeleteView
# (fund/views.py) as existing endpoints, but direct source inspection
# confirmed these classes DO NOT EXIST in the current codebase (both
# were removed in Phase 24 — "comment-delete + contribution-delete
# removal sitewide" — but the views.py/urls.py/api.ts export and
# import sections of all.yaml were never updated to match). all.yaml
# has been corrected to reflect this removal everywhere it previously
# listed these as live exports/imports. There is no DELETE route for
# comments or contributions in posts/urls.py or fund/urls.py. Only
# PostDeleteView and ExpenseDeleteView have working delete endpoints.
#
# Backend architecture note: the project uses ONLY DRF APIView
# classes (function-based helper functions exist for logging/IP
# extraction only). There are zero Django Forms (no forms.py
# anywhere), zero ViewSets, zero DefaultRouter usage. Because every
# URL pattern maps 1:1 (or 1:2 in two cases) to exactly one View
# class, the categories "Django Views", "URL patterns" and "API
# endpoints" are merged into a single category `api_endpoints`
# below to avoid tripling the same 67 facts — each item there
# already lists the urls.py file, the views.py file/class, and the
# HTTP method/path/permission together.
# ============================================================

forms:
  scope: frontend
  total_count: 22
  description: Every <form> or form-like data-entry UI in the Next.js frontend that submits data to a backend API (mutating, not search/filter-only).
  subcategories:
    public_facing_forms:
      count: 9
      items:
        - id: form_login
          label: Login form
          scope: frontend
          location:
            - frontend/app/[locale]/login/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/views.py
            - backend/accounts/backends.py
          notes: "Fields: credential (email or phone), password. Calls authAPI.login -> POST /api/auth/login/ (LoginView). noValidate, manual required checks only. credential routed to email-or-phone lookup in MemberAuthBackend.authenticate()."
        - id: form_register
          label: Registration form
          scope: frontend
          location:
            - frontend/app/[locale]/register/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/views.py
            - backend/accounts/serializers.py
          notes: "Fields: full_name, display_name, phone, email, password, confirm_password. Calls authAPI.register -> POST /api/auth/register/ (RegisterView + RegisterSerializer). Client: full_name required (max 35), display_name optional (max 20), phone-or-email required (phone must match strict '00<countrycode><number>' format via frontend/lib/validation.ts isValidPhoneStrict; email format-checked), password min 8 chars, password===confirm_password. Server re-validates via backend/core/validators.py (validate_phone_format, validate_email_format, sanitize_and_limit) in RegisterSerializer.validate_full_name/validate_display_name/validate_phone and validate()."
        - id: form_profile_edit
          label: Own profile edit form
          scope: frontend
          location:
            - frontend/app/[locale]/profile/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/member_views.py
            - backend/accounts/serializers.py
          notes: "No <form> tag, button onClick. Fields: full_name, display_name, email, phone. Calls membersAPI.updateProfile -> PATCH /api/members/{id}/update/ (MemberUpdateView + MemberUpdateSerializer). No extra client validation beyond state presence."
        - id: form_profile_change_password
          label: Own change-password form
          scope: frontend
          location:
            - frontend/app/[locale]/profile/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/member_views.py
            - backend/accounts/serializers.py
          notes: "No <form> tag. Fields: old_password, new_password, confirm_new_password. Calls membersAPI.changePassword -> PATCH /api/members/{id}/change-password/ (ChangePasswordView + ChangePasswordSerializer). Submit disabled unless new_password & confirm present; no client-side match check (server-side only, see ChangePasswordSerializer.validate())."
        - id: form_my_comment_edit
          label: Own comment inline edit form
          scope: frontend
          location:
            - frontend/app/[locale]/profile/comments/page.tsx
            - frontend/lib/api.ts
            - backend/posts/views.py
            - backend/posts/serializers.py
          notes: "No <form> tag. Fields: text, rating (1-5). Calls commentsAPI.updateMine -> PATCH /api/posts/comments/{id}/update/ (CommentUpdateView + CommentOwnerEditSerializer). Client: text.trim() required."
        - id: form_contact
          label: Public contact form
          scope: frontend
          location:
            - frontend/app/[locale]/contact/page.tsx
            - frontend/lib/api.ts
            - backend/core/contact_views.py
            - backend/core/serializers.py
            - backend/core/models.py
          notes: "<form onSubmit>. Fields: name (prefilled/disabled if logged in), contact (free text, NOT phone-specific), message. Calls contactAPI.submit -> POST /api/contact/submit/ (ContactMessageCreateView + ContactMessageCreateSerializer). HTML5 required attrs (no noValidate). Special UI handling for HTTP 429 (AnonRateThrottle: 100/hour). Generates a tracking_code (see tracking_code_scheme category)."
        - id: form_contribute_initiate
          label: Contribute wizard step 1 — initiate contribution
          scope: frontend
          location:
            - frontend/app/[locale]/contribute/page.tsx
            - frontend/lib/api.ts
            - backend/payments/views.py
            - backend/payments/serializers.py
          notes: "No <form> tag, multi-step wizard. Fields: amount, guestName (if unauthenticated), selectedMethod, showInPublicList, displayNameChoice, customDisplayName (if custom), message. Calls paymentsAPI.initiate -> POST /api/payments/initiate/ (PaymentInitiateView + PaymentInitiateSerializer). Client gate: amount>0 matching regex /^\\d{0,9}(\\.\\d{0,2})?$/, method selected, guest name required if unauth, custom name required if that choice selected. Creates a Contribution row + a tracking_code."
        - id: form_contribute_upload_receipt
          label: Contribute wizard step 3 — upload payment receipt
          scope: frontend
          location:
            - frontend/app/[locale]/contribute/page.tsx
            - frontend/lib/api.ts
            - backend/payments/views.py
            - backend/payments/serializers.py
          notes: "No <form> tag. Field: file (file picker or camera capture). Calls paymentsAPI.uploadReceipt -> POST /api/payments/{pk}/receipt/ (ReceiptUploadView + ReceiptUploadSerializer, MultiPartParser). Button disabled until a file is selected. See file_upload_handlers category."
        - id: form_post_comment
          label: Comment-on-post submission form
          scope: frontend
          location:
            - frontend/app/[locale]/posts/[id]/page.tsx
            - frontend/lib/api.ts
            - backend/posts/views.py
            - backend/posts/serializers.py
            - backend/posts/models.py
          notes: "<form onSubmit noValidate>. Fields: commentName (readOnly if authenticated), commentText, commentRating (1-5). Calls postsAPI.createComment -> POST /api/posts/{pk}/comments/create/ (CommentCreateView with kwargs target_type='post', + CommentCreateSerializer). Manual checks: text required, guest name required if not authenticated, rating must be non-zero. Comment is generic (GenericForeignKey via content_type/object_id), shared with expense comments."
    admin_data_entry_forms:
      count: 13
      items:
        - id: form_admin_member_create
          label: Admin — Add Member modal form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/members/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/member_views.py
            - backend/accounts/serializers.py
          notes: "<form onSubmit> in AdminModal. Fields: fullName, displayName, phone, email, newGroupId, password, passwordConfirm. Calls membersAPI.create -> POST /api/members/create/ (MemberCreateView + MemberCreateSerializer). Toast-based validation: phone-or-email required, password===passwordConfirm, length>=8. Requires can_manage_permissions or superuser (see auth_permission_checks)."
        - id: form_admin_member_edit_profile
          label: Admin — member profile edit form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/members/[id]/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/member_views.py
            - backend/accounts/serializers.py
          notes: "<form onSubmit>. Fields: fullName, displayName, email, phone. Calls membersAPI.updateProfile -> PATCH /api/members/{id}/update/ (MemberUpdateView + MemberUpdateSerializer). Same endpoint as the member's own profile edit form."
        - id: form_admin_member_change_group
          label: Admin — change member's access group form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/members/[id]/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/member_views.py
          notes: "<form onSubmit>. Field: groupId (select). Calls membersAPI.changeGroup -> PATCH /api/members/{id}/group/ (MemberChangeGroupView). Submit disabled unless a different group is selected; catches HTTP 403 for attempts on a superuser target."
        - id: form_admin_member_change_password
          label: Admin — change another member's password form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/members/[id]/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/member_views.py
            - backend/accounts/serializers.py
          notes: "<form onSubmit>, gated by can_change_any_password permission. Fields: newPassword, confirmPassword. Calls membersAPI.changePassword -> PATCH /api/members/{id}/change-password/ (ChangePasswordView). Toast-based match check client-side."
        - id: form_admin_member_deactivate
          label: Admin — deactivate/reactivate member (with reason)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/members/[id]/page.tsx
            - frontend/components/admin/AdminConfirmDialog.tsx
            - frontend/lib/api.ts
            - backend/accounts/member_views.py
            - backend/accounts/models.py
          notes: "Rendered via AdminConfirmDialog (not a raw <form>), single field: reason (free text, stored in Member.deactivation_reason). Calls membersAPI.toggleActive -> PATCH /api/members/{id}/toggle-active/ (MemberToggleActiveView)."
        - id: form_admin_group_create_edit
          label: Admin — create/edit access group modal form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/groups/page.tsx
            - frontend/components/admin/fields/AdminPermissionCheckbox.tsx
            - frontend/lib/api.ts
            - backend/accounts/group_views.py
            - backend/accounts/serializers.py
            - backend/accounts/models.py
          notes: "<form onSubmit>. Fields: name, description, selectedPermissions (checkbox list of the 13 seeded Permission codenames). Calls groupsAPI.create -> POST /api/groups/create/ (AccessGroupCreateView) or groupsAPI.update -> PATCH /api/groups/{pk}/update/ (AccessGroupUpdateView). Disabled unless name.trim() non-empty."
        - id: form_admin_contribution_create
          label: Admin — manual contribution creation modal form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/contributions/page.tsx
            - frontend/lib/api.ts
            - backend/fund/views.py
            - backend/fund/serializers.py
          notes: "<form onSubmit>. Fields: guestName, amount, currency, paymentMethod, status, notes. Calls fundAPI.createManualContribution -> POST /api/fund/contributions/create-manual/ (ContributionManualCreateView + ContributionManualCreateSerializer). Toast validation: guestName.trim() required, amount>0. No receipt upload for manual entries (admin-recorded, not self-service)."
        - id: form_admin_contribution_edit
          label: Admin — edit existing contribution form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/contributions/page.tsx
            - frontend/lib/api.ts
            - backend/fund/views.py
            - backend/fund/serializers.py
          notes: "No <form> tag. Fields: editAmount, editCurrency, editGuestName, editPaymentMethod, editNotes, editShowInPublicList, editDisplayNameChoice, editPublicDisplayName, editMessage (max 150 chars). Calls fundAPI.updateContribution -> PATCH /api/fund/contributions/{pk}/edit/ (ContributionAdminEditView + ContributionAdminEditSerializer). Client check: amount>0."
        - id: form_admin_expense_create
          label: Admin — create expense modal form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/expenses/page.tsx
            - frontend/components/admin/fields/AdminFileUpload.tsx
            - frontend/lib/api.ts
            - backend/fund/views.py
            - backend/fund/serializers.py
          notes: "<form onSubmit>, multipart. Fields: amount, shortReason, description, expenseDate, receipt (file, optional). Calls fundAPI.createExpense -> POST /api/fund/expenses/create/ (ExpenseCreateView + ExpenseCreateSerializer). Client check: amount>0. See file_upload_handlers."
        - id: form_admin_post_create_edit
          label: Admin — create/edit post modal form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/posts/page.tsx
            - frontend/lib/api.ts
            - backend/posts/views.py
            - backend/posts/serializers.py
          notes: "<form onSubmit>. Fields: title, body, images (multi-file). Calls postsAPI.create -> POST /api/posts/create/ (PostCreateView) then postsAPI.uploadImages -> POST /api/posts/{pk}/images/ (PostImageUploadView) for new posts; postsAPI.update -> PATCH /api/posts/{pk}/update/ (PostUpdateView, title/body only) for edits. Disabled unless title & body both non-empty after trim."
        - id: form_admin_comment_edit
          label: Admin — edit any comment's text/rating form
          scope: frontend
          location:
            - frontend/app/[locale]/admin/comments/page.tsx
            - frontend/lib/api.ts
            - backend/posts/views.py
            - backend/posts/serializers.py
          notes: "No <form> tag. Fields: editText, editRating (0-5). Calls commentsAPI.update -> PATCH /api/posts/comments/{pk}/edit/ (CommentAdminEditView + CommentAdminEditSerializer). Client check: text.trim() required."
        - id: form_admin_payments_fields
          label: Admin — payment method settings (per-field save)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/payments/page.tsx
            - frontend/lib/settingsMeta.ts
            - frontend/lib/paymentMethodsMeta.ts
            - frontend/lib/api.ts
            - backend/core/settings_views.py
            - backend/core/models.py
          notes: "No single <form>; each DefaultSetting key (MANUAL_FIELDS, PAYPAL_FIELDS, instructions, plus instant toggles) has its own Save button/instant-change handler. Each calls settingsAPI.update(key, value) -> PATCH /api/settings/{key}/ (DefaultSettingUpdateView). Validated server-side via _validate_value() per key in settings_views.py."
        - id: form_admin_settings_fields
          label: Admin — general site settings (per-field save)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/settings/page.tsx
            - frontend/lib/settingsMeta.ts
            - frontend/lib/api.ts
            - backend/core/settings_views.py
            - backend/core/models.py
          notes: "Same per-field Save pattern as admin/payments. Includes the contact_phone DefaultSetting (org's public phone number — NOT the Member.phone field; see contact_data_fields category for the distinction)."
  notes_general: "Quality-test relevant: every form's submit handler is in the listed frontend page.tsx file; every corresponding backend handler is the View class + Serializer class listed in location. frontend/lib/validation.ts provides shared client-side validation/format helpers (phone, email, length limits) used by these forms — see validation_logic category."

action_buttons:
  scope: frontend
  total_count: 9
  description: Standalone action triggers that mutate data without a multi-field form — confirm-and-fire deletes, status toggles, and approve/reject buttons.
  subcategories:
    destructive_confirm_actions:
      count: 4
      items:
        - id: action_admin_member_delete
          label: Admin — delete member (confirm dialog, no fields)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/members/[id]/page.tsx
            - frontend/components/admin/AdminConfirmDialog.tsx
            - frontend/lib/api.ts
            - backend/accounts/member_views.py
          notes: "Calls membersAPI.delete -> DELETE /api/members/{id}/delete/ (MemberDeleteView). Requires can_delete_member or superuser."
        - id: action_admin_group_delete
          label: Admin — delete access group (confirm dialog)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/groups/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/group_views.py
          notes: "Calls groupsAPI.delete -> DELETE /api/groups/{pk}/delete/ (AccessGroupDeleteView)."
        - id: action_admin_expense_delete
          label: Admin — delete expense (confirm dialog)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/expenses/page.tsx
            - frontend/lib/api.ts
            - backend/fund/views.py
          notes: "Calls fundAPI.deleteExpense -> DELETE /api/fund/expenses/{pk}/delete/ (ExpenseDeleteView, permission_classes includes HasGroupPermission('can_manage_permissions')). NOTE: this is the ONLY delete endpoint in the fund app — Contributions cannot be deleted by anyone (ContributionDeleteView was removed in Phase 24; all.yaml has been corrected to reflect this)."
        - id: action_admin_post_image_delete
          label: Admin — delete post / delete a single post image
          scope: frontend
          location:
            - frontend/app/[locale]/admin/posts/page.tsx
            - frontend/lib/api.ts
            - backend/posts/views.py
          notes: "Two related confirm actions: postsAPI.delete -> DELETE /api/posts/{pk}/delete/ (PostDeleteView), and per-image delete -> DELETE /api/posts/{pk}/images/{image_id}/delete/ (PostImageDeleteView). NOTE: this is the ONLY delete endpoint in the posts app for content — Comments cannot be deleted by anyone (CommentDeleteView was removed in Phase 24; all.yaml has been corrected to reflect this)."
    status_change_buttons:
      count: 5
      items:
        - id: action_admin_group_set_default
          label: Admin — set group as default (button)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/groups/page.tsx
            - frontend/lib/api.ts
            - backend/accounts/group_views.py
          notes: "Calls groupsAPI.setDefault -> PATCH /api/groups/{pk}/set-default/ (AccessGroupSetDefaultView). Default group is auto-assigned to new registrants (see BASELINE_GROUP_PERMISSIONS)."
        - id: action_admin_contribution_approve_reject
          label: Admin — approve/reject pending contribution
          scope: frontend
          location:
            - frontend/app/[locale]/admin/contributions/page.tsx
            - frontend/lib/api.ts
            - backend/fund/views.py
            - backend/fund/serializers.py
          notes: "Buttons; reject path shows a rejectReason textarea. Calls fundAPI.updateContribution(id, {status, rejection_reason?}) -> PATCH /api/fund/contributions/{pk}/edit/, or fundAPI.updateContributionStatus -> PATCH /api/fund/contributions/{pk}/status/ (ContributionStatusUpdateView + ContributionStatusSerializer) depending on flow."
        - id: action_admin_comment_approve_reject
          label: Admin — approve/reject pending comment
          scope: frontend
          location:
            - frontend/app/[locale]/admin/comments/page.tsx
            - frontend/lib/api.ts
            - backend/posts/views.py
            - backend/posts/serializers.py
          notes: "Calls commentsAPI.updateStatus -> PATCH /api/posts/comments/{pk}/status/ (CommentStatusUpdateView + CommentStatusSerializer), or commentsAPI.update with status+rejection_reason via CommentAdminEditView. Requires can_approve_comments."
        - id: action_admin_contact_toggle_handled
          label: Admin — toggle contact message handled/unhandled
          scope: frontend
          location:
            - frontend/app/[locale]/admin/contact-messages/page.tsx
            - frontend/lib/api.ts
            - backend/core/contact_views.py
          notes: "Calls contactAPI.toggleHandled(m.id) -> PATCH /api/contact/{pk}/toggle-handled/ (ContactMessageToggleHandledView). Requires can_manage_contact_messages."
        - id: action_admin_member_toggle_active
          label: Admin — toggle member active/inactive (see form_admin_member_deactivate)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/members/[id]/page.tsx
            - backend/accounts/member_views.py
          notes: "Cross-referenced with form_admin_member_deactivate above — listed here too because it is fundamentally a status-toggle action; the 'reason' field is optional metadata on top of the toggle."

search_inputs:
  scope: frontend
  total_count: 11
  description: Every search box or filter input across the frontend, verified individually for real-time (debounced) vs manual-submit vs absent behavior.
  subcategories:
    realtime_debounced:
      count: 2
      items:
        - id: search_posts
          label: Posts page search (real-time)
          scope: frontend
          location:
            - frontend/app/[locale]/posts/page.tsx
            - frontend/lib/api.ts
            - backend/posts/views.py
          notes: "300ms debounce (line ~120), triggers postsAPI.getList(page, search) -> GET /api/posts/?search=... (PostListView). One of only two real-time search inputs in the whole frontend."
        - id: search_expenses
          label: Expenses page search + filters (real-time)
          scope: frontend
          location:
            - frontend/app/[locale]/expenses/page.tsx
            - frontend/lib/api.ts
            - backend/fund/views.py
          notes: "300ms debounce (line ~58), combines 5 filters: search, dateFrom, dateTo, amountMin, amountMax -> GET /api/fund/expenses/?... (ExpenseListView). The other of only two real-time search inputs."
    manual_submit_filters:
      count: 6
      items:
        - id: search_admin_members
          label: Admin members list search (manual submit)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/members/page.tsx
            - backend/accounts/member_views.py
          notes: "Requires Enter/button submit, no debounce. Backend: Q(phone__icontains=search) OR name/email match in MemberListView."
        - id: search_admin_comments
          label: Admin comments filter (manual submit)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/comments/page.tsx
            - backend/posts/views.py
          notes: "Manual submit form, GET only, no debounce."
        - id: search_admin_contact_messages
          label: Admin contact-messages filter (manual submit)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/contact-messages/page.tsx
            - backend/core/contact_views.py
          notes: "Manual submit form, GET only, no debounce."
        - id: search_admin_contributions
          label: Admin contributions filter (manual submit)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/contributions/page.tsx
            - backend/fund/views.py
          notes: "Manual submit form, GET only, no debounce."
        - id: search_admin_logs_activity
          label: Admin activity-log filter — Actor + Action fields (manual submit)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/logs/activity/page.tsx
            - backend/logs/views.py
          notes: "Two text fields (Actor, Action), manual submit form, GET only, no debounce."
        - id: search_admin_logs_system
          label: Admin system-log filter — Source field (manual submit)
          scope: frontend
          location:
            - frontend/app/[locale]/admin/logs/system/page.tsx
            - backend/logs/views.py
          notes: "Single Source text field, manual submit form, GET only, no debounce."
    no_search_input:
      count: 3
      items:
        - id: search_admin_groups_absent
          label: Admin groups page — no search/filter input exists
          scope: frontend
          location:
            - frontend/app/[locale]/admin/groups/page.tsx
          notes: "Confirmed zero search or filter inputs on this page."
        - id: search_admin_posts_absent
          label: Admin posts page — no search/filter input exists
          scope: frontend
          location:
            - frontend/app/[locale]/admin/posts/page.tsx
          notes: "Confirmed zero search or filter inputs on this page."
        - id: search_admin_expenses_absent
          label: Admin expenses page (admin panel) — no search/filter input exists
          scope: frontend
          location:
            - frontend/app/[locale]/admin/expenses/page.tsx
          notes: "Confirmed zero search or filter inputs on this admin page (distinct from the public expenses/page.tsx which DOES have real-time search — see search_expenses)."
  notes_general: "There is no shared debounce hook/utility anywhere in the frontend — each of the two real-time inputs implements its own inline 300ms setTimeout/debounce logic independently. To make all search inputs real-time, each of the 9 non-realtime page.tsx files listed above would need its own debounce logic added (and the 3 'absent' pages would need a search input added first)."

api_calls:
  scope: frontend
  total_count: 13
  description: All HTTP client modules in frontend/lib/api.ts (single axios instance, baseURL from NEXT_PUBLIC_API_URL), grouped by the backend app they target.
  subcategories:
    api_modules:
      count: 13
      items:
        - id: api_authAPI
          label: authAPI — register/login/logout/profile/token-refresh
          scope: frontend
          location:
            - frontend/lib/api.ts
            - backend/accounts/views.py
            - backend/accounts/urls.py
          notes: "Methods: register, login, logout, getProfile, refreshToken. Targets /api/auth/*."
        - id: api_postsAPI
          label: postsAPI — list/detail/create/update/delete posts + image upload
          scope: frontend
          location:
            - frontend/lib/api.ts
            - backend/posts/views.py
            - backend/posts/urls.py
          notes: "Methods: getList, getDetail, getComments, createComment, create, update, delete, uploadImages, deleteImage. Targets /api/posts/*."
        - id: api_commentsAPI
          label: commentsAPI — comment list/detail/status/edit (global + own)
          scope: frontend
          location:
            - frontend/lib/api.ts
            - backend/posts/views.py
            - backend/posts/urls.py
          notes: "Methods: getList, getDetail, updateStatus, update, updateMine, getMine. Targets /api/posts/comments/*. Shared by both post-comments and expense-comments via target_type."
        - id: api_fundAPI
          label: fundAPI — balance, contributions, expenses, expense comments
