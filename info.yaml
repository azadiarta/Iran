django_forms:
  scope: backend
  total_count: 0
  description: "Django Forms (forms.py / django.forms.Form / ModelForm) do not exist anywhere in this codebase. Verified via direct search: `find backend -name forms.py` returns nothing, and the Django admin panel uses its own auto-generated forms (standard ModelAdmin behavior) rather than custom forms.py classes. All data validation/entry is handled via DRF Serializers (see serializers category) on the backend and plain React state + manual checks (see forms category) on the frontend."
  subcategories: {}

models:
  scope: backend
  total_count: 12
  description: All Django models across the 5 apps that define them (accounts, core, fund, logs, posts). Every model uses a UUIDField primary key (default=uuid.uuid4).
  subcategories:
    accounts_models:
      count: 2
      items:
        - id: model_Member
          label: Member — custom auth user model
          scope: backend
          location: [backend/accounts/models.py, backend/groupfund/settings.py]
          notes: "extends AbstractBaseUser. AUTH_USER_MODEL='accounts.Member'. Fields: full_name, display_name, group (FK AccessGroup), phone (CharField, unique, null/blank — the project's ONLY dedicated phone field, see contact_data_fields), email (EmailField, unique, null/blank), member_number (PositiveIntegerField, unique, auto-assigned), is_active, is_staff, is_superuser, deactivation_reason, deactivated_by (FK self), created_at, updated_at. Member.clean() (lines ~110-112) enforces phone-or-email present. MemberManager is the custom manager (create_user/create_superuser)."
        - id: model_AccessGroup
          label: AccessGroup — custom permission group
          scope: backend
          location: [backend/accounts/models.py]
          notes: "Fields: name (unique), description, is_default (bool — auto-assigned to new registrants), permissions (M2M to core.Permission), created_at, updated_at. Replaces Django's built-in Group model entirely — Member.group is a single FK to AccessGroup, not Django's M2M user-groups."
    core_models:
      count: 3
      items:
        - id: model_Permission
          label: Permission — seeded app-level permission codename
          scope: backend
          location: [backend/core/models.py, backend/core/seed_initial_data.py]
          notes: "Fields: codename (unique), label, description, created_at. Exactly 13 seeded rows: can_contribute, can_comment, can_post, can_expense, can_view_balance, can_view_posts, can_view_dashboard, can_approve_comments, can_delete_member, can_change_any_password, can_manage_permissions, can_manage_contact_messages, can_view_member_details. NOT Django's built-in auth.Permission model."
        - id: model_DefaultSetting
          label: DefaultSetting — site-wide key/value config store
          scope: backend
          location: [backend/core/models.py, backend/core/settings_views.py, backend/core/seed_initial_data.py]
          notes: "Fields: key (unique), value (TextField — often JSON-encoded), description, updated_by (FK Member), created_at, updated_at. Holds payment-method config (MANUAL_FIELDS, PAYPAL_FIELDS), contact_phone (org's public phone — see contact_data_fields), and other site settings. Per-key validation in _validate_value() (core/settings_views.py)."
        - id: model_ContactMessage
          label: ContactMessage — public contact-form submission
          scope: backend
          location: [backend/core/models.py, backend/core/contact_views.py, backend/core/serializers.py]
          notes: "Fields: tracking_code (auto, see tracking_code_scheme), name, contact_info (CharField — generic free-text contact method, NOT phone-specific, see contact_data_fields), message, sender (FK Member, null if guest), is_handled, handled_by (FK Member), handled_at, created_at."
    fund_models:
      count: 2
      items:
        - id: model_Contribution
          label: Contribution — a fund contribution (self-service or admin-manual)
          scope: backend
          location: [backend/fund/models.py, backend/fund/views.py, backend/fund/serializers.py, backend/payments/views.py]
          notes: "Fields: tracking_code (auto), contributor (FK Member, null if guest), guest_name, amount (Decimal 11,2), currency (default GBP), payment_method (choices), status (choices: pending/pending_review/completed/failed), notes, receipt_image (ImageField, blank — only populated via self-service flow), show_in_public_list, display_name_choice, public_display_name, message (max 150), rejection_reason, created_at, updated_at. NO delete capability exists (see ep_contribution_admin_detail notes)."
        - id: model_Expense
          label: Expense — an organizational expense/withdrawal
          scope: backend
          location: [backend/fund/models.py, backend/fund/views.py, backend/fund/serializers.py]
          notes: "Fields: withdrawn_by (FK Member), amount (Decimal 10,2), short_reason, description, receipt_image (ImageField, blank), expense_date (DateField), created_at, updated_at. Is the only fund-app model with a working delete endpoint (ExpenseDeleteView)."
    logs_models:
      count: 2
      items:
        - id: model_ActivityLog
          label: ActivityLog — audit trail of member actions
          scope: backend
          location: [backend/logs/models.py, backend/logs/views.py]
          notes: "Fields: actor (FK Member, null if system/guest), actor_display, action (free text, e.g. 'member.delete'), target_type (FK ContentType), target_id (UUID), target_display, ip_address, extra_data (JSONField — before/after snapshots), created_at. Written via per-app private _log() helper functions (one each in accounts/member_views.py, accounts/group_views.py, accounts/views.py, fund/views.py, posts/views.py, core/contact_views.py, payments/views.py) — no single shared logging utility module exists, the pattern is duplicated per-app."
        - id: model_SystemLog
          label: SystemLog — system-level event/error log
          scope: backend
          location: [backend/logs/models.py, backend/logs/views.py]
          notes: "Fields: level (choices, e.g. INFO/WARNING/ERROR), source (free text, e.g. app/module name), message, extra_data (JSONField), related_member (FK Member, nullable), ip_address, created_at."
    posts_models:
      count: 3
      items:
        - id: model_Post
          label: Post — announcement/news post
          scope: backend
          location: [backend/posts/models.py, backend/posts/views.py, backend/posts/serializers.py]
          notes: "Fields: author (FK Member), title (max 150), body (TextField), created_at, updated_at."
        - id: model_PostImage
          label: PostImage — image attached to a Post
          scope: backend
          location: [backend/posts/models.py, backend/posts/views.py, backend/posts/serializers.py]
          notes: "Fields: post (FK Post, related_name='images'), image (ImageField, upload_to='posts/'), uploaded_at."
        - id: model_Comment
          label: Comment — generic comment on a Post or Expense
          scope: backend
          location: [backend/posts/models.py, backend/posts/views.py, backend/posts/serializers.py]
          notes: "Fields: tracking_code (auto), author (FK Member, null if guest), guest_name, content_type/object_id (GenericForeignKey — target is Post or Expense), text, rating (IntegerField 1-5, nullable), status (choices: pending/approved/rejected), rejection_reason, created_at, updated_at. NO delete capability exists for any comment (see ep_comment_admin_edit_update_detail notes)."
  notes_general: "Total of 12 models matches the 12 admin_panel registrations exactly — every model in the project is registered in the Django admin."

