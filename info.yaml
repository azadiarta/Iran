        - id: ser_AccessGroupSerializer
          label: AccessGroupSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "Used by AccessGroupListView."
        - id: ser_AccessGroupCreateSerializer
          label: AccessGroupCreateSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "Used by AccessGroupCreateView."
        - id: ser_AccessGroupUpdateSerializer
          label: AccessGroupUpdateSerializer
          scope: backend
          location: [backend/accounts/serializers.py]
          notes: "Used by AccessGroupUpdateView."
    core_serializers:
      count: 4
      items:
        - id: ser_PermissionSerializer
          label: PermissionSerializer
