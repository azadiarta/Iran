          label: "langStore (Zustand) vs. [locale] URL segment — two parallel locale signals"
          scope: frontend
          location: [frontend/store/langStore.ts, frontend/middleware.ts]
          notes: "The [locale] URL segment is the canonical source of truth for next-intl; langStore additionally persists a user preference to localStorage ('groupfund-lang') used for things like the initial redirect/default before a [locale] segment is known. Kept in sync but are two distinct mechanisms — worth knowing both exist when debugging locale bugs."
